---
dgxcluster:
  children:
    k3sserver:
    dgxsparks:
    fullvlans:

k3sserver:
  hosts:
    k3smaster:
      # Real values in host_vars/k3smaster/vault.yml
      ansible_host: "192.168.123.100"
      clevis_luks_passphrase: "changeme"
      host_octet: 100
      mailname: "k3smaster.example.com"
      ovs_bridge_name: "br0"
      default_route_iface: "br0.123"
      k3s_node_ip: "192.168.124.100"

      isk3smaster: true
      isk3sserver: true
      hw_iface: "enx6c1ff7c1da8d"
      wantsnetplan: true
      fail2ban_sendermail: "fail2ban@{{ mailname }}"
      wantsopenvswitch: true
      ovs_bridge_iface: "enx6c1ff7c1da8d"
      wantsclevis: true
      wantsnut: true

      # K3s Node-Labels
      k3s_node_labels:
        - "node-role=k3smaster"
        - "kubernetes.io/arch=amd64"

      # Policy-Routing: extra routes (Netplan)
      ovs_vlan_extra:
        123:
          extra_routes:
            - to: default
              via: 192.168.123.1
              table: 123
            - to: 192.168.122.0/24
              via: 192.168.123.1
              table: 123

      # fwmark return-path routing
      fwmark_routing:
        - iface: "br0.123"
          mark: "0x65"
          inbound_src: "192.168.122.0/24"
          inbound_dst: "192.168.123.100"
          table: 123

      # Keine GPU
      has_nvidia_gpu: false

      # smartd (falls Festplatten vorhanden)
      smartd_devices: [ ]
      #  - { device: "/dev/sda", type: "auto" }
    spark1:
      # Real values in host_vars/spark1/vault.yml
      ansible_host: "192.168.124.101"
      clevis_luks_passphrase: "changeme"
      host_octet: 101
      mailname: "spark1.example.com"
      default_route_iface: "br0.124"
      k3s_node_ip: "192.168.124.101"
      qsfp_ip: "10.10.10.101"

      wantsclevis: true
      isk3sserver: true
      hw_iface: "enP7s7"
      wantsnetplan: true
      isdgxspark: true
      spark_id: 1
      is_sglang_head: true
      fail2ban_sendermail: "fail2ban@{{ mailname }}"

      # Netzwerk — OVS Bridge auf enP7s7
      ovs_bridge_iface: "enP7s7"

      # K3s
      k3s_node_labels:
        - "spark-id=1"
        - "nvidia.com/gpu.present=true"
        - "kubernetes.io/arch=arm64"

      has_nvidia_gpu: true

      # smartd
      smartd_devices:
        - { device: "/dev/nvme0n1", type: "nvme" }
    spark2:
      # Real values in host_vars/spark2/vault.yml
      ansible_host: "192.168.124.102"
      clevis_luks_passphrase: "changeme"
