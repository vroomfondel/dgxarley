        - "kubernetes.io/arch=arm64"

      has_nvidia_gpu: true

      # smartd
      smartd_devices:
        - { device: "/dev/nvme0n1", type: "nvme" }
    spark3:
      # Real values in host_vars/spark3/vault.yml
      ansible_host: "192.168.124.103"
      clevis_luks_passphrase: "changeme"
      host_octet: 103
      mailname: "spark3.example.com"
      default_route_iface: "br0.124"
      k3s_node_ip: "192.168.124.103"
      qsfp_ip: "10.10.10.103"

      wantsclevis: true
      isk3sserver: true
      hw_iface: "enP7s7"
      wantsnetplan: true
      isdgxspark: true
      spark_id: 3
      is_sglang_head: false
      fail2ban_sendermail: "fail2ban@{{ mailname }}"

      # Netzwerk — OVS Bridge auf enP7s7
      ovs_bridge_iface: "enP7s7"

      # K3s
      k3s_node_labels:
        - "spark-id=3"
