      wantsnetplan: true
      isdgxspark: true
      spark_id: 2
      is_sglang_head: false
      fail2ban_sendermail: "fail2ban@{{ mailname }}"

      # Netzwerk — OVS Bridge auf enP7s7
      ovs_bridge_iface: "enP7s7"

      # K3s
      k3s_node_labels:
        - "spark-id=2"
