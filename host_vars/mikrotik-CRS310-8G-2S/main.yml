---
# Dummy values — overridden by vault.yml

ansible_host: "192.168.123.2"
ansible_password: "changeme"
serial_number: "CHANGEME"
# ansible_private_key_file: "~/.ssh/id_ed25519"
# ansible_network_cli_ssh_type: libssh
ansible_ssh_user: "mikrotikadmin"

mikrotik_bridge_name: bridge

mikrotik_bridge_ports:
  - interface: ether1
    pvid: 123
    comment: "Uplink (Netgear)"
  - interface: ether2
    pvid: 191
    comment: "mikrotik-CRS812-8DS-2DQ-2DDQ-RM access"
  - interface: ether3
    pvid: 123
    comment: "k3smaster OVS trunk"
  - interface: ether5
    pvid: 124
    comment: "spark1 access"
  - interface: ether7
    pvid: 124
    comment: "spark2 access"
  - interface: ether6
    pvid: 124
    comment: "spark3 access"
  - interface: ether8
    pvid: 124
    comment: "spark4 access"

mikrotik_bridge_vlans:
  - vlan_ids: 123
    tagged: "bridge,ether1"
    untagged: "ether3"
  - vlan_ids: 124
    tagged: "bridge,ether1,ether3"
    untagged: "ether2,ether5,ether6,ether7,ether8"

mikrotik_mgmt_interfaces:
  - name: vlan123-mgmt
    vlan_id: 123
    address: "192.168.123.2/24"
  - name: vlan124-mgmt
    vlan_id: 124
    address: "192.168.124.1/24"

mikrotik_default_gateway: "192.168.123.1"
mikrotik_dns_servers:
  - "192.168.123.1"

mikrotik_fasttrack_enabled: true

mikrotik_srcnat_rules:
  - comment: "masquerade vlan124 to vlan123"
    chain: srcnat
    action: masquerade
    src_address: "192.168.124.0/24"
    out_interface: vlan123-mgmt

mikrotik_dhcp_servers:
  - name: dhcp-vlan124
    interface: vlan124-mgmt
    pool_name: dhcp-pool-vlan124
    pool_ranges: "192.168.124.100-192.168.124.199"
    network: "192.168.124.0/24"
    gateway: "192.168.124.1"
    dns_server: "192.168.123.1"