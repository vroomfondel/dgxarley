---
# SGLang distributed inference — one deployment per entry in sglang_instances.
# The single-instance case is just sglang_instances.default (renders byte-identical
# resources to the pre-refactor deployment). All instance-specific logic lives in
# sglang_instance.yml; this file only fans out over the instance map.
#
# Per-instance variable wiring (see roles/k8s_dgx/defaults/main.yml for the schema):
#   inst                     = _sglang_instance_defaults merged under the entry
#   _sglang_active_model     = inst.model     -> re-resolves all model-derived knobs
#   _sglang_active_nnodes    = #nodes         -> re-resolves tp/pp + QSFP IP slice
#   _sglang_active_sriov_key = inst.sriov_key -> selects the VF + QSFP IP block
#   _sglang_active_{tp,pp,ep} = inst overrides ("" = derive from profile/nnodes)
- name: Deploy each SGLang instance
  ansible.builtin.include_tasks: sglang_instance.yml
  loop: "{{ sglang_instances | dict2items }}"
  loop_control:
    loop_var: _inst_item
    label: "{{ _inst_item.key }}"
  vars:
    _inst_key: "{{ _inst_item.key }}"
    inst: "{{ _sglang_instance_defaults | combine(_inst_item.value) }}"
    _sglang_active_model: "{{ inst.model }}"
    _sglang_active_nnodes: "{{ inst.nodes | length }}"
    _sglang_active_sriov_key: "{{ inst.sriov_key }}"
    _sglang_active_tp: "{{ inst.tp_size | default('') }}"
    _sglang_active_pp: "{{ inst.pp_size | default('') }}"
    _sglang_active_ep: "{{ inst.ep_size | default('') }}"
