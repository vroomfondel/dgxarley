---
#- name: Skip LiteLLM — litellm_enabled is false
#  ansible.builtin.debug:
#    msg: "LiteLLM deployment skipped (litellm_enabled={{ litellm_enabled }}). Set litellm_enabled: true to deploy."
#  when: not litellm_enabled
#  tags: litellm

- name: Create litellm namespace
  kubernetes.core.k8s:
    name: "{{ litellm_namespace }}"
    api_version: v1
    kind: Namespace
    state: present


# ============================================================================
# PostgreSQL Database Check/Create (idempotent)
# ============================================================================
# The init-script in kubectlstuff_postgresql.yml (4_createdb_litellm.sh) only
# runs on a fresh PG data dir. For existing clusters we ensure the litellm
# role + DB exist at runtime — same pattern as windmill/openwebui.

- name: Get litellm database password from postgresql-secrets
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: postgresql-secrets
    namespace: postgresql
  register: postgresql_secrets_info

- name: Set litellm credential facts
  set_fact:
    litellm_db_password: "{{ postgresql_secrets_info.resources[0].data.LITELLM_POSTGRES_PASSWORD | b64decode }}"

- name: Get PostgreSQL pod
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: postgresql
    label_selectors:
      - app=postgresql
  register: postgresql_pods

- name: Set PostgreSQL pod name fact
  set_fact:
    postgresql_pod_name: "{{ postgresql_pods.resources[0].metadata.name }}"

- name: Ensure litellm user and database exist in PostgreSQL
  kubernetes.core.k8s_exec:
    namespace: postgresql
    pod: "{{ postgresql_pod_name }}"
    command: |
      bash -c '
        set -e
        LITELLM_PASSWORD="{{ litellm_db_password }}"

        if psql -U postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='\''litellm'\''" | grep -q 1; then
          psql -U postgres -c "ALTER USER litellm WITH PASSWORD '\''${LITELLM_PASSWORD}'\'';"
          echo "User litellm: exists (password ensured)"
        else
          psql -U postgres -c "CREATE USER litellm WITH PASSWORD '\''${LITELLM_PASSWORD}'\'';"
          echo "User litellm: created"
        fi

        if psql -U postgres -tAc "SELECT 1 FROM pg_database WHERE datname='\''litellm'\''" | grep -q 1; then
          echo "Database litellm: exists"
        else
          psql -U postgres -c "CREATE DATABASE litellm OWNER litellm;"
          psql -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE litellm TO litellm;"
          echo "Database litellm: created"
        fi
      '
  register: litellm_db_ensure
  changed_when: "'created' in litellm_db_ensure.stdout"


- name: Create litellm env secret (master_key, salt, DB URL, UI creds)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: litellm-env
        namespace: "{{ litellm_namespace }}"
      type: Opaque
      stringData:
        # Admin bearer token for the proxy API (sk-... style). Used as
        # Authorization: Bearer <master_key> for /key/generate, /user/new etc.
        LITELLM_MASTER_KEY: "{{ litellm_master_key }}"
        # Encrypts persisted virtual-key hashes in the DB. Changing this
        # invalidates existing keys — treat as immutable after first deploy.
        LITELLM_SALT_KEY: "{{ litellm_salt_key }}"
        # Postgres-backed mode: enables virtual keys, users, teams, budgets,
        # spend tracking. Without DATABASE_URL LiteLLM runs in config-only mode.
        DATABASE_URL: "postgresql://litellm:{{ litellm_db_password }}@postgresql.postgresql.svc.cluster.local:5432/litellm"
        # Persist models added via the UI/API to the DB (in addition to the
        # static model_list from config.yaml).
        STORE_MODEL_IN_DB: "True"
        # Admin UI at /ui — login form credentials.
        UI_USERNAME: "{{ litellm_ui_username }}"
        UI_PASSWORD: "{{ litellm_ui_password }}"


- name: Create litellm config
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: litellm-config
        namespace: "{{ litellm_namespace }}"
      data:
        config.yaml: |
          model_list:
          {% for entry in litellm_model_list %}
            - model_name: "{{ entry.model_name }}"
              litellm_params:
          {% for key, value in entry.litellm_params.items() %}
          {% if value is defined and value is not none and value != omit and key != 'ssl_verify' %}
                {{ key }}: {{ value | to_json }}
          {% endif %}
          {% endfor %}
          {% endfor %}

          litellm_settings:
          {% for key, value in litellm_settings.items() %}
            {{ key }}: {{ value | to_json }}
          {% endfor %}

          general_settings:
            # master_key is sourced from LITELLM_MASTER_KEY env (see Secret).
            # store_model_in_db mirrors STORE_MODEL_IN_DB — belt & suspenders.
            store_model_in_db: true
          {% if litellm_guardrails | length > 0 %}

          # Guardrails — rendered only when litellm_guardrails is non-empty.
          # See defaults/main.yml for the commented catalogue of examples.
          guardrails:
          {% for entry in litellm_guardrails %}
            - guardrail_name: "{{ entry.guardrail_name }}"
              litellm_params:
          {% for key, value in entry.litellm_params.items() %}
          {% if value is defined and value is not none and value != omit %}
                {{ key }}: {{ value | to_json }}
          {% endif %}
          {% endfor %}
          {% endfor %}
          {% endif %}
  

- name: Create litellm service
  kubernetes.core.k8s:
    state: present
    definition:
      kind: Service
      apiVersion: v1
      metadata:
        name: litellm
        namespace: "{{ litellm_namespace }}"
        labels:
          app: litellm
      spec:
        selector:
          app: litellm
        ports:
          - port: "{{ litellm_port }}"
            name: litellm
            targetPort: "{{ litellm_port }}"
            protocol: TCP


- name: Create litellm deployment
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: litellm
        namespace: "{{ litellm_namespace }}"
        labels:
          app: litellm
        annotations:
          keel.sh/policy: force
          keel.sh/match-tag: "true"
          keel.sh/pollSchedule: "@every 24h"
          keel.sh/trigger: poll
      spec:
        replicas: "{{ 1 if litellm_enabled else 0}}"
        strategy:
          type: Recreate
        selector:
          matchLabels:
            app: litellm
        template:
          metadata:
            labels:
              app: litellm
            annotations:
              checksum/config: "{{ litellm_model_list | string | hash('sha256') }}"
          spec:
            nodeSelector:
              kubernetes.io/arch: amd64
            dnsConfig:
              options:
                - name: ndots
                  value: "1"
            containers:
              - name: litellm
                image: "{{ litellm_image }}"
                imagePullPolicy: Always
                args:
                  - "--config"
                  - "/app/config.yaml"
                  - "--port"
                  - "{{ litellm_port | string }}"
                ports:
                  - containerPort: "{{ litellm_port }}"
                    protocol: TCP
                envFrom:
                  - secretRef:
                      name: litellm-env
                resources:
                  requests:
                    cpu: 100m
                    memory: 512Mi
                  limits:
                    cpu: "1"
                    memory: 1536Mi
                readinessProbe:
                  httpGet:
                    path: /health/readiness
                    port: "{{ litellm_port }}"
                  initialDelaySeconds: 10
                  periodSeconds: 15
                livenessProbe:
                  httpGet:
                    path: /health/liveliness
                    port: "{{ litellm_port }}"
                  initialDelaySeconds: 15
                  periodSeconds: 30
                volumeMounts:
                  - name: config
                    mountPath: /app/config.yaml
                    subPath: config.yaml
                    readOnly: true
            restartPolicy: Always
            volumes:
              - name: config
                configMap:
                  name: litellm-config


- name: Create litellm ip-allowlist middleware
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: litellm-ip-allowlist
        namespace: "{{ litellm_namespace }}"
      spec:
        ipAllowList:
          sourceRange: "{{ traefik_internal_allowlist }}"


- name: Create litellm http to https redirect middleware
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: redirect-myhttps
        namespace: "{{ litellm_namespace }}"
      spec:
        redirectScheme:
          scheme: https


- name: Create litellm TLS certificate
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: "litellm.{{ dns_external_domain_suffix }}"
        namespace: "{{ litellm_namespace }}"
      spec:
        dnsNames:
          - "litellm.{{ dns_external_domain_suffix }}"
        secretName: "litellm.{{ dns_external_domain_suffix }}"
        issuerRef:
          name: letsencrypt-production
          kind: ClusterIssuer


- name: Create litellm http ingressroute with redirect
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: litellm-ingress
        namespace: "{{ litellm_namespace }}"
      spec:
        entryPoints:
          - web
        routes:
        - kind: Rule
          match: "Host(`litellm.{{ dns_external_domain_suffix }}`)"
          priority: 10
          services:
          - kind: Service
            name: litellm
            namespace: "{{ litellm_namespace }}"
            passHostHeader: true
            port: "{{ litellm_port }}"
          middlewares:
            - name: redirect-myhttps
            - name: litellm-ip-allowlist


- name: Create litellm https ingressroute
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: litellm-https-ingress
        namespace: "{{ litellm_namespace }}"
      spec:
        entryPoints:
          - websecure
        routes:
          - kind: Rule
            match: "Host(`litellm.{{ dns_external_domain_suffix }}`)"
            priority: 10
            middlewares:
              - name: litellm-ip-allowlist
            services:
              - kind: Service
                name: litellm
                namespace: "{{ litellm_namespace }}"
                passHostHeader: true
                port: "{{ litellm_port }}"
        tls:
          secretName: "litellm.{{ dns_external_domain_suffix }}"


- name: Register DNS A record for litellm
  community.general.nsupdate:
    server: "{{ nsupdate_server }}"
    zone: "{{ nsupdate_zone }}"
    key_name: "{{ nsupdate_tsig_key_name }}"
    key_secret: "{{ nsupdate_tsig_key_secret }}"
    key_algorithm: "{{ nsupdate_tsig_algorithm }}"
    record: "litellm.{{ dns_external_domain_suffix }}."
    type: A
    ttl: "{{ nsupdate_ttl }}"
    value: "{{ nsupdate_ingress_ip }}"
    state: present


