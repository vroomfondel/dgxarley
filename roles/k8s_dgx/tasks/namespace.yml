---
- name: Create workload namespaces
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ item }}"
  loop:
    - "{{ sglang_namespace }}"
    - "{{ vllm_namespace }}"
    # openwebui_namespace moved to the k8s_infra role (apps/openwebui.yml
    # creates the openwebui namespace itself now).
