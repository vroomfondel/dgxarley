---
# Pre-shard the active SGLang model for fast multi-node TP loading.
# Runs as a multi-node job (worker + head), same topology as SGLang itself.
# Each node saves its own TP rank's sharded weights locally.
#
# Usage:
#   ansible-playbook k8s_dgx.yml --tags sglang_shard
#
# Prerequisites:
# - Model must be downloaded (run hf_preload first)
# - Ollama pods should be scaled to 0 (the Job needs full GPU memory)
# - After completion, set load_format: "sharded_state" in the model profile

- name: Skip shard job — load_format is not sharded_state
  ansible.builtin.debug:
    msg: >-
      Shard job skipped: sglang_load_format={{ sglang_load_format }}.
      Set load_format: "sharded_state" in the model profile for
      {{ sglang_model }} to enable sharding.
  when: sglang_load_format != "sharded_state"

- name: Create SGLang shard script ConfigMap
  when: sglang_load_format == "sharded_state"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: sglang-shard-script
        namespace: "{{ dgx_namespace }}"
      data:
        save_sharded.py: "{{ lookup('file', role_path ~ '/files/sglang_save_sharded.py') }}"
        launch.sh: "{{ lookup('file', role_path ~ '/files/sglang_shard_launch.sh') }}"

- name: Create SGLang wait-for-worker script ConfigMap
  when: sglang_load_format == "sharded_state"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: sglang-wait-script
        namespace: "{{ dgx_namespace }}"
      data:
        wait_for_worker.sh: "{{ lookup('file', role_path ~ '/files/sglang_wait_for_worker.sh') }}"

- name: Delete existing SGLang shard Jobs
  when: sglang_load_format == "sharded_state"
  kubernetes.core.k8s:
    state: absent
    api_version: batch/v1
    kind: Job
    name: "{{ item }}"
    namespace: "{{ dgx_namespace }}"
  loop:
    - sglang-shard-worker
    - sglang-shard-head

# Worker must start first (same ordering as SGLang deployment).
# The head's NCCL rendezvous needs the worker to be reachable.
- name: Deploy SGLang shard worker Job
  when: sglang_load_format == "sharded_state"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: sglang-shard-worker
        namespace: "{{ dgx_namespace }}"
        labels:
          app: sglang-shard
          role: worker
      spec:
        ttlSecondsAfterFinished: 3600
        backoffLimit: 0
        template:
          metadata:
            labels:
              app: sglang-shard
              role: worker
            annotations:
              k8s.v1.cni.cncf.io/networks: qsfp-direct-worker
          spec:
            serviceAccountName: sglang-head
            enableServiceLinks: false
            hostIPC: true
            nodeSelector:
              spark-id: "2"
            restartPolicy: Never
            initContainers:
              - name: model-download
                image: "{{ sglang_image }}"
                command: ["python3", "/scripts/download_models.py"]
                env:
                  - name: HF_PRELOAD_MODELS
                    value: "{{ sglang_model }}"
                  - name: HF_TOKEN
                    value: "{{ hf_token }}"
                  - name: HF_HUB_DISABLE_PROGRESS_BARS
                    value: "0"
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: preload-script
                    mountPath: /scripts
                    readOnly: true
            containers:
              - name: shard
                image: "{{ sglang_image }}"
                command: ["/bin/bash", "/scripts/launch.sh"]
                env:
                  - name: NODE_RANK
                    value: "1"
                  - name: TP
                    value: "{{ sglang_tp | string }}"
                  - name: EP
                    value: "{{ sglang_ep | string }}"
                  - name: NNODES
                    value: "{{ sglang_nnodes | string }}"
                  - name: SGLANG_MODEL
                    value: "{{ sglang_model }}"
                  - name: SGLANG_QUANTIZATION
                    value: "{{ sglang_quantization }}"
                  - name: SGLANG_ATTENTION_BACKEND
                    value: "{{ sglang_attention_backend }}"
                  - name: SGLANG_FP4_GEMM_BACKEND
                    value: "{{ sglang_fp4_gemm_backend }}"
                  - name: QSFP_IP_SPARK1
                    value: "{{ qsfp_ip_spark1 }}"
                  - name: QSFP_IP_SPARK2
                    value: "{{ qsfp_ip_spark2 }}"
                  - name: NCCL_PORT
                    value: "{{ nccl_bootstrap_port | string }}"
                  - name: HF_TOKEN
                    value: "{{ hf_token }}"
                  - name: SGLANG_ENABLE_JIT_DEEPGEMM
                    value: "{{ 'false' if sglang_disable_deep_gemm | bool else 'true' }}"
                  - name: PYTORCH_CUDA_ALLOC_CONF
                    value: "expandable_segments:True"
                  - name: NCCL_SOCKET_IFNAME
                    value: "{{ nccl_socket_ifname }}"
                  - name: NCCL_IB_DISABLE
                    value: "1"
                  - name: NCCL_DEBUG
                    value: "INFO"
                resources:
                  limits:
                    nvidia.com/gpu: "1"
                securityContext:
                  privileged: true
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: shard-script
                    mountPath: /scripts
                    readOnly: true
            volumes:
              - name: hf-cache
                hostPath:
                  path: "{{ hf_cache_path }}"
                  type: DirectoryOrCreate
              - name: preload-script
                configMap:
                  name: sglang-model-download-script
              - name: shard-script
                configMap:
                  name: sglang-shard-script
                  defaultMode: 0755

- name: Deploy SGLang shard head Job
  when: sglang_load_format == "sharded_state"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: sglang-shard-head
        namespace: "{{ dgx_namespace }}"
        labels:
          app: sglang-shard
          role: head
      spec:
        ttlSecondsAfterFinished: 3600
        backoffLimit: 0
        template:
          metadata:
            labels:
              app: sglang-shard
              role: head
            annotations:
              k8s.v1.cni.cncf.io/networks: qsfp-direct
          spec:
            serviceAccountName: sglang-head
            enableServiceLinks: false
            hostIPC: true
            nodeSelector:
              spark-id: "1"
            restartPolicy: Never
            initContainers:
              - name: model-download
                image: "{{ sglang_image }}"
                command: ["python3", "/scripts/download_models.py"]
                env:
                  - name: HF_PRELOAD_MODELS
                    value: "{{ sglang_model }}"
                  - name: HF_TOKEN
                    value: "{{ hf_token }}"
                  - name: HF_HUB_DISABLE_PROGRESS_BARS
                    value: "0"
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: preload-script
                    mountPath: /scripts
                    readOnly: true
              - name: wait-for-worker
                image: bitnami/kubectl:latest
                command: ["/bin/sh", "/scripts/wait_for_worker.sh"]
                env:
                  - name: WAIT_NAMESPACE
                    value: "{{ dgx_namespace }}"
                  - name: WAIT_LABEL
                    value: "app=sglang-shard,role=worker"
                volumeMounts:
                  - name: wait-script
                    mountPath: /scripts
                    readOnly: true
            containers:
              - name: shard
                image: "{{ sglang_image }}"
                command: ["/bin/bash", "/scripts/launch.sh"]
                env:
                  - name: NODE_RANK
                    value: "0"
                  - name: TP
                    value: "{{ sglang_tp | string }}"
                  - name: EP
                    value: "{{ sglang_ep | string }}"
                  - name: NNODES
                    value: "{{ sglang_nnodes | string }}"
                  - name: SGLANG_MODEL
                    value: "{{ sglang_model }}"
                  - name: SGLANG_QUANTIZATION
                    value: "{{ sglang_quantization }}"
                  - name: SGLANG_ATTENTION_BACKEND
                    value: "{{ sglang_attention_backend }}"
                  - name: SGLANG_FP4_GEMM_BACKEND
                    value: "{{ sglang_fp4_gemm_backend }}"
                  - name: QSFP_IP_SPARK1
                    value: "{{ qsfp_ip_spark1 }}"
                  - name: QSFP_IP_SPARK2
                    value: "{{ qsfp_ip_spark2 }}"
                  - name: NCCL_PORT
                    value: "{{ nccl_bootstrap_port | string }}"
                  - name: HF_TOKEN
                    value: "{{ hf_token }}"
                  - name: SGLANG_ENABLE_JIT_DEEPGEMM
                    value: "{{ 'false' if sglang_disable_deep_gemm | bool else 'true' }}"
                  - name: PYTORCH_CUDA_ALLOC_CONF
                    value: "expandable_segments:True"
                  - name: NCCL_SOCKET_IFNAME
                    value: "{{ nccl_socket_ifname }}"
                  - name: NCCL_IB_DISABLE
                    value: "1"
                  - name: NCCL_DEBUG
                    value: "INFO"
                  - name: RSYNC_TARGET
                    value: "{{ hostvars['spark2']['ansible_host'] }}"
                  - name: HF_CACHE_HOST_PATH
                    value: "{{ hf_cache_path }}"
                resources:
                  limits:
                    nvidia.com/gpu: "1"
                securityContext:
                  privileged: true
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: shard-script
                    mountPath: /scripts
                    readOnly: true
                  - name: ssh-keys
                    mountPath: /root/.ssh
                    readOnly: true
            volumes:
              - name: hf-cache
                hostPath:
                  path: "{{ hf_cache_path }}"
                  type: DirectoryOrCreate
              - name: preload-script
                configMap:
                  name: sglang-model-download-script
              - name: shard-script
                configMap:
                  name: sglang-shard-script
                  defaultMode: 0755
              - name: wait-script
                configMap:
                  name: sglang-wait-script
                  defaultMode: 0755
              - name: ssh-keys
                hostPath:
                  path: /root/.ssh
                  type: Directory
