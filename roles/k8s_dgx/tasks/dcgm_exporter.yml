---
# =============================================================================
# NVIDIA DCGM EXPORTER — Per-GPU metrics for Prometheus
#
# Runs as a DaemonSet on every spark (selector nvidia.com/gpu.present=true,
# set by NFD via hosts.yml). Consumes one time-slice via nvidia.com/gpu=1
# (cluster has nvidia_gpu_timeslice_replicas={{ nvidia_gpu_timeslice_replicas }} per GPU).
#
# SINGLE-SERIES-PER-GPU (changed 2026-06-05): DCGM_EXPORTER_KUBERNETES is set to
# "false" so DCGM does NOT attach per-consumer pod/namespace/container labels.
# With GPU time-slicing (nvidia_gpu_timeslice_replicas per physical GPU) the K8s
# integration emitted the SAME physical GPU's metric once per GPU-holding pod
# (the exporter itself + every time-sliced consumer: sglang, ollama, …) — identical
# gpu+instance, different pod/container labels → duplicate Grafana legend rows
# ("GPU 0 (spark1)" twice) and sum() double-counting. Disabling it yields exactly
# one series per physical GPU. Because the dcgm scrape job adds no `pod` label
# (only node→instance/node, see prometheus.yml), the series identity is
# also stable across exporter pod restarts. Trade-off: we lose GPU↔pod attribution
# joins — not used by any dashboard/alert here; GPU hardware metrics are physical-GPU
# properties. To re-enable, flip the env back to "true" (the pod-resources mount and
# GPU_ID_TYPE below are kept inert for exactly that). The dcgm-exporter-12239 dashboard
# also wraps every selector in `max by (gpu, instance)(…)` as a second layer of dedup.
# =============================================================================

- name: Create dcgm-exporter DaemonSet
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: dcgm-exporter
        namespace: monitoring
        labels:
          app.kubernetes.io/name: dcgm-exporter
      spec:
        selector:
          matchLabels:
            app.kubernetes.io/name: dcgm-exporter
        updateStrategy:
          type: RollingUpdate
        template:
          metadata:
            labels:
              app.kubernetes.io/name: dcgm-exporter
            annotations:
              keel.sh/policy: patch
              keel.sh/match-tag: "true"
              keel.sh/pollSchedule: "@every 24h"
              keel.sh/trigger: poll
          spec:
            nodeSelector:
              nvidia.com/gpu.present: "true"
            tolerations:
              - operator: Exists
                effect: NoSchedule
            containers:
              - name: dcgm-exporter
                image: "{{ dcgm_exporter_image }}"
                env:
                  - name: DCGM_EXPORTER_LISTEN
                    value: ":9400"
                  # false → one series per physical GPU, no per-pod attribution
                  # labels (see header). Flip to "true" to restore GPU↔pod joins.
                  - name: DCGM_EXPORTER_KUBERNETES
                    value: "false"
                  # Inert while KUBERNETES=false; only consulted by the K8s
                  # integration. Kept so re-enabling is a single-line flip.
                  - name: DCGM_EXPORTER_KUBERNETES_GPU_ID_TYPE
                    value: "uid"
                  - name: NODE_NAME
                    valueFrom:
                      fieldRef:
                        fieldPath: spec.nodeName
                ports:
                  - name: metrics
                    containerPort: 9400
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
                    nvidia.com/gpu: "1"
                volumeMounts:
                  - name: pod-resources
                    mountPath: /var/lib/kubelet/pod-resources
                    readOnly: true
                readinessProbe:
                  httpGet:
                    path: /health
                    port: metrics
                  initialDelaySeconds: 10
                  periodSeconds: 30
                livenessProbe:
                  httpGet:
                    path: /health
                    port: metrics
                  initialDelaySeconds: 30
                  periodSeconds: 30
            volumes:
              - name: pod-resources
                hostPath:
                  path: /var/lib/kubelet/pod-resources

- name: Create dcgm-exporter Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: dcgm-exporter
        namespace: monitoring
        labels:
          app.kubernetes.io/name: dcgm-exporter
      spec:
        type: ClusterIP
        clusterIP: None  # Headless service for DaemonSet
        ports:
          - name: metrics
            port: 9400
            targetPort: metrics
        selector:
          app.kubernetes.io/name: dcgm-exporter
