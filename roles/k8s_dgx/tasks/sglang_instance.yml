                      # shared dir), then drops a per-model done-marker for the workers.
                      python3 /scripts/download_models.py || exit $?
                      mkdir -p "$MARKDIR"
                      for m in $(printf '%s' "$HF_PRELOAD_MODELS" | tr ',' ' '); do
                        touch "$MARKDIR/$(printf '%s' "$m" | sed 's#/#--#g')"
                      done
                      echo "[preload] head download complete; markers written"
                    else
