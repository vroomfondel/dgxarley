                      # on the shared dir + redundant work). Wait for the head's per-model markers;
                      # kick off a BACKGROUND warmup so warming overlaps the wait without blocking
                      # the poll, and print the cache-fill % (juicefs warmup --check) each round.
                      # Non-fatal 30min timeout -> sglang then fails loudly on a missing model.
                      echo "[preload-wait] shared JuiceFS -> waiting for head preload markers (<=30min); background-warming"
                      start=$(date +%s); deadline=$(( start + 1800 ))
                      MODELS=$(printf '%s' "$HF_PRELOAD_MODELS" | tr ',' ' ')
                      HAVE_JFS=no; [ -x /usr/local/bin/juicefs ] && HAVE_JFS=yes
                      if [ "$HAVE_JFS" = yes ]; then
                        for m in $MODELS; do
                          d="/root/.cache/huggingface/hub/models--$(printf '%s' "$m" | sed 's#/#--#g')"
                          [ -d "$d" ] && /usr/local/bin/juicefs warmup --threads 1 --background "$d" >/dev/null 2>&1 || true
                        done
