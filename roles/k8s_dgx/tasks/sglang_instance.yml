---
# One SGLang instance. Included once per sglang_instances entry by sglang.yml.
# `inst` carries the per-instance config; _sglang_active_model/_nnodes/_sriov_key
# (set as include vars) make the sglang_* default chain re-resolve for this
# instance. Resource names are prefixed with inst.prefix (= "sglang" for the
# "default" instance, so its resources are byte-identical to the old layout).

# Validate parallelism fits the node count BEFORE creating anything. Catches a
# profile/instance tp_size that doesn't divide the node count (which would
# otherwise yield pp=0) and an ep that doesn't divide tp.
- name: Validate parallelism fits node count ({{ inst.prefix }})
  ansible.builtin.assert:
    that:
      - (sglang_tp | int) >= 1 and (sglang_pp | int) >= 1 and (sglang_ep | int) >= 1
      - (sglang_tp | int) * (sglang_pp | int) == (_sglang_active_nnodes | int)
      - (sglang_tp | int) % (sglang_ep | int) == 0
    fail_msg: >-
      Instance '{{ inst.prefix }}': tp={{ sglang_tp }} * pp={{ sglang_pp }}
      must equal nodes={{ _sglang_active_nnodes }} (1 GPU/node) and ep={{ sglang_ep }}
      must divide tp. Set tp_size/pp_size/ep_size on the instance, pick a model
      whose profile fits, or change the nodes list.
    success_msg: "{{ inst.prefix }}: tp={{ sglang_tp }} pp={{ sglang_pp }} ep={{ sglang_ep }} over {{ _sglang_active_nnodes }} node(s) OK"

# Validate a manual PP layer partition (SGLANG_PP_LAYER_PARTITION) if set: must
# have exactly pp_size comma-separated entries and only makes sense with pp > 1.
# SGLang additionally asserts the entries sum to num_hidden_layers at startup
# (which Ansible can't check here without the model's layer count).
- name: Validate manual PP layer partition ({{ inst.prefix }})
  ansible.builtin.assert:
    that:
      - (sglang_pp_layer_partition | string | length == 0) or
        ((sglang_pp | int) > 1 and
         ((sglang_pp_layer_partition | string).split(',') | length == (sglang_pp | int)))
    fail_msg: >-
      Instance '{{ inst.prefix }}': pp_layer_partition='{{ sglang_pp_layer_partition }}'
      must have exactly pp={{ sglang_pp }} comma-separated per-stage layer counts
      (and requires pp > 1). The counts must sum to the model's num_hidden_layers
      (SGLang asserts the sum at startup).
    success_msg: >-
      {{ inst.prefix }}: pp_layer_partition
      {{ 'unset (even split)' if (sglang_pp_layer_partition | string | length == 0)
         else sglang_pp_layer_partition }}

# Guard: refuse to deploy if KIKUBE has taken over management of SGLang.
# The KIKUBE product layer (dgxarley-custom) sets kikube.io/managed-by=kikube
# on all resources it manages. Once that annotation is present on the Service,
# Ansible must not overwrite the deployment.
- name: Check if SGLang is managed by KIKUBE ({{ inst.prefix }})
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Service
    name: "{{ inst.prefix }}"
    namespace: "{{ sglang_namespace }}"
  register: _sglang_svc_check

- name: Abort if SGLang is managed by KIKUBE ({{ inst.prefix }})
  ansible.builtin.fail:
    msg: >-
      ABORTED: The SGLang Service '{{ inst.prefix }}' in namespace
      '{{ sglang_namespace }}' has annotation kikube.io/managed-by=kikube. This
      deployment is now managed by the KIKUBE product layer. Use KIKUBE tooling
      to deploy changes. To force Ansible override:
      kubectl annotate svc/{{ inst.prefix }} -n {{ sglang_namespace }} kikube.io/managed-by-
  when: >-
    _sglang_svc_check.resources | length > 0 and
    'kikube.io/managed-by' in (_sglang_svc_check.resources[0].metadata.annotations | default({})) and
    _sglang_svc_check.resources[0].metadata.annotations['kikube.io/managed-by'] == 'kikube'

- name: Create SGLang ConfigMap ({{ inst.prefix }})
  register: _sglang_configmap
  kubernetes.core.k8s:
    state: present
    apply: true  # full replace — removes stale keys (e.g. NCCL_IB_DISABLE after RoCE switch)
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{ inst.prefix }}-config"
        namespace: "{{ sglang_namespace }}"
      data:
        SGLANG_MODEL: "{{ _sglang_active_model }}"
        SGLANG_CONTEXT_LENGTH: "{{ sglang_context_length | string }}"
        SGLANG_KV_CACHE_DTYPE: "{{ sglang_kv_cache_dtype }}"
        SGLANG_MODEL_DTYPE: "{{ sglang_model_dtype }}"
        SGLANG_MEM_FRACTION: "{{ sglang_mem_fraction_static }}"
        SGLANG_REASONING_PARSER: "{{ sglang_reasoning_parser }}"
        SGLANG_TOOL_CALL_PARSER: "{{ sglang_tool_call_parser }}"
        SGLANG_QUANTIZATION: "{{ sglang_quantization }}"
        SGLANG_TRUST_REMOTE_CODE: "{{ sglang_trust_remote_code | string | lower }}"
        SGLANG_JSON_MODEL_OVERRIDE_ARGS: "{{ sglang_json_model_override_args }}"
        # SGLang's _derive_context_length runs BEFORE json_model_override_args
        # is applied to hf_config, so overriding rope_scaling alone doesn't
        # raise the derived context_length ceiling — the ValueError still
        # fires when context_length > max_position_embeddings. This env var
        # bypasses the check. Only enabled when json_model_override_args is
        # set (i.e. YaRN is actually being injected), to keep the guardrail
        # active for all other models.
        SGLANG_ALLOW_OVERWRITE_LONGER_CONTEXT_LEN: "{{ '1' if sglang_json_model_override_args else '0' }}"
        SGLANG_MOE_RUNNER_BACKEND: "{{ sglang_moe_runner_backend }}"
        # #25181: false dequants DeepSeek wo_a fp8→bf16 (V4-Flash-FP8 ships wo_a
        # as bf16; opt-on would keep the param fp8 → "Downcasting not allowed").
        SGLANG_OPT_FP8_WO_A_GEMM: "{{ '1' if sglang_opt_fp8_wo_a_gemm | bool else '0' }}"
        # DeepGEMM SM121 kernel gaps (DeepGEMM #317): hc_prenorm→TileLang,
        # paged_mqa_logits→torch. Without these, V4 asserts "Unsupported architecture".
        SGLANG_OPT_DEEPGEMM_HC_PRENORM: "{{ '1' if sglang_opt_deepgemm_hc_prenorm | bool else '0' }}"
        SGLANG_FP8_PAGED_MQA_LOGITS_TORCH: "{{ '1' if sglang_fp8_paged_mqa_logits_torch | bool else '0' }}"
        # C4-indexer top-k transform: TVM jit topk_transform_512_v2 dies on sm_121
        # (topk_v2.cuh:472 CUDA error: invalid argument) at decode → torch fallback.
        SGLANG_TOPK_TRANSFORM_512_TORCH: "{{ '1' if sglang_topk_transform_512_torch | bool else '0' }}"
        # DSV4 DSA indexer via TileLang (8-16x faster than torch, CUDA-graph-capturable;
        # requires the tilelang-0.1.8 indexer compat patch baked into the image).
        SGLANG_OPT_USE_TILELANG_INDEXER: "{{ '1' if sglang_opt_use_tilelang_indexer | bool else '0' }}"
        # Diagnostic: when "1", launch.sh activates dsv4_memprobe.py (logs CUDA-
        # allocator / RSS / swap deltas around the post-weight-load lifecycle).
        # Off by default; enable for a run via -e sglang_memprobe=1.
        SGLANG_MEMPROBE: "{{ sglang_memprobe | default('0') | string }}"
        SGLANG_LOAD_FORMAT: "{{ sglang_load_format }}"
        # Tuning knob: weight-load read-buffer concurrency (JSON for
        # --model-loader-extra-config, e.g. {"enable_multithread_load": false}).
        # Empty = sglang default (8 buffered threads). Set per-run via -e.
        SGLANG_MODEL_LOADER_EXTRA_CONFIG: "{{ sglang_model_loader_extra_config | default('') }}"
        SGLANG_WEIGHT_LOADER_DISABLE_MMAP: "{{ sglang_weight_loader_disable_mmap | string | lower }}"
        SGLANG_WEIGHT_LOADER_DROP_CACHE_AFTER_LOAD: "{{ sglang_weight_loader_drop_cache_after_load | string | lower }}"
        SGLANG_MAX_RUNNING_REQUESTS: "{{ sglang_max_running_requests | string }}"
        SGLANG_MAX_TOTAL_TOKENS: "{{ sglang_max_total_tokens | string }}"
        SGLANG_SCHEDULE_POLICY: "{{ sglang_schedule_policy }}"
        SGLANG_SPECULATIVE_ENABLED: "{{ sglang_speculative_enabled | string | lower }}"
        SGLANG_SPECULATIVE_ALGO: "{{ sglang_speculative_algo }}"
        SGLANG_SPECULATIVE_NUM_STEPS: "{{ sglang_speculative_num_steps | string }}"
        SGLANG_SPECULATIVE_EAGLE_TOPK: "{{ sglang_speculative_eagle_topk | string }}"
        SGLANG_SPECULATIVE_NUM_DRAFT_TOKENS: "{{ sglang_speculative_num_draft_tokens | string }}"
        SGLANG_SPECULATIVE_DRAFT_MODEL_PATH: "{{ sglang_speculative_draft_model_path }}"
        SGLANG_SPECULATIVE_DRAFT_MODEL_QUANTIZATION: "{{ sglang_speculative_draft_model_quantization }}"
        SGLANG_SPECULATIVE_MOE_RUNNER_BACKEND: "{{ sglang_speculative_moe_runner_backend }}"
        SGLANG_SPECULATIVE_ADAPTIVE: "{{ sglang_speculative_adaptive | string | lower }}"
        SGLANG_SPECULATIVE_ADAPTIVE_CONFIG_JSON: "{{ sglang_speculative_adaptive_config | to_json }}"
        SGLANG_MAMBA_SCHEDULER_STRATEGY: "{{ sglang_mamba_scheduler_strategy }}"
        SGLANG_MAMBA_FULL_MEMORY_RATIO: "{{ sglang_mamba_full_memory_ratio | string }}"
        SGLANG_MAX_MAMBA_CACHE_SIZE: "{{ sglang_max_mamba_cache_size | string }}"
        SGLANG_ENABLE_SPEC_V2: "{{ '1' if (sglang_enable_spec_v2 | bool) else '' }}"
        SGLANG_DIST_TIMEOUT: "{{ sglang_dist_timeout | string }}"
        SGLANG_WATCHDOG_TIMEOUT: "{{ sglang_watchdog_timeout | string }}"
        SGLANG_ATTENTION_BACKEND: "{{ sglang_attention_backend }}"
        SGLANG_MM_ATTENTION_BACKEND: "{{ sglang_mm_attention_backend }}"
        SGLANG_PAGE_SIZE: "{{ sglang_page_size | string }}"
        SGLANG_SWA_FULL_TOKENS_RATIO: "{{ sglang_swa_full_tokens_ratio | string }}"
        SGLANG_DLLM_ALGORITHM: "{{ sglang_dllm_algorithm }}"
        SGLANG_LOG_LEVEL: "{{ sglang_log_level }}"
        SGLANG_FP8_GEMM_RUNNER_BACKEND: "{{ sglang_fp8_gemm_runner_backend }}"
        SGLANG_FP4_GEMM_BACKEND: "{{ sglang_fp4_gemm_backend }}"
        SGLANG_CUDA_GRAPH_MAX_BS: "{{ sglang_cuda_graph_max_bs | string }}"
        SGLANG_DISABLE_CUDA_GRAPH: "{{ sglang_disable_cuda_graph | string | lower }}"
        TQDM_POSITION: "-1"
        SGLANG_DISABLE_PIECEWISE_CUDA_GRAPH: "{{ sglang_disable_piecewise_cuda_graph | string | lower }}"
        SGLANG_DISABLE_FLASHINFER_CUTLASS_MOE_FP4_ALLGATHER: "{{ sglang_disable_flashinfer_cutlass_moe_fp4_allgather | string | lower }}"
        SGLANG_DISABLE_OVERLAP_SCHEDULE: "{{ sglang_disable_overlap_schedule | string | lower }}"
        SGLANG_SERVED_MODEL_NAME: "{{ sglang_served_model_name }}"
        SGLANG_CHAT_TEMPLATE_KWARGS: "{{ sglang_chat_template_kwargs | to_json }}"
        SGLANG_EP: "{{ sglang_ep | string }}"
        SGLANG_ENABLE_EPLB: "{{ sglang_enable_eplb | string | lower }}"
        SGLANG_ENABLE_EXPERT_DISTRIBUTION_METRICS: "{{ sglang_enable_expert_distribution_metrics | string | lower }}"
        SGLANG_ENABLE_METRICS: "{{ inst.enable_metrics | string | lower }}"
        # Embedding mode (from the model profile via sglang_is_embedding): when
        # "true", the minimal embed launcher (sglang_embed_launch.sh, selected in
        # the launch-script ConfigMap below) adds --is-embedding and skips all
        # generation/distributed machinery. Inert for generation instances.
        SGLANG_IS_EMBEDDING: "{{ sglang_is_embedding | string | lower }}"
        SGLANG_CHUNKED_PREFILL_SIZE: "{{ sglang_chunked_prefill_size | string }}"
        SGLANG_ENABLE_JIT_DEEPGEMM: "{{ 'false' if sglang_disable_deep_gemm | bool else 'true' }}"
        # Flash Attention 4 CuTe DSL JIT: enable persistent disk cache so compiled
        # kernels survive pod restarts. First start compiles (~slow), subsequent
        # starts load from cache. Cache dir on hf-cache hostPath for persistence.
        FLASH_ATTENTION_CUTE_DSL_CACHE_ENABLED: "1"
        FLASH_ATTENTION_CUTE_DSL_CACHE_DIR: "/root/.cache/huggingface/fa4_cute_dsl_cache"
        # FlashInfer 0.6.6 CUTLASS MoE JIT: on first inference, flashinfer_cutlass
        # generates and compiles ~30+ CUTLASS instantiations (moe_gemm_kernels_*,
        # cutlass_kernel_file_gemm_sm90_M{64,128}_group*) via nvcc/cicc/cc1plus.
        # Default: all compile in parallel → 15+ processes × ~1 GB each → OOM on
        # 121 GB DGX Spark. MAX_JOBS limits concurrent compilations.
        MAX_JOBS: "{{ sglang_jit_max_jobs | default(2) | string }}"
        # FlashInfer JIT cache: compiled .so files survive pod restarts.
        # Default FLASHINFER_WORKSPACE_BASE is /root (→ /root/.cache/flashinfer/,
        # overlay-FS, lost on restart). Redirect to persistent hostPath volume.
        FLASHINFER_WORKSPACE_BASE: "/root/.cache/flashinfer_persistent"
        # Fix CUDA allocator fragmentation during AWQ Marlin repack (SGLang #11471)
        PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
        SGLANG_MOE_CONFIG_DIR: "{{ sglang_moe_config_dir }}"
        HF_HUB_OFFLINE: "1"
        SGLANG_ENABLE_TP_MEMORY_INBALANCE_CHECK: "0"
        # Activates the dgxarley sgl-kernel-sm121-debug.patch diagnostic block
        # in run_fp4_blockwise_scaled_group_mm_sm120(). Only has an effect when
        # the sglang image was built with --sm121-debug
        # (APPLY_SGL_KERNEL_SM121_DEBUG=1) — for default builds the compiled
        # binary contains no consuming code and this env var is inert.
        #
        # DGXARLEY_ prefix (not SGL_ / SGLANG_) keeps this var clearly outside
        # sglang's env namespace; sglang's environ.py iterates every SGL_*
        # env var at startup and emits a UserWarning deprecation spam — using
        # our own prefix avoids that noise in the pod logs.
        # DGXARLEY_SM121_DEBUG: "1"

        # CUDA_LAUNCH_BLOCKING: removed (was "1" during sm121 debug session,
        # then "0" — but "0" may still enable serialization on some CUDA
        # runtimes that check env-var presence, not value). Re-add with "1"
        # only when debugging device-side asserts; see sglkernel-fix.md.
        # CUDA_LAUNCH_BLOCKING: "1"
        NCCL_SOCKET_IFNAME: "{{ nccl_socket_ifname }}"
        # NCCL transport: controlled by sglang_nccl_transport (roce/socket).
        # With apply: true, the ConfigMap is fully replaced — keys from the
        # inactive mode vanish automatically (no strategic merge residue).
        NCCL_IB_HCA: "{{ sglang_nccl_env.NCCL_IB_HCA | default(omit) }}"
        NCCL_IB_GID_INDEX: "{{ sglang_nccl_env.NCCL_IB_GID_INDEX | default(omit) }}"
        NCCL_IB_MERGE_NICS: "{{ sglang_nccl_env.NCCL_IB_MERGE_NICS | default(omit) }}"
        NCCL_NET: "{{ sglang_nccl_env.NCCL_NET | default(omit) }}"
        NCCL_IB_DISABLE: "{{ sglang_nccl_env.NCCL_IB_DISABLE | default(omit) }}"
        # NCCL 2.30.4 NVLS regression: silent hang on high-expert MoE weight
        # load (≥256 experts) on GB10/CX-7 RoCE. NVLS is a no-op here anyway.
        # See nccl_nvls_enable in defaults + NVIDIA/nccl#2167. Empty -> omit.
        NCCL_NVLS_ENABLE: "{{ nccl_nvls_enable if (nccl_nvls_enable | default('')) | length > 0 else omit }}"
        NCCL_DEBUG: "INFO"

- name: Create SGLang launch script ConfigMap ({{ inst.prefix }})
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{ inst.prefix }}-launch-script"
        namespace: "{{ sglang_namespace }}"
      data:
        # Embedding instances (inst.is_embedding) get the minimal embed launcher;
        # generation instances get the full generation launcher. Same mount path
        # (/scripts/launch.sh), so the pod spec is unchanged either way.
        launch.sh: "{{ lookup('file', role_path ~ '/files/' ~ ('sglang_embed_launch.sh' if (inst.is_embedding | default(false)) else 'sglang_launch.sh')) }}"
        # DSV4 unified-memory load probe (copied to dist-packages by launch.sh
        # only when SGLANG_MEMPROBE=1). Pinpoints the post-weight-load action
        # that doubles GB10 unified memory.
        dsv4_memprobe.py: "{{ lookup('file', role_path ~ '/files/dsv4_memprobe.py') }}"

- name: Create SGLang wait-for-worker script ConfigMap ({{ inst.prefix }})
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{ inst.prefix }}-wait-script"
        namespace: "{{ sglang_namespace }}"
      data:
        wait_for_worker.sh: "{{ lookup('file', role_path ~ '/files/sglang_wait_for_worker.sh') }}"

- name: Create SGLang model-download script ConfigMap ({{ inst.prefix }})
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{ inst.prefix }}-model-download-script"
        namespace: "{{ sglang_namespace }}"
      data:
        download_models.py: "{{ lookup('file', role_path ~ '/files/hf_preload_download.py') }}"

- name: Create SGLang HAProxy config ConfigMap ({{ inst.prefix }})
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "{{ inst.prefix }}-haproxy-config"
        namespace: "{{ sglang_namespace }}"
      data:
        haproxy.cfg: "{{ lookup('template', 'sglang_haproxy.cfg.j2') }}"


- name: Create SGLang ServiceAccount ({{ inst.prefix }})
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: "{{ inst.prefix }}-head"
        namespace: "{{ sglang_namespace }}"

# Role is generic (pod read-only) and shared across instances in this namespace —
# kept unprefixed so the "default" instance matches the pre-refactor name.
- name: Create SGLang pod-reader Role
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: pod-reader
        namespace: "{{ sglang_namespace }}"
      rules:
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["get", "list", "watch"]

- name: Create SGLang RoleBinding ({{ inst.prefix }})
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: "{{ inst.prefix }}-head-pod-reader"
        namespace: "{{ sglang_namespace }}"
      subjects:
        - kind: ServiceAccount
          name: "{{ inst.prefix }}-head"
          namespace: "{{ sglang_namespace }}"
      roleRef:
        kind: Role
        name: pod-reader
        apiGroup: rbac.authorization.k8s.io

# Startup ordering: Workers MUST be deployed before head.
# At the NCCL/PyTorch level, the head (rank 0) hosts the TCP rendezvous server
# and workers (rank 1..N) connect as clients with exponential backoff retries.
# However, the head has a startupProbe on /v1/models which only passes after the
# model is fully loaded — and model loading requires ALL nodes to be connected
# (tensor parallelism). If workers waited for the head to be Ready, it would
# deadlock: head can't become Ready without workers, workers won't start without
# the head. Instead, workers start first (no readinessProbe → immediately Ready),
# and the head's wait-for-worker initContainer gates on that. When the head's sglang
# process opens the rendezvous port, the workers (already retrying) connect instantly.

# Migration: remove old unnumbered sglang-worker Deployment
- name: Remove legacy sglang-worker Deployment ({{ inst.prefix }}, pre-multi-worker)
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: Deployment
    name: "{{ inst.prefix }}-worker"
    namespace: "{{ sglang_namespace }}"

# Cleanup: remove worker Deployments beyond this instance's node count
- name: Remove excess SGLang worker Deployments ({{ inst.prefix }})
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: Deployment
    name: "{{ inst.prefix }}-worker-{{ item }}"
    namespace: "{{ sglang_namespace }}"
  loop: "{{ range(_sglang_active_nnodes | int, 5) | list }}"

- name: Deploy SGLang worker Deployments ({{ inst.prefix }})
  loop: "{{ range(1, _sglang_active_nnodes | int) | list }}"
  loop_control:
    loop_var: worker_rank
    label: "{{ inst.prefix }}-worker-{{ worker_rank }} (spark{{ inst.nodes[worker_rank] }}, rank {{ worker_rank }})"
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ inst.prefix }}-worker-{{ worker_rank }}"
        namespace: "{{ sglang_namespace }}"
        labels:
          app: "{{ inst.prefix }}"
          role: worker
      spec:
        replicas: 1
        strategy:
          type: Recreate
        selector:
          matchLabels:
            app: "{{ inst.prefix }}"
            role: worker
            worker-rank: "{{ worker_rank | string }}"
        template:
          metadata:
            labels:
              app: "{{ inst.prefix }}"
              role: worker
              worker-rank: "{{ worker_rank | string }}"
            annotations:
              k8s.v1.cni.cncf.io/networks: "{{ '[{\"name\":\"qsfp-vf' ~ qsfp_sriov_assignments[_sglang_active_sriov_key].vf ~ '\",\"ips\":[\"' ~ _sglang_qsfp_ips[worker_rank] ~ '/24\"]}]' if qsfp_sriov_enabled | default(false) else 'qsfp-direct-worker' ~ worker_rank }}"
              kubectl.kubernetes.io/default-container: sglang
              checksum/launch-script: "{{ (lookup('file', role_path ~ '/files/sglang_launch.sh') ~ lookup('file', role_path ~ '/files/dsv4_memprobe.py')) | hash('sha256') }}"
              checksum/config: "{{ _sglang_configmap.result.data | to_json(sort_keys=True) | hash('sha256') }}"  # hash of the WHOLE rendered sglang-config ConfigMap (omit-stripped by k8s, sort_keys-stable) → rolls pods on ANY config/knob change (cuda_graph_max_bs, moe_runner_backend, mamba_*, …), not a hand-picked field subset
          spec:
            enableServiceLinks: false         # prevent K8s SGLANG_PORT=tcp://... injection
            hostIPC: true                    # shared memory for NCCL
            nodeSelector:
              spark-id: "{{ inst.nodes[worker_rank] | string }}"
            initContainers:
              - name: model-download
                image: "{{ sglang_image }}"
                imagePullPolicy: Always
                command: ["python3", "/scripts/download_models.py"]
                env:
                  - name: HF_PRELOAD_MODELS
                    value: "{{ _sglang_active_model }}{{ ',' + sglang_speculative_draft_model_path if (sglang_speculative_enabled | bool) and sglang_speculative_draft_model_path else '' }}"
                  - name: HF_TOKEN
                    value: "{{ hf_token }}"
                  - name: HF_HUB_DISABLE_PROGRESS_BARS
                    value: "0"
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: model-download-script
                    mountPath: /scripts
                    readOnly: true
            containers:
              - name: sglang
                image: "{{ sglang_image }}"
                imagePullPolicy: Always
                command: ["/bin/bash", "/scripts/launch.sh"]
                envFrom:
                  - configMapRef:
                      name: "{{ inst.prefix }}-config"
                env:
                  - name: SGLANG_IMAGE
                    value: "{{ sglang_image }}"
                  - name: NODE_RANK
                    value: "{{ worker_rank | string }}"
                  - name: SGLANG_HOST
                    valueFrom:
                      fieldRef:
                        fieldPath: status.podIP
                  - name: TP
                    value: "{{ sglang_tp | string }}"
                  - name: PP
                    value: "{{ sglang_pp | string }}"
                  - name: PP_ASYNC_BATCH_DEPTH
                    value: "{{ sglang_pp_async_batch_depth | string }}"
                  - name: PP_LAYER_PARTITION
                    value: "{{ sglang_pp_layer_partition | string }}"
                  - name: EP
                    value: "{{ sglang_ep | string }}"
                  - name: NNODES
                    value: "{{ _sglang_active_nnodes | string }}"
                  - name: QSFP_IP_SPARK1
                    value: "{{ _sglang_qsfp_ips[0] }}"
                  - name: QSFP_PEER_IPS
                    value: "{{ (_sglang_qsfp_ips[:worker_rank] + _sglang_qsfp_ips[worker_rank + 1:]) | join(',') }}"
                  - name: NCCL_PORT
                    value: "{{ inst.nccl_port | string }}"
                  - name: SGLANG_PORT
                    value: "{{ inst.port | string }}"
                  - name: HF_TOKEN
                    value: "{{ hf_token }}"
                  # Both names set explicitly so the collective path is identical
                  # on 0.5.11 (reads SGLANG_USE_JIT_ALL_REDUCE) and 0.5.12 (reads
                  # SGLANG_OPT_USE_CUSTOM_ALL_REDUCE_V2). See sglang_jit_allreduce
                  # default for rationale.
                  - name: SGLANG_USE_JIT_ALL_REDUCE
                    value: "{{ '1' if (sglang_jit_allreduce | bool) else '0' }}"
                  - name: SGLANG_OPT_USE_CUSTOM_ALL_REDUCE_V2
                    value: "{{ '1' if (sglang_jit_allreduce | bool) else '0' }}"
                # Burstable iff sglang_memory_request is set (→ swap-eligible under
                # kubelet LimitedSwap); empty "" → BestEffort (memory.swap.max=0, never swaps).
                resources: "{{ {'limits': {'nvidia.com/gpu': '1'}} | combine({'requests': {'memory': sglang_memory_request}} if sglang_memory_request else {}) }}"
                securityContext:
                  # privileged required for: (1) hostIPC NCCL shared memory,
                  # (2) RoCE transport — NCCL's IB plugin needs /dev/infiniband/uverbs*
                  # which host-device CNI doesn't expose to non-privileged containers.
                  privileged: true
                # Liveness probe: restart stale workers when head dies and NCCL breaks.
                # Uses process check (not HTTP) because PP workers have no API server.
                # Works for both TP and PP: the sglang process dies on NCCL timeout
                # regardless of parallelism mode.
                livenessProbe:
                  exec:
                    command: ["pgrep", "-f", "sglang.launch_server"]
                  initialDelaySeconds: 900
                  periodSeconds: 30
                  failureThreshold: 3
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: flashinfer-cache
                    mountPath: /root/.cache/flashinfer_persistent
                  - name: triton-cache
                    mountPath: /root/.triton/cache
                  - name: launch-script
                    mountPath: /scripts
                    readOnly: true
            volumes:
              - name: hf-cache
                hostPath:
                  path: "{{ hf_cache_path }}"
                  type: DirectoryOrCreate
              - name: flashinfer-cache
                hostPath:
                  path: "{{ hf_cache_path }}/flashinfer_cache"
                  type: DirectoryOrCreate
              - name: triton-cache
                hostPath:
                  path: "{{ hf_cache_path }}/triton_cache"
                  type: DirectoryOrCreate
              - name: model-download-script
                configMap:
                  name: "{{ inst.prefix }}-model-download-script"
              - name: launch-script
                configMap:
                  name: "{{ inst.prefix }}-launch-script"
                  defaultMode: 0755

- name: Deploy SGLang head Deployment ({{ inst.prefix }})
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ inst.prefix }}-head"
        namespace: "{{ sglang_namespace }}"
        labels:
          app: "{{ inst.prefix }}"
          role: head
      spec:
        replicas: 1
        strategy:
          type: Recreate
        selector:
          matchLabels:
            app: "{{ inst.prefix }}"
            role: head
        template:
          metadata:
            labels:
              app: "{{ inst.prefix }}"
              role: head
              # Instance name (sglang_instances key, default "default"). Flows to
              # the scraped /metrics series as the `sglang_instance` label via the
              # kubernetes-pods labelmap → Grafana shows the instance NAME instead
              # of the pod IP:port. NOT in selector.matchLabels (immutable), pod
              # template only.
              sglang_instance: "{{ _inst_key }}"
            annotations:
              # Embedding instances need NO QSFP/Multus (single-node, no NCCL) →
              # omit the network annotation entirely (runs on the default pod net).
              # `omit` also short-circuits the qsfp_sriov_assignments[sriov_key]
              # lookup, which would KeyError for the embed instance (no assignment)
              # when qsfp_sriov_enabled is globally true.
              k8s.v1.cni.cncf.io/networks: "{{ omit if (inst.is_embedding | default(false)) else ('[{\"name\":\"qsfp-vf' ~ qsfp_sriov_assignments[_sglang_active_sriov_key].vf ~ '\",\"ips\":[\"' ~ _sglang_qsfp_ips[0] ~ '/24\"]}]' if qsfp_sriov_enabled | default(false) else 'qsfp-direct') }}"
              kubectl.kubernetes.io/default-container: sglang
              # SGLang Prometheus scrape — HEAD only (workers run no HTTP server).
              # Port = inst.port (HAProxy-fronted; /metrics passes through the L4 TCP
              # forward to uvicorn). scrape="false" → kubernetes-pods job drops it.
              prometheus.io/scrape: "{{ inst.enable_metrics | string | lower }}"
              prometheus.io/port: "{{ inst.port | string }}"
              prometheus.io/path: "/metrics"
              checksum/launch-script: "{{ (lookup('file', role_path ~ '/files/' ~ ('sglang_embed_launch.sh' if (inst.is_embedding | default(false)) else 'sglang_launch.sh')) ~ lookup('file', role_path ~ '/files/dsv4_memprobe.py')) | hash('sha256') }}"
              checksum/config: "{{ _sglang_configmap.result.data | to_json(sort_keys=True) | hash('sha256') }}"  # hash of the WHOLE rendered sglang-config ConfigMap (omit-stripped by k8s, sort_keys-stable) → rolls pods on ANY config/knob change (cuda_graph_max_bs, moe_runner_backend, mamba_*, …), not a hand-picked field subset
          spec:
            serviceAccountName: "{{ inst.prefix }}-head"
            enableServiceLinks: false         # prevent K8s SGLANG_PORT=tcp://... injection
            hostIPC: true                    # shared memory for NCCL
            nodeSelector:
              spark-id: "{{ inst.nodes[0] | string }}"
            initContainers:
              - name: model-download
                image: "{{ sglang_image }}"
                imagePullPolicy: Always
                command: ["python3", "/scripts/download_models.py"]
                env:
                  - name: HF_PRELOAD_MODELS
                    value: "{{ _sglang_active_model }}{{ ',' + sglang_speculative_draft_model_path if (sglang_speculative_enabled | bool) and sglang_speculative_draft_model_path else '' }}"
                  - name: HF_TOKEN
                    value: "{{ hf_token }}"
                  - name: HF_HUB_DISABLE_PROGRESS_BARS
                    value: "0"
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: model-download-script
                    mountPath: /scripts
                    readOnly: true
              - name: wait-for-worker
                image: bitnami/kubectl:latest
                command: ["/bin/sh", "/scripts/wait_for_worker.sh"]
                env:
                  - name: WAIT_NAMESPACE
                    value: "{{ sglang_namespace }}"
                  - name: WAIT_LABEL
                    value: "app={{ inst.prefix }},role=worker"
                  - name: WAIT_COUNT
                    value: "{{ ((_sglang_active_nnodes | int) - 1) | string }}"
                  - name: WAIT_TIMEOUT
                    value: "{{ sglang_wait_timeout | string }}"
                volumeMounts:
                  - name: wait-script
                    mountPath: /scripts
                    readOnly: true
            containers:
              - name: sglang
                image: "{{ sglang_image }}"
                imagePullPolicy: Always
                command: ["/bin/bash", "/scripts/launch.sh"]
                envFrom:
                  - configMapRef:
                      name: "{{ inst.prefix }}-config"
                env:
                  - name: SGLANG_IMAGE
                    value: "{{ sglang_image }}"
                  - name: NODE_RANK
                    value: "0"
                  # v0.5.10rc0 changed --host default from 127.0.0.1 to 0.0.0.0.
                  # Must be 127.0.0.1 to avoid EADDRINUSE with Scheduler subprocess
                  # (which binds <pod-ip>:port). HAProxy sidecar handles external access.
                  - name: SGLANG_HOST
                    value: "127.0.0.1"
                  - name: TP
                    value: "{{ sglang_tp | string }}"
                  - name: PP
                    value: "{{ sglang_pp | string }}"
                  - name: PP_ASYNC_BATCH_DEPTH
                    value: "{{ sglang_pp_async_batch_depth | string }}"
                  - name: PP_LAYER_PARTITION
                    value: "{{ sglang_pp_layer_partition | string }}"
                  - name: EP
                    value: "{{ sglang_ep | string }}"
                  - name: NNODES
                    value: "{{ _sglang_active_nnodes | string }}"
                  # QSFP/NCCL peer IPs are meaningless for a single-node embed
                  # instance (no workers, no NCCL), AND its sriov_key ("embed") is
                  # absent from qsfp_sriov_assignments, so evaluating _sglang_qsfp_ips
                  # would fail ("dict has no attribute 'embed'"). Guard with
                  # is_embedding — the lazy `X if cond else Y` never evaluates the
                  # _sglang_qsfp_ips branch when embedding. The embed launcher
                  # ignores these vars anyway. Same guard as the QSFP annotation above.
                  - name: QSFP_IP_SPARK1
                    value: "{{ '127.0.0.1' if (inst.is_embedding | default(false)) else _sglang_qsfp_ips[0] }}"
                  - name: QSFP_PEER_IPS
                    value: "{{ '' if (inst.is_embedding | default(false)) else (_sglang_qsfp_ips[1:] | join(',')) }}"
                  - name: NCCL_PORT
                    value: "{{ inst.nccl_port | string }}"
                  - name: SGLANG_PORT
                    value: "{{ inst.internal_port | string }}"
                  - name: HF_TOKEN
                    value: "{{ hf_token }}"
                  # Both names set explicitly so the collective path is identical
                  # on 0.5.11 (reads SGLANG_USE_JIT_ALL_REDUCE) and 0.5.12 (reads
                  # SGLANG_OPT_USE_CUSTOM_ALL_REDUCE_V2). See sglang_jit_allreduce
                  # default for rationale.
                  - name: SGLANG_USE_JIT_ALL_REDUCE
                    value: "{{ '1' if (sglang_jit_allreduce | bool) else '0' }}"
                  - name: SGLANG_OPT_USE_CUSTOM_ALL_REDUCE_V2
                    value: "{{ '1' if (sglang_jit_allreduce | bool) else '0' }}"
                # Burstable iff sglang_memory_request is set (→ swap-eligible under
                # kubelet LimitedSwap); empty "" → BestEffort (memory.swap.max=0, never swaps).
                resources: "{{ {'limits': {'nvidia.com/gpu': '1'}} | combine({'requests': {'memory': sglang_memory_request}} if sglang_memory_request else {}) }}"
                securityContext:
                  # privileged required for: (1) hostIPC NCCL shared memory,
                  # (2) RoCE transport — NCCL's IB plugin needs /dev/infiniband/uverbs*
                  # which host-device CNI doesn't expose to non-privileged containers.
                  privileged: true
                readinessProbe:
                  httpGet:
                    path: /v1/models
                    port: "{{ inst.port }}"
                  periodSeconds: 15
                  failureThreshold: 3
                livenessProbe:
                  httpGet:
                    path: /v1/models
                    port: "{{ inst.port }}"
                  initialDelaySeconds: 1800
                  periodSeconds: 30
                  failureThreshold: 3
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                  - name: flashinfer-cache
                    mountPath: /root/.cache/flashinfer_persistent
                  - name: triton-cache
                    mountPath: /root/.triton/cache
                  - name: launch-script
                    mountPath: /scripts
                    readOnly: true
              - name: proxy
                image: haproxy:lts-alpine
                args: []
                volumeMounts:
                  - name: haproxy-config
                    mountPath: /usr/local/etc/haproxy
                    readOnly: true
                ports:
                  - containerPort: "{{ inst.port }}"
                    name: http
            volumes:
              - name: hf-cache
                hostPath:
                  path: "{{ hf_cache_path }}"
                  type: DirectoryOrCreate
              - name: flashinfer-cache
                hostPath:
                  path: "{{ hf_cache_path }}/flashinfer_cache"
                  type: DirectoryOrCreate
              - name: triton-cache
                hostPath:
                  path: "{{ hf_cache_path }}/triton_cache"
                  type: DirectoryOrCreate
              - name: model-download-script
                configMap:
                  name: "{{ inst.prefix }}-model-download-script"
              - name: launch-script
                configMap:
                  name: "{{ inst.prefix }}-launch-script"
                  defaultMode: 0755
              - name: haproxy-config
                configMap:
                  name: "{{ inst.prefix }}-haproxy-config"
              - name: wait-script
                configMap:
                  name: "{{ inst.prefix }}-wait-script"
                  defaultMode: 0755

- name: Create SGLang Service ({{ inst.prefix }})
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ inst.prefix }}"
        namespace: "{{ sglang_namespace }}"
      spec:
        type: ClusterIP
        selector:
          app: "{{ inst.prefix }}"
          role: head
        ports:
          - name: http
            port: "{{ inst.port }}"
            targetPort: "{{ inst.port }}"
            protocol: TCP

# External Traefik exposure. The ClusterIP Service above is always created (in-
# cluster clients need it). The per-instance cert / ingressroutes / DNS below
# TOGGLE on inst.external_enabled (default true): state=present when exposed,
# state=absent when not — so flipping the flag to false and re-running ACTIVELY
# REMOVES the ingress, certificate and DNS record (no orphaned routes). The two
# shared middlewares stay present unconditionally (generic, harmless when unused,
# and needed by any OTHER instance that IS exposed).
# Generic HTTPS-redirect middleware, shared across instances in this namespace
# (idempotent re-apply) — kept unprefixed to match the pre-refactor name.
- name: Create HTTPS redirect middleware in sglang namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: redirect-myhttps
        namespace: "{{ sglang_namespace }}"
      spec:
        redirectScheme:
          scheme: https

# Generic IP allowlist (same sourceRange for all instances) — kept unprefixed.
- name: Create SGLang ip allowlist middleware
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: sglang-ip-allowlist
        namespace: "{{ sglang_namespace }}"
      spec:
        ipAllowList:
          sourceRange: "{{ traefik_internal_allowlist }}"

- name: Manage SGLang TLS certificate ({{ inst.prefix }}, external_enabled)
  kubernetes.core.k8s:
    state: "{{ 'present' if inst.external_enabled | bool else 'absent' }}"
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: "{{ inst.hostname }}.{{ dns_external_domain_suffix }}"
        namespace: "{{ sglang_namespace }}"
      spec:
        dnsNames:
          - "{{ inst.hostname }}.{{ dns_external_domain_suffix }}"
        secretName: "{{ inst.hostname }}.{{ dns_external_domain_suffix }}"
        issuerRef:
          name: letsencrypt-production
          kind: ClusterIssuer

- name: Manage SGLang http ingressroute with redirect ({{ inst.prefix }}, external_enabled)
  kubernetes.core.k8s:
    state: "{{ 'present' if inst.external_enabled | bool else 'absent' }}"
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: "{{ inst.prefix }}-ingress"
        namespace: "{{ sglang_namespace }}"
      spec:
        entryPoints:
          - web
        routes:
        - kind: Rule
          match: "Host(`{{ inst.hostname }}.{{ dns_external_domain_suffix }}`)"
          priority: 10
          services:
          - kind: Service
            name: "{{ inst.prefix }}"
            namespace: "{{ sglang_namespace }}"
            passHostHeader: true
            port: "{{ inst.port }}"
          middlewares:
            - name: redirect-myhttps
            - name: sglang-ip-allowlist

- name: Manage SGLang https ingressroute ({{ inst.prefix }}, external_enabled)
  kubernetes.core.k8s:
    state: "{{ 'present' if inst.external_enabled | bool else 'absent' }}"
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: "{{ inst.prefix }}-https-ingress"
        namespace: "{{ sglang_namespace }}"
      spec:
        entryPoints:
          - websecure
        routes:
          - kind: Rule
            match: "Host(`{{ inst.hostname }}.{{ dns_external_domain_suffix }}`)"
            priority: 10
            middlewares:
              - name: sglang-ip-allowlist
            services:
              - kind: Service
                name: "{{ inst.prefix }}"
                namespace: "{{ sglang_namespace }}"
                passHostHeader: true
                port: "{{ inst.port }}"
        tls:
          secretName: "{{ inst.hostname }}.{{ dns_external_domain_suffix }}"

- name: Manage DNS A record for sglang ({{ inst.prefix }}, external_enabled)
  community.general.nsupdate:
    server: "{{ nsupdate_server }}"
    zone: "{{ nsupdate_zone }}"
    key_name: "{{ nsupdate_tsig_key_name }}"
    key_secret: "{{ nsupdate_tsig_key_secret }}"
    key_algorithm: "{{ nsupdate_tsig_algorithm }}"
    record: "{{ inst.hostname }}.{{ dns_external_domain_suffix }}."
    type: A
    ttl: "{{ nsupdate_ttl }}"
    value: "{{ nsupdate_ingress_ip }}"
    state: "{{ 'present' if inst.external_enabled | bool else 'absent' }}"
  ignore_errors: true
  register: dns_result

- name: Warn if DNS registration failed ({{ inst.prefix }})
  ansible.builtin.debug:
    msg: "DNS registration failed (non-critical): {{ dns_result.msg | default('unknown') }}"
  when: dns_result is failed
