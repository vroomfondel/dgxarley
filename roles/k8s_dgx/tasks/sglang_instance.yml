                image: "{{ sglang_image }}"
                # Pre-warm THIS node's JuiceFS blockcache for the active model so the
                # sglang container starts with a WARM cache (fast load) instead of pulling
                # cold shards from the single spark4 backend mid-startup. Runs in an
                # initContainer (no liveness/startup probe), gated on hf_hub_cache_on_juicefs.
                # `juicefs warmup` is cache-aware -> fetches ONLY uncached blocks, so a warm
                # node is a quick no-op (no wasteful full re-read). Non-fatal. When JuiceFS is
                # off the juicefs-bin volume points at /bin/true and the command exits early.
                env:
                  - name: HF_PRELOAD_MODELS
                    value: "{{ _sglang_active_model }}{{ ',' + sglang_speculative_draft_model_path if (sglang_speculative_enabled | bool) and sglang_speculative_draft_model_path else '' }}"
                command: ["/bin/bash", "-c"]
                args:
                  - |
                    if [ "{{ hf_hub_cache_on_juicefs | bool | ternary('yes', 'no') }}" != "yes" ]; then
                      echo "[jfs-warmup] JuiceFS cache off -> no warmup"; exit 0
                    fi
                    if [ ! -x /usr/local/bin/juicefs ]; then
                      echo "[jfs-warmup] juicefs binary not mounted -> skip"; exit 0
                    fi
                    # Warm the SAME comma-list the preload downloads (primary + MTP/draft):
                    # submit a BACKGROUND warmup, then poll `juicefs warmup --check` and print the
                    # cache-fill % until fully cached (or a ~40min cap). Non-fatal.
                    for m in $(printf '%s' "$HF_PRELOAD_MODELS" | tr ',' ' '); do
                      DIR="/root/.cache/huggingface/hub/models--$(printf '%s' "$m" | sed 's#/#--#g')"
                      [ -d "$DIR" ] || { echo "[jfs-warmup] ${DIR} absent -> skip"; continue; }
                      echo "[jfs-warmup] warming ${DIR} (background)"
                      /usr/local/bin/juicefs warmup --threads 1 --background "${DIR}" || echo "[jfs-warmup] submit rc=$? (non-fatal)"
                      for i in $(seq 1 80); do
                        chk=$(/usr/local/bin/juicefs warmup --check "${DIR}" 2>&1)
                        pct=$(printf '%s' "$chk" | grep -oE '\([0-9.]+%\)' | tail -1)
                        echo "[jfs-warmup] ${DIR} cached=${pct:-?}"
                        printf '%s' "$chk" | grep -q '(100.0%)' && { echo "[jfs-warmup] ${DIR} fully cached"; break; }
                        sleep 30
                      done
                    done
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                    mountPropagation: "{{ 'HostToContainer' if hf_hub_cache_on_juicefs | bool else 'None' }}"
                  - name: juicefs-bin
                    mountPath: /usr/local/bin/juicefs
                    readOnly: true
              - name: wait-for-worker
                image: bitnami/kubectl:latest
                command: ["/bin/sh", "/scripts/wait_for_worker.sh"]
                env:
                  - name: WAIT_NAMESPACE
                    value: "{{ sglang_namespace }}"
                  - name: WAIT_LABEL
                    value: "app={{ inst.prefix }},role=worker"
                  - name: WAIT_COUNT
                    value: "{{ ((_sglang_active_nnodes | int) - 1) | string }}"
                  - name: WAIT_TIMEOUT
                    value: "{{ sglang_wait_timeout | string }}"
                volumeMounts:
                  - name: wait-script
                    mountPath: /scripts
                    readOnly: true
            containers:
              - name: sglang
                image: "{{ sglang_image }}"
                imagePullPolicy: Always
                command: ["/bin/bash", "/scripts/launch.sh"]
                envFrom:
                  - configMapRef:
                      name: "{{ inst.prefix }}-config"
                env:
                  # Unbuffered stdout/stderr so logger/print lines reach kubectl
                  # logs immediately (esp. the per-shard weight-load progress).
                  - name: PYTHONUNBUFFERED
                    value: "1"
                  - name: SGLANG_IMAGE
                    value: "{{ sglang_image }}"
                  - name: NODE_RANK
                    value: "0"
                  # v0.5.10rc0 changed --host default from 127.0.0.1 to 0.0.0.0.
                  # Must be 127.0.0.1 to avoid EADDRINUSE with Scheduler subprocess
                  # (which binds <pod-ip>:port). HAProxy sidecar handles external access.
                  - name: SGLANG_HOST
                    value: "127.0.0.1"
                  - name: TP
                    value: "{{ sglang_tp | string }}"
                  - name: PP
                    value: "{{ sglang_pp | string }}"
                  - name: PP_ASYNC_BATCH_DEPTH
                    value: "{{ sglang_pp_async_batch_depth | string }}"
                  - name: PP_LAYER_PARTITION
                    value: "{{ sglang_pp_layer_partition | string }}"
                  - name: EP
                    value: "{{ sglang_ep | string }}"
                  - name: NNODES
                    value: "{{ _sglang_active_nnodes | string }}"
                  # QSFP/NCCL peer IPs are meaningless for a single-node embed
                  # instance (no workers, no NCCL), AND its sriov_key ("embed") is
                  # absent from qsfp_sriov_assignments, so evaluating _sglang_qsfp_ips
                  # would fail ("dict has no attribute 'embed'"). Guard with
                  # is_embedding — the lazy `X if cond else Y` never evaluates the
                  # _sglang_qsfp_ips branch when embedding. The embed launcher
                  # ignores these vars anyway. Same guard as the QSFP annotation above.
                  - name: QSFP_IP_SPARK1
                    value: "{{ '127.0.0.1' if (inst.is_embedding | default(false)) else _sglang_qsfp_ips[0] }}"
                  - name: QSFP_PEER_IPS
                    value: "{{ '' if (inst.is_embedding | default(false)) else (_sglang_qsfp_ips[1:] | join(',')) }}"
                  - name: NCCL_PORT
                    value: "{{ inst.nccl_port | string }}"
                  - name: SGLANG_PORT
                    value: "{{ inst.internal_port | string }}"
                  - name: HF_TOKEN
                    value: "{{ hf_token }}"
                  - name: HF_HUB_DISABLE_XET
                    value: "{{ hf_hub_disable_xet | default(0) | string }}"
                  - name: HF_XET_HIGH_PERFORMANCE
                    value: "{{ '0' if (hf_hub_xet_disable_high_performance | default(0) | int) else '1' }}"
                  - name: HF_XET_NUM_CONCURRENT_RANGE_GETS
                    value: "{{ hf_xet_num_concurrent_range_gets | default(16) | string }}"
                  # Both names set explicitly so the collective path is identical
                  # on 0.5.11 (reads SGLANG_USE_JIT_ALL_REDUCE) and 0.5.12 (reads
                  # SGLANG_OPT_USE_CUSTOM_ALL_REDUCE_V2). See sglang_jit_allreduce
                  # default for rationale.
                  - name: SGLANG_USE_JIT_ALL_REDUCE
                    value: "{{ '1' if (sglang_jit_allreduce | bool) else '0' }}"
                  - name: SGLANG_OPT_USE_CUSTOM_ALL_REDUCE_V2
                    value: "{{ '1' if (sglang_jit_allreduce | bool) else '0' }}"
                # Burstable iff sglang_memory_request is set (→ swap-eligible under
                # kubelet LimitedSwap); empty "" → BestEffort (memory.swap.max=0, never swaps).
                resources: "{{ {'limits': {'nvidia.com/gpu': '1'}} | combine({'requests': {'memory': sglang_memory_request}} if sglang_memory_request else {}) }}"
                securityContext:
                  # privileged required for: (1) hostIPC NCCL shared memory,
                  # (2) RoCE transport — NCCL's IB plugin needs /dev/infiniband/uverbs*
                  # which host-device CNI doesn't expose to non-privileged containers.
                  privileged: true
                readinessProbe:
                  httpGet:
                    path: /v1/models
                    port: "{{ inst.port }}"
                  periodSeconds: 15
                  failureThreshold: 3
                livenessProbe:
                  httpGet:
                    path: /v1/models
                    port: "{{ inst.port }}"
                  # 1h startup grace (3600 + 3×30s ≈ 61 min): a COLD per-node JuiceFS
                  # blockcache pulls the big NVFP4 checkpoints (e.g. glm-5.2-reap-504B,
                  # 63 shards) from the single backend at ~117 MB/s, which can exceed the
                  # old 1800s before the server binds :port. Once the NVMe cache is warm
                  # the load is fast again (juicefs warmup or one full load). remote-control 2026-07-15.
                  initialDelaySeconds: 3600
                  periodSeconds: 30
                  failureThreshold: 3
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                    # HostToContainer when JuiceFS-backed so the pod survives a
                    # JuiceFS FUSE remount; None (default) for a plain local dir.
                    mountPropagation: "{{ 'HostToContainer' if hf_hub_cache_on_juicefs | bool else 'None' }}"
                  - name: flashinfer-cache
                    mountPath: /root/.cache/flashinfer_persistent
                  - name: triton-cache
                    mountPath: /root/.triton/cache
                  - name: fa4-cute-dsl-cache
                    mountPath: /root/.cache/fa4_cute_dsl_persistent
                  - name: launch-script
                    mountPath: /scripts
                    readOnly: true
                  # Runtime source-patches, run by /scripts/launch.sh's patch runner.
                  # Own mount (not a subdir of /scripts) to keep the two ConfigMaps
                  # independent and avoid a nested configMap mount.
                  - name: patch-scripts
                    mountPath: /patches
                    readOnly: true
              - name: proxy
                image: haproxy:lts-alpine
                args: []
                volumeMounts:
                  - name: haproxy-config
                    mountPath: /usr/local/etc/haproxy
                    readOnly: true
                ports:
                  - containerPort: "{{ inst.port }}"
                    name: http
            volumes:
              - name: hf-cache
                hostPath:
                  # hf_hub_cache_on_juicefs: shared JuiceFS (its root maps onto
                  # /root/.cache/huggingface → hub at <mount>/hub) vs local NVMe.
                  # type Directory when on JuiceFS → fail loudly if not mounted.
                  path: "{{ hf_cache_juicefs_root if hf_hub_cache_on_juicefs | bool else hf_cache_path }}"
                  type: "{{ 'Directory' if hf_hub_cache_on_juicefs | bool else 'DirectoryOrCreate' }}"
              - name: flashinfer-cache
                hostPath:
                  path: "{{ hf_cache_path }}/flashinfer_cache"
                  type: DirectoryOrCreate
              - name: triton-cache
                hostPath:
                  path: "{{ hf_cache_path }}/triton_cache"
                  type: DirectoryOrCreate
              # fa4-cute-dsl-cache — node-local JIT cache, NOT migrated to JuiceFS
              # (see FLASH_ATTENTION_CUTE_DSL_CACHE_DIR in the ConfigMap above).
              - name: fa4-cute-dsl-cache
                hostPath:
                  path: "{{ hf_cache_path }}/fa4_cute_dsl_cache"
                  type: DirectoryOrCreate
              - name: model-download-script
                configMap:
                  name: "{{ inst.prefix }}-model-download-script"
              - name: launch-script
                configMap:
                  name: "{{ inst.prefix }}-launch-script"
                  defaultMode: 0755
              - name: patch-scripts
                configMap:
                  name: "{{ inst.prefix }}-patch-scripts"
                  defaultMode: 0644
              # Host juicefs binary (read-only) for the jfs-warmup initContainer. Points
              # at /bin/true when JuiceFS is off so the hostPath File mount stays valid.
              - name: juicefs-bin
                hostPath:
                  path: "{{ '/usr/local/bin/juicefs' if hf_hub_cache_on_juicefs | bool else '/bin/true' }}"
                  type: File
              - name: haproxy-config
                configMap:
                  name: "{{ inst.prefix }}-haproxy-config"
              - name: wait-script
                configMap:
                  name: "{{ inst.prefix }}-wait-script"
                  defaultMode: 0755

- name: Create SGLang Service ({{ inst.prefix }})
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ inst.prefix }}"
        namespace: "{{ sglang_namespace }}"
      spec:
        type: ClusterIP
        selector:
          app: "{{ inst.prefix }}"
          role: head
        ports:
          - name: http
            port: "{{ inst.port }}"
            targetPort: "{{ inst.port }}"
            protocol: TCP

# External Traefik exposure. The ClusterIP Service above is always created (in-
# cluster clients need it). The per-instance cert / ingressroutes / DNS below
# TOGGLE on inst.external_enabled (default true): state=present when exposed,
# state=absent when not — so flipping the flag to false and re-running ACTIVELY
# REMOVES the ingress, certificate and DNS record (no orphaned routes). The two
# shared middlewares stay present unconditionally (generic, harmless when unused,
# and needed by any OTHER instance that IS exposed).
# Generic HTTPS-redirect middleware, shared across instances in this namespace
# (idempotent re-apply) — kept unprefixed to match the pre-refactor name.
- name: Create HTTPS redirect middleware in sglang namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: redirect-myhttps
        namespace: "{{ sglang_namespace }}"
      spec:
        redirectScheme:
          scheme: https

# Generic IP allowlist (same sourceRange for all instances) — kept unprefixed.
- name: Create SGLang ip allowlist middleware
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: sglang-ip-allowlist
        namespace: "{{ sglang_namespace }}"
      spec:
        ipAllowList:
          sourceRange: "{{ traefik_internal_allowlist }}"

- name: Manage SGLang TLS certificate ({{ inst.prefix }}, external_enabled)
  kubernetes.core.k8s:
    state: "{{ 'present' if inst.external_enabled | bool else 'absent' }}"
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: "{{ inst.hostname }}.{{ dns_external_domain_suffix }}"
        namespace: "{{ sglang_namespace }}"
      spec:
        dnsNames:
          - "{{ inst.hostname }}.{{ dns_external_domain_suffix }}"
        secretName: "{{ inst.hostname }}.{{ dns_external_domain_suffix }}"
        issuerRef:
          name: letsencrypt-production
          kind: ClusterIssuer

- name: Manage SGLang http ingressroute with redirect ({{ inst.prefix }}, external_enabled)
  kubernetes.core.k8s:
    state: "{{ 'present' if inst.external_enabled | bool else 'absent' }}"
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: "{{ inst.prefix }}-ingress"
        namespace: "{{ sglang_namespace }}"
      spec:
        entryPoints:
          - web
        routes:
        - kind: Rule
          match: "Host(`{{ inst.hostname }}.{{ dns_external_domain_suffix }}`)"
          priority: 10
          services:
          - kind: Service
            name: "{{ inst.prefix }}"
            namespace: "{{ sglang_namespace }}"
            passHostHeader: true
            port: "{{ inst.port }}"
          middlewares:
            - name: redirect-myhttps
            - name: sglang-ip-allowlist

- name: Manage SGLang https ingressroute ({{ inst.prefix }}, external_enabled)
  kubernetes.core.k8s:
    state: "{{ 'present' if inst.external_enabled | bool else 'absent' }}"
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: "{{ inst.prefix }}-https-ingress"
        namespace: "{{ sglang_namespace }}"
      spec:
        entryPoints:
          - websecure
        routes:
          - kind: Rule
            match: "Host(`{{ inst.hostname }}.{{ dns_external_domain_suffix }}`)"
            priority: 10
            middlewares:
              - name: sglang-ip-allowlist
            services:
              - kind: Service
                name: "{{ inst.prefix }}"
                namespace: "{{ sglang_namespace }}"
                passHostHeader: true
                port: "{{ inst.port }}"
        tls:
          secretName: "{{ inst.hostname }}.{{ dns_external_domain_suffix }}"

- name: Manage DNS A record for sglang ({{ inst.prefix }}, external_enabled)
  community.general.nsupdate:
    server: "{{ nsupdate_server }}"
    zone: "{{ nsupdate_zone }}"
    key_name: "{{ nsupdate_tsig_key_name }}"
    key_secret: "{{ nsupdate_tsig_key_secret }}"
    key_algorithm: "{{ nsupdate_tsig_algorithm }}"
    record: "{{ inst.hostname }}.{{ dns_external_domain_suffix }}."
    type: A
    ttl: "{{ nsupdate_ttl }}"
    value: "{{ nsupdate_ingress_ip }}"
    state: "{{ 'present' if inst.external_enabled | bool else 'absent' }}"
  ignore_errors: true
  register: dns_result

- name: Warn if DNS registration failed ({{ inst.prefix }})
  ansible.builtin.debug:
    msg: "DNS registration failed (non-critical): {{ dns_result.msg | default('unknown') }}"
  when: dns_result is failed
