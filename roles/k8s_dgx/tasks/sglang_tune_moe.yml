---
# Tune fused MoE Triton kernel configs for the GPU on spark1.
# Sweeps ~1280 kernel configurations (block sizes, warp counts, pipeline stages)
# and writes the optimal config as a JSON file. SGLang reads these at runtime
# via SGLANG_MOE_CONFIG_DIR to avoid "Using default MoE kernel config" warnings.
#
# Usage:
#   ansible-playbook k8s_dgx.yml --tags sglang_tune_moe
#
# Prerequisites:
# - Model must be downloaded (run hf_preload first)
# - SGLang pods should be scaled to 0 (avoid GPU contention / measurement noise)
# - After completion, redeploy SGLang to pick up the new SGLANG_MOE_CONFIG_DIR env var

- name: Create SGLang MoE tuning script ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: sglang-tune-moe-script
        namespace: "{{ sglang_namespace }}"
      data:
        tune_moe.sh: "{{ lookup('file', role_path ~ '/files/sglang_tune_moe.sh') }}"

- name: Delete existing SGLang MoE tuning Job
  kubernetes.core.k8s:
    state: absent
    api_version: batch/v1
    kind: Job
    name: sglang-tune-moe
    namespace: "{{ sglang_namespace }}"

- name: Deploy SGLang MoE tuning Job
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: sglang-tune-moe
        namespace: "{{ sglang_namespace }}"
        labels:
          app: sglang-tune-moe
      spec:
        ttlSecondsAfterFinished: 3600
        backoffLimit: 0
        template:
          metadata:
            labels:
              app: sglang-tune-moe
          spec:
            enableServiceLinks: false
            nodeSelector:
              spark-id: "1"
            restartPolicy: Never
            containers:
              - name: tune
                image: "{{ sglang_image }}"
                command: ["/bin/bash", "/scripts/tune_moe.sh"]
                env:
                  - name: SGLANG_MODEL
                    value: "{{ sglang_model }}"
                  - name: TP
                    value: "{{ sglang_tp | string }}"
                  - name: EP
                    value: "{{ sglang_ep | string }}"
                  - name: HF_TOKEN
                    value: "{{ hf_token }}"
                  - name: MOE_CONFIG_DIR
                    value: "{{ sglang_moe_config_dir }}"
                  - name: HF_CACHE_HOST_PATH
                    value: "{{ hf_cache_path }}"
                  - name: RSYNC_TARGETS
                    # Empty when hf_hub_cache_on_juicefs → the tune script no-ops the rsync fan-out
                    # (moe_configs already lands on the shared JuiceFS namespace).
                    value: "{{ '' if hf_hub_cache_on_juicefs | bool else (range(2, sglang_nnodes | int + 1) | map('string') | map('regex_replace', '^(.+)$', 'spark\\1') | map('extract', hostvars, 'ansible_host') | join(',')) }}"
                  - name: FORCE_RETUNE
                    value: "{{ sglang_force_retune | default('false') }}"
                  - name: SGLANG_TUNE_BRANCH
                    value: "{{ sglang_tune_branch | default('v' ~ sglang_image.split(':')[-1]) }}"
                  - name: PYTHONUNBUFFERED
                    value: "1"
                  - name: RAY_DEDUP_LOGS
                    value: "0"
                resources:
                  limits:
                    nvidia.com/gpu: "1"
                securityContext:
                  privileged: true
                volumeMounts:
                  - name: hf-cache
                    mountPath: /root/.cache/huggingface
                    # HostToContainer when JuiceFS-backed (survive a FUSE remount);
                    # None for a plain local dir. Same gate as the SGLang pods.
                    mountPropagation: "{{ 'HostToContainer' if hf_hub_cache_on_juicefs | bool else 'None' }}"
                  - name: tune-script
                    mountPath: /scripts
                    readOnly: true
                  - name: ssh-keys
                    mountPath: /root/.ssh
                    readOnly: true
            volumes:
              - name: hf-cache
                hostPath:
                  # hf_hub_cache_on_juicefs: write moe_configs straight into the shared
                  # JuiceFS (its root maps onto /root/.cache/huggingface) vs local
                  # NVMe. When on JuiceFS the rsync fan-out is skipped
                  # (RSYNC_TARGETS='') because every node already sees this write.
                  path: "{{ hf_cache_juicefs_root if hf_hub_cache_on_juicefs | bool else hf_cache_path }}"
                  type: "{{ 'Directory' if hf_hub_cache_on_juicefs | bool else 'DirectoryOrCreate' }}"
              - name: tune-script
                configMap:
                  name: sglang-tune-moe-script
                  defaultMode: 0755
              - name: ssh-keys
                hostPath:
                  path: /root/.ssh
                  type: Directory
