---
# --- PostgreSQL password lookup ---

- name: Get openwebui database password from postgresql-secrets
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: postgresql-secrets
    namespace: postgresql
  register: postgresql_secrets_info

- name: Set openwebui database password fact
  set_fact:
    openwebui_db_password: "{{ postgresql_secrets_info.resources[0].data.OPENWEBUI_POSTGRES_PASSWORD | b64decode }}"

