# is active, the litellm role writes each generated sk-... token into a K8s
# Secret named litellm-vkey-<alias>. Uncommenting the two tasks below pulls
# those Secrets in and overrides the plain vars
# (openwebui_connections_openai_keys[0], openwebui_embedding_openai_key) so
# the Secrets become the source of truth — no copy-paste from vault needed.
# Currently disabled: tokens come from vault vars directly.
