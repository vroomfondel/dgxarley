---
# Multus thick DaemonSet + QSFP NetworkAttachmentDefinitions.
#
# The manifest (files/multus-daemonset-thick.yml) is a pre-patched copy of upstream.
# To regenerate after upstream changes: bash roles/k8s_dgx/files/update_multus_manifest.sh
# See the header comment in that file for all fixes applied.
#
# Prerequisites (installed by dgx_prepare role, tag: cni):
#   - host-device CNI plugin in /var/lib/rancher/k3s/data/cni/ (not K3s-bundled)
#   - static IPAM CNI plugin in /var/lib/rancher/k3s/data/cni/ (not K3s-bundled)
#
# PF NADs (qsfp-direct, qsfp-direct-worker):
#   Move the whole PF into the pod namespace with a hardcoded static IP.
#   Used when qsfp_sriov_enabled=false (pods reference by simple NAD name).
#
# VF NADs (qsfp-vf0 .. qsfp-vfN):
#   One per SR-IOV Virtual Function, no hardcoded IP.
#   Pods specify which NAD + IP via annotation JSON:
#     k8s.v1.cni.cncf.io/networks: '[{"name":"qsfp-vf0","ips":["10.10.10.1/24"]}]'
#   Allows multiple pods to use QSFP simultaneously on different VFs.
#
# Both sets are always created — unused NADs are harmless.
# NADs are created in both sglang and vllm namespaces so either engine can use QSFP.

- name: Apply Multus CNI thick DaemonSet
  kubernetes.core.k8s:
    state: present
    src: "{{ role_path }}/files/multus-daemonset-thick.yml"

- name: Wait for NetworkAttachmentDefinition CRD to be established
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: network-attachment-definitions.k8s.cni.cncf.io
  register: _nad_crd
  until: >
    _nad_crd.resources | length > 0 and
    (_nad_crd.resources[0].status.conditions |
     default([]) | selectattr('type', 'equalto', 'Established') |
     selectattr('status', 'equalto', 'True') | list | length > 0)
  retries: 30
  delay: 10

# --- PF NADs (hardcoded IPs) ---

- name: Create NAD for QSFP direct (PF, head IP)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: k8s.cni.cncf.io/v1
      kind: NetworkAttachmentDefinition
      metadata:
        name: qsfp-direct
        namespace: "{{ item }}"
      spec:
        config: |
          {
            "cniVersion": "0.3.1",
            "type": "host-device",
            "device": "{{ qsfp_sriov_pf_iface | default('enp1s0f0np0') }}",
            "ipam": {
              "type": "static",
              "addresses": [
                {
                  "address": "{{ qsfp_ip_spark1 }}/24"
                }
              ]
            }
          }
  loop:
    - "{{ sglang_namespace }}"
    - "{{ vllm_namespace }}"

# Migration: remove old unnumbered qsfp-direct-worker NAD
- name: Remove legacy qsfp-direct-worker NAD (pre-multi-worker)
  kubernetes.core.k8s:
    state: absent
    api_version: k8s.cni.cncf.io/v1
    kind: NetworkAttachmentDefinition
    name: qsfp-direct-worker
    namespace: "{{ item }}"
  loop:
    - "{{ sglang_namespace }}"
    - "{{ vllm_namespace }}"

# Dynamic per-worker PF NADs: qsfp-direct-worker1, qsfp-direct-worker2, ...
# max(sglang_nnodes, vllm_nnodes) determines how many NADs to create.
- name: Create NADs for QSFP direct workers (PF, per-worker IPs)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: k8s.cni.cncf.io/v1
      kind: NetworkAttachmentDefinition
      metadata:
        name: "qsfp-direct-worker{{ item.1 }}"
        namespace: "{{ item.0 }}"
      spec:
        config: |
          {
            "cniVersion": "0.3.1",
            "type": "host-device",
            "device": "{{ qsfp_sriov_pf_iface | default('enp1s0f0np0') }}",
            "ipam": {
              "type": "static",
              "addresses": [
                {
                  "address": "{{ _qsfp_ips_pf_all[item.1] }}/24"
                }
              ]
            }
          }
  loop: "{{ [sglang_namespace, vllm_namespace] | product(range(1, [sglang_nnodes | int, vllm_nnodes | int] | max) | list) | list }}"
  loop_control:
    label: "{{ item.0 }}/qsfp-direct-worker{{ item.1 }}"

# --- VF NADs (no hardcoded IPs, pods set IP via annotation JSON) ---

- name: Create NADs for QSFP SR-IOV VFs
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: k8s.cni.cncf.io/v1
      kind: NetworkAttachmentDefinition
      metadata:
        name: "qsfp-vf{{ item.1 }}"
        namespace: "{{ item.0 }}"
      spec:
        config: |
          {
            "cniVersion": "0.3.1",
            "type": "host-device",
            "device": "{{ qsfp_sriov_vf_prefix | default('enp1s0f0') }}v{{ item.1 }}",
            "ipam": {
              "type": "static"
            }
          }
  loop: "{{ [sglang_namespace, vllm_namespace] | product(range(0, qsfp_sriov_numvfs | default(4) | int)) | list }}"
