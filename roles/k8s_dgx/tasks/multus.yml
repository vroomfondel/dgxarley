---
# Multus thick DaemonSet + QSFP NetworkAttachmentDefinitions.
#
# The manifest (files/multus-daemonset-thick.yml) is downloaded from upstream and patched
# for K3s — see the header comment in that file for all fixes applied.
#
# Prerequisites (installed by dgx_prepare role, tag: cni):
#   - host-device CNI plugin in /var/lib/rancher/k3s/data/cni/ (not K3s-bundled)
#   - static IPAM CNI plugin in /var/lib/rancher/k3s/data/cni/ (not K3s-bundled)
#
# The NetworkAttachmentDefinitions use host-device CNI to attach the QSFP P2P interface
# (enP2p1s0f0np0, ConnectX-7, PCI bus 0002:01:00.0) with static IPs on 10.10.10.0/24.
# Note: enP2p1s0f0np0 has a capital P (PCI domain 0002). Do not confuse with
# enp1s0f0np0 (lowercase, PCI domain 0000, port 0 — typically DOWN/unused).

- name: Apply Multus CNI thick DaemonSet
  kubernetes.core.k8s:
    state: present
    src: "{{ role_path }}/files/multus-daemonset-thick.yml"

- name: Wait for NetworkAttachmentDefinition CRD to be established
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: network-attachment-definitions.k8s.cni.cncf.io
  register: _nad_crd
  until: >
    _nad_crd.resources | length > 0 and
    (_nad_crd.resources[0].status.conditions |
     default([]) | selectattr('type', 'equalto', 'Established') |
     selectattr('status', 'equalto', 'True') | list | length > 0)
  retries: 30
  delay: 10

- name: Create NetworkAttachmentDefinition for QSFP direct (spark1 head)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: k8s.cni.cncf.io/v1
      kind: NetworkAttachmentDefinition
      metadata:
        name: qsfp-direct
        namespace: "{{ dgx_namespace }}"
      spec:
        config: |
          {
            "cniVersion": "0.3.1",
            "type": "host-device",
            "device": "enP2p1s0f0np0",
            "ipam": {
              "type": "static",
              "addresses": [
                {
                  "address": "{{ qsfp_ip_spark1 }}/24"
                }
              ]
            }
          }

- name: Create NetworkAttachmentDefinition for QSFP direct worker (spark-2 worker)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: k8s.cni.cncf.io/v1
      kind: NetworkAttachmentDefinition
      metadata:
        name: qsfp-direct-worker
        namespace: "{{ dgx_namespace }}"
      spec:
        config: |
          {
            "cniVersion": "0.3.1",
            "type": "host-device",
            "device": "enP2p1s0f0np0",
            "ipam": {
              "type": "static",
              "addresses": [
                {
                  "address": "{{ qsfp_ip_spark2 }}/24"
                }
              ]
            }
          }
