---
- name: Create ollama namespace
  kubernetes.core.k8s:
    name: ollama
    api_version: v1
    kind: Namespace
    state: present

- name: Create ollama configmap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: ollama-config
        namespace: ollama
      data:
        OLLAMA_MODELS: "/ollama_models"
        OLLAMA_NUM_PARALLEL: "{{ ollama_num_parallel | string }}"
        OLLAMA_MAX_LOADED_MODELS: "{{ ollama_max_loaded_models | string }}"
        OLLAMA_KEEP_ALIVE: "{{ ollama_keep_alive | string }}"
        OLLAMA_FLASH_ATTENTION: "{{ ollama_flash_attention | string }}"
        OLLAMA_KV_CACHE_TYPE: "{{ ollama_kv_cache_type }}"
        OLLAMA_CONTEXT_LENGTH: "{{ ollama_context_length | string }}"

- name: Create ollama TLS HAProxy config (shared by ollama + ollama-embed)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: ollama-tls-haproxy-config
        namespace: ollama
      data:
        haproxy.cfg: |
          global
            log stdout format raw local0
          defaults
            mode http
            timeout connect 5s
            timeout client 1800s
            timeout server 1800s
          frontend tls_front
            bind *:{{ ollama_tls_port }} ssl crt /etc/haproxy/tls/server.pem
            default_backend ollama_back
          backend ollama_back
            server local 127.0.0.1:{{ ollama_port }}
        gen-cert.sh: |
          #!/bin/sh
          set -e
          openssl req -x509 -nodes -newkey rsa:2048 \
            -keyout /etc/haproxy/tls/key.pem -out /etc/haproxy/tls/cert.pem \
            -days 3650 -subj '/CN=ollama'
          cat /etc/haproxy/tls/cert.pem /etc/haproxy/tls/key.pem > /etc/haproxy/tls/server.pem

- name: Create ollama pull-models script configmap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: ollama-pull-models-script
        namespace: ollama
      data:
        pull-models.sh: |
          #!/bin/bash
          set -em
          ollama serve &
          until ollama list >/dev/null 2>&1; do
            echo "waiting for ollama to be available in initContainer..."
            sleep 1
          done
          IFS=',' read -ra models <<< "$OLLAMA_PRELOAD_MODELS"
          for model in "${models[@]}"; do
            echo "Pulling ${model} ..."
            ollama pull "${model}"
          done
          kill %1


- name: Create ollama service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: ollama
        namespace: ollama
        labels:
          app: ollama
      spec:
        selector:
          app: ollama
        ports:
          - port: "{{ ollama_port }}"
            name: ollamaport
            targetPort: "{{ ollama_port }}"
          - port: "{{ ollama_tls_port }}"
            name: tls
            targetPort: "{{ ollama_tls_port }}"

- name: Create ollama deployment
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ollama
        namespace: ollama
        labels:
          app: ollama
        annotations:
          keel.sh/policy: force
          keel.sh/match-tag: "true"
          keel.sh/pollSchedule: "@every 24h"
          keel.sh/trigger: poll
      spec:
        replicas: "{{ ollama_replicas | default(1) | int }}"
        strategy:
          type: Recreate
        selector:
          matchLabels:
            app: ollama
        template:
          metadata:
            labels:
              app: ollama
            annotations:
              kubectl.kubernetes.io/default-container: ollama
              checksum/config: "{{ (ollama_num_parallel | string ~ ollama_max_loaded_models | string ~ ollama_keep_alive | string ~ ollama_flash_attention | string ~ ollama_kv_cache_type ~ ollama_context_length | string) | hash('sha256') }}"
              checksum/pull-models: "{{ ollama_preload_models | join(',') | hash('sha256') }}"
              checksum/tls-haproxy: "{{ (ollama_tls_port | string ~ ollama_port | string) | hash('sha256') }}"
          spec:
            restartPolicy: Always
            nodeSelector:
              spark-id: "3"
            dnsConfig:
              options:
                - name: ndots
                  value: "1"
            initContainers:
              - name: pull-models
                image: ollama/ollama:latest
                imagePullPolicy: Always
                command: ["/bin/bash", "/scripts/pull-models.sh"]
                envFrom:
                  - configMapRef:
                      name: ollama-config
                env:
                  - name: OLLAMA_PRELOAD_MODELS
                    value: "{{ ollama_preload_models | join(',') }}"
                resources:
                  limits:
                    nvidia.com/gpu: "1"
                securityContext:
                  privileged: true
                volumeMounts:
                  - name: ollama-data
                    mountPath: /ollama_models
                  - name: pull-models-script
                    mountPath: /scripts
              - name: gen-tls-cert
                image: ollama/ollama:latest
                command: ["/bin/sh", "/scripts-tls/gen-cert.sh"]
                volumeMounts:
                  - name: tls-haproxy-config
                    mountPath: /scripts-tls/gen-cert.sh
                    subPath: gen-cert.sh
                    readOnly: true
                  - name: tls-cert
                    mountPath: /etc/haproxy/tls
            containers:
              - name: ollama
                image: ollama/ollama:latest
                imagePullPolicy: Always
#                lifecycle:
#                  postStart:
#                    exec:
#                      command: ["/bin/sh", "/scripts/warmup.sh"]
                envFrom:
                  - configMapRef:
                      name: ollama-config
                tty: true
                ports:
                  - containerPort: "{{ ollama_port }}"
                    name: ollamaport
                resources:
                  limits:
                    nvidia.com/gpu: "1"
                securityContext:
                  privileged: true
                volumeMounts:
                  - name: ollama-data
                    mountPath: /ollama_models
              - name: tls-proxy
                image: haproxy:lts-alpine
                command: ["haproxy", "-f", "/etc/haproxy/haproxy.cfg"]
                ports:
                  - containerPort: "{{ ollama_tls_port }}"
                    name: tls
                volumeMounts:
                  - name: tls-haproxy-config
                    mountPath: /etc/haproxy/haproxy.cfg
                    subPath: haproxy.cfg
                    readOnly: true
                  - name: tls-cert
                    mountPath: /etc/haproxy/tls
                    readOnly: true
            volumes:
              - name: ollama-data
                hostPath:
                  path: /var/lib/ollama-data
                  type: DirectoryOrCreate
              - name: pull-models-script
                configMap:
                  name: ollama-pull-models-script
                  defaultMode: 0755
              - name: tls-haproxy-config
                configMap:
                  name: ollama-tls-haproxy-config
                  defaultMode: 0755
              - name: tls-cert
                emptyDir: {}
#              - name: warmup-script
#                configMap:
#                  name: ollama-warmup-script
#                  defaultMode: 0755

- name: Create ollama ip-allowlist middleware
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: ollama-ip-allowlist
        namespace: ollama
      spec:
        ipAllowList:
          sourceRange: "{{ traefik_internal_allowlist }}"

- name: Create ollama http to https redirect middleware
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: redirect-myhttps
        namespace: ollama
      spec:
        redirectScheme:
          scheme: https

- name: Create ollama TLS certificate
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: "ollama.{{ dns_external_domain_suffix }}"
        namespace: ollama
      spec:
        dnsNames:
          - "ollama.{{ dns_external_domain_suffix }}"
        secretName: "ollama.{{ dns_external_domain_suffix }}"
        issuerRef:
          name: letsencrypt-production
          kind: ClusterIssuer

- name: Create ollama http ingressroute with redirect
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: ollama-ingress
        namespace: ollama
      spec:
        entryPoints:
          - web
        routes:
        - kind: Rule
          match: "Host(`ollama.{{ dns_external_domain_suffix }}`)"
          priority: 10
          services:
          - kind: Service
            name: ollama
            namespace: ollama
            passHostHeader: true
            port: "{{ ollama_port }}"
          middlewares:
            - name: redirect-myhttps
            - name: ollama-ip-allowlist

- name: Create ollama https ingressroute
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: ollama-https-ingress
        namespace: ollama
      spec:
        entryPoints:
          - websecure
        routes:
          - kind: Rule
            match: "Host(`ollama.{{ dns_external_domain_suffix }}`)"
            priority: 10
            middlewares:
              - name: ollama-ip-allowlist
            services:
              - kind: Service
                name: ollama
                namespace: ollama
                passHostHeader: true
                port: "{{ ollama_port }}"
        tls:
          secretName: "ollama.{{ dns_external_domain_suffix }}"

- name: Register DNS A record for ollama
  community.general.nsupdate:
    server: "{{ nsupdate_server }}"
    zone: "{{ nsupdate_zone }}"
    key_name: "{{ nsupdate_tsig_key_name }}"
    key_secret: "{{ nsupdate_tsig_key_secret }}"
    key_algorithm: "{{ nsupdate_tsig_algorithm }}"
    record: "ollama.{{ dns_external_domain_suffix }}."
    type: A
    ttl: "{{ nsupdate_ttl }}"
    value: "{{ nsupdate_ingress_ip }}"
    state: present
