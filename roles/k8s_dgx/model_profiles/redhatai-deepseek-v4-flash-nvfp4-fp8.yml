---
# Model profile: RedHatAI/DeepSeek-V4-Flash-NVFP4-FP8
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# UNTESTED — first-contact config based on HF config.json + RedHatAI README.
# RedHatAI mixed-precision repackage of deepseek-ai/DeepSeek-V4-Flash:
#   - FP8 (W8A8 group-128 / block-128) on attention projections
#     (re:.*attn.*(fused_wqa_wkv|wq_b|wo_a|wo_b)$)
#   - NVFP4 (nvfp4-pack-quantized, group-16, fp8_e4m3 scales) on FFN/MoE
#     (re:.*ffn.*(gate|up|down)_proj$)
# Both groups carried under one `compressed-tensors` quant_method
# (format=mixed-precision). Same packaging family as the Qwen3.6 NVFP4
# profile — DO NOT set quantization=modelopt_fp4 here, SGLang will reject
# it (see redhatai-qwen3.6-35b-a3b-nvfp4.yml for the error class).
#
# Architecture (DeepseekV4ForCausalLM, model_type=deepseek_v4):
#   43 layers, hidden=4096, MLA attention (num_attention_heads=64,
#   num_key_value_heads=1 — latent-compressed KV), 256 routed experts +
#   1 shared, 6 active per token, moe_intermediate_size=2048,
#   topk_method=noaux_tc, scoring_func=sqrtsoftplus, vocab=129280.
#   1 MTP (num_nextn_predict_layers) head for speculative NEXTN decoding.
#
# SGLang support: `DeepseekV4ForCausalLM` is in mainline since PR #23882
# (merged ~2026-05-08, shipped in v0.5.12 released 2026-05-16). Files:
#   python/sglang/srt/models/deepseek_v4.py
#   python/sglang/srt/models/deepseek_v4_nextn.py    (MTP / NEXTN)
# Our default_sglang_image: scitrera/dgx-spark-sglang:0.5.12 covers this.
# v0.5.12.post1 (2026-05-26) has V4-specific stability cherry-picks — worth
# bumping the image once scitrera publishes a .post1 tag.
# The RedHatAI README only references vLLM PR #41276; that's a separate
# vLLM-side NVFP4-quant WIP, unrelated to SGLang model support.
# Roadmap / open issues: sgl-project/sglang #23602 (NVFP4 MoE), #25165
# (DeepseekV4 reg fail on some Hopper images with --trust-remote-code).
#
# Recommended vLLM launch (from README, for reference):
#   vllm serve RedHatAI/DeepSeek-V4-Flash-NVFP4-FP8 \
#     --tensor-parallel-size 4 --kv_cache_dtype="fp8"
# Reported eval: GSM8K 0.910, MMLU-Pro 0.554.
_model_profile:
  "RedHatAI/DeepSeek-V4-Flash-NVFP4-FP8":
    knowledge_cutoff: "2025-05"  # DeepSeek-V4-Flash base; not in official card. Aggregators (opencode.ai, typingmind) + self-report (deepseek-ai/DeepSeek-V3#1389). Medium confidence.
    release_date: "2026-04-22"  # DeepSeek-V4-Flash base; HF API createdAt (official API announcement 2026-04-24)
    info_url: "https://huggingface.co/RedHatAI/DeepSeek-V4-Flash-NVFP4-FP8"
    nccl_transport: "roce"
    tp_size: 4
    ep_size: 1
    # Model supports 1,048,576 (1M); 131072 is conservative first-contact —
    # KV cache headroom matters because MTP draft tokens add per-batch slack.
    # Raise to 262144 / 524288 / 1048576 after the n=1 baseline confirms KV
    # cache fits at the chosen mem_fraction_static.
    context_length: 131072
    quantization: "compressed-tensors"
    trust_remote_code: true
    kv_cache_dtype: "fp8_e4m3"
    # 0.70 first-contact: 256 experts × 43 layers + 1M ctx KV is hefty.
    # Adjust after first launch logs report actual KV-cache size.
    mem_fraction_static: "0.70"
    # Conservative kernel choices for a new arch on compressed-tensors:
    #  - triton MoE: only path proven to accept compressed-tensors NVFP4 on this
    #    cluster (flashinfer_cutlass / flashinfer_cutedsl rejected by SGLang
    #    _handle_moe_kernel_config whitelist on the Qwen3.6 NVFP4 profile —
    #    same packaging family applies here).
    #  - flashinfer attention: standard, MLA-compatible.
    #  - fp4_gemm flashinfer_cutlass: same as Qwen3.6 NVFP4 winner.
    moe_runner_backend: "triton"
    attention_backend: "flashinfer"
    fp4_gemm_backend: "flashinfer_cutlass"
    disable_deep_gemm: true
    disable_cuda_graph: false
    disable_piecewise_cuda_graph: false
    cuda_graph_max_bs: 8
    jit_max_jobs: 4
    pp_async_batch_depth: 0
    num_experts: 256
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # DeepSeek V4 is NOT a hybrid-mamba arch (standard MoE + MLA attention) —
    # leave mamba_scheduler_strategy empty and enable_spec_v2 default (false).
    # The hybrid-mamba switches in the Qwen3.5/3.6 profiles do NOT apply here.
    # SGLang parser registry (verified in v0.5.12 source):
    #  - reasoning: "deepseek-v4" → _DeepSeekV3Detector (Qwen3-style <think> tags)
    #    (python/sglang/srt/parser/reasoning_parser.py)
    #  - tool-call: "deepseekv4" → dedicated DeepSeekV4Detector
    #    (python/sglang/srt/function_call/deepseekv4_detector.py)
    reasoning_parser: "deepseek-v4"
    tool_call_parser: "deepseekv4"
    # DeepSeek-recommended sampling defaults.
    recommended_sampling:
      temperature: 0.6
      top_p: 0.95
    # MTP speculative decoding via the single num_nextn_predict_layers head.
    # num_steps=1 matches the 1 available draft layer; bump only after the
    # NVFP4 sweep from redhatai-qwen3.6-35b-a3b-nvfp4 is reproduced here.
    speculative_enabled: false
    speculative_algo: NEXTN
    speculative_num_steps: 1
    speculative_eagle_topk: 1
    speculative_num_draft_tokens: 2
    # Testweise auf flashinfer 0.6.13rc2 (PR #3576 + §3 NVFP4-quant-Kernels
    # #3237/#3264) — attention_backend ist hier bereits flashinfer + NVFP4, also
    # der sauberste flashinfer-Bump-Test (FLASHINFER_0.6.12_TODO.md §2/§3,
    # 2026-06-21-Note). Zurück: 0.5.12.post1-sm121 (flashinfer 0.6.12).
    # sglang_image: "xomoxcc/dgx-spark-sglang:0.5.12.post1-sm121"  # war: flashinfer 0.6.12
    sglang_image: "xomoxcc/dgx-spark-sglang:0.5.13-sm121"          # flashinfer 0.6.13rc2 (testweise)
