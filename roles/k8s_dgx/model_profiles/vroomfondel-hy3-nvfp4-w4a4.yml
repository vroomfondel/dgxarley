---
# Model profile: vroomfondel/Hy3-NVFP4-W4A4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# ✅ VALIDATED WORKING on GB10/sm121 (2026-07-10) — serves coherently (correct German,
#   correct 86.67 km/h math, valid fib() code; no NaN, no salad) via the 0.5.14-sm121
#   image + tp4/ep1 + moe/fp4=flashinfer_cutlass + attn=triton, ONCE the shared-expert
#   loader remap is applied (see the "shared_experts → shared_mlp" note below).
#
# ROOT CAUSE of the long "W4A4 NaNs on GB10" saga (SOLVED — full trail in
#   ../../../QUANT_HY3_GOTCHAS.md): NOT the FP4 kernels / flashinfer / JIT cache /
#   dtype / model code (all exonerated). It was a WEIGHT-NAME MISMATCH — this checkpoint
#   names the shared expert `model.layers.N.mlp.SHARED_EXPERTS.*`, but SGLang's HYV3 model
#   module is `shared_mlp`, and load_weights had no remap → the (real, FP4) shared-expert
#   weights were silently skipped → shared_mlp zero-init → shared_mlp.down_proj NaN at
#   layer 1, first forward. Localised with the per-layer `--debug-tensor-dump` trace.
#   FIX: sglang_launch.sh step-3 monkey-patch remaps `.shared_experts.`→`.shared_mlp.` in
#   hunyuan_v3.py load_weights (gated on Hy3/Hunyuan, idempotent). No re-quant, no graft.
#   Drop the launch patch once SGLang ships the remap upstream.
#
# WHAT THIS CHECKPOINT IS (HF card, 2026-07-08):
#   vroomfondel's NVIDIA-ModelOpt NVFP4 (W4A4) repackage of tencent/Hy3 — the
#   295B/21B-active Hunyuan-3 MoE (hy_v3 arch, released 2026-07-06). ModelOpt
#   0.45.0, modelopt_fp4 unified HF checkpoint (hf_quant_config.json).
#     - Weights + activations of the Linear / MoE-expert GEMMs → NVFP4 (E2M1,
#       group_size 16, FP8 block scales).
#     - FP8 KV cache (static calibrated).
#     - Kept BF16 (excluded from quant): lm_head, model.embed_tokens, ALL MoE
#       router gates (*.mlp.gate), and the MTP/NEXTN speculative head
#       (model.layers.80*). → the draft head is a high-precision BF16 head.
#   HF reports the checkpoint as "148B params" — that is the FP4 weights packed
#   two-per-U8 byte (295B FP4 ≈ 148B U8 elements), i.e. ~148 GB of packed weight
#   tensors on disk, not a smaller model.
#
# Architecture (hy_v3, from tencent/Hy3 base config):
#   80 transformer layers, hidden GQA with 64 attention heads over 8 KV heads,
#   sparse MoE = 192 routed experts (top-8) + 1 shared expert, 256K native
#   context. One 3.8B MTP head (at layers.80*) for EAGLE/MTP speculative decode.
#   num_key_value_heads=8 → TP=4 gives 2 KV heads/GPU (clean). 192 experts → EP=4
#   clean. ~148 GB FP4 weights + BF16 excludes → ~40 GB/GPU at TP=4 — FITS on the
#   4× GB10 cluster (comparable to DeepSeek-V4-Flash's ~42 GB/GPU). Each GB10 has
#   128 GB unified memory (~120 GB usable) → ~40 GB weights leaves ~80 GB/GPU free
#   for KV — huge headroom, the full 256K window fits comfortably.
#
# Card's reference serving (2-node B200, NOT this cluster):
#   python3 -m sglang.launch_server --model ./Hy3-NVFP4-W4A4 \
#     --quantization modelopt_fp4 --tp-size 2 --nnodes 2 --node-rank 0 \
#     --tool-call-parser hunyuan --reasoning-parser hunyuan \
#     --speculative-algorithm EAGLE --speculative-num-steps 2 \
#     --speculative-eagle-topk 1 --speculative-num-draft-tokens 3 \
#     --context-length 32768 --served-model-name hy3 --port 8000
#   Card note: "On GB10/sm121 some SGLang-side workarounds may be required for the
#   NVFP4 path. Start with a low --context-length; KV cache and interconnect
#   bandwidth are the limits." → exactly our SM121 kernel-wall situation below.
_model_profile:
  "vroomfondel/Hy3-NVFP4-W4A4":
    knowledge_cutoff: null  # not disclosed on the Hy3 card
    release_date: "2026-07-06"  # tencent/Hy3 base release (NVFP4 repackage later)
    info_url: "https://huggingface.co/vroomfondel/Hy3-NVFP4-W4A4"
    nccl_transport: "roce"
    # STEP C 2026-07-09: PP=4/TP=1/EP=1 — NO tensor + NO expert sharding (each GPU
    # runs full layers with all 192 experts, pipeline across the 4 nodes). Isolates
    # ALL sharding as the hy_v3 garbage cause. STEP B (TP=4/EP=1) still NaN-crashed →
    # EP=4 dispatch ruled out; STEP A (Qwen TP=4) coherent → image + TP-for-qwen ok.
    # tp_size=1 → PP = nnodes//tp = 4. Was TP=4/EP=1 (step B), TP=4/EP=4 (original).
    tp_size: 4
    ep_size: 1
    num_experts: 192
    trust_remote_code: true  # hy_v3 is a custom arch; loads model code from the repo
    # Parsers per the card (verbatim SGLang registry names):
    tool_call_parser: "hunyuan"     # needed by honcho/hindsight tool-calling paths
    reasoning_parser: "hunyuan"     # Hy3 is a hybrid fast/slow-thinking model
    # ⚠ TOKEN-SUFFIX: this checkpoint's tokenizer suffixes EVERY structural token
    # (tokenizer_config.json token_suffix ":opensource" → the model emits single
    # tokens <think:opensource>, <tool_calls:opensource>, <tool_sep:opensource>,
    # <arg_key/arg_value:opensource>; the BARE forms <think>/<tool_calls> are not
    # tokens at all). The 0.5.14-sm121 image's hunyuan detectors match only the
    # BARE tokens (pre-#29920) → WITHOUT the fix, reasoning never splits and NO
    # tool calls parse. sglang_launch.sh backports SGLang PR #29920's
    # resolve_hunyuan_tokens() (gated on Hy3/Hunyuan or a hunyuan parser), feeding
    # the suffix via SGLANG_HUNYUAN_TOKEN_SUFFIX (from token_suffix). Verified in a
    # debug pod: tool-call + reasoning-split both parse the :opensource tokens.
    # When bumping to an image that already contains #29920, drop that launch block.
    # The tokenizer itself needs NO patch: it loads fully as transformers-v5
    # TokenizersBackend (the "still TokenizersBackend" warning is cosmetic — the
    # repo ships no custom tokenizer .py, so nothing model-specific is missing).

    # --- Reasoning default: thinking ON via reasoning_effort (hybrid model) ---
    # Hy3's chat template gates thinking ONLY on `reasoning_effort` (values
    # high|low|no_think; template DEFAULT is no_think = OFF). This key flips the
    # default to ON. HOW IT REACHES A REQUEST (code-verified 2026-07-11):
    #   • LiteLLM-routed traffic (hermes-default, honcho, hindsight, openwebui):
    #     this key renders into _sglang_extra_body_defaults → the LiteLLM model_list
    #     entry's extra_body → LiteLLM merges {chat_template_kwargs:{reasoning_effort:
    #     high}} into EVERY upstream request → SGLang serving_chat.py pops it into the
    #     template's reasoning_effort → <think:opensource> opens → THINKING ON. ✓
    #   • The SAME key ALSO renders the SERVER flag --chat-template-kwargs
    #     (SGLANG_CHAT_TEMPLATE_KWARGS). The 0.5.14-sm121 image has NO such flag, so
    #     sglang_launch.sh's capability-guard SKIPS it (else the head crash-loops on
    #     "unrecognized arguments"). ⇒ requests hitting SGLang DIRECTLY (SGLANG_URL,
    #     bypassing LiteLLM) get NO server-side default → thinking OFF unless they pass
    #     reasoning_effort themselves (e.g. sglang-test --reasoning-effort high). On a
    #     future image that DOES support the flag, the guard passes it and direct
    #     requests default-on too — automatically, no profile change needed.
    # Valid Hy3 values: high | low | no_think (NOT none/medium/max — those raise a
    # chat-template error). Set "low" for lighter reasoning, or REMOVE this key to
    # default OFF (per-request reasoning_effort still works either way).
    chat_template_kwargs:
      reasoning_effort: "high"

    # --- Context: native 256K (full window) ---
    # Base supports 262144, and it fits: ~40 GB/GPU weights leaves ~80 GB/GPU free
    # on the 128 GB GB10, while one full 256K sequence's FP8 KV is only ~10 GB/GPU
    # at TP=4. The card's "start low" note is generic GB10 caution — not a limit
    # here. (Interconnect bandwidth, not memory, is the real long-context cost.)
    context_length: 262144

    # --- Quantization: modelopt_fp4 (unified HF checkpoint) ---
    quantization: "modelopt_fp4"
    # FP8 KV baked into the checkpoint (static calibrated) → fp8_e4m3 matches.
    kv_cache_dtype: "fp8_e4m3"

    # --- Backend = VALIDATED WORKING (2026-07-10), alternatives UNTESTED-not-broken ---
    # moe_runner_backend=flashinfer_cutlass + fp4_gemm_backend=flashinfer_cutlass +
    # attention_backend=triton: this exact combo serves COHERENTLY on GB10/sm121 (see the
    # ROOT CAUSE note at the top — the real blocker was the shared_experts→shared_mlp load
    # gap, NOT the backends). ⚠ IMPORTANT: the old "backend X device-asserts on sm121"
    # claims were mostly the shared_experts NaN wearing different masks — so treat all
    # alternatives as UNTESTED-since-the-fix, NOT proven-broken, EXCEPT the ones that are
    # independently confirmed hard walls:
    #   - moe_runner=cutlass → CONFIRMED unavailable: SGLang 0.5.14 removed its own cutlass
    #     MoE runner (NotImplementedError). Never reaches a kernel.
    #   - moe_runner=flashinfer_trtllm → crashes in trtllm_batched_gemm_runner.cu:305
    #     (kernel compiled sm100f, wrong for sm121); fp4_gemm=flashinfer_trtllm/cute-dsl →
    #     BackendSupportedError on capability 121. All independent of shared_experts.
    #   - moe_runner=triton → the earlier "device-side assert" with this backend WAS the
    #     shared_experts NaN (sampler `probability tensor contains inf/nan`), not a triton
    #     bug. Whether triton MoE now works post-fix is UNTESTED — flashinfer_cutlass is
    #     just what we validated; no need to re-test unless there's a reason (e.g. perf).
    #   - fp4_gemm=flashinfer_cudnn → "100% startup crash on sm121" is INHERITED from the
    #     Qwen3-235B sibling profile, not first-hand-verified on Hy3 (but a startup crash is
    #     pre-forward, so architecturally unrelated to shared_experts → plausibly still true).
    # For the record: the H200 before/after calibration preview being coherent was correct
    # — the weights ARE fine, they just weren't reaching shared_mlp on load.
    # Full backend-availability taxonomy: QUANT_HY3_GOTCHAS.md.
    # Historical sweep/crash log: TESTLOGS/sglang_nn4_tp4_ep4/hy3-nvfp4-w4a4/.
    moe_runner_backend: "flashinfer_cutlass"
    fp4_gemm_backend: "flashinfer_cutlass"
    # attention: triton is what we VALIDATED for HYV3. flashinfer attn has a SEPARATELY
    # observed crash — "Invalid configuration NUM_MMA..." in prefill.cuh, a kernel-launch
    # config assert tied to the HYV3 head geometry (from kikube/quantizer
    # smoke_sglang_spark.sh, a different test context) — which is a DIFFERENT failure class
    # than the shared_experts sampler NaN, so it's likely a genuine separate sm121/HYV3
    # incompatibility (NOT the shared_experts root cause; that "→ our NaN" attribution was
    # a conflation). Not re-tested since the fix — but a kernel-launch crash is unrelated to
    # weight loading, so no reason to expect it changed. trtllm_mha is SM100-only (not GB10).
    # Retest flashinfer attn only if there's a reason (e.g. perf); triton is the safe default.
    attention_backend: "triton"
    # DeepGemm targets FP8 ue8m0; NVFP4 scale_fmt != ue8m0 → disable (JIT blocks
    # the scheduler forward loop / 300s watchdog kill / RAM exhaustion otherwise).
    disable_deep_gemm: true
    # eager (disable_cuda_graph) is broken on any cutlass_moe_fp4 path (TURBOQUANT.md);
    # piecewise graphs crash at startup in this kernel family on SM121.
    disable_cuda_graph: false
    disable_piecewise_cuda_graph: true
    cuda_graph_max_bs: 32
    jit_max_jobs: 4
    pp_async_batch_depth: 0
    # 0.70 = the modelopt_fp4 sibling's post-weight KV reserve (fraction of the
    # ~80 GB/GPU free AFTER weights → generous KV pool; not vLLM's total-fraction).
    # Plenty for 256K here; only revisit if co-locating another instance.
    mem_fraction_static: "0.70"
    # EPLB off by default (routed_experts_weights_of_layer crashes on other MoE
    # families here); enable only after a clean baseline.
    enable_eplb: false
    enable_expert_distribution_metrics: false

    # --- Speculative decode: built-in MTP head via EAGLE (card-recommended) ---
    # The 3.8B MTP/NEXTN head is preserved in the checkpoint and EXCLUDED from
    # quant (BF16) → high-precision draft, no external draft model. Card uses the
    # EAGLE algorithm over the model's own head with topk=1 (no draft path, so
    # speculative_draft_model_path/_quantization stay unset). Params verbatim from
    # the card. VALIDATED on GB10 2026-07-11 (boots + serves; two sglang_launch.sh
    # patches — see REAL FIX below). Flip speculative_enabled:false only to A/B a
    # spec-off baseline (still unmeasured).
    # ── MTP/NEXTN boot crash 2026-07-09 — RESOLVED 2026-07-11 (two sglang_launch.sh
    #    patches; NOT the "unquant" knob, which is a NO-OP — see REAL FIX below) ──
    # Deploy with spec ON crash-loops: hunyuan_v3_nextn.py load_weights →
    # fused_moe _load_w13 → "tensor a (2048) must match b (4096) at dim 1" → SIGQUIT
    # → exitCode 137 → worker cascade. THE SHAPE FACTS (verified via safetensors
    # headers) are correct: the MTP layer (layers.80) experts are BF16 (gate/up_proj
    # hidden=4096, NO weight_scale), while the MAIN layers are NVFP4 (U8, hidden packed
    # 2-per-byte =2048, + weight_scale). SGLang builds an NVFP4 w13 buffer (hidden=2048)
    # for the NEXTN head and tries to copy the BF16 weight (hidden=4096) into it → the
    # 2048-vs-4096 mismatch.
    #
    # ⚠ CORRECTION 2026-07-11 (code-verified, image 0.5.14-sm121 + upstream main):
    # `speculative_draft_model_quantization: unquant` DOES NOT FIX THIS — it is a no-op
    # for a built-in NEXTN head. The earlier "FIX = force draft quant to unquant" note
    # was checkpoint-level reasoning only (never validated at boot); empirically it still
    # crashed with unquant set. Why it's a no-op, traced through the source:
    #   1. server_args.py: draft `unquant` → `speculative_draft_model_quantization=None`
    #      — and, unlike the MAIN model's `--quantization unquant` (which ALSO sets
    #      `_quantization_explicitly_unset=True`), the DRAFT path sets NO such flag.
    #   2. model_config.from_server_args(is_draft_model=True) passes quantization=None.
    #   3. model_config._verify_quantization: `if self.quantization is None:
    #      self.quantization = quant_method` — quant_method is read from the checkpoint's
    #      hf_quant_config.json (global modelopt_fp4). So None is silently re-promoted to
    #      modelopt_fp4. (`_quantization_explicitly_unset` is never consulted here — it
    #      only guards the server_args-level model adjustments, not ModelConfig.)
    # → the NEXTN MoE is ALWAYS built modelopt_fp4 on GB10 regardless of this knob.
    # (hunyuan_v3_nextn.py lacks even the NPU-only `quant_config=None` guard that
    # glm4_moe_nextn.py / qwen3_5_mtp.py carry — and that guard is CUDA-inert anyway.)
    # Same no-op mechanism is documented for the Mistral EAGLE case in
    # sglang_launch.sh (~:831). See [[reference_draft_quant_unquant]] (updated).
    #
    # REAL FIX — NOW WIRED into sglang_launch.sh (Hy3/Hunyuan-gated, active when
    # SGLANG_SPECULATIVE_ENABLED=true), two runtime monkey-patches analogous to the
    # shared_experts→shared_mlp remap:
    #   (1) force the NEXTN head's quant_config=None (builds BF16, not modelopt_fp4) →
    #       fixes the 2048-vs-4096 load crash;
    #   (2) remap layers.80.final_layernorm.weight → shared_head.norm.weight (upstream
    #       PR #30331) → without it the draft output-norm is default-init and acceptance
    #       collapses.
    # With both applied, spec is ON and VALIDATED 2026-07-11: MTP boots + serves coherently
    # (CUDA-graph capture, no crash). Acceptance is MODEST / load-dependent — single-req
    # accept_len ~1.6 (accept rate ~0.20, ~16-17 tok/s); 4-req batch accept_len ~2.0,
    # accept rate peaks ~0.5 post-prefill then settles ~0.28-0.33 (~40-53 tok/s aggregate).
    # No spec-off baseline measured on the same load yet → net speedup NOT yet quantified.
    # The no-spec base model stays VALIDATED coherent (2026-07-10); vLLM W4A16-marlin
    # remains the other known-working Hy3+MTP path (QUANT_HY3_GOTCHAS.md, SGLang Blocker A).
    # The `unquant` value below is INERT (see CORRECTION above) — it is NOT the fix; the
    # two sglang_launch.sh patches are. HF card updated 2026-07-11 to match.
    speculative_enabled: true
    speculative_algo: EAGLE
    # --- Draft-tree tuning: variant B (deeper chain + runtime-adaptive) ---
    # Baseline steps=2/topk=1/num_draft=3 gave accept_len ~1.75-2.3 (accept rate
    # ~0.4-0.6). This cluster is inter-node/NCCL-bound (TP=4 over QSFP), so each
    # decode-verify step pays a FIXED all-reduce tax regardless of tokens emitted
    # → amortizing more accepted tokens per verify is unusually valuable here.
    # A deeper chain + adaptive tuning targets that. MEASURED 2026-07-11 (spec-on,
    # adaptive): single-req accept_len ~1.6 / ~17 tok/s; 4-req accept_len ~2.0 /
    # ~40-53 tok/s agg (accept rate settles ~0.28-0.33). Still no spec-off baseline on
    # the same load → revisit the seed once a controlled spec-off vs spec-on run exists.
    # ValueError: --speculative-num-steps=4 is not in the adaptive config candidate_steps [0, 1, 3, 7]. Pass one of those values.
    speculative_num_steps: 3          # was 2 — deeper draft chain (adaptive seed)
    speculative_eagle_topk: 1         # MUST stay 1: speculative_adaptive is disabled for topk>1
    speculative_num_draft_tokens: 6   # was 3 — larger verify tree (adaptive seed)
    # Adaptive Spec V2 (SGLang >=0.5.12): retunes num_steps/num_draft_tokens at
    # runtime from observed accept rate + batch pressure. Requires EAGLE + topk=1
    # (both satisfied). The three values above are just the starting seed.
    speculative_adaptive: true
    speculative_draft_model_quantization: "unquant"  # INERT for built-in NEXTN: normalizes to None → _verify_quantization re-promotes to modelopt_fp4 (see note above). Real fix = NEXTN BF16-loader patch.

    # Official recommendation (tencent/Hy3 card): temperature=0.9, top_p=1.0 (same
    # for thinking + no_think; the card tunes behavior via reasoning_effort, not
    # sampling). top_k is set to -1 (disabled) because the checkpoint's
    # generation_config ships top_k=0 which SGLang REJECTS ("top_k must be -1 or
    # >=1, got 0", HTTP 400) — -1 is SGLang's disable sentinel and matches the
    # model's intent. These feed LiteLLM's per-model defaults (_sglang_sampling_
    # defaults → litellm.yml), so requests via LiteLLM get valid params.
    recommended_sampling:
      temperature: 0.9
      top_p: 1.0
      top_k: -1

    # Image: default is 0.5.14-sm121. ⚠ hy_v3 is a brand-new arch (base released
    # 2026-07-06) — confirm the pinned image actually registers the hy_v3 model
    # class + hunyuan parsers before deploy; pin a newer sm121 image here if not.
    # sglang_image: "xomoxcc/dgx-spark-sglang:0.5.14-sm121"
