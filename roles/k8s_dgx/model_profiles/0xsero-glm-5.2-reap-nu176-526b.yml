# Model profile: 0xSero/GLM-5.2-REAP-NU176-526B
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# ############################################################################
# ## ⚠️  NON-UNIFORM EXPERT PRUNING — DOES NOT LOAD ON STOCK SGLang/vLLM.  ##
# ############################################################################
# This is the FIRST non-uniform REAP cut of GLM-5.2: each MoE layer keeps a
# DIFFERENT number of routed experts (config.json num_routed_experts_per_layer =
# list of 79 ints, VERIFIED: dense layers 0-2 = 0, MoE layers 108–216, mean ~176,
# n_routed_experts scalar = max = 216). Every stock inference engine — SGLang AND
# vLLM alike — assumes ONE expert count for all layers, so it will mis-load the
# renumbered gate.weight / e_score_correction_bias rows on the short layers.
# The author ships a 12-line patched vLLM fork (DeepseekV2MoE resolves its layer's
# count from the per-layer list) as the ONLY supported runtime:
#   repo:  https://github.com/0xSero/glm-5.2-nonuniform
#   image: ghcr.io/0xsero/vllm-b12x-nonuniform:20260705
# Our stock scitrera/dgx-spark-vllm and lmsysorg/sglang images do NOT carry this
# patch. This profile is therefore a PLACEHOLDER / metadata record only — it is
# NOT deployable as-is. To actually serve it we'd have to port the 12-line
# non-uniform patch into our SGLang (or run the author's forked vLLM image).
# Prefer the UNIFORM sibling 0xSero/glm-5.2-reap-504B-v2 (keep-168) for stock serving.
# ############################################################################
_model_profile:
  "0xSero/GLM-5.2-REAP-NU176-526B":
    knowledge_cutoff: "2025-12"  # GLM-5.2 base; not in official card. Inherited estimate from GLM-5 family (apxml lists Dec 2025). Low confidence.
    release_date: "2026-07-05"  # Base nvidia/GLM-5.2-NVFP4 (~2026-06-25); this non-uniform cut ~early July 2026 (forked-vLLM image tag 20260705). Estimate, low confidence.
    info_url: "https://huggingface.co/0xSero/GLM-5.2-REAP-NU176-526B"
    # README: https://huggingface.co/0xSero/GLM-5.2-REAP-NU176-526B/blob/main/README.md
    # ~526B MoE (337 GB on disk) — a NON-UNIFORMLY expert-pruned GLM-5.2. Instead of
    # pruning every MoE layer to the same keep-K, per-layer keep counts are allocated
    # by per-layer REAP saliency (gate_weight × ‖expert_output‖) measured over 16.08B
    # calibration tokens, water-filled to a budget of 75×176 and clamped to [108, 216]
    # in multiples of 4. Mean dropped-saliency mass 17.6% vs 22.3% for the prior
    # uniform keep-156 cut. Whole-expert copy from nvidia/GLM-5.2-NVFP4 (base) with
    # per-layer renumbering; MTP layer experts (168) taken from the NVFP4 uniform cut
    # because NVIDIA ships MTP in BF16, which b12x-class MoE kernels reject.
    # Architecture: GlmMoeDsa — MLA (Multi-head Latent Attention) with DSA
    # (DeepSeek Sparse Attention). Geometry VERIFIED against config.json:
    # num_hidden_layers=78, first_k_dense_replace=3 (dense layers 0-2), rest MoE,
    # n_shared_experts=1 + num_experts_per_tok=8 per MoE layer, but n_routed_experts
    # is PER-LAYER (see num_routed_experts_per_layer; scalar = max = 216 — the value
    # below). num_nextn_predict_layers=1 → MTP head (NEXTN), 168 experts on the MTP layer.
    # num_attention_heads=64, num_key_value_heads=64 (full MHA via MLA), head_dim=192.
    # hidden_size=6144, moe_intermediate_size=2048, vocab_size=154880.
    # n_group=1, topk_group=1, routed_scaling_factor=2.5.
    # TP must divide 64 → valid TP ∈ {1,2,4,8,…}; TP=6 is INVALID (64 ∤ 6).
    # 78 layers divide cleanly by PP=6 (13/node) and PP=3 (26/stage).
    # NVFP4 quantization VERIFIED against config.json quantization_config
    # (producer modelopt 0.39.0.dev, quant_method=modelopt, quant_algo=NVFP4,
    # group_size=16): config_groups.group_0 quantizes BOTH weights AND
    # input_activations to FP4 (num_bits 4, type float, group_size 16, targets
    # Linear) → W4A4, not weight-only W4A16. Applied to the routed-expert MLPs;
    # router gates, attention (q/k/v/o), DSA indexer, dense MLPs (0-2), shared
    # experts, lm_head, and the MTP layer all remain BF16 (quantization_config.ignore).
    # No kv_cache_quant_algo in the checkpoint — kv_cache_dtype below is a serving choice.
    nccl_transport: "roce"
    tp_size: 4
    context_length: 16384  # conservative; config.json max_position_embeddings=1048576 (1M), but KV headroom on 4 nodes is the real constraint
    quantization: "modelopt_fp4"
    # trust_remote_code: required because the GLM-5 family ships custom model code
    # (GlmMoeDsaForCausalLM, custom tokenizer) in the HF repo that SGLang must execute.
    trust_remote_code: true
    # NOTE: the args below MIRROR the uniform 504B-v2 / nvidia GLM-5.2 profiles. They
    # are placeholders — with a stock (uniform-assumption) engine the model won't even
    # load correctly, so none of these have been (or can be) validated on this cut.
    moe_runner_backend: "flashinfer_cutlass"
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.18"  # 526B > the 504B cut → slightly less KV headroom; conservative
    attention_backend: "flashinfer"
    fp4_gemm_backend: "flashinfer_cutlass"
    jit_max_jobs: 4
    disable_piecewise_cuda_graph: true
    disable_cuda_graph: false
    cuda_graph_max_bs: 8
    pp_async_batch_depth: 0
    # DeepGemm is designed for FP8 with ue8m0 scale format. For NVFP4 models
    # (scale_fmt != ue8m0): (1) the JIT-compiled kernels aren't optimized for
    # this format and may degrade accuracy, (2) JIT compilation blocks the
    # scheduler forward loop synchronously, triggering the 300s watchdog kill,
    # (3) parallel nvcc/cicc processes exhaust system RAM. With DeepGemm
    # disabled, FP4 GEMM selection falls to fp4_gemm_backend.
    disable_deep_gemm: true
    # GLM-5 family reasoning/tool parsers:
    # "glm45" — GLM-4.5 detector, separates <think>...</think> into reasoning_content.
    # "glm47" — GLM-4.7 tool call format.
    reasoning_parser: "glm45"
    tool_call_parser: "glm47"
    # num_experts = MAX per-layer keep (216 = the n_routed_experts scalar / tensor dim).
    # The engine MUST additionally honor num_routed_experts_per_layer or short layers
    # mis-route — stock SGLang does not, hence the header warning.
    num_experts: 216
    # ep_size: with TP=1/PP=4, EP must be 1 (EP requires ep_size <= tp_size).
    ep_size: 1
    # Same REPORT.md sampler guardrail as the uniform cut: min_p=0.05 + repetition
    # penalty recovers pruning-induced looping for free (start 1.05, → 1.10 if loops
    # appear). Card also cites an "anti-overthinking" hesitation-marker directive
    # (arXiv:2606.00206) for pruned reasoning models. Guardrail axis is min_p, NOT top_p.
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      min_p: 0.05
      repetition_penalty: 1.05
    # MTP / speculative decoding (NEXTN): trained MTP head present
    # (num_nextn_predict_layers=1, 168 experts on the MTP layer). Same GLM family as
    # nvidia/GLM-4.7-NVFP4 (MTP VALIDATED there). UNTESTED here — and moot until a
    # non-uniform-aware runtime exists; flip speculative_enabled:false if it misbehaves.
    speculative_enabled: true
    speculative_algo: NEXTN
    speculative_num_steps: 3
    speculative_num_draft_tokens: 4
