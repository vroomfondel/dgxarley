# Model profile: nvidia/MiniMax-M2.7-NVFP4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
# NOTE: cloned from nvidia-minimax-m2.5-nvfp4.yml. Architecture is identical
# (62 layers, hidden 3072, 256 experts / 8 active, num_key_value_heads=8). UNLIKE the
# M2.5 lineage (which ran PP=4/TP=1), this profile runs TP=4/PP=1: 8 KV heads divide
# cleanly by 4 (2 per rank), so tensor parallelism is viable and drops the pipeline
# bubbles. The MoE-runner and CUDA-graph axes were RE-MEASURED for M2.7 on TP=4 by
# the sglang_nn4_tp4_ep1 matrix (2026-06-01, sglang-0.5.12.post1) — winner is
# flashinfer_cutlass MoE + flashinfer attn + fi_cutlass FP4 + piecewise CUDA graph.
# See TESTLOGS/sglang_nn4_tp4_ep1/minimax-m2.7-nvfp4/TESTLOG_nv580.159_sglang-0.5.12.post1_minimax-m2.7-nvfp4_4n.md.
# The remaining values inherited from the M2.5 PP=4 logs (mem_fraction, cuda_graph_max_bs,
# kv_cache_dtype) were NOT specifically swept and stand as reasonable defaults.
_model_profile:
  "nvidia/MiniMax-M2.7-NVFP4":
    knowledge_cutoff: null  # no published cutoff found (HF card/tech report/aggregators checked 2026-06)
    info_url: "https://huggingface.co/nvidia/MiniMax-M2.7-NVFP4"
    # 230B total / 10B active MoE (62 layers, hidden 3072, 256 experts, 8 active/token,
    # sigmoid routing), NVFP4 quantized (~139 GB weights, modelopt v0.43.0).
    # num_key_value_heads=8 → not divisible by 3 (TP=3 impossible) but divisible by 4.
    # Runs TP=4/PP=1: each of the 4 ranks holds 2 KV heads + a 1/4 shard of every
    # layer's weights (~35 GB/GPU), leaving the bulk of the 128 GB unified memory for
    # KV cache. No pipeline stages → no pipeline bubbles (the PP=4 per-request latency
    # penalty is gone), at the cost of per-layer all-reduce traffic (RoCE-bound). The
    # M2.5 PP=4/TP=1 alternative is kept in sglang_nn4_tp1_ep1 for comparison.
    # Recommended launch (NVIDIA model card):
    #   python3 -m sglang.launch_server --model nvidia/MiniMax-M2.7-NVFP4 --tensor-parallel-size 8 \
    #     --quantization modelopt_fp4 --trust-remote-code --reasoning-parser minimax-append-think \
    #     --tool-call-parser minimax-m2 --moe-runner-backend flashinfer_cutlass --attention-backend flashinfer
    # load_format: "sharded_state" — disabled for NVFP4 because:
    # 1. NVFP4 process_weights_after_loading runs on the empty model first, then
    #    shard tensors are copied in. This double-processing eats ~4 GB extra memory
    #    vs. the default loader (streaming weights → process once), leaving less
    #    headroom for CUDA graph capture.
    # 2. No real speedup observed with TP=2 EP=2: NVFP4 weight loading is dominated
    #    by process_weights_after_loading (scale recalibration, FP4 repacking), not
    #    by file I/O. Sharded loading skips the slow safetensors redistribute but
    #    the post-processing cost remains the same (~360s either way).
    # load_format: "sharded_state"
    nccl_transport: "roce"
    #nccl_transport: "roce"
    tp_size: 4  # TP=4/PP=1 (PP = nnodes/tp = 4/4 = 1). 8 KV heads / 4 = 2 per rank — divides cleanly, no PP bubbles.
    # config.json max_position_embeddings = 196608 (identical to M2.5). The model
    # card's "204800" is its benchmark ISL, NOT the architectural context window —
    # do not raise context_length above max_position_embeddings.
    context_length: 196608
    quantization: "modelopt_fp4"
    # trust_remote_code: required because MiniMax-M2.7 ships custom model code
    # (minimax_m2.py, custom tokenizer) in the HF repo that SGLang must execute.
    # Without it, transformers refuses to load the model class. Safe here because
    # the code comes from NVIDIA's official nvidia/MiniMax-M2.7-NVFP4 repo.
    trust_remote_code: true
    # flashinfer_cutlass MoE — RESOLVED by the TP=4 matrix (2026-06-01,
    # sglang-0.5.12.post1, see TESTLOGS/sglang_nn4_tp4_ep1/minimax-m2.7-nvfp4/).
    # Block A (fi_cutlass) won: top n8 peak 136–139 tok/s, stable across all CG
    # variants. The old "fi_cutlass MoE crashes (Xid 13, PP=4 tests 17–32)" caveat
    # was a pipeline-stage interaction and does NOT apply on TP=4/PP=1 — fi_cutlass
    # is the NVIDIA model-card MoE backend and the proven NVFP4 path on our other TP
    # models (qwen3-235b, glm-4.7). Block B (triton) tied within ~3% but lost on
    # single-stream latency. PROBES both crashed at startup: flashinfer_trtllm
    # (sm100-only batched-GEMM, no sm121 kernel) and cutlass-direct (MoeRunner
    # NotImplementedError) — do not use either. PP=4 ref (superseded): triton moe +
    # eager → 63.9 tok/s at 8∥.
    moe_runner_backend: "flashinfer_cutlass"
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.80"
    # mem_fraction_static: "0.40"  # for speculative_enabled=true
    # PP=4 winner uses flashinfer attention (Test 2: 63.9 at 8∥).
    # triton attention also stable (Test 5: 52.2 at 8∥, Test 13: 62.0 at 8∥).
    attention_backend: "flashinfer"
    # flashinfer_cutlass fp4: stable on PP=4. fi_cudnn also works but slightly
    # lower throughput (Test 9: 48.9 vs Test 1: 61.2 at 8∥).
    fp4_gemm_backend: "flashinfer_cutlass"
    jit_max_jobs: 4
    # Piecewise CUDA graph ENABLED — RESOLVED by the TP=4 matrix. The PP=4 OOM
    # ("58 chunks × 256 experts per stage") was a pipeline-stage failure; on
    # TP=4/PP=1 there are no stages, so piecewise is viable and was the best
    # all-rounder (case 02: n8 peak 136.0, n1 35.9 tok/s @ 0.42s TTFT, 8/8 clean
    # at every concurrency level). Both eager (no-CG) cases paid a huge cold-start
    # penalty — 11.9s (fi_cutlass) / 67s (triton) n1 TTFT — so eager is OUT here.
    disable_piecewise_cuda_graph: false
    # CUDA graph ENABLED (was eager, PP=4-inherited). On TP=4/PP=1 the pipeline-bubble
    # rationale for eager is gone and the matrix confirmed piecewise CG wins on
    # latency at parity throughput. PP=4 ref (superseded): eager 63.9 vs full-CG 61.2
    # at 8∥. NB: full-CG (case 03) edged n1 but flaked 1/8 at n8; piecewise had zero
    # fails — hence piecewise, not full-CG.
    disable_cuda_graph: false
    cuda_graph_max_bs: 16
    pp_async_batch_depth: 0  # no-op at PP=1 (no pipeline stages). PP=4 ref: pp_async hurt throughput (50.0 vs 63.9).
    # DeepGemm is designed for FP8 with ue8m0 scale format. For NVFP4 models
    # (scale_fmt != ue8m0): JIT kernels not optimized, blocks scheduler watchdog,
    # exhausts system RAM. Disabled — FP4 GEMM falls to fp4_gemm_backend above.
    disable_deep_gemm: true
    # "minimax" parser maps to Qwen3Detector which properly separates
    # <think>...</think> into reasoning_content. Works with OpenWebUI and CLI tools.
    reasoning_parser: "minimax"
    tool_call_parser: "minimax-m2"
    num_experts: 256
    # ep_size: "{{ sglang_nnodes if (256 % (sglang_nnodes | int) == 0) else 1 }}"  # for TP=4 EP=4 mode
    ep_size: 1  # TP=4 EP=1: each rank holds all 256 experts. EP=4 (256 % 4 == 0) is a separate sglang_nn4_tp4_ep4 matrix.
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 40
    speculative_enabled: false
    speculative_algo: NEXTN
    speculative_num_steps: 3
    speculative_num_draft_tokens: 4
    speculative_draft_model_path: ""
