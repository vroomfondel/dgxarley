# Model profile: QuantTrio/Qwen3-235B-A22B-Instruct-2507-AWQ
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
_model_profile:
  "QuantTrio/Qwen3-235B-A22B-Instruct-2507-AWQ":
    info_url: "https://huggingface.co/QuantTrio/Qwen3-235B-A22B-Instruct-2507-AWQ"
    # 235B/22B MoE, AWQ 4-bit (~124 GB / ~62 GB per GPU with TP=2)
    load_format: "sharded_state"  # default: auto
    context_length_max: 262144
    context_length: 262144
    #context_length: 131072
    #context_length: 65536
    #context_length: 32768
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.7"
    # quantization: "moe_wna16" avoids the Marlin repack that causes OOM on
    # memory-constrained GPUs. Auto-detect (no flag) creates AWQMarlinConfig which
    # works correctly but needs ~109 GB peak during repack (old+new tensors coexist).
    # moe_wna16 uses Triton INT4 kernels directly — no repack, peak = final ~62 GB.
    # --quantization awq is WRONG for MoE: AWQConfig.get_quant_method() returns None
    # for FusedMoE → falls through to unquantized FP16 → OOM.
    quantization: "moe_wna16"
    attention_backend: "triton"
    disable_deep_gemm: true
    tool_call_parser: "qwen3_coder"
    # Expert parallelism: monkey-patched at runtime (see Thinking profile comment).
    num_experts: 128
    ep_size: "{{ sglang_nnodes if (128 % (sglang_nnodes | int) == 0) else 1 }}"
    # EPLB disabled: see Thinking profile comment (Qwen3MoE missing attribute, crashes
    # after ~1000 iter). Still broken on 0.5.9-dev2-acab24a7-t5.
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # Standard MoE (128 experts, 8 active) — triton attention backend required
    # on SM121 (flashinfer has edge cases with large MoE models).
    # Weight loading (~170s for 25 shards) can be halved with pre-sharding:
    # run sglang_shard job, then enable load_format: "sharded_state" above.
    # non-thinking only — no <think> blocks, no reasoning_parser needed
    recommended_sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      presence_penalty: 1.0  # https://huggingface.co/QuantTrio/Qwen3-235B-A22B-Instruct-2507-AWQ#best-practices
    #    sampling_overrides:
    #      repetition_penalty: 1.1
    #      frequency_penalty: 0.3

