---
# Model profile: canada-quant/DeepSeek-V4-Flash-W4A16-FP8-MTP
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# UNTESTED, HIGH-RISK first-contact — config derived from HF config.json only.
# This is a THIRD-PARTY compressed-tensors mixed-precision repackage of
# deepseek-ai/DeepSeek-V4-Flash. Before relying on it, read the two STRUCTURAL
# RISKS below — both can make it fail at model build, before any kernel runs.
#
# WHAT THIS CHECKPOINT IS (config.json quantization_config, format=mixed-precision,
# quant_method=compressed-tensors, scale_fmt=ue8m0):
#   - group_0  ATTENTION  → FP8 W8A8: block-[128,128] fp8 weights + dynamic
#     group-128 fp8 input activations. targets:
#       re:.*attn\.(wq_a|wq_b|wkv|wo_a|wo_b|fused_wqa_wkv|q_a_proj|q_b_proj|
#                   kv_proj|o_a_proj|o_b_proj)$
#   - group_1  ROUTED MoE → INT4 W4A16: pack-quantized, num_bits=4, group_size=128,
#     actorder=static, symmetric int. targets:
#       re:.*experts\.\d+\.(w1|w2|w3|gate_proj|up_proj|down_proj|gate_up_proj)$
#   - ignore: layers.*.ffn.shared_experts.{w1,w2,w3} stay bf16 (unquantized).
# So the name decodes as: W4A16 = the routed experts (INT4 weights / bf16 acts),
# FP8 = the attention projections, MTP = the num_nextn_predict_layers draft head.
#
# WHY IT'S ATTRACTIVE: the routed-expert MoE block is the dominant weight cost,
# and INT4 is ~half the per-GPU footprint of the sgl-project FP8 checkpoint
# (~73.5 GB/GPU). That is the single biggest fit lever on 128 GB UNIFIED memory —
# if it loads, this is the lightest DSv4-Flash variant we have.
#
# ── STRUCTURAL RISK 1: wqkv_a matcher gap (likely fatal at model build) ────────
#   SGLang's V4 model fuses the attention input proj into a module named
#   `wqkv_a` (python/sglang/srt/models/deepseek_v4.py:265). That literal name is
#   NOT in group_0.targets above (they list wq_a / wkv / fused_wqa_wkv etc., but
#   never `wqkv_a`). compressed-tensors find_matched_target() then raises:
#     ValueError: Unable to find matching target for
#     model.layers.0.self_attn.wqkv_a in the compressed-tensors config.
#   This is the EXACT failure that pushed us off RedHatAI/DeepSeek-V4-Flash-
#   NVFP4-FP8 onto sgl-project's plain-FP8 checkpoint — see the header of
#   sgl-project-deepseek-v4-flash-fp8.yml. It applies here too unless this repo's
#   wider target regex happens to satisfy the matcher (unverified).
#
# ── STRUCTURAL RISK 2: compressed-tensors W4A16 MoE on V4 is upstream-WIP ───────
#   Per the same sgl-project profile note, compressed-tensors W4A16 for DeepSeek
#   V4 is an open upstream feature (sgl-project/sglang #23724). Even past the
#   wqkv_a gap, the INT4 routed-MoE path may not have a working SM121 runner.
#
# If EITHER risk bites, fall back to sgl-project/DeepSeek-V4-Flash-FP8 (proven to
# load + serve coherent output end-to-end, 2026-05-31). This profile is here so
# we can RE-TEST the W4A16 path as upstream lands #23724 — not because it works
# today.
#
# Architecture (DeepseekV4ForCausalLM, model_type=deepseek_v4) — identical to the
# FP8 checkpoint: 43 layers, hidden=4096, MQA (num_attention_heads=64,
# num_key_value_heads=1, DSA index/sparse attention, index_topk=512), 256 routed
# experts + 1 shared, 6 active/token, moe_intermediate_size=2048, q_lora_rank=1024,
# o_lora_rank=1024, 3 hash_moe layers, 1 MTP head. max_position_embeddings=1M,
# yarn rope (factor 16 over 65536). Same SM121 kernel landmines as the FP8 profile.
_model_profile:
  "canada-quant/DeepSeek-V4-Flash-W4A16-FP8-MTP":
    knowledge_cutoff: null  # no published cutoff found (HF card/tech report/aggregators checked 2026-06)
    info_url: "https://huggingface.co/canada-quant/DeepSeek-V4-Flash-W4A16-FP8-MTP"
    nccl_transport: "roce"
    tp_size: 4
    ep_size: 1
    # 131072 conservative first-contact. INT4 routed experts free a lot of weight
    # budget vs FP8, so KV headroom is larger here — raise to 262144 / 524288 /
    # 1048576 once the n=1 baseline confirms KV fits at the chosen mem_fraction.
    context_length: 131072
    # compressed-tensors mixed-precision (FP8 attn + INT4 MoE). Do NOT set fp8 or
    # modelopt_fp4 — SGLang dispatches the per-group schemes off this single flag.
    quantization: "compressed-tensors"
    trust_remote_code: true
    kv_cache_dtype: "fp8_e4m3"
    # First-contact = standard mmap loader (cleaner to debug a brand-new quant
    # path). The INT4 footprint is well under the FP8 checkpoint's, so the host
    # load-peak that drove us to fastsafetensors on the FP8 profile is far less
    # severe here. Switch to load_format: fastsafetensors if the host still swaps.
    load_format: "auto"
    weight_loader_disable_mmap: false
    weight_loader_drop_cache_after_load: true
    # INT4 MoE roughly halves the dominant weight block vs FP8 → expect well under
    # the FP8 ~73.5 GB/GPU. 0.85 is generous because weights are smaller; back off
    # toward 0.70 if the first launch logs show KV + weights tight. ep_size does
    # NOT help footprint (per-GPU MoE weight is W/4 under both TP=4 and EP=4); the
    # fit levers are context_length / mem_fraction_static (KV) and the quant size.
    mem_fraction_static: "0.85"
    # Kernel choices — same SM121 landmine set as sgl-project-deepseek-v4-flash-fp8
    # (identical arch), with the MoE runner adjusted for INT4 compressed-tensors:
    #  - triton MoE: the only runner that accepts compressed-tensors quant MoE on
    #    this cluster (flashinfer_cutlass/cutedsl are fp8/fp4-only; rejected by
    #    _handle_moe_kernel_config whitelist). For W4A16 (wna16) INT4 it's also the
    #    path; NOTE the moe_wna16 qzeros EP bug (SGLANG_TP_EP_MOE_UPSTREAM_BUG.md)
    #    is EP-only — we run ep_size=1 (TP), so it does not apply.
    #  - flashinfer attention: MLA/MQA-compatible (V4 DSA path).
    #  - fp8_gemm cutlass: SM121 auto-picks flashinfer→trtllm (unsupported here);
    #    cutlass is the working FP8 GEMM runner for the attention group.
    moe_runner_backend: "triton"
    attention_backend: "flashinfer"
    fp8_gemm_runner_backend: "cutlass"
    # Unlike sgl-project's plain-FP8 checkpoint (wo_a shipped bf16 → had to dequant
    # via opt_fp8_wo_a_gemm=false to avoid a downcast crash), THIS repo quantizes
    # wo_a to fp8 (it's in group_0.targets). So the downcast crash may not occur
    # and wo_a could legitimately stay fp8. Kept false for first-contact safety
    # (fp8→bf16 dequant always succeeds); try true once the model loads clean.
    opt_fp8_wo_a_gemm: false
    # DeepGEMM has no sm_121 variant for two V4 kernels (DeepGEMM #317, SGLang
    # #23657) → route both to fallbacks, same as the FP8 profile:
    #  - hc_prenorm (MHC heavily-compressed) → TileLang
    #  - paged_mqa_logits (DSA Lightning-Indexer) → torch
    opt_deepgemm_hc_prenorm: false
    fp8_paged_mqa_logits_torch: true
    # C4-indexer top-k transform: TVM jit topk_transform_512_v2 dies on sm_121 at
    # decode (topk_v2.cuh:472 invalid argument). Route to the torch fallback.
    topk_transform_512_torch: true
    disable_deep_gemm: true
    disable_cuda_graph: true
    disable_piecewise_cuda_graph: true
    cuda_graph_max_bs: 8
    jit_max_jobs: 1
    pp_async_batch_depth: 0
    num_experts: 256
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # DeepSeek V4 is NOT a hybrid-mamba arch (standard MoE + MLA/MQA) — leave
    # mamba_scheduler_strategy empty, enable_spec_v2 default (false).
    # SGLang parser registry (v0.5.12): reasoning "deepseek-v4" → _DeepSeekV3Detector,
    # tool-call "deepseekv4" → dedicated DeepSeekV4Detector.
    reasoning_parser: "deepseek-v4"
    tool_call_parser: "deepseekv4"
    # DeepSeek-recommended sampling defaults (this repo ships no generation_config
    # override; using the generic DeepSeek values, NOT sgl-project's 1.0/1.0).
    recommended_sampling:
      temperature: 0.6
      top_p: 0.95
    # MTP speculative decoding via the single num_nextn_predict_layers head. Runs
    # under EAGLE framework with env SGLANG_ENABLE_SPEC_V2=1. Disabled for
    # first-contact; enable + tune (balanced: steps 1 / draft-tokens 2) only after
    # the n=1 baseline boots and produces coherent output.
    speculative_enabled: false
    speculative_algo: NEXTN
    speculative_num_steps: 1
    speculative_eagle_topk: 1
    speculative_num_draft_tokens: 2
    sglang_image: "xomoxcc/dgx-spark-sglang:0.5.12.post1-sm121"
