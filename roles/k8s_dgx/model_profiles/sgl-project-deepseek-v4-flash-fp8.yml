---
# Model profile: sgl-project/DeepSeek-V4-Flash-FP8
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# UNTESTED — first-contact config based on HF config.json.
#
# WHY THIS CHECKPOINT (and not RedHatAI/DeepSeek-V4-Flash-NVFP4-FP8):
#   RedHatAI's NVFP4 repackage is compressed-tensors format whose quant config
#   targets the fused attention proj as `fused_wqa_wkv`
#   (re:.*attn.*(fused_wqa_wkv|wq_b|wo_a|wo_b)$). SGLang's V4 implementation
#   names that module `wqkv_a` (python/sglang/srt/models/deepseek_v4.py:265),
#   so find_matched_target() raises at model build:
#     ValueError: Unable to find matching target for
#     model.layers.0.self_attn.wqkv_a in the compressed-tensors config.
#   SGLang's V4 loader expects the deepseek-ai/sgl checkpoint naming
#   (remap_weight_name_to_dpsk_hf_format), and compressed-tensors W4A16 for V4
#   is still an open upstream feature (sgl-project/sglang #23724). RedHatAI's
#   checkpoint is vLLM-targeted. NVFP4 is currently a dead end for Flash on
#   SGLang: NVIDIA only published nvidia/DeepSeek-V4-Pro-NVFP4 (too large for
#   4×GB10), and the third-party Flash NVFP4 repos are all compressed-tensors
#   family → same matcher gap.
#
# sgl-project/DeepSeek-V4-Flash-FP8 is SGLang's OWN pre-converted checkpoint
# (issue #24111). It uses plain block-wise FP8 — quant_method=fp8,
# weight_block_size=[128,128], scale_fmt=ue8m0 — NOT compressed-tensors, so the
# wqkv_a matcher gap does not apply. This is the SGLang-native serving path.
# Trade-off vs NVFP4: FP8 is ~1 byte/param (~2× the NVFP4 weight footprint).
#
# STILL REQUIRED: the kv_lora_rank launch patch. V4-Flash config.json has
# kv_lora_rank: null (Flash uses q-LoRA + o-LoRA + GQA, no MLA KV compression),
# and SGLang parses deepseek_v4 via _DeepseekV4ConfigAlias(DeepseekV3Config),
# whose strict dataclass (transformers 5.x) rejects null. Widened to int|None
# in sglang_launch.sh before launch — see that script's DeepseekV3Config patch
# block. Without it, startup fails at config parse with
# StrictDataclassFieldValidationError.
#
# Architecture (DeepseekV4ForCausalLM, model_type=deepseek_v4):
#   43 layers, hidden=4096, V4-Flash MQA attention (num_attention_heads=64,
#   num_key_value_heads=1; DSA index/sparse attention path), 256 routed experts
#   + 1 shared, 6 active per token, moe_intermediate_size=2048, vocab=129280.
#   1 MTP (num_nextn_predict_layers) head for speculative NEXTN decoding.
#
# SGLang support: DeepseekV4ForCausalLM is mainline since PR #23882 (shipped in
# v0.5.12). Files: python/sglang/srt/models/deepseek_v4.py and
# deepseek_v4_nextn.py (MTP). Flash serving is still being stabilized upstream
# (#25165 / #23743) — expect possible further first-contact issues past load.
#
# Recommended launch (sgl-project cookbook, for reference):
#   python3 -m sglang.launch_server --model-path sgl-project/DeepSeek-V4-Flash-FP8 \
#     --tp-size 4 --kv-cache-dtype fp8_e4m3
_model_profile:
  "sgl-project/DeepSeek-V4-Flash-FP8":
    info_url: "https://huggingface.co/sgl-project/DeepSeek-V4-Flash-FP8"
    nccl_transport: "roce"
    tp_size: 4
    ep_size: 1
    # Model supports 1,048,576 (1M); 131072 is conservative first-contact —
    # KV cache headroom matters because MTP draft tokens add per-batch slack.
    # Raise to 262144 / 524288 / 1048576 after the n=1 baseline confirms KV
    # cache fits at the chosen mem_fraction_static.
    context_length: 131072
    load_format: "auto"
    # 131072
    # quantization: auto-detected from checkpoint (quant_method=fp8 block-wise,
    # ue8m0 scales) — NO explicit flag, same as zai-org/GLM-4.7-FP8. Do NOT set
    # compressed-tensors / modelopt_fp4 here; this is plain block FP8.
    trust_remote_code: true
    kv_cache_dtype: "fp8_e4m3"
    # Load-peak mitigation for the 294 GB / ~73.5 GB-per-GPU footprint on 128 GB
    # UNIFIED memory (CPU+GPU shared on GB10): the first FP8 boot was kernel
    # OOM-killed (SIGKILL, no CUDA traceback) right at the end of weight load —
    # resident weights + mmap'd shard page-cache + CUDA/NCCL context exceeded the
    # node's ~121.6 GiB allocatable (no pod mem limit). See UPSTREAM_DSV4_BUGS.md.
    # disable_mmap avoids leaving mapped shard pages resident (charged to the
    # cgroup); drop_cache_after_load frees page-cache post-load. Best-effort —
    # the model is borderline on 4×GB10 and may still not fit.
    weight_loader_disable_mmap: false
    weight_loader_drop_cache_after_load: true
    # 0.70 first-contact: 256 experts × 43 layers + 1M ctx KV is hefty, and FP8
    # weights are ~2× the NVFP4 footprint. Adjust after first launch logs report
    # actual KV-cache size. NOTE: if it doesn't fit, ep_size does NOT help —
    # per-GPU MoE weight footprint is W/4 under both TP=4 and EP=4 (TP shards
    # every expert 1/4; EP holds 1/4 of the experts whole). The fit levers are
    # context_length / mem_fraction_static (KV only) and, for the fixed weight
    # block, the quant size (FP8 → NVFP4) or more GPUs. EP=4 is a THROUGHPUT
    # lever (whole-expert GEMMs vs tiny TP shards), not a memory one.
    mem_fraction_static: "0.90"
    # Kernel choices for block-wise FP8 on SM121 (mirrors zai-org/GLM-4.7-FP8):
    #  - triton MoE: proven block-FP8 MoE path on this cluster.
    #  - flashinfer attention: standard, MLA-compatible (V4 MQA/DSA path).
    #  - fp8_gemm cutlass: SM121 auto-selects flashinfer→trtllm which is
    #    unsupported here; cutlass is the working FP8 GEMM runner.
    #  - disable_deep_gemm: SM121 DeepGemm JIT hits "Unknown recipe" errors,
    #    even though the ue8m0 scale format is DeepGemm's native layout.
    moe_runner_backend: "triton"
    attention_backend: "flashinfer"
    fp8_gemm_runner_backend: "cutlass"
    # SGLANG_OPT_FP8_WO_A_GEMM=0. V4-Flash ships the o-LoRA wo_a projection as
    # bf16; with the opt default-on (#25181, 0.5.12) SGLang keeps the wo_a param
    # fp8 and weight load dies "Downcasting not allowed: target fp8, loaded bf16"
    # (deepseek_v4.py load_weights → copy_with_check). false dequants wo_a → bf16.
    opt_fp8_wo_a_gemm: false
    # DeepGEMM has no sm_121 variant for two V4 kernels (DeepGEMM #317, SGLang
    # #23657) → "Unsupported architecture". Route both to their fallbacks:
    #  - hc_prenorm (MHC) → TileLang (crashes at kernel_warmup otherwise)
    #  - paged_mqa_logits (DSA Lightning-Indexer) → torch (crashes at decode)
    # Independent of disable_deep_gemm (that's the JIT-MoE DeepGEMM switch).
    opt_deepgemm_hc_prenorm: false
    fp8_paged_mqa_logits_torch: true
    # C4-indexer top-k transform: the TVM jit kernel topk_transform_512_v2
    # (SGLANG_OPT_USE_TOPK_V2, default-on) dies on sm_121 at decode with
    # `topk_v2.cuh:472 CUDA error: invalid argument`. Route to the torch fallback
    # (topk_transform_512_pytorch_vectorized), checked before the v2 branch.
    topk_transform_512_torch: true
    disable_deep_gemm: true
    disable_cuda_graph: true
    disable_piecewise_cuda_graph: true
    cuda_graph_max_bs: 8
    jit_max_jobs: 1
    pp_async_batch_depth: 0
    num_experts: 256
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # fp4_gemm_backend dropped — this is a block-FP8 checkpoint, no NVFP4 path.
    # (Was flashinfer_cutlass on the prior RedHatAI NVFP4 profile.)
    #
    # DeepSeek V4 is NOT a hybrid-mamba arch (standard MoE + MLA/MQA attention) —
    # leave mamba_scheduler_strategy empty and enable_spec_v2 default (false).
    # SGLang parser registry (verified in v0.5.12 source):
    #  - reasoning: "deepseek-v4" → _DeepSeekV3Detector (Qwen3-style <think> tags)
    #    (python/sglang/srt/parser/reasoning_parser.py)
    #  - tool-call: "deepseekv4" → dedicated DeepSeekV4Detector
    #    (python/sglang/srt/function_call/deepseekv4_detector.py)
    reasoning_parser: "deepseek-v4"
    tool_call_parser: "deepseekv4"
    # Recommended generation parameters per the sgl-project model card /
    # generation_config.json: temperature=1.0, top_p=1.0 (do_sample=true,
    # no top_k). NOTE: differs from the generic DeepSeek 0.6/0.95 — this is the
    # checkpoint's own published default.
    recommended_sampling:
      temperature: 1.0
      top_p: 1.0
    # MTP speculative decoding via the single num_nextn_predict_layers head.
    # Disabled for first-contact; enable + tune only after the n=1 FP8 baseline
    # boots and produces coherent output.
    # Per the SGLang DeepSeek-V4 cookbook, V4-Flash MTP runs under the EAGLE
    # framework and requires env SGLANG_ENABLE_SPEC_V2=1. Recipe presets:
    #   balanced:    --speculative-num-steps 1 --speculative-num-draft-tokens 2
    #   low-latency: --speculative-num-steps 3 --speculative-num-draft-tokens 4
    #   (eagle-topk 1 in both; max-throughput disables MTP at saturation).
    # Values below match the "balanced" preset; switch speculative_algo to EAGLE
    # and set SGLANG_ENABLE_SPEC_V2=1 when enabling.
    speculative_enabled: false
    speculative_algo: NEXTN
    speculative_num_steps: 1
    speculative_eagle_topk: 1
    speculative_num_draft_tokens: 2
    sglang_image: "xomoxcc/dgx-spark-sglang:0.5.12.post1-sm121"
    memory_request: "100Gi"
