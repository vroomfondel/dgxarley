---
# Model profile: nvidia/diffusiongemma-26B-A4B-it-NVFP4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# Official NVIDIA ModelOpt NVFP4 quant of google/diffusiongemma-26B-A4B-it —
# Google DeepMind's DISCRETE-DIFFUSION variant of Gemma 4 (released 2026-06-10,
# Apache 2.0). Same Gemma 4 26B-A4B MoE on-device shape as the autoregressive
# nvidia/Gemma-4-26B-A4B-NVFP4 sibling in this repo, BUT it does NOT decode
# left-to-right: it iteratively denoises parallel 256-token "canvas" blocks.
# 25.2B total / ~3.8B active. NVFP4 packaging = modelopt_fp4 (MoE expert FFN
# weights FP4; attention/router/lm_head stay BF16), same recipe as the sibling.
#
# ── ENGINE: SGLang dLLM path ─────────────────────────────────────────────────
# DiffusionGemma is a discrete-diffusion (block-renoising) model — SGLang serves
# it via its diffusion-LLM (dLLM) path, NOT the autoregressive Scheduler. Runtime
# support is upstream PR #28054 (still OPEN/unmerged upstream as of 2026-06-19;
# docs cookbook #27824 merged 2026-06-10), baked into our image:
#   - Image: xomoxcc/dgx-spark-sglang:0.5.14-gemmadiffusion-sm121 carries the
#     PR #28054 dLLM runtime (recipe sglang-0.5.14-gemma4-diffusion-sm121.recipe,
#     APPLY_DIFFUSIONGEMMA_PR28054=1). The plain 0.5.13-gemma4 image does NOT
#     carry the dLLM code and rejects the flag — this profile pins the
#     gemmadiffusion image accordingly.
#   - Launch: dllm_algorithm below → --dllm-algorithm Gemma4Renoise (wired via
#     sglang_dllm_algorithm → SGLANG_DLLM_ALGORITHM → sglang_launch.sh). Same
#     launch_server entrypoint + HAProxy sidecar + probes as every other profile
#     (--dllm-algorithm is a ServerArgs flag, not a separate server). SGLang's
#     _handle_dllm_inference AUTO-FORCES triton attn + eager (cuda graph disabled)
#     + unchunked prefill for Gemma4Renoise, so the autoregressive knobs below
#     are overridden internally and kept only as schema placeholders.
# Full plan + open runtime questions: DIFFUSIONGEMMA_SGLANG_SCOPE.md.
#
# ── VALIDATION STATUS: deployable; first boot on this cluster not yet done ───
# Deploys like any other profile (set sglang_model + ansible-playbook k8s_dgx.yml
# --tags sglang). Not yet booted on SM121/GB10 — confirm on the first run:
#   - NVFP4: PR #28054 + the cookbook target the BF16 base
#     google/diffusiongemma-26B-A4B-it. Whether this modelopt_fp4 quant loads
#     through gemma4_diffusion.py is unverified — smoke-test the BF16 base FIRST,
#     then this NVFP4 quant.
#   - Multi-node TP=4 for an encoder-decoder block-diffusion model is untested
#     (cookbook shows single-node). Backend values below are inherited sibling
#     defaults, NOT matrix winners.
#   - Streaming emits one fully-denoised canvas per chunk (not token-by-token) —
#     check OpenWebUI/Hermes rendering.
# Fallback if a boot path fails: the `vllm` tag (scitrera/dgx-spark-vllm). Card's
# vLLM command (Blackwell/Hopper):
#   vllm serve nvidia/diffusiongemma-26B-A4B-it-NVFP4 --trust-remote-code \
#     --max-num-seqs 4 --attention-backend TRITON_ATTN \
#     --enable-auto-tool-choice --tool-call-parser gemma4 --reasoning-parser gemma4
_model_profile:
  "nvidia/diffusiongemma-26B-A4B-it-NVFP4":
    knowledge_cutoff: "2025-01"  # official HF/Google card (Gemma 4 corpus); month precision
    info_url: "https://huggingface.co/nvidia/diffusiongemma-26B-A4B-it-NVFP4"
    # NVFP4 quant of google/diffusiongemma-26B-A4B-it. Discrete-diffusion Gemma 4.
    # Multimodal (text+image, video as frame sequences). 25.2B total / ~3.8B active MoE.
    # MoE: 128 routed experts, top_k=8, + 1 shared expert. moe_intermediate_size=704.
    # 30 layers. num_attention_heads=16, num_key_value_heads=8 (2:1 GQA), head_dim=256.
    # Hybrid attention 5:1 sliding-to-full (sliding_window=1024). Global layers:
    # global_head_dim=512, num_global_kv_heads=2. Context: 262144 native (256K).
    # vocab_size: 262144. 35+ languages.
    # Diffusion decoding: parallel 256-token canvas blocks (block-by-block denoising),
    # NOT autoregressive. Card recommends --max-num-seqs 4.
    # NVFP4: MoE FFN weights are FP4; attention, router, lm_head remain BF16.
    # ~13-15 GB total after quantization → ~3-4 GB/GPU at TP=4.
    nccl_transport: "roce"
    tp_size: 4
    context_length: 262144
    quantization: "modelopt_fp4"
    trust_remote_code: true
    moe_runner_backend: "cutlass"
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.90"
    attention_backend: "triton"  # forced anyway by SGLang's dLLM handler; also the only Gemma4 allowlist option
    fp4_gemm_backend: "flashinfer_cutlass"
    jit_max_jobs: 4
    disable_piecewise_cuda_graph: true  # fp4_quantize has no fake-tensor impl
    disable_cuda_graph: false
    cuda_graph_max_bs: 8
    pp_async_batch_depth: 0
    disable_deep_gemm: true
    num_experts: 128
    ep_size: 1
    # ── Diffusion-LLM (dLLM) ────────────────────────────────────────────────
    # Selects SGLang's block-diffusion decode path → --dllm-algorithm Gemma4Renoise
    # (wired via sglang_dllm_algorithm). REQUIRES the 0.5.13-gemmadiffusion image
    # (PR #28054); other images reject the flag. SGLang auto-forces triton attn +
    # eager + unchunked prefill for this algorithm, overriding the autoregressive
    # knobs above. Denoising params (max_denoising_steps=48, entropy_bound=0.1,
    # canvas=256, temp 0.4..0.8) are MODEL-CONFIG defaults (hf_config), NOT CLI
    # flags — they come from the checkpoint and are not tunable from this profile.
    dllm_algorithm: "Gemma4Renoise"
    # Card pins --max-num-seqs 4 for the diffusion path → SGLang --max-running-requests 4
    # (wired via sglang_max_running_requests in defaults/main.yml).
    max_running_requests: 4
    # Parsers per the official NVFP4 card (same as autoregressive Gemma 4):
    #   --reasoning-parser gemma4 --tool-call-parser gemma4
    # Required for Hermes tool/function calling behind hermes-default.
    reasoning_parser: "gemma4"
    tool_call_parser: "gemma4"
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 64
    speculative_enabled: false
    # Image MUST be the gemmadiffusion build (bakes PR #28054 dLLM runtime); the
    # plain gemma4 image rejects --dllm-algorithm Gemma4Renoise. Built from
    # sglang-0.5.14-gemma4-diffusion-sm121.recipe (THE unified Gemma image — all
    # five Gemma profiles share it) via scripts/build_sm121_image.sh.
    # sglang_image: "xomoxcc/dgx-spark-sglang:0.5.13-gemmadiffusion-sm121"  # prior v0.5.13 diffusion image
    sglang_image: "xomoxcc/dgx-spark-sglang:0.5.14-gemmadiffusion-sm121"
