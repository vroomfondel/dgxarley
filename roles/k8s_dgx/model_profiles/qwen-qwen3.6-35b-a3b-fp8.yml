---
# Model profile: Qwen/Qwen3.6-35B-A3B-FP8
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
_model_profile:
  "Qwen/Qwen3.6-35B-A3B-FP8":
    info_url: "https://huggingface.co/Qwen/Qwen3.6-35B-A3B-FP8"
    # 35B/3B MoE (Gated DeltaNet hybrid), fine-grained FP8 (block 128).
    # 256 experts, 8 routed + 1 shared activated per token. Native context 262K
    # (extensible to ~1M via YaRN). MTP-trained — speculative decoding
    # available via NEXTN but left disabled here pending validation.
    context_length: 262144
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.50"
    attention_backend: "triton"
    disable_deep_gemm: true
    fp8_gemm_runner_backend: "cutlass"
    reasoning_parser: "qwen3"
    tool_call_parser: "qwen3_coder"
    num_experts: 256
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # supports thinking (default) and non-thinking modes; control via
    # chat_template_kwargs={"enable_thinking": False} per-request.
    #   thinking:        temperature=1.0  top_p=0.95  top_k=20  presence_penalty=1.5
    #   thinking_coding: temperature=0.6  top_p=0.95  top_k=20  presence_penalty=0.0
    #   non_thinking:    temperature=0.7  top_p=0.80  top_k=20  presence_penalty=1.5
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      presence_penalty: 1.5
    # Bench-only anti-repetition overrides — symmetric to the 27B sibling
    # (frequency_penalty + min_tokens). presence_penalty bleibt bei 1.5
    # (gleicher Wert wie recommended_sampling, aber explicit für Symmetrie).
    sampling_overrides:
      presence_penalty: 1.5
      frequency_penalty: 0.5
      min_tokens: 4
    ep_size: 1
    tp_size: 4
    # MTP / speculative decoding (NEXTN) — recommended by model card:
    #   --speculative-algo NEXTN --speculative-num-steps 3
    #   --speculative-eagle-topk 1 --speculative-num-draft-tokens 4
    #
    # IMPORTANT: the card's recipe is incomplete on SGLang 0.5.10 for this
    # hybrid-mamba arch. With just speculative_* set, startup fails with:
    #   ValueError: Speculative decoding for Qwen3_5MoeForConditionalGeneration
    #   is not compatible with radix cache when using --mamba-scheduler-strategy
    #   no_buffer. Use --mamba-scheduler-strategy extra_buffer and
    #   set SGLANG_ENABLE_SPEC_V2=1.
    # Both extra knobs (mamba_scheduler_strategy, enable_spec_v2) are wired
    # through defaults/main.yml → tasks/sglang.yml env → sglang_launch.sh.
    # Flip the whole block (speculative_enabled, mamba_scheduler_strategy,
    # enable_spec_v2) together to enable MTP.
    # speculative_enabled: true
    # speculative_algo: NEXTN
    # speculative_num_steps: 3
    # speculative_eagle_topk: 1
    # speculative_num_draft_tokens: 4
    # mamba_scheduler_strategy: extra_buffer
    # enable_spec_v2: true
    # operational defaults — Test 6 winner config from the 14-case 0.5.10 sweep
    # on 4× DGX Spark TP=4 EP=1 (TESTLOG ..._qwen-3.6-35b-a3b-fp8_4n.md):
    #   triton MoE + triton attn + CG on + piecewise on → 345.8 tok/s @ n=8.
    # fi_cutlass MoE crashes on FP8 ("Fp8MoEMethod has no attribute 'runner'");
    # eager mode is 1.7×–3.3× slower at every batch size.
    nccl_transport: roce
    moe_runner_backend: triton
    disable_cuda_graph: false
    disable_piecewise_cuda_graph: false
    pp_async_batch_depth: 0
    cuda_graph_max_bs: 8
    speculative_enabled: false
