---
# Model profile: nvidia/Gemma-4-31B-IT-NVFP4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
_model_profile:
  "nvidia/Gemma-4-31B-IT-NVFP4":
    knowledge_cutoff: "2025-01"  # official HF/Google model card (Gemma 4 corpus); month precision
    info_url: "https://huggingface.co/nvidia/Gemma-4-31B-IT-NVFP4"
    # ALTERNATIVE (BF16 source): https://huggingface.co/google/gemma-4-31B-it
    # NVFP4-quantized variant of google/gemma-4-31B-it.
    # 30.7B DENSE (NOT MoE), multimodal-capable (Gemma4ForConditionalGeneration
    # ships text + vision + audio heads; SGLang uses the text path).
    # Architecture: 60 layers, hybrid attention 5:1 sliding-to-full (every 6th
    # layer is full_attention, the rest sliding_window=1024).
    # num_attention_heads=32, num_key_value_heads=16 (2:1 GQA), head_dim=256.
    # Global (full-attention) layers: Unified K/V, global_head_dim=512,
    # num_global_kv_heads=4, proportional RoPE (partial_rotary_factor=0.25).
    # rope_theta: 10000 (sliding) / 1000000 (full). vocab_size: 262144.
    # Context: 262144 native (256K, no YaRN needed).
    # NVFP4: ModelOpt v0.42.0 quantized BOTH weights AND activations to NVFP4
    # (dense model → full W4A4 on the linear layers, NOT the MoE experts-only
    # recipe the 26B-A4B uses; lm_head/embeddings stay BF16). Near-BF16 accuracy
    # per card (AIME 87.92→87.60, MMLU-Pro 85.25→84.94, GPQA 85.80→85.35). Apache-2.0.
    # ~18-20 GB total after quantization → ~5 GB/GPU at TP=4 (ample KV headroom).
    #
    # ── VALIDATION STATUS: UNVALIDATED on this cluster ──────────────────────
    # First-time test for this model has NEVER completed: the 0.5.11 matrix was
    # set up but the run is still pending — no throughput numbers exist.
    # See TESTLOGS/sglang_nn4_tp4_ep1/gemma-4-31b-it-nvfp4/
    #     TESTLOG_nv580.142_sglang-0.5.11_gemma-4-31b-it-nvfp4_4n.md
    # ("Run pending — first-time test"). No 0.5.13 testlog yet either.
    # Treat the backend values below as INHERITED sibling defaults (mirrored
    # from the 26B-A4B NVFP4 / Qwen3-235B NVFP4 winners), NOT matrix winners for
    # this model — re-run the matrix on the current image before trusting them.
    #
    # ── attention_backend MUST be triton/trtllm_mha — SGLang allowlist (READ) ──
    # SGLang's _handle_model_specific_adjustments (server_args.py) hard-rejects
    # flashinfer for Gemma4ForConditionalGeneration with an AssertionError at
    # server-arg parsing, BEFORE any weight load / CUDA-graph capture / forward:
    #   "Gemma4 only supports trtllm_mha, triton, or intel_xpu attention backend,
    #    got prefill=flashinfer, decode=flashinfer"
    # So the flashinfer head_dim=512 kernel situation below is MOOT for Gemma-4:
    # it doesn't matter that flashinfer PR #3576 (v0.6.13rc2, in this image) now
    # supports head_dim=512 on SM120/121 — SGLang won't let flashinfer be selected
    # for Gemma4 at all. The only allowed backends are trtllm_mha | triton |
    # intel_xpu. triton is the proven head_dim=512 path used by the BF16 siblings.
    # (Background on the now-irrelevant flashinfer head_dim=512 register-budget
    # guard KTraits::IsInvalid(): FLASHINFER_HEAD_DIM_512_UPSTREAM_BUG.md.)
    nccl_transport: "roce"
    tp_size: 4  # num_kv_heads=16 → 4 per GPU
    context_length: 262144
    quantization: "modelopt_fp4"
    trust_remote_code: true
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.7"
    # attention_backend=triton — SGLang hard-rejects flashinfer for Gemma4
    #   (allowlist: trtllm_mha | triton | intel_xpu; see header). triton is the
    #   proven head_dim=512 path used by the BF16 siblings.
    attention_backend: "triton"
    # fp4_gemm_backend=flashinfer_cutlass — flashinfer_cudnn FP4 GEMM is broken
    #   on SM121 (100% startup crash across sibling NVFP4 matrices — same
    #   regression as GLM-4.7 / Qwen3.5-397B / Qwen3-235B). cutlass is the only
    #   working FP4 GEMM path on SM121.
    fp4_gemm_backend: "flashinfer_cutlass"
    jit_max_jobs: 4
    disable_piecewise_cuda_graph: true  # fp4_quantize has no fake-tensor impl → dynamo trace fails
    disable_cuda_graph: false
    cuda_graph_max_bs: 16
    pp_async_batch_depth: 0
    disable_deep_gemm: true
    # Parsers per the SGLang Gemma 4 cookbook (gemma4 covers the whole family;
    # the nvidia card omits a serve command but Gemma 4 ships a built-in thinking
    # mode + tool calling). Required for Hermes tool/function calling behind
    # hermes-default. (vLLM's --enable-auto-tool-choice has no SGLang equivalent —
    # SGLang enables tool parsing implicitly when tool_call_parser is set.)
    reasoning_parser: "gemma4"
    tool_call_parser: "gemma4"
    recommended_sampling:
      temperature: 1.0  # card: temperature=1.0, top_p=0.95; top_k=64 is the Gemma default
      top_p: 0.95
      top_k: 64
    speculative_enabled: true
    speculative_algo: "NEXTN"  # auto-promoted to FROZEN_KV_MTP at runtime
    speculative_draft_model_path: "google/gemma-4-31B-it-assistant"
    speculative_num_steps: 4
    speculative_num_draft_tokens: 5  # = num_steps + 1
    speculative_eagle_topk: 1
    enable_spec_v2: true  # auto-disabled by FROZEN_KV_MTP at runtime
    # ── Image: xomoxcc/dgx-spark-sglang:0.5.14-gemmadiffusion-sm121 ──────────
    # THE unified Gemma-4 image — all five Gemma profiles share it. Carries the
    # gemma4-NVFP4 geglu-nan-clamp patch (#22928) this NVFP4 model needs, plus
    # (gated-off / inert here) the FROZEN_KV_MTP fix (#28081) and DiffusionGemma
    # bake (#28054). Main-ahead pin (commit 3a1417a, post-v0.5.13). NB:
    # flashinfer-attn stays allowlist-rejected for Gemma4 regardless of the
    # 0.6.13rc2 head_dim=512 work — see header.
    # Recipe: sglang-0.5.14-gemma4-diffusion-sm121.recipe.
    # sglang_image: "xomoxcc/dgx-spark-sglang:0.5.13-gemma4-sm121"   # prior NVFP4-Gemma image
    # sglang_image: "xomoxcc/dgx-spark-sglang:0.5.11-gemma4-sm121"   # flashinfer 0.6.11 (older)
    sglang_image: "xomoxcc/dgx-spark-sglang:0.5.14-gemmadiffusion-sm121"
