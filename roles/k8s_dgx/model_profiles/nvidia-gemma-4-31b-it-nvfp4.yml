---
# Model profile: nvidia/Gemma-4-31B-IT-NVFP4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
_model_profile:
  "nvidia/Gemma-4-31B-IT-NVFP4":
    info_url: "https://huggingface.co/nvidia/Gemma-4-31B-IT-NVFP4"
    # NVFP4-quantized variant of google/gemma-4-31B-it.
    # 30.7B dense, multimodal-capable (text+image+video).
    # Architecture: 60 layers, hybrid attention 5:1 sliding-to-full,
    # num_attention_heads=32, num_key_value_heads=16 (2:1 GQA), head_dim=256.
    # Global layers: global_head_dim=512, num_global_kv_heads=4.
    # Context: 262144 native (256K). vocab_size: 262144.
    # NVFP4: FFN weights are FP4; attention, lm_head remain BF16.
    # ~18-20 GB total after quantization → ~5 GB/GPU at TP=4.
    nccl_transport: "roce"
    tp_size: 4
    context_length: 262144
    quantization: "modelopt_fp4"
    trust_remote_code: true
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.90"
    attention_backend: "flashinfer"
    fp4_gemm_backend: "flashinfer_cutlass"
    jit_max_jobs: 4
    disable_piecewise_cuda_graph: true  # fp4_quantize has no fake-tensor impl
    disable_cuda_graph: false
    cuda_graph_max_bs: 8
    pp_async_batch_depth: 0
    disable_deep_gemm: true
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 64
    speculative_enabled: false
