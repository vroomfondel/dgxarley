---
# Model profile: nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles at runtime.
#
# WHAT — NVIDIA's OMNI-MODAL (text + image + video + audio) Nemotron-3 Nano, NVFP4
# quant. 31B total / ~3B active. A multimodal WRAPPER around a NemotronH text core:
#   config.json top-level   architectures: "NemotronH_Nano_Omni_Reasoning_V3"
#                           model_type:    "NemotronH_Nano_Omni_Reasoning_V3"
#   llm_config (text core)  architectures: "NemotronHForCausalLM" (model_type nemotron_h)
#                           52 layers, hidden_size 2688, 32 attn heads, num_kv_heads 2 (GQA),
#                           n_routed_experts 128 + 1 shared, num_experts_per_tok 6,
#                           expert_intermediate_size 1856, max_position_embeddings 262144.
#   vision_config           C-RADIOv2-H image/video-frame encoder (stays BF16)
#   sound_config            Parakeet-based audio encoder, hidden 1024 (stays BF16)
# Quant (modelopt mixed): routed MoE experts NVFP4 (FP4 E2M1, per-block FP8 E4M3 scales,
#   group_size 16); Mamba in_proj/out_proj, shared experts, attn o_proj FP8; vision+audio
#   encoders BF16. ~4.98 effective bits/weight, ~20.9 GB weights.
# Released 2026-04-28 (NVIDIA Nemotron-3 Nano Omni). Reasoning post-train (<think>),
# enable_thinking toggles reasoning (ON by default).
#
# >>> SGLang NVFP4 SUPPORT: YES (corrected 2026-06-24) <<<
# CAUTION on stale sources: the HF model card's SGLang section still says
# "NVFP4 and FP8 support to come" and only ships a BF16 sglang line — but that
# card text is STALE (written at the 2026-04-28 release). SGLang's OWN official
# cookbook now documents launch commands for ALL THREE quants (BF16 / FP8 /
# NVFP4) of this Omni model — so NVFP4 multimodal IS supported on SGLang:
#   https://docs.sglang.io/cookbook/autoregressive/NVIDIA/Nemotron3-Nano-Omni
# The cookbook's NVFP4 line (verbatim, §4.8):
#   sglang serve --model-path nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4 \
#     --host 0.0.0.0 --port 30000 --tp 4 --trust-remote-code \
#     --tool-call-parser qwen3_coder --reasoning-parser deepseek-r1
# NB the cookbook uses --reasoning-parser deepseek-r1, while the HF card's BF16 line
# uses nemotron_3 — we run nemotron_3 (card / Super-sibling value, user choice); A/B
# deepseek-r1 if reasoning doesn't split. See reasoning_parser below. The cookbook
# notes NVFP4 "requires Blackwell" — GB10/SM121 qualifies (this
# cluster already serves NVFP4 daily), so that's not a blocker here.
# >>> IMAGE: arch class IS present (verified 2026-06-24) <<<
# The loader class `NemotronH_Nano_Omni_Reasoning_V3` is registered in SGLang since
# >= v0.5.12 — it lives in models/nano_nemotron_vl.py (subclasses NemotronH_Nano_VL_V2,
# listed in EntryClass), NOT a separate *omni* file. So it is present in BOTH the
# cluster default (scitrera/dgx-spark-sglang:0.5.12) AND the custom SM121 build
# (xomoxcc/dgx-spark-sglang:0.5.13-sm121, recipe SGLANG_REF=v0.5.13). NO image bump is
# needed for the architecture — the earlier "main-branch-only" worry was wrong.
# This profile PINS the SM121 build below: it is the NVFP4-MoE-on-SM121-hardened image
# (the stock scitrera image device-asserts on the triton/cutlass NVFP4 MoE path —
# CUTLASS_NVFP4_SM121_PRD.md), the correct base for an NVFP4 model on GB10.
# >>> AUDIO GAP — librosa NOT in the image <<< the model code has a real audio path
# (get_audio_feature / is_audio, Parakeet encoder) that needs librosa at runtime, and
# NO image in scripts/patches/ installs it (verified). Consequence: TEXT + IMAGE/VIDEO
# should work; AUDIO input will fail until librosa is added to the recipe (or pip-installed
# into the running pod). Add `librosa` to the 0.5.13-sm121 recipe if audio is required.
#
# >>> VALIDATED 2026-06-25 — 13-case matrix run (TP=4 EP=1) <<<
# TESTLOG: TESTLOGS/sglang_nn4_tp4_ep1/nemotron-3-nano-omni-30b-a3b-reasoning-nvfp4/
#   TESTLOG_nv580.159_sglang-0.5.13-sm121_…_4n.md
# The shape below IS the matrix WINNER (case 02): boots, serves, output clean
# (reasoning splits, TTR 0.62, no collapse). Peak n=8 437.9 tok/s, n=16 660.8.
# Validated axes: kernels (fi_cutlass MoE + fi attn + fi_cutlass FP4), full-CG,
# reasoning_parser nemotron_3, fp8_e4m3 KV (beats bf16), mem_fraction_static
# (0.60/0.75/0.80 all equal — kept 0.60), cuda_graph_max_bs 32 (64/128 no gain),
# 2× context (524288) boots+serves. CUDA graphs are the only real throughput
# lever (+33 % n=8 vs eager). Still OPEN (see per-line notes): ep=4 (crashed at
# capture, INCONCLUSIVE — retry to confirm), piecewise (flag never engaged in the
# probe), AUDIO (librosa missing), and long-context QUALITY (no RULER curve).
_model_profile:
  "nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4":
    knowledge_cutoff: "2026-02"  # NOT separately published for Nano-Omni; family post-training value — VERIFY
    release_date: "2026-04-28"  # NVIDIA Nemotron-3 Nano Omni launch
    info_url: "https://huggingface.co/nvidia/Nemotron-3-Nano-Omni-30B-A3B-Reasoning-NVFP4"
    # load_format auto (NVFP4 sharded_state disabled — same rationale as the Super sibling:
    # double-processes weights in process_weights_after_loading for no I/O win).
    load_format: "auto"
    nccl_transport: "roce"
    # PARALLELISM — tp_size 4 mirrors the cluster's fixed 4-node topology (sglang_nnodes=4)
    # and the Super sibling. BUT this is a small model: ~21 GB NVFP4 weights fit a SINGLE
    # 128 GB Spark, so the NVIDIA card targets TP=1 single-GPU. If you ever run a single-node
    # SGLang instance, tp_size: 1 is the natural fit (no all-reduce, KV is cheap). At TP=4 the
    # 2 KV heads replicate across rank-pairs (4 % 2 == 0) — valid GQA, same as Super. VALIDATED at TP=4.
    tp_size: 4
    # 262144 native (config.json max_position_embeddings). NemotronH attention is NoPE, so the
    # cap is conservative and raisable via json_model_override_args (auto-sets
    # SGLANG_ALLOW_OVERWRITE_LONGER_CONTEXT_LEN — see tasks/sglang.yml) — but the Omni text
    # report does not publish a long-context RULER curve, so stay at native 256K until measured.
    context_length: 262144
    # NVIDIA modelopt NVFP4 — must be told explicitly (NOT compressed-tensors / RedHatAI).
    quantization: "modelopt_fp4"
    # trust_remote_code: required — NemotronH_Nano_Omni ships custom model + processor code
    # (auto_map) that SGLang must execute. Safe: official nvidia/ repo.
    trust_remote_code: true
    # flashinfer_cutlass MoE — the proven NVFP4 MoE runner on SM121 (Super/qwen3-235b/glm-4.7).
    # VALIDATED as the winner here. triton is NOT an alternative on the modelopt NVFP4 path (falls
    # through to cutlass_moe_fp4 → CONFIRMED: case 12 hit `cutlass_moe.py AssertionError: mismatch
    # in expected n`, i.e. the nx2_w1 assert). fi_cudnn FP4 works + ties throughput but had a
    # repetition wobble (case 09) — no upside; stay on fi_cutlass.
    # ⚠️ REQUIRES the sglang_launch.sh "_sgl_nemotronh_omni_wrapper_" patch (PR #25024): without
    # it, this Omni *wrapper* arch (NemotronH_Nano_Omni_Reasoning_V3) bypasses the NemotronH MoE
    # defaults hook → llm_config-nested MoE settings unresolved → backend stays AUTO → falls to
    # the sm_100-only cutlass_moe_fp4 and trips the nx2_w1 shape assert during flashinfer autotune
    # (even with this flashinfer_cutlass set — the hook does the llm_config resolution this needs).
    # The wrapper patch is CONFIRMED effective on 0.5.13-sm121 (boot-litmus / case 01 passed 2026-06-25).
    moe_runner_backend: "flashinfer_cutlass"
    # fp8_e4m3 KV VALIDATED: ~3 % faster than bf16 (case 08) at half the KV memory, no quality cost.
    kv_cache_dtype: "fp8_e4m3"
    # Small model → lots of headroom. VALIDATED: 0.60/0.75/0.80 are throughput-EQUAL (model is
    # Mamba-state-clamped at max_running_requests=32, not KV-bound), so a bigger KV pool buys nothing
    # → kept 0.60. Raise only if a workload needs the larger pool for long single requests.
    mem_fraction_static: "0.60"
    # attention_backend MUST NOT be triton — SGLang's apply_nemotron_h_defaults hard-asserts
    # against it on NemotronHForCausalLM (first layer may be Mamba, not attention). flashinfer
    # works on the text core; Mamba2 SSM layers use their own kernels regardless. The VISION/
    # AUDIO encoder attention path is a separate unknown (no SGLang mm support yet anyway).
    attention_backend: "flashinfer"
    fp4_gemm_backend: "flashinfer_cutlass"
    jit_max_jobs: 4
    # NemotronH hybrid graph: the Super card sets --disable-piecewise-cuda-graph; mirror it. The
    # matrix piecewise PROBE (case 13) never actually engaged (the flag stayed True in server_args),
    # so piecewise remains UNTESTED here — keep it off, the proven default.
    disable_piecewise_cuda_graph: true
    # full-CG VALIDATED as the ONLY real throughput lever: +33 % n=8 vs eager (case 01). Captures
    # cleanly (the earlier transient init_cuda_graph_state crash did NOT recur across the matrix).
    disable_cuda_graph: false
    # cuda_graph_max_bs VALIDATED at 32: 64/128 (cases 06/07) gave NO throughput gain — the decode
    # batch never exceeds the max_running_requests=32 clamp, so a larger captured bs is unused.
    cuda_graph_max_bs: 32
    pp_async_batch_depth: 0
    # NVFP4 scale_fmt != ue8m0 → DeepGemm JIT not optimized; disable (same as all NVFP4 here).
    disable_deep_gemm: true
    num_experts: 128
    # ep_size=1 is the VALIDATED default. EP=4 is CONFIRMED-BROKEN here (reproduced ≥2× via Loki:
    # a pre-matrix manual run 2026-06-25 14:39-14:45Z with EP2/EP3 rank labels, AND matrix case 11
    # 17:11Z) — every ep>1 attempt dies DETERMINISTICALLY with the SAME stack:
    #   cuda_graph_runner.py:543 → hybrid_linear_attn_backend init_cuda_graph_state →
    #   flashinfer_backend.py:693  self.cuda_graph_kv_indices[i][0] = 0  → CUDA illegal memory access.
    # It is NOT an OOM (35-44 GB free at capture) and NOT EP-specific kernel code — it's the FlashInfer
    # attn CUDA-graph-capture path, the IDENTICAL crash as the rare ep=1 "transient" first-boot flake;
    # ep>1 just makes it fire every time. WORKAROUND if EP is ever needed: pair ep>1 with
    # disable_cuda_graph (eager) to skip init_cuda_graph_state — untested, and EP gives no expected
    # throughput win on this small model anyway, so keep ep=1. 128 % 4 == 0 (shardable in principle).
    # Dynamic-safe form if sglang_nnodes ever changes:
    #   ep_size: "{{ sglang_nnodes if (128 % (sglang_nnodes | int) == 0) else 1 }}"
    ep_size: 1
    # reasoning-parser = nemotron_3 per the HF MODEL CARD (user choice 2026-06-24),
    # matching the validated Super-120B sibling. NOTE the conflict: SGLang's own cookbook
    # (§4.8) uses deepseek-r1 across all three quants — if <think> tags leak into content
    # or reasoning isn't split out, A/B deepseek-r1. tool-call-parser qwen3_coder (both
    # card + cookbook agree). (vLLM uses --reasoning-parser nemotron_v3 + --enable-auto-
    # tool-choice — do NOT copy the vLLM names here.) Required for tool-calling backends
    # (Honcho/Hermes). Reasoning toggled per-request via
    # extra_body={"chat_template_kwargs":{"enable_thinking":false}}.
    reasoning_parser: "nemotron_3"
    tool_call_parser: "qwen3_coder"
    recommended_sampling:
      temperature: 1.0  # Nemotron-3 family default (mirrors Super); VERIFY against Omni card
      top_p: 0.95
    # NO speculative decoding — NO MTP. VERIFIED 2026-06-25 (three independent ways,
    # no longer a first-contact guess):
    #   1. The served checkpoint's own config.json (snapshot dc5f0b0…) has NO
    #      num_nextn_predict_layers / nextn / mtp / draft key anywhere — neither
    #      top-level nor in the nested llm_config (NemotronHForCausalLM).
    #   2. The Nemotron-3 Nano Omni paper (arXiv 2604.24954) never mentions MTP /
    #      multi-token prediction / speculative decoding / draft tokens at all.
    #   3. MTP is a Nemotron-3 FAMILY technique, but only the SUPER ships a usable
    #      MTP head (num_nextn_predict_layers in its config); the NVIDIA/vLLM MTP
    #      writeups are all Super-scoped. No separate Nano/Omni MTP or draft
    #      checkpoint was published.
    # So there is no native draft head to drive, and no external draft exists.
    # Leave OFF. (Speculative would only be possible via a separate EAGLE/draft
    # model — neither provided nor trivial on the hybrid Mamba core.)
    speculative_enabled: false
    # CONCURRENCY note (deferred): NemotronH is a hybrid Mamba model, so max_running_requests
    # is clamped by the Mamba state-cache pool (max_mamba_cache_size // mamba_ratio), NOT by
    # KV/cuda_graph — same as the Super. Without MTP there is no extra_buffer doubling, so the
    # ratio is smaller. MEASURED 2026-06-25: the boot allocates max_mamba_cache_size and clamps
    # max_running_requests=32 — left auto (that clamp is fine for current load); set it explicitly
    # only if concurrency tuning needs it. See the Super profile's long note for the mechanics.
    #
    # Pin the SM121-hardened build: it carries the Omni class (v0.5.13) AND the NVFP4 MoE SM121 fix
    # the stock image lacks. TEXT path VALIDATED on this build (2026-06-25 matrix). image/video
    # untested (architecturally present, not exercised). ⚠️ AUDIO still needs librosa added to this
    # image's recipe (see AUDIO GAP in header) — the Parakeet path fails at runtime without it.
    sglang_image: "xomoxcc/dgx-spark-sglang:0.5.13-sm121"
