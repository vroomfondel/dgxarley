---
# Model profile: nvidia/Gemma-4-26B-A4B-NVFP4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# Official NVIDIA ModelOpt NVFP4 quant of google/gemma-4-26B-A4B-it. Same
# `nvfp4_experts_only` recipe and on-device shape as the community
# bg-digitalservices/Gemma-4-26B-A4B-it-NVFP4, which this profile REPLACED in
# this repo on 2026-06-19 — only the MoE expert FFN weights are FP4; attention,
# router, lm_head stay BF16. Quantized with NVIDIA Model Optimizer v0.43.0 →
# `modelopt_fp4` packaging (NOT compressed-tensors — that's the RedHatAI W4A4
# repack, a different format + a measurable accuracy drop, e.g. AIME 82.8% recovery).
#
# Why nvidia over the community bg-digitalservices quant: identical recipe, but
# the official card documents the parsers (gemma4 tool-call + reasoning) and
# reports ~BF16 parity (AIME 88.95→90.00, IFBench 77.77→78.1).
#
# ── VALIDATION STATUS: UNVALIDATED on this cluster ──────────────────────────
# Neither this nor the former bg-digitalservices profile was ever validated on
# SM121 — both testlogs are "Run pending" (no throughput numbers). The
# flashinfer_cutlass FP4 GEMM path is the established working FP4 path on SM121
# (per the sibling NVFP4 models), but this model has not been booted or swept
# here. Backend values below are inherited sibling defaults, NOT matrix winners
# — re-run the matrix on the current image before trusting them. SGLang
# hard-rejects flashinfer for Gemma4 (server_args allowlist: trtllm_mha | triton
# | intel_xpu), so attention_backend MUST be triton/trtllm_mha here regardless of
# the flashinfer head_dim=512 situation — see nvidia-gemma-4-31b-it-nvfp4.yml.
_model_profile:
  "nvidia/Gemma-4-26B-A4B-NVFP4":
    knowledge_cutoff: "2025-01"  # official HF/Google model card (Gemma 4 corpus); month precision
    info_url: "https://huggingface.co/nvidia/Gemma-4-26B-A4B-NVFP4"
    # NVFP4-quantized variant of google/gemma-4-26B-A4B-it. Multimodal (text+image,
    # video as frame sequences). 26B total / ~3.8B active MoE.
    # MoE: 128 routed experts, top_k=8, + 1 shared expert. moe_intermediate_size=704.
    # 30 layers. num_attention_heads=16, num_key_value_heads=8 (2:1 GQA), head_dim=256.
    # Hybrid attention 5:1 sliding-to-full (sliding_window=1024). Global layers:
    # global_head_dim=512, num_global_kv_heads=2. Context: 262144 native (256K).
    # vocab_size: 262144.
    # NVFP4: MoE FFN weights are FP4; attention, router, lm_head remain BF16.
    # ~13-15 GB total after quantization → ~3-4 GB/GPU at TP=4.
    nccl_transport: "roce"
    tp_size: 4
    context_length: 262144
    quantization: "modelopt_fp4"
    trust_remote_code: true
    moe_runner_backend: "cutlass"
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.90"
    attention_backend: "triton"  # SGLang allowlist: flashinfer rejected for Gemma4
    fp4_gemm_backend: "flashinfer_cutlass"
    jit_max_jobs: 4
    disable_piecewise_cuda_graph: true  # fp4_quantize has no fake-tensor impl
    disable_cuda_graph: false
    cuda_graph_max_bs: 8
    pp_async_batch_depth: 0
    disable_deep_gemm: true
    num_experts: 128
    ep_size: 1
    # Parsers per the official model card / SGLang Gemma 4 cookbook:
    #   sglang serve ... --reasoning-parser gemma4 --tool-call-parser gemma4
    # (vLLM's --enable-auto-tool-choice has no SGLang equivalent — SGLang
    #  enables tool parsing implicitly when tool_call_parser is set.)
    # Built-in thinking mode → reasoning_parser gemma4. Required for Hermes
    # tool/function calling behind hermes-default.
    reasoning_parser: "gemma4"
    tool_call_parser: "gemma4"
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 64
    speculative_enabled: true
    speculative_algo: "NEXTN"  # auto-promoted to FROZEN_KV_MTP at runtime
    speculative_draft_model_path: "google/gemma-4-26B-A4B-it-assistant"
    speculative_num_steps: 3
    speculative_num_draft_tokens: 4  # = num_steps + 1
    speculative_eagle_topk: 1
    enable_spec_v2: true  # auto-disabled by FROZEN_KV_MTP at runtime
    # Unified Gemma-4 image (all five share it). Carries the #22928 geglu patch
    # this NVFP4 model needs; FROZEN_KV_MTP (#28081) + DiffusionGemma (#28054)
    # bakes are gated-off/inert here. Recipe: sglang-0.5.14-gemma4-diffusion-sm121.
    # sglang_image: "xomoxcc/dgx-spark-sglang:0.5.13-gemma4-sm121"  # prior NVFP4-Gemma image
    # sglang_image: "xomoxcc/dgx-spark-sglang:0.5.11-gemma4-sm121"
    sglang_image: "xomoxcc/dgx-spark-sglang:0.5.13-gemma4-sm121"
    # sglang_image: "xomoxcc/dgx-spark-sglang:0.5.14-gemmadiffusion-sm121"
