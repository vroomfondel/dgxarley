---
# Model profile: google/gemma-4-31B-it
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
_model_profile:
  "google/gemma-4-31B-it":
    info_url: "https://huggingface.co/google/gemma-4-31B-it"
    # ALTERNATIVE: https://huggingface.co/nvidia/Gemma-4-31B-IT-NVFP4
    # 30.7B dense, multimodal-capable (Gemma4ForConditionalGeneration ships
    # with text + vision + audio heads; SGLang uses the text path).
    # Architecture: 60 layers, hybrid attention with 5:1 sliding-to-full
    # pattern (every 6th layer is full_attention, rest are sliding_window=1024).
    # num_attention_heads=32, num_key_value_heads=16 (2:1 GQA), head_dim=256.
    # Global layers use Unified Keys/Values (global_head_dim=512, num_global_kv_heads=4)
    # + proportional RoPE (partial_rotary_factor=0.25) for memory-efficient long context.
    # rope_theta: 10000 (sliding) / 1000000 (full). vocab_size: 262144.
    # Context: 262144 native (256K, no YaRN extension needed).
    # BF16 weights ~62 GB total → TP=4 gives ~15.5 GB/GPU; lots of KV-cache headroom.
    # SGLang has day-one Gemma 4 support (per Google/LMSYS blog). Still new —
    # Gemma4 backend path, sliding+full attention hybrid, and proportional RoPE
    # may have edge cases on SM121 that need testing before production use.
    # MTP via google/gemma-4-31B-it-assistant (4-layer drafter, released
    # 2026-05-05) → SGLang FROZEN_KV_MTP path (PR #24436 cherry-pick is in
    # `always_source_patches` of build_sm121_image.sh, so both 0.5.11-sm121
    # and 0.5.11-gemma4-sm121 carry it). No public EAGLE3 draft for Gemma 4.
    nccl_transport: "roce"
    tp_size: 4  # num_kv_heads=16 → 4 per GPU
    context_length: 262144  # 256K native
    quantization: ""  # native BF16
    trust_remote_code: false  # official Google model, no custom code
    # Winner config: Test 09 of the v0.5.11 MTP sweep (2026-05-13)
    #   triton attn + piecewise CG + FROZEN_KV_MTP (num_steps=4) →
    #   22.09 / 86.24 / 153.24 tok/s (n=1/n=4/n=8) = +110% / +96% / +80% vs
    #   non-MTP baseline (10.49 / 44.06 / 85.34). Sweep peak at n=8.
    # See TESTLOGS/sglang_nn4_tp4_ep1/gemma-4-31b-it/TESTLOG_nv580.142_sglang-0.5.11_gemma-4-31b-it_4n.md
    # for the full MTP sweep (num_steps ∈ {2..6}) — n=8 peaks at steps=4,
    # n=1/n=4 keep climbing through steps=6 (26.68 / 91.41 at steps=6).
    # If the deployment is single-stream (chat/agent), bump to num_steps=6 +
    # num_draft_tokens=7 for +14% n=1; the n=8 trade-off is ~−5%.
    #
    # MTP requirements:
    # - Image must carry the PR #24436 cherry-pick (sglang-gemma4-mtp-pr24436.patch)
    #   — both 0.5.11-sm121 and 0.5.11-gemma4-sm121 do (always_source_patches
    #   in build_sm121_image.sh). For dense BF16 Gemma-4 the lean 0.5.11-sm121
    #   is mandatory: 0.5.11-gemma4-sm121 ships PR #22929 which iterates
    #   range(num_experts) on weight-load → TypeError on dense (num_experts=None).
    #   Gating the loop fixed it; the lean image avoids the patch entirely.
    # - speculative_algo: NEXTN is auto-promoted to FROZEN_KV_MTP at runtime.
    # - enable_spec_v2 is auto-disabled by FROZEN_KV_MTP at runtime.
    # - num_draft_tokens MUST equal num_steps + 1 (autoadjust does not fire).
    # - attention_backend=triton is mandatory: FlashInfer crashes on
    #   global_head_dim=512 (see FLASHINFER_HEAD_DIM_512_UPSTREAM_BUG.md).
    # - Drafter google/gemma-4-31B-it-assistant: per-pod model-download
    #   initContainer auto-appends speculative_draft_model_path to
    #   HF_PRELOAD_MODELS when speculative_enabled=true (tasks/sglang.yml).
    #   Also pre-staged cluster-wide via the hf_preload Job entry in
    #   defaults/main.yml (saves the per-pod download — optimization only).
    kv_cache_dtype: "fp8_e4m3"
    # mem_fraction_static: "0.85"
    mem_fraction_static: "0.6"
    attention_backend: "triton"
    jit_max_jobs: 4
    disable_piecewise_cuda_graph: false
    disable_cuda_graph: false
    cuda_graph_max_bs: 8
    pp_async_batch_depth: 0
    disable_deep_gemm: false
    recommended_sampling:
      # Gemma family defaults — verify against latest model card before production.
      temperature: 1.0
      top_p: 0.95
      top_k: 64
    speculative_enabled: true
    speculative_algo: "NEXTN"  # auto-promoted to FROZEN_KV_MTP at runtime
    speculative_draft_model_path: "google/gemma-4-31B-it-assistant"
    speculative_num_steps: 4
    speculative_num_draft_tokens: 5  # = num_steps + 1
    speculative_eagle_topk: 1
    enable_spec_v2: true  # auto-disabled by FROZEN_KV_MTP at runtime
    # sglang_image: "xomoxcc/dgx-spark-sglang:main-gemma4-sm121"
    sglang_image: "xomoxcc/dgx-spark-sglang:0.5.11-sm121"
