# Model profile: nvidia/MiniMax-M2.5-NVFP4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# >>> MODE SWITCH (2026-06-21): PP=4 → TP=4 / EP=1 — BEST-GUESS, UNVALIDATED <<<
# Was PP=4 (TP=1) because num_key_value_heads=8 was assumed un-splittable. That
# assumption was WRONG for plain TP: 8 KV heads / TP=4 = 2 heads/GPU (clean), and
# SGLang issue #20966 PROVES the base model loads at TP=4 on this exact NVFP4 repo
# (that bug only OOMs the SPEC draft worker, not the base). Moving to the standard
# NVFP4-family shape (same as nvidia/Qwen3.5-122B-A10B-NVFP4 / 397B-NVFP4):
#   * TP=4 EP=1: each GPU holds all 256 experts with the FFN intermediate TP-sharded
#     (~35 GB weights/GPU of the ~139 GB NVFP4 total) → huge KV headroom.
#   * BIG WIN vs PP: flashinfer_cutlass MoE WORKS on TP. The Xid-13 / worker crashes
#     that killed all 16 fi_cutlass tests (17–32) were PP-SPECIFIC, not arch-specific.
#     So we get the fast SM121 NVFP4 MoE runner instead of the triton fallback PP forced.
#   * EP=1 (NOT EP=4): the NVFP4 family crashes at EP>1 (StandardDispatcher EP-combine /
#     shuffle_rows OOB bug). EP=4 is also what OOMed the draft worker in #20966.
# NEEDS A FRESH MATRIX RUN — the PP=4 numbers (historical block at bottom) do NOT
# transfer. Re-sweep moe_runner × attention × CG variant at TP=4 EP=1 before trusting.
#
# Recommended launch (NVIDIA model card maps their 8-GPU TP=8 → our TP=4):
#   python3 -m sglang.launch_server --model nvidia/MiniMax-M2.5-NVFP4 --tensor-parallel-size 4 \
#     --quantization modelopt_fp4 --trust-remote-code --reasoning-parser minimax-append-think \
#     --tool-call-parser minimax-m2 --moe-runner-backend flashinfer_cutlass --attention-backend flashinfer
_model_profile:
  "nvidia/MiniMax-M2.5-NVFP4":
    knowledge_cutoff: null  # not disclosed (HF card training data "Undisclosed"; blog/report silent)
    release_date: "2026-02-12"  # MiniMax-M2.5 base; official MiniMax announcement
    info_url: "https://huggingface.co/nvidia/MiniMax-M2.5-NVFP4"
    # 229B / 8-active MoE (256 experts, sigmoid routing), 62 layers, hidden 3072,
    # num_key_value_heads=8, NVFP4 quantized (~139 GB weights). Native ctx 196608.
    # MiniMaxM2ForCausalLM (custom code → trust_remote_code). Native MTP head present
    # (use_mtp=true, num_mtp_modules=3, mtp_transformer_layers=1) kept BF16 — see the
    # speculative block at the bottom.
    nccl_transport: "roce"
    # TP=4 across the 4 sparks. Proven loadable at TP=4 on this repo (SGLang #20966).
    # 8 KV heads / 4 = 2 per GPU (clean); num_attention_heads also %4 (#20966 ran TP=4
    # with no head-divisibility error).
    tp_size: 4
    context_length: 196608
    quantization: "modelopt_fp4"
    # trust_remote_code: required — MiniMax-M2.5 ships custom model code (minimax_m2.py,
    # custom tokenizer) SGLang must execute. Safe: NVIDIA's official repo.
    trust_remote_code: true
    kv_cache_dtype: "fp8_e4m3"
    # TP-mode MoE: flashinfer_cutlass = SM121/GB10 NVFP4 default + validated Qwen3.5-NVFP4
    # winner. The PP-only Xid-13 crash does NOT apply at TP. Fall back to triton (the
    # PP-validated runner) if this arch regresses/crashes.
    moe_runner_backend: "flashinfer_cutlass"
    fp4_gemm_backend: "flashinfer_cutlass"
    # flashinfer attn validated to load this arch (PP Test 2). fi-vs-triton ≈ irrelevant
    # for the NVFP4 family (122B finding); triton is the family default — A/B both.
    attention_backend: "flashinfer"
    num_experts: 256
    # EP=1 mandatory for the NVFP4 family: EP>1 crashes (StandardDispatcher EP-combine /
    # shuffle_rows OOB) and EP=4 is what OOMed the draft worker in #20966. At EP=1 each
    # GPU holds all 256 experts, FFN intermediate TP-sharded.
    ep_size: 1
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # ~35 GB weights/GPU after TP=4 → ample KV headroom. Was 0.85; dropped to 0.55 because
    # MTP is now enabled — the #20966 draft worker needs its own slice (see the spec block
    # below). Raise back toward 0.85 if MTP is ever turned off again.
    mem_fraction_static: "0.55"
    # Full CUDA graphs + piecewise OFF — mirrors the 122B-NVFP4 winner. On PP, piecewise
    # always OOMed (58 chunks × 256 experts/stage); that constraint is gone at TP, but
    # full-CG > piecewise was the 122B finding anyway. A/B piecewise on the matrix run.
    disable_cuda_graph: false
    disable_piecewise_cuda_graph: true
    cuda_graph_max_bs: 32
    jit_max_jobs: 4
    # DeepGemm is FP8/ue8m0-only; NVFP4 scale_fmt != ue8m0 → JIT kernels unoptimized,
    # block the scheduler watchdog, exhaust host RAM. Disabled; FP4 GEMM → fp4_gemm_backend.
    disable_deep_gemm: true
    # "minimax" → Qwen3Detector, separates <think>…</think> into reasoning_content (works
    # with OpenWebUI + CLI). Card suggests "minimax-append-think" — A/B if traces leak.
    reasoning_parser: "minimax"
    tool_call_parser: "minimax-m2"
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 40
    # MTP / speculative decoding — ENABLED 2026-06-21 (user request). UNVALIDATED: no
    # matrix run yet, so the FIRST boot IS the validation run. The arch HAS a native MTP
    # head (use_mtp=true, num_mtp_modules=3), so NEXTN uses the BUILT-IN head — no external
    # draft model. ⚠️ sgl-project/sglang#20966 (the draft-worker OOM) is OPEN / inactive
    # upstream — NO fix merged; the reporter OOMed at TP=4/EP=4/EAGLE even @ mem_fraction
    # 0.7/0.8/0.85. Our mitigation is BEST-EFFORT, NOT a guaranteed fix: EP=1 (forced by the
    # NVFP4 family anyway → far smaller draft footprint than the report's EP=4) +
    # mem_fraction_static 0.55 (above) + PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True at
    # launch. It MAY STILL OOM on first boot — if it does, set speculative_enabled back to
    # false. The fast EAGLE3
    # path needs an upstream FORK (HF blog lujangusface/tw-eagle3-minimax); NEXTN is in-tree.
    speculative_enabled: true
    speculative_algo: NEXTN
    speculative_num_steps: 3
    speculative_num_draft_tokens: 4
    speculative_eagle_topk: 1
    speculative_draft_model_path: ""  # empty = NEXTN uses the in-checkpoint MTP head

# ============================================================================
# HISTORICAL: PP=4 (TP=1) matrix-validated config — kept for fallback/comparison.
# To restore: set tp_size:1, moe_runner_backend:triton, mem_fraction_static:0.80,
# add pp_async_batch_depth:0. PP=4 winner was Test 2 (triton MoE + flashinfer attn +
# fi_cutlass FP4) → 63.9 tok/s @ 8∥. PP-SPECIFIC findings (do NOT re-derive):
#   * fi_cutlass MoE crashed all 16 PP tests (17–32): Xid 13 / worker crash on SM121.
#   * triton MoE mandatory on PP; flashinfer attn (63.9) > triton attn (62.0).
#   * piecewise CUDA graphs always OOM on PP (58 chunks × 256 experts/stage).
#   * pp_async_batch_depth>0 hurt throughput (Test 4: 50.0 vs Test 2: 63.9).
#   * eager (63.9) ≈ CUDA graphs (61.2) @ 8∥; CG better for TTFT/1∥.
#   * load_format "sharded_state" disabled for NVFP4: double-processes weights
#     (process_weights_after_loading on empty model, then copy-in) → ~4 GB extra,
#     no speedup (NVFP4 load is post-processing-bound, not I/O-bound; ~360s either way).
# ============================================================================
