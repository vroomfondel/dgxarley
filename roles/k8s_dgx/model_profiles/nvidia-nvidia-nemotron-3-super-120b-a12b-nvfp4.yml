---
# Model profile: nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# UPDATED 2026-06-02 — modernized from the original 0.5.x-era stub against the
# current HF model card + config.json and the newer model_profile schema keys
# (tp_size/pp, fp4_gemm_backend, disable_piecewise_cuda_graph, mamba_scheduler_strategy,
# enable_spec_v2, native MTP block). Architecture facts below are from config.json.
#
# VALIDATED 2026-06-04 — first test matrix run (7 cases, sglang 0.5.12, RoCE, TP=4):
# TESTLOGS/sglang_nn4_tp4_ep1/nemotron-3-super-120b-a12b-nvfp4/
#   TESTLOG_nv580.159_sglang-0.5.12_nemotron-3-super-120b-a12b-nvfp4_4n.md
# The first-contact defaults below MATCHED the winner (Case 03: full-CG + fi_cutlass
# MoE + fi_cutlass fp4_gemm + ctx524k → n=8 peak 135.06 tok/s, 8/8 clean) — so the
# serving values are unchanged; only the caveats below were downgraded to facts.
#
# RE-VALIDATED + MTP VALIDATED 2026-06-16 — 14-case matrix on the dedicated MTP image
# (sglang 0.5.13-dev-nemotronh-mtp, RoCE, TP=4):
#   TESTLOG_nv580.159_sglang-0.5.13-mtp_nemotron-3-super-120b-a12b-nvfp4_4n.md
# Outcomes that set the values below:
#   * MTP NOW PAYS OFF — EAGLE steps=3/draft=4 (Case 09) is the WINNER: accept_len ≈ 2.7,
#     1.70× n=1 (53.99 vs no-spec 31.67) and 1.37× n=8 (peak 199.7 vs 146.3), 8/8 clean,
#     NO NaN. This 3/4 setting BEATS the NVIDIA cookbook 5/5 (Case 10), which ran slower
#     (n=8 152.7) AND lost a request to the repetition detector. So the recipe stays 3/4,
#     NOT the cookbook 5/5. R2 (NVFP4 MTP NaN) + R3 (accept_len>1 loader fix) both PASS on
#     this image — #21138/#27998/#24955/#28102 are in it; no --disable-radix-cache needed.
#   * No-spec image delta: ~8% faster than 0.5.12 (Case 03 ctx524k 145.8 vs 135.1).
#   * Cases 05 (fi_cudnn fp4_gemm) + 06 (triton MoE) STILL startup-crash on this image too.
#   * enable_spec_v2 (Case 14) + manual mamba extra_buffer (Case 13) showed NO benefit → OFF.
#
# >>> IMAGE CAVEAT — RESOLVED 2026-06-04 <<<  Although the model card serves this on a
# DEDICATED dev image (lmsysorg/sglang:dev-cu13-nemotronh-nano-omni-reasoning-v3), the
# mainline UPSTREAM base scitrera/dgx-spark-sglang:0.5.12 DOES carry the
# NemotronHForCausalLM NVFP4 path + Mamba2 SM121 kernels — Case 01 booted and emitted
# coherent tokens. No dev-image and NO per-profile `sglang_image:` override are needed
# for serving. (fi_cudnn fp4_gemm is the one gap — that wheel is missing from the base
# image; see fp4_gemm_backend note below. fp4_gemm stays flashinfer_cutlass anyway.)
_model_profile:
  "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4":
    knowledge_cutoff: "2026-02"  # post-training cutoff (HF card); pre-training 2025-06 — use latest for LCB contamination
    info_url: "https://huggingface.co/nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
    # 120B total / 12B active LatentMoE — Mamba2 + MoE + select-attention HYBRID
    # (NemotronHForCausalLM, model_type=nemotron_h). config.json: 88 layers,
    # hidden_size 4096, 32 attention heads, num_key_value_heads=2 (GQA),
    # n_routed_experts=512 + 1 shared, num_experts_per_tok=22, moe_latent_size=1024
    # (tokens projected to a latent dim for expert routing), ssm_state_size=128,
    # mamba_num_heads=128. NVFP4 quantized (~67 GB weights, mixed precision:
    # expert FFN weights = FP4 group_size 16, attention/latent-proj/MTP/embeddings
    # = FP8/BF16 for stability).
    # CONTEXT > 256K: config.json caps max_position_embeddings at 262144, but that is
    # CONSERVATIVE — per the Technical Report (§2 "Long-Context Extension":
    # https://research.nvidia.com/labs/nemotron/files/NVIDIA-Nemotron-3-Super-Technical-Report.pdf)
    # the model was natively long-context-trained (LC-Phase CPT at 1,048,576 = 1M for
    # 34B tokens), and the attention layers use NoPE (no positional embeddings — "we
    # omit positional embeddings"; Mamba2 carries order). So there is NO RoPE/YaRN to
    # scale: extending context is literally just raising the number. RULER (base, 0-shot)
    # holds gracefully: 64K 92.3 / 128K 88.3 / 256K 84.6 / 512K 82.5 / 1M 71.0 (Report
    # Table 4). To go past 262144 here, raise context_length AND
    # lift the config cap via json_model_override_args (which auto-sets
    # SGLANG_ALLOW_OVERWRITE_LONGER_CONTEXT_LEN=1 — see tasks/sglang.yml:46-54; without it
    # SGLang's _derive_context_length clamps back to 262144). NO rope_scaling needed —
    # contrast nvidia-qwen3-235b-a22b-nvfp4.yml which DOES need YaRN. Example for 512K:
    #   context_length: 524288
    #   json_model_override_args: '{"max_position_embeddings": 524288}'
    # The ceiling is memory/prefill-compute, not quality: only 8 of 88 layers are
    # attention (growing KV), the 80 Mamba layers keep constant recurrent state, so KV
    # stays modest — but the 8 full-attention layers' prefill is still O(seq²). Pair long
    # context with chunked_prefill_size (below). VALIDATED 2026-06-04: 262K/512K/1M all
    # boot and run at ~equal throughput (n=8 peak 118/135/135 tok/s; the 262K case only
    # reads lower because it lost 1/8 to the repetition detector — see TESTLOG). NoPE +
    # 80/88 Mamba layers → KV barely grows, so 512K and 1M are essentially FREE vs 262K;
    # the only reason to cap shorter is RULER quality (82.5 @ 512K, 71.0 @ 1M). 524288 is
    # the chosen default; raise to 1048576 if >512K context is ever needed.
    # Reasoning ON/OFF + low-effort via chat_template_kwargs (enable_thinking /
    # low_effort). Native Multi-Token Prediction (num_nextn_predict_layers=1,
    # mtp_hybrid_override_pattern "*E") → speculative decoding, see MTP block below.
    # Supported languages: EN, FR, DE, IT, JA, ES, ZH.
    #
    # Recommended SGLang launch (NVIDIA model card):
    #   python3 -m sglang.launch_server --model-path nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4 \
    #     --trust-remote-code --quantization modelopt_fp4 --mem-fraction-static 0.8 \
    #     --max-running-requests 8 --reasoning-parser nemotron_3 \
    #     --tool-call-parser qwen3_coder --disable-piecewise-cuda-graph
    # NOTE: the card's reasoning parser is "nemotron_3" for SGLang (vLLM/TRT-LLM use
    # the "super_v3"/"nano-v3" plugin instead — do not copy those here).
    #
    # load_format: "auto" (NVFP4 sharded_state is disabled — double-processes
    # weights in process_weights_after_loading, eats ~4 GB headroom for no I/O win;
    # same rationale as nvidia-minimax-m2.7-nvfp4.yml).
    load_format: "auto"
    nccl_transport: "roce"
    # PARALLELISM — TP=4 → PP = nnodes/tp = 4/4 = 1 (single TP group across all 4
    # nodes, no pipeline stages). Cluster is fixed at sglang_nnodes=4; ~67 GB sharded
    # over TP=4 → ~17 GB weights/GPU, leaving the bulk of 128 GB for KV. NB: with
    # num_key_value_heads=2 and TP=4, SGLang REPLICATES each KV head across 2 ranks
    # (4 % 2 == 0) — valid GQA behaviour, the same way our other low-KV-head MoE
    # models run TP. NVIDIA's model card recommends TP=1/EP=1 (single GPU); TP=4/PP=1
    # trades that for cluster-wide tensor parallelism (more KV, all-reduce traffic on
    # RoCE). Alternative: tp_size: 1 → PP=4 keeps the 2 KV heads intact and matches the
    # card's parallelism, at the cost of pipeline bubbles (see nvidia-glm-5-nvfp4.yml).
    # Both paths are UNVALIDATED here.
    tp_size: 4
    context_length: 524288  #262144
    json_model_override_args: '{"max_position_embeddings": 524288}'
    quantization: "modelopt_fp4"
    # trust_remote_code: required — NemotronH ships custom model + tokenizer code in
    # the HF repo that SGLang must execute. Safe: official nvidia/ repo.
    trust_remote_code: true
    # flashinfer_cutlass MoE — the proven NVFP4 MoE path on our other NVIDIA NVFP4
    # models (qwen3-235b, glm-4.7, minimax-m2.7). VALIDATED 2026-06-04: the ONLY viable
    # MoE runner on this model. MUST stay flashinfer_cutlass — `triton` is NOT an
    # optional alternative, it startup-CRASHES (Case 06): the triton runner flag is
    # ignored on the NVFP4 modelopt path, which always dispatches the FFN through
    # cutlass_moe_fp4, and the LatentMoE/512-expert shape trips a hard assertion there
    # (moe/cutlass_moe.py:427 `nx2_w1 == intermediate_size_per_partition*2`).
    # RE-CONFIRMED 2026-06-16 on the 0.5.13-mtp image: Case 06 triton STILL crashes with
    # `AssertionError: mismatch in expected n` (cutlass_moe.py:428). Stays flashinfer_cutlass.
    moe_runner_backend: "flashinfer_cutlass"
    kv_cache_dtype: "fp8_e4m3"
    # mem_fraction_static = post-weight KV reserve fraction (higher = more KV).
    # VALIDATED 2026-06-04 (TP=4/PP=1): weights load to 23.31 GB/GPU (modelopt_mixed),
    # and 0.80 reserves a 16.58M-token KV cache at ctx524k (K 15.81 + V 15.81 GB) with
    # ~23.6 GB still free after CUDA-graph capture — i.e. 0.80 is comfortable and could
    # go higher if more KV is wanted. No OOM at 262K/512K/1M.
    mem_fraction_static: "0.75"
    # attention_backend: MUST NOT be triton — SGLang's apply_nemotron_h_defaults hook
    # hard-asserts against it ("NemotronHForCausalLM does not support triton attention
    # backend, as the first layer might not be an attention layer"; the hybrid pattern
    # starts with Mamba, not attention). flashinfer works (head_dim=128 supported).
    # Mamba2 SSM layers use their own kernels regardless of this setting.
    attention_backend: "flashinfer"
    # fp4_gemm_backend: flashinfer_cutlass — VALIDATED 2026-06-04 (winner shape). Do NOT
    # switch to flashinfer_cudnn on the scitrera base image: Case 05 startup-crashes with
    # "RuntimeError: cuDNN is not available" (the nvidia-cudnn-cu12 wheel is not in this
    # base; it needs the cuDNN-layer image from scripts/build_cudnn_image.sh). fi_cutlass
    # already wins on the Qwen3.6-NVFP4 comparison, so cuDNN-FP4 is not worth the rebuild.
    # RE-CONFIRMED 2026-06-16: the dev MTP image ALSO lacks the cuDNN-FP4 wheel — Case 05
    # startup-crashes identically (`RuntimeError: cuDNN is not available`). Stays fi_cutlass.
    fp4_gemm_backend: "flashinfer_cutlass"
    jit_max_jobs: 4
    # disable-piecewise-cuda-graph: set EXPLICITLY by the model card's SGLang launch
    # line — likely because the Mamba2/attention hybrid graph doesn't piecewise-capture
    # cleanly. Keep true until proven otherwise (cross-ref FLASHINFER_0.6.12_TODO §2).
    disable_piecewise_cuda_graph: true
    disable_cuda_graph: false
    cuda_graph_max_bs: 32
    # CONCURRENCY CEILING on this hybrid model is the Mamba state-cache pool, NOT
    # KV/cuda_graph: SGLang clamps max_running_requests = max_mamba_cache_size //
    # mamba_ratio (ratio≈3, ~3 reserved slots/req). Without an explicit pool the
    # auto-fit can land far lower (Ultra sibling booted at pool=18 → 6 parallel),
    # which would make cuda_graph_max_bs:32 inert. 96//3 = 32 matches the CG cap
    # above exactly. Two levers (both OFF=auto-fit):
    #   * mamba_full_memory_ratio (default 0.9 → mamba gets 47% of rest_memory):
    #     memory-checked KV→mamba shift, preferred in principle but UNTESTED on
    #     both Nemotron-3 profiles. Read the boot log's "max_mamba_cache_size:" line.
    #   * max_mamba_cache_size: explicit slot count, bypasses the ratio. NOT memory-
    #     checked — too high steals from KV / OOMs at KV profiling.
    # Memory estimate: Ultra logged 4.59 GB ssm_state for 48 slots (~0.1 GB/slot,
    # TP=4-sharded); Super is much smaller per slot, so 96 slots ≈ a few GB —
    # comfortable vs the validated ~23.6 GB free after CG capture at 0.80.
    # STATUS: 48→16 is VALIDATED on the Ultra sibling (EP=4 matrix 2026-06-06);
    # 96 here is UNVALIDATED (the 2026-06-04 Super matrix winner ran
    # cuda_graph_max_bs:8 with auto-fit pool). On first boot verify the log lines
    # "max_mamba_cache_size: 96" → "max_running_requests=32" and the ssm_state size.
    # mamba_full_memory_ratio: 3.0
    max_mamba_cache_size: 96
    pp_async_batch_depth: 0
    # DeepGemm targets FP8/ue8m0 scale format; for NVFP4 (scale_fmt != ue8m0) its JIT
    # kernels aren't optimized, block the scheduler watchdog, and exhaust system RAM.
    # Disabled → FP4 GEMM selection falls to fp4_gemm_backend above.
    disable_deep_gemm: true
    # chunked_prefill_size: model card recommends chunked prefill (bounds the Mamba
    # conv/SSM-state memory spike on long prefills). SGLang enables it by default;
    # uncomment to pin a chunk size if long-context prefills OOM.
    # chunked_prefill_size: 131072
    reasoning_parser: "nemotron_3"
    tool_call_parser: "qwen3_coder"
    # chat_template_kwargs: REMOVED — the current xomoxcc:0.5.12.post1-sm121 build
    # rejects the server-side `--chat-template-kwargs` flag ("sglang serve: error:
    # unrecognized arguments: --chat-template-kwargs ..."). The model card never sets
    # it as a launch flag anyway: reasoning defaults to ON in the chat template and is
    # toggled PER REQUEST via extra_body={"chat_template_kwargs":{"enable_thinking":
    # false}} / {"low_effort": true}. Do NOT re-add as a profile key on this image.
    # chat_template_kwargs:
    #   enable_thinking: true
    #   low_effort: false
    num_experts: 512
    # ep_size: 1 with TP=4 → MoE runs tensor-parallel (experts sharded across the 4
    # ranks, no expert-parallel all-to-all). Matches the model card's EP=1. To switch
    # to EP=TP=4 (all-to-all MoE, attention stays TP) use the dynamic form:
    # ep_size: "{{ sglang_nnodes if (512 % (sglang_nnodes | int) == 0) else 1 }}".
    ep_size: 4
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
    # ---- Native MTP / speculative decoding (1 built-in MTP layer) ----
    # VALIDATED 2026-06-16 (MTP matrix, 14 cases) — see the 0.5.13-mtp TESTLOG. The values
    # below are the MEASURED WINNER (Case 09: steps=3, draft=4, topk=1), which beat every
    # other draft depth AND the NVIDIA cookbook 5/5:
    #   * steps=3 / draft=4 (this profile): accept_len ≈ 2.7, 1.70× n=1, 1.37× n=8 over
    #     no-spec, 8/8 clean, no NaN.  <-- WINNER
    #   * steps=5 / draft=5 (NVIDIA cookbook recipe): SLOWER (n=8 152.7 vs 199.7) AND lost
    #     a request to the repetition detector (7/8). Higher accept_len (2.97) did NOT beat
    #     net throughput — the extra draft-compute per step costs more than it saves here.
    #   * steps=5 / draft=7 (TRT accept-3.45 point): also slower (n=8 175.1). Deeper draft =
    #     more accept but more wasted draft compute.
    #   So DO NOT bump this to the cookbook 5/5 — 3/4 is the empirical optimum on this model.
    #
    # algo is EAGLE, NOT NEXTN — SGLang drives Nemotron's embedded MTP layer as an
    # EAGLE-style tail draft; no external draft model (speculative_draft_model_path "").
    # NVIDIA Advanced Deployment Guide (2026-06, where the cookbook 5/5 comes from):
    #   https://docs.nvidia.com/nemotron/latest/usage-cookbook/Nemotron-3-Super/AdvancedDeploymentGuide/README.html
    #
    # >>> PRIOR BLOCKERS — ALL RESOLVED on xomoxcc:0.5.13-dev-nemotronh-mtp-sm121 <<<
    # (kept for provenance; these were the pre-run risks, now confirmed cleared)
    #   * sgl-project/sglang#24955 (DP attn + MTP, MERGED), #28102 (DP+EP fix, MERGED),
    #     #27184 (spec-v2/B200 docs, MERGED), #27998 (MTP + radix cache, GB10-validated):
    #     all present in this image. MTP boots, no --disable-radix-cache needed.
    #   * Old BLOCKER 2 / #21138 (accept_rate≈0.33 from the MTP loader filtering
    #     lm_head.weight + backbone.embeddings out) — FIXED in this image: accept_len > 1
    #     on EVERY MTP case (1.81 → 3.07), the loader-bug signature (accept≈1) is gone.
    #   * #27828 (NVFP4 MTP target-logits NaN, the riskiest path) — NOT present: zero NaN
    #     in any MTP head log.
    # Memory: MTP draft buffers + 512K KV co-fit (Case 12 ran 5/5 @ ctx524k 8/8); the
    # lighter 3/4 winner fits ctx524288 with more headroom. Drop mem_fraction_static if OOM.
    speculative_enabled: true
    speculative_algo: EAGLE
    speculative_num_steps: 3  # VALIDATED WINNER 2026-06-16 — beats cookbook 5/5; do NOT raise
    speculative_num_draft_tokens: 4  # VALIDATED WINNER 2026-06-16 — beats cookbook 5/5 + 5/7
    speculative_eagle_topk: 1
    speculative_draft_model_path: ""
    # enable_spec_v2: true                       # Case 14: boots but NO win over 3/4 default → leave OFF
    # mamba_scheduler_strategy: "extra_buffer"   # Case 13: NO benefit (degenerate n=1 repetition);
    #   #27998 auto-selects it for spec+radix anyway → never set manually. Leave OFF.
    sglang_image: "xomoxcc/dgx-spark-sglang:0.5.13-dev-nemotronh-mtp-sm121"
