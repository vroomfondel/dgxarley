---
# Model profile: nvidia/Qwen3.6-35B-A3B-NVFP4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# NVIDIA's OWN modelopt quant of Qwen/Qwen3.6-35B-A3B (NVFP4 upload 2026-05-31).
# Three sibling packagings of the SAME base model already live in this repo:
#   * redhatai-qwen3.6-35b-a3b-nvfp4.yml  — compressed-tensors, uniform NVFP4, FULLY VALIDATED winner
#   * mmangkad-qwen3.6-35b-a3b-nvfp4.yml  — modelopt, uniform NVFP4, seed
#   * qwen-qwen3.6-35b-a3b-fp8.yml        — FP8 sibling
#
# ⚠️ NOT a uniform-NVFP4 checkpoint, despite the "-NVFP4" repo name, and REQUIRES a
# sglang_launch.sh runtime patch to load on this stack. The original header claimed
# "functionally identical packaging to mmangkad's, both modelopt → modelopt_fp4" —
# WRONG. The actual hf_quant_config.json (modelopt 0.44.0, confirmed 2026-06-24) is
# `quant_algo: MIXED_PRECISION`, NOT uniform NVFP4:
#   * MoE experts + shared-expert proj (322 layers) → W4A16_NVFP4, group_size 16
#   * linear_attn (Gated-DeltaNet) + others (260 layers) → FP8
#   * MTP head (mtp*) → EXCLUDED (kept full precision)
#   * kv_cache_quant_algo → FP8
#
# ── WHY THE PATCH IS NEEDED (SGLang 0.5.12 AND 0.5.13 — dispatch code identical;
#    active image: xomoxcc/dgx-spark-sglang:0.5.13-sm121) ──
# _parse_modelopt_quant_config() maps MIXED_PRECISION → quant method by ARCHITECTURE:
# NemotronH → modelopt_mixed, everything else → w4afp8. This Qwen arch
# (Qwen3_5MoeForConditionalGeneration) falls through to w4afp8, which is a closed trap:
#   * modelopt_fp4 / modelopt_mixed → _verify_quantization rejects the mismatch
#     (detected w4afp8 ∉ compatible[modelopt_*] = ["modelopt"]).
#   * w4afp8 → passes verify, but W4AFp8Config is the W4A8 (int4 + per-group fp8-scale)
#     loader — the WRONG weight encoding for NVFP4 (e2m1) experts.
# The ModelOptMixedPrecisionConfig loader DOES compose per-layer NVFP4+FP8 correctly
# but is unreachable for this arch upstream. TWO PAIRED sglang_launch.sh patches make
# it work (⚠️ if either is dropped/reverted, this profile breaks again):
#   1. "_sgl_mixed_nvfp4_dispatch_" — broadens the gate so any NVFP4-bearing
#      MIXED_PRECISION checkpoint → modelopt_mixed (not just NemotronH). With this +
#      `quantization: modelopt_mixed` below, detection matches and verify passes.
#   2. "_sgl_mixed_nvfp4_variant_" — modelopt 0.44 labels the experts/shared-expert
#      linears `quant_algo: W4A16_NVFP4` (weight-only NVFP4), but the mixed loader's
#      per-layer get_quant_method does exact `== "NVFP4"` → W4A16_NVFP4 layers got NO
#      quant method → built unquantized → KeyError on w*_weight_scale_2. The patch
#      normalizes any *NVFP4* variant to NVFP4 so the real loader runs. The checkpoint
#      ships the full NVFP4 tensor set (weight/weight_scale/weight_scale_2/input_scale).
#
#   architectures Qwen3_5MoeForConditionalGeneration, 40 layers, 256 experts /
#   8 routed + 1 shared per token, max_position_embeddings 262144,
#   mtp_num_hidden_layers 1 (native MTP head → NEXTN speculative).
# 35B total / ~3B active, Gated-DeltaNet hybrid-mamba MoE → SGLang routes it
# through the mamba scheduler path (hence the spec-v2 + extra_buffer knobs below).
#
# ── VALIDATION STATUS: UNVALIDATED — first boot is first-contact for modelopt_mixed
#    on this Qwen arch + SM121/GB10. The launch.sh patch clears the config-dispatch
#    walls; it does NOT guarantee a clean weight-load / CUDA-graph capture. ──
# The values below are NOT a fresh matrix winner:
#   * MODEL-INTRINSIC knobs taken from the RedHatAI VALIDATED winner (0.5.12 matrix,
#     Test 45, n=8 peak 438.07 tok/s — best ever on this cluster): context, MTP
#     depth (NEXTN s=2 / draft=3, the validated sweet spot — s=3/4/5 all decayed),
#     sampling, parsers. These are model properties, carry across to this upload.
#   * mem 0.6 conservative first-contact (matches both uniform-NVFP4 siblings).
# NOTE: the two uniform-NVFP4 siblings (redhatai = validated winner, mmangkad = seed)
# already cover this base model and DON'T need the patch — prefer them unless you
# specifically want this first-party mixed-precision upload. Re-run the focused sweep
# (matrixtest_matrices/sglang_nn4_tp4_ep1/qwen-3.6-35b-a3b-nvfp4-...) and rewrite with
# measured numbers once it boots clean.
_model_profile:
  "nvidia/Qwen3.6-35B-A3B-NVFP4":
    knowledge_cutoff: null  # not officially disclosed; community (Reddit r/Qwen_AI) claims ~mid-2024, unconfirmed
    release_date: "2026-04-16"  # Qwen3.6-35B-A3B base; official QwenLM GitHub changelog (NVFP4 upload 2026-05-31)
    info_url: "https://huggingface.co/nvidia/Qwen3.6-35B-A3B-NVFP4"
    # SM121 sgl-kernel build required for NVFP4 on GB10. Pinned (not the scitrera 0.5.12
    # default) so this profile resolves correctly without a -e override. The MIXED_PRECISION
    # dispatch the modelopt_mixed loader needs comes from the sglang_launch.sh runtime patch
    # (works on any -sm121 image; 0.5.12/0.5.13 source identical), NOT from this build.
    sglang_image: "xomoxcc/dgx-spark-sglang:0.5.13-sm121"
    # 35B/3B MoE (Gated DeltaNet hybrid), MIXED_PRECISION modelopt: W4A16_NVFP4 MoE
    # experts + FP8 attn (~10–12 GB on-device vs ~35 GB FP8). 256 experts, 8 routed + 1 shared per token. Native 262K
    # context (extensible to ~1M via YaRN — not enabled here). MTP-trained → NEXTN.
    context_length: 262144
    # MIXED_PRECISION modelopt checkpoint (W4A16_NVFP4 MoE + FP8 attn). REQUIRES BOTH
    # sglang_launch.sh "_sgl_mixed_nvfp4_*" patches (see header): _dispatch_ routes this
    # Qwen arch's MIXED_PRECISION → modelopt_mixed (stock gates it to NemotronH → w4afp8),
    # and _variant_ makes the loader accept the W4A16_NVFP4 quant_algo string. Without
    # them: verify-mismatch crash, then KeyError on w*_weight_scale_2.
    quantization: "modelopt_mixed"
    trust_remote_code: true
    kv_cache_dtype: "fp8_e4m3"
    # 0.6 conservative first-contact (matches both 3.6-35B NVFP4 siblings); MTP draft
    # tokens want extra KV headroom and NVFP4 weights are ~3× smaller than FP8 → slack.
    mem_fraction_static: "0.6"
    nccl_transport: roce
    # flashinfer_cutlass is whitelisted for modelopt_mixed (server_args
    # _handle_moe_kernel_config) and is the runner the modelopt_mixed loader uses for
    # the NVFP4 expert layers — correct here. A/B vs triton once it boots, but this is
    # no longer a blind guess like it was on the w4afp8 path.
    moe_runner_backend: flashinfer_cutlass
    attention_backend: flashinfer
    # NVFP4 expert GEMM backend — appropriate for the W4A16_NVFP4 MoE layers.
    fp4_gemm_backend: flashinfer_cutlass
    disable_deep_gemm: true
    disable_cuda_graph: false
    # RedHatAI winner ran piecewise-CG ON (disable_piecewise_cuda_graph: false). The
    # mmangkad modelopt seed kept it OFF for boot safety. Start safe (true); flip to
    # false and re-measure once it boots clean — piecewise was part of the 438 winner.
    disable_piecewise_cuda_graph: true
    pp_async_batch_depth: 0
    cuda_graph_max_bs: 32
    jit_max_jobs: 4
    ep_size: 1
    tp_size: 4
    num_experts: 256
    enable_eplb: false
    enable_expert_distribution_metrics: false
    reasoning_parser: "qwen3"
    tool_call_parser: "qwen3_coder"
    # thinking (default) + non-thinking via chat_template_kwargs={"enable_thinking":false}.
    #   thinking:        temperature=1.0  top_p=0.95  top_k=20  presence_penalty=1.5
    #   thinking_coding: temperature=0.6  top_p=0.95  top_k=20  presence_penalty=0.0
    #   non_thinking:    temperature=0.7  top_p=0.80  top_k=20  presence_penalty=1.5
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      presence_penalty: 1.5
    # MTP / speculative (NEXTN) — native 1-layer MTP head (mtp_num_hidden_layers: 1).
    # s=2 / draft=3 is the VALIDATED sweet spot from the RedHatAI matrix (Tests 45–48:
    # n=8 peak s=2→438.07, s=3→387.42, s=4→366.38, s=5→350.36 — monotonic decay with
    # depth). The two hybrid-mamba knobs (extra_buffer + spec_v2) avoid the
    # spec-v2-vs-radix-cache boot crash on this Gated-DeltaNet MoE arch.
    speculative_enabled: true
    speculative_algo: NEXTN
    speculative_num_steps: 2
    speculative_eagle_topk: 1
    speculative_num_draft_tokens: 3
    mamba_scheduler_strategy: extra_buffer
    enable_spec_v2: true
