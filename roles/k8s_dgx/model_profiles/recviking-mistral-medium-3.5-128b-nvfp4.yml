---
# Model profile: RecViking/Mistral-Medium-3.5-128B-NVFP4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# FIRST CONTACT / UNVALIDATED (written 2026-06-20). No matrix run yet — the
# values below are a conservative seed inherited from the dense-NVFP4 sibling
# mmangkad-qwen3.6-27b-nvfp4.yml. Rewrite with the winner config + measured
# throughput after the first sweep.
#
# WHY THIS REPO (over the other Medium-3.5 NVFP4 quants on the hub) ───────────
#   RecViking/...-NVFP4 ships HUGGINGFACE-FORMAT (config.json present,
#   model.safetensors.index.json, HF + tekken tokenizers) → loads on the stock
#   SGLang path with NO launch-script changes. The sibling zdy1995love/...-NVFP4
#   and Mistral's own checkpoints are MISTRAL-NATIVE (params.json, consolidated
#   safetensors, NO config.json) → NOT SGLang-loadable without an offline HF
#   conversion or the vLLM `--config-format mistral` path. See the Large-3-675B
#   profile header for the full format discussion.
#
# WHAT THIS CHECKPOINT IS (verified against HF config.json 2026-06-20) ─────────
#   arch Mistral3ForConditionalGeneration (model_type mistral3), multimodal:
#     - text_config: model_type "ministral3", DENSE (NOT MoE) — 88 layers,
#       hidden_size 12288, intermediate_size 28672, 96 attn heads,
#       num_key_value_heads 8 (GQA), head_dim 128, vocab 131072.
#       YaRN rope: factor 64 over original 4096 → 262144 native context,
#       rope_theta 1e6, beta_fast 4 / beta_slow 1.
#     - vision_config: pixtral, 48 layers, hidden 1664, patch 14, image 1540.
#   QUANT: compressed-tensors NVFP4 (recipe.yaml: QuantizationModifier scheme
#   NVFP4, group_size 16, weights+input_activations FP4, targets [Linear]).
#   IGNORE list keeps lm_head, the ENTIRE vision_tower, and the
#   multi_modal_projector in BF16 — i.e. ONLY the text-transformer Linear ops
#   are FP4. kv_cache_scheme null (KV stays BF16 in the checkpoint; we still run
#   an fp8 KV pool at runtime via kv_cache_dtype below — orthogonal choice).
#   ~80.3 GB safetensors (2 shards) → ~20 GB/GPU at TP=4. COMFORTABLE fit:
#   ~108 GB/GPU free for KV + activations + CUDA graphs, so long context and
#   high concurrency are cheap here (the opposite of the 675B's squeeze).
#
# >>> BOOT / VALIDATION (2026-06-27: BOOTS + SERVES + VISION VERIFIED on :8000) <<<
#   Multimodal smoke test passed: a generated image (red circle / green square /
#   blue triangle) was described correctly via /v1/chat/completions — vision tower
#   works end-to-end in BF16 with the _sgl_vlm_ignore_fix patch.
#   1. ARCH SUPPORT — Mistral3ForConditionalGeneration is registered in SGLang
#      (Mistral-Small-3 / Pixtral lineage), but the INNER text model_type
#      "ministral3" + config transformers_version 5.7.0 are newer than the
#      scitrera/dgx-spark-sglang:0.5.12 base likely ships. If load_model raises
#      an unknown-model-type / config-parse error, the base image needs a
#      transformers bump (or a dev image) — same failure mode noted in the
#      qwen3.5-397b profile. trust_remote_code is set to give the repo's own
#      code a chance to register the type. (Loaded fine on 0.5.12 in practice.)
#   2. >>> RESOLVED — VISION-TOWER NVFP4 CRASH (was: boot crash at ~3 min) <<<
#      compressed-tensors NVFP4 VLMs keep the ENTIRE vision_tower + projector in
#      BF16 via the checkpoint `ignore` list, but SGLang 0.5.12 quantized them
#      anyway → "ValueError: mm_fp4 accepts 2d tensors, got [1,16,832]..." in the
#      vision attention qkv_proj. Root cause: should_ignore_layer() matches the
#      checkpoint `ignore` names against RUNTIME module names that differ via four
#      loader remaps (q/k/v->qkv, gate/up->gate_up, attention.o_proj->attention.proj,
#      and the inner Mistral3/Llava mount STRIPS the leading "model." from
#      vision_tower/multi_modal_projector), and the model class has NO
#      packed_modules_mapping so the fused branch never runs. NOT a fp4_gemm_backend
#      issue. Fixed by the idempotent `# [patch] _sgl_vlm_ignore_fix` block in
#      sglang_launch.sh (wraps should_ignore_layer to inject the fused mapping +
#      test inverse-remapped names). With the patch the head boots, loads the vision
#      tower as BF16, and serves /v1/models. Upstream PR #24929 (OPEN) only covers
#      the unrelated ".linear" suffix variant. See memory
#      reference_vlm_compressed_tensors_ignore_mismatch.
_model_profile:
  "RecViking/Mistral-Medium-3.5-128B-NVFP4":
    knowledge_cutoff: null  # not officially disclosed (Mistral Medium 3.5 card silent)
    release_date: "2026-04-28"  # quant build date (config quant version 0.15.1.a20260428); base Medium-3.5 earlier
    info_url: "https://huggingface.co/RecViking/Mistral-Medium-3.5-128B-NVFP4"
    nccl_transport: "roce"
    # ~80 GB / TP=4 → ~20 GB/GPU. TP=4 valid: num_key_value_heads=8, 8 % 4 == 0
    # → 2 KV heads/rank (clean GQA, no replication). PP not needed (fits easily).
    tp_size: 4
    # Native 262144 (config max_position_embeddings). Memory is NOT the constraint
    # here, so this can likely go to the YaRN-extended ceiling later if needed.
    # >>> CAPPED TO 128K FOR MTP <<< NOTE: the EAGLE draft's OWN params.json
    # actually declares max_position_embeddings 262144 (YaRN factor 64 × 4096,
    # i.e. the SAME 256K as the target) — so the draft is NOT natively limited to
    # 128K. The 128000 is a SGLang FALLBACK: the draft is Mistral-native
    # (params.json + consolidated.safetensors, NO config.json), and SGLang can't
    # parse its YaRN rope offline ("Missing validation function for
    # rope_type=deepseek_yarn" + generation_config load fails) → _derive_context_
    # length falls back to 128000. The HF-format target parses its config.json
    # fine → 262144. The mismatch (target 262144 > draft-derived 128000) aborts
    # the draft-worker init → head sigquits → whole TP group crash-loops.
    # Capping the TARGET to 128000 makes target == derived so the guard passes.
    # Tradeoff: caps the whole instance to 128K even though both models support
    # 256K. Alternatives if 256K is needed WITH MTP: (a) feed the draft an
    # HF-format config.json so SGLang derives 262144, or (b) SGLANG_ALLOW_
    # OVERWRITE_LONGER_CONTEXT_LEN=1 (draft then runs at its 128000 fallback;
    # drafts past 128K positions may be junk → rejected by target verify, so
    # correctness holds but no speedup there, and CUDA-index risk). Restore
    # 262144 outright ONLY if speculative_enabled is set back to false.
    # context_length: 262144   # full 256K — requires speculative off OR a draft config.json
    context_length: 128000
    # compressed-tensors NVFP4 → SGLang AUTO-DETECTS from config.json. Do NOT set
    # `quantization: modelopt_fp4` (that's the ModelOpt packaging; this repo is
    # llm-compressor / compressed-tensors). Intentionally NO quantization key.
    # trust_remote_code: required so the repo can register the mistral3/ministral3
    # types if the base transformers doesn't know them. Safe: inspect the repo's
    # *.py (prepare_calibration_v3.py / quant_nvfp4_v3.py are quant scripts, not
    # runtime hooks) before first boot if paranoid.
    trust_remote_code: true
    kv_cache_dtype: "fp8_e4m3"
    # Compute dtype → --dtype bfloat16. REQUIRED for EAGLE MTP (speculative below):
    # the Mistral-native EAGLE draft's params.json has NO dtype field, so --dtype
    # auto makes the draft fall back to fp32→fp16, which collides with this bf16
    # target's shared embed/head → "out_dtype must be Half or BFloat16" crash at
    # draft graph capture (SGLang cookbook Mistral-Medium-3.5 §3.3). This does NOT
    # touch the NVFP4 weights (config.json: dtype bfloat16 + nvfp4-pack-quantized
    # are orthogonal — weights stay FP4, --dtype only sets compute dtype, which the
    # target already does under auto). Harmless to keep even with speculative off.
    dtype: "bfloat16"
    # DENSE model — NO moe_runner_backend / num_experts / ep_size keys. The whole
    # NVFP4-gated-MoE padding-crash matrix (see reference_nvfp4_gated_moe_padding)
    # does NOT apply: there is no MoE FFN. fp4_gemm_backend still governs the dense
    # FP4 linear GEMM.
    # Conservative seed: fi-attn + fi_cutlass FP4 GEMM + CG on + piecewise off.
    # Mirrors the dense mmangkad-qwen3.6-27b-nvfp4 first-contact shape.
    attention_backend: "flashinfer"
    fp4_gemm_backend: "flashinfer_cutlass"
    disable_deep_gemm: true        # DeepGemm targets FP8/ue8m0 scales, not NVFP4
    disable_cuda_graph: false
    disable_piecewise_cuda_graph: true
    cuda_graph_max_bs: 32
    pp_async_batch_depth: 0
    jit_max_jobs: 4
    # Plenty of headroom (~20 GB/GPU weights). 0.85 is safe; can push higher for
    # even more KV if a sweep shows benefit. NOT the tight 0.75 the big MoEs need.
    mem_fraction_static: "0.7"
    # REASONING — Medium-3.5 IS a thinking model (tokenizer_config has [THINK]
    # special tokens; chat_template exposes reasoning_effort 'none'|'high'). It is
    # OFF by default (reasoning_effort defaults to 'none' → no thinking tokens) and
    # toggled PER REQUEST, not via a launch flag: pass reasoning_effort="high"
    # (OpenAI param) or chat_template_kwargs={"reasoning_effort":"high"}. SGLang's
    # MistralDetector (key "mistral", tokens [THINK]/[/THINK], reasoning_default
    # "mistral") splits those into reasoning_content when present — harmless when
    # reasoning is off. tool_call_parser "mistral" handles Mistral's tool calls.
    reasoning_parser: "mistral"
    tool_call_parser: "mistral"
    recommended_sampling:
      # Mistral model card guidance: low temperature for production (non-thinking).
      # Raise toward ~0.7 when reasoning_effort="high" (thinking traces need slack).
      temperature: 0.15
      top_p: 1.0
    sampling_overrides: {}
    # ── MTP / speculative decoding via the official EAGLE draft ──────────────────
    # Draft: mistralai/Mistral-Medium-3.5-128B-EAGLE — n_layers 2, dim 12288,
    # n_heads 96, n_kv_heads 8, head_dim 128, vocab 131072 (matches this target),
    # weights FP8_e4m3 (~3 GB). It is an EAGLE (v1) head, NOT EAGLE3.
    #
    # FORMAT IS NOT A BLOCKER (verified 2026-06-20): the EAGLE repo is Mistral-
    # native (consolidated.safetensors + params.json, no config.json), but SGLang
    # 0.5.12 loads it — is_mistral_model("...eagle...mistral...")=True routes it
    # through MistralConfigParser → dense GQA → MistralForCausalLMEagle, and the
    # FP8 draft quant (params.json qformat_weight fp8_e4m3) is mapped to quant_method
    # fp8. (Probed live in scitrera/dgx-spark-sglang:0.5.12.)
    # >>> ONE OPEN RISK — speculative stays DISABLED, pre-staged, until measured <<<
    #   CROSS-PRECISION DRIFT on SM121: an FP8 draft against an NVFP4 target risks
    #   the same FP4→BF16 hidden-state distribution drift that made EAGLE3×NVFP4
    #   degenerate (NaN logprobs, parallelism collapse) on this hardware — see the
    #   empirical note in nvidia-qwen3-235b-a22b-nvfp4.yml. Plus the target here is
    #   a multimodal Mistral3 wrapper — EAGLE-against-Mistral3 is itself untested.
    # Flip speculative_enabled to true ONLY after a bench shows a positive accept-
    # rate and no NaN-recovery storm. This is now a TEST, not a prerequisite hunt.
    speculative_enabled: true
    speculative_algo: "EAGLE"
    speculative_draft_model_path: "mistralai/Mistral-Medium-3.5-128B-EAGLE"
    # Draft ships FP8 (params.json quantization.qformat_weight fp8_e4m3) — keep it
    # fp8: the SGLang cookbook (Mistral-Medium-3.5 §3.3) runs this exact draft
    # FP8-quantized and does NOT set this flag (auto-detect → fp8). "unquant" does
    # NOT help here anyway: SGLang normalizes "unquant" → None → auto-detect → the
    # Mistral-native params.json's fp8 wins regardless (verified 2026-06-27).
    # >>> The fp8-draft "out_dtype must be Half or BFloat16" crash is NOT a quant
    # problem — it's a dtype problem, fixed at the ROOT by `dtype: bfloat16` above
    # (--dtype bfloat16 stops the draft's fp32→fp16 fallback). The fc monkeypatch
    # _sgl_eagle_fp8_out_dtype_fix in sglang_launch.sh stays as a belt-and-suspenders
    # safety net (only triggers on a non-half/bf16 fc input).
    speculative_draft_model_quantization: "fp8"
    speculative_num_steps: 2
    speculative_eagle_topk: 1
    speculative_num_draft_tokens: 3
