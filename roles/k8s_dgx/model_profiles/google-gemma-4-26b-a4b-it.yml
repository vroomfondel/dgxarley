# Model profile: google/gemma-4-26B-A4B-it
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
_model_profile:
  "google/gemma-4-26B-A4B-it":
    knowledge_cutoff: "2025-01"  # official HF/Google model card (Gemma 4 corpus); month precision
    release_date: "2026-04-02"  # Gemma 4 family launch; official Google blog + HF cards
    info_url: "https://huggingface.co/google/gemma-4-26B-A4B-it"
    # ALTERNATIVE: https://huggingface.co/bg-digitalservices/Gemma-4-26B-A4B-it-NVFP4
    # 26B total / ~3.8B active MoE (top_k=8 of 128 experts per token),
    # multimodal-capable. The "A4B" suffix denotes ~4B active params — Google's
    # latency-optimized variant (lmarena ~1441 with only 3.8B active compute).
    # Architecture: Gemma4ForConditionalGeneration with enable_moe_block=true.
    # 30 layers, hybrid attention with 5:1 sliding-to-full pattern (sliding_window=1024).
    # num_attention_heads=16, num_key_value_heads=8 (2:1 GQA), head_dim=256.
    # Global layers: Unified K/V (global_head_dim=512, num_global_kv_heads=2)
    # + proportional RoPE (partial_rotary_factor=0.25).
    # MoE: num_experts=128, top_k_experts=8, moe_intermediate_size=704.
    # rope_theta: 10000 (sliding) / 1000000 (full). vocab_size: 262144.
    # Context: 262144 native (256K).
    # BF16 weights ~52 GB total → TP=4 EP=4 → ~13 GB/GPU, huge headroom.
    # Per-token compute is tiny (3.8B active) → expected very high tok/s.
    # SGLang day-one support per Google/LMSYS blog. Still new — Gemma4 MoE
    # path hasn't been stress-tested on SM121, may need tuning.
    # MTP via google/gemma-4-26B-A4B-it-assistant (4-layer drafter, released
    # 2026-05-05) → SGLang FROZEN_KV_MTP path (PR #24436 cherry-pick is in
    # `always_source_patches` of build_sm121_image.sh, so both 0.5.11-sm121
    # and 0.5.11-gemma4-sm121 carry it). No public EAGLE3 draft for Gemma 4.
    nccl_transport: "roce"
    tp_size: 4  # num_kv_heads=8 → 2 per GPU
    context_length: 262144
    quantization: ""  # native BF16
    trust_remote_code: false
    # Winner config: Test 20 of the v0.5.11 MTP sweep (2026-05-15)
    #   triton MoE + triton attn + piecewise CG + FROZEN_KV_MTP (num_steps=3) →
    #   50.08 / 161.38 / 263.16 tok/s (n=1/n=4/n=8) = +55% / +22% / +26% vs
    #   non-MTP baseline (Case 06 re-run: 32.39 / 132.67 / 208.31).
    #   263.16 tok/s at n=8 is the cluster's all-time throughput record.
    # See TESTLOGS/sglang_nn4_tp4_ep1/gemma-4-26b-a4b-it/TESTLOG_nv580.142_sglang-0.5.11_gemma-4-26b-a4b-it_4n.md
    # for the full MTP sweep (num_steps ∈ {2..6}) — n=8 peaks at steps=3,
    # n=1 peaks at steps=2 (56.94 tok/s, +76%). Sweet spot here differs from
    # the 31B-it dense sibling (which peaked at steps=4 for n=8) because the
    # MoE target is less decode-bound (3.8B active, 40 tok/s baseline n=1).
    # If the deployment is single-stream (chat/agent), bump down to
    # num_steps=2 + num_draft_tokens=3 for +14% n=1; the n=8 trade-off is ~−5%.
    #
    # MTP requirements (same as 31B-it):
    # - Image must carry Gemma-4 MTP support. PR #24436 is upstream-native from
    #   v0.5.12 on, so on the 0.5.13 image the build script SKIPS the
    #   sglang-gemma4-mtp-pr24436.patch cherry-pick — MTP works natively.
    # - The old "prefer the lean image over gemma4" reasoning is OBSOLETE on
    #   0.5.13: the gemma4-only NVFP4 patch #22929 (the one that historically
    #   risked dense Gemma-4 weight-load) went upstream-native and was dropped
    #   from the 0.5.13-gemma4 recipe, which now carries only the FP4-only
    #   #22928 (geglu-nan-clamp, inert on BF16). All five Gemma-4 profiles now
    #   share the single 0.5.14-gemmadiffusion-sm121 image (see bottom note).
    # - speculative_algo: NEXTN auto-promoted to FROZEN_KV_MTP at runtime.
    # - enable_spec_v2 auto-disabled by FROZEN_KV_MTP at runtime.
    # - num_draft_tokens MUST equal num_steps + 1 (autoadjust does not fire).
    # - attention_backend: triton (per SGLang-Allowlist DAUERHAFT Pflicht).
    #   REVERTED 2026-07-23: der TESTWEISE-Flip auf flashinfer (2026-06-24, zum
    #   Validieren des fa2 head_dim=512-Fix PR #3576) war moot — SGLangs
    #   _handle_model_specific_adjustments lehnt attention_backend=flashinfer für
    #   Gemma4ForConditionalGeneration VOR dem Weight-Load per Allowlist hart ab
    #   (AssertionError "Gemma4 only supports trtllm_mha, triton, or intel_xpu").
    #   triton handhabt global_head_dim=512 korrekt. Der Revert-Commit f77a355
    #   (2026-06-30) hat nur den Doc-Text zurückgesetzt, die YAML nicht — das wird
    #   hier nachgeholt. See FLASHINFER_HEAD_DIM_512_UPSTREAM_BUG.md +
    #   FLASHINFER_0.6.12_TODO.local.md §7.
    # - Drafter google/gemma-4-26B-A4B-it-assistant: per-pod model-download
    #   initContainer auto-appends speculative_draft_model_path to
    #   HF_PRELOAD_MODELS when speculative_enabled=true (tasks/sglang.yml).
    #   Also pre-staged cluster-wide via the hf_preload Job entry in
    #   defaults/main/hf_cache.yml (saves the per-pod download — optimization only).
    moe_runner_backend: "triton"
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.85"
    attention_backend: "triton"  # SGLang allowlist: flashinfer rejected for Gemma4
    jit_max_jobs: 4
    disable_piecewise_cuda_graph: false
    disable_cuda_graph: false
    cuda_graph_max_bs: 8
    pp_async_batch_depth: 0
    disable_deep_gemm: false
    num_experts: 128
    ep_size: 1
    # Parsers for the Gemma 4 family (built-in thinking mode + tool calling).
    # Required for Hermes tool/function calling behind hermes-default.
    reasoning_parser: "gemma4"
    tool_call_parser: "gemma4"
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 64
    speculative_enabled: true
    speculative_algo: "NEXTN"  # auto-promoted to FROZEN_KV_MTP at runtime
    speculative_draft_model_path: "google/gemma-4-26B-A4B-it-assistant"
    speculative_num_steps: 3
    speculative_num_draft_tokens: 4  # = num_steps + 1
    speculative_eagle_topk: 1
    enable_spec_v2: true  # auto-disabled by FROZEN_KV_MTP at runtime
    # ── Image: xomoxcc/dgx-spark-sglang:0.5.14-gemmadiffusion-sm121 ──────────
    # THE unified Gemma-4 image — all five Gemma profiles share it. Main-ahead
    # pin (commit 3a1417a) carrying the FROZEN_KV_MTP cuda-graph fix (#28081)
    # that v0.5.13 LACKS (BF16 MTP crashed at boot on 0.5.13-gemma4,
    # kv_context=None). Bakes MTP (#24436 native), gemma4-NVFP4 (#22928, inert
    # on BF16) and DiffusionGemma (#28054, gated-off here).
    # Recipe: sglang-0.5.14-gemma4-diffusion-sm121.recipe.
    # (Pre-consolidation this profile used 0.5.13-gemma4-sm121, then 0.5.11-sm121.)
    # Testweise auf 0.5.14-gemmadiffusion-sm121 (flashinfer 0.6.13rc2). NB: der
    # flashinfer-Nutzen ist hier begrenzt — attention bleibt zwangsweise triton
    # (Gemma4-Allowlist, s. §7-Note 2026-06-21) und BF16≠NVFP4, also greifen die
    # §3-NVFP4-Kernel-Gewinne nicht. Validierungs-fokus ist der MTP-Boot-Pfad
    # (0.5.11→0.5.14, #28081 FROZEN_KV_MTP-Fix). Zurück: 0.5.11-sm121.
    # sglang_image: "xomoxcc/dgx-spark-sglang:0.5.13-gemma4-sm121"  # v0.5.13: FROZEN_KV_MTP boot crash
    # sglang_image: "xomoxcc/dgx-spark-sglang:0.5.11-sm121"          # pre-0.5.13 lean (validated MTP baseline, flashinfer 0.6.11)
    sglang_image: "xomoxcc/dgx-spark-sglang:0.5.14-gemmadiffusion-sm121"  # flashinfer 0.6.13rc2 (testweise)



