# Model profile: Qwen/Qwen3.6-27B-FP8
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
_model_profile:
  "Qwen/Qwen3.6-27B-FP8":
    knowledge_cutoff: null  # no published cutoff found (HF card/tech report/aggregators checked 2026-06)
    info_url: "https://huggingface.co/Qwen/Qwen3.6-27B-FP8"
    # 27B dense (hybrid Gated DeltaNet + Gated Attention), fine-grained FP8 (block 128).
    # Native context 262K, extensible to ~1M via YaRN.
    context_length: 262144
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.80"
    attention_backend: "flashinfer"
    disable_deep_gemm: true
    fp8_gemm_runner_backend: "cutlass"
    reasoning_parser: "qwen3"
    tool_call_parser: "qwen3_coder"
    # supports thinking (default) and non-thinking modes; control via
    # chat_template_kwargs={"enable_thinking": False} per-request.
    #   thinking:        temperature=1.0  top_p=0.95  top_k=20  presence_penalty=0.0
    #   thinking_coding: temperature=0.6  top_p=0.95  top_k=20  presence_penalty=0.0
    #   non_thinking:    temperature=0.7  top_p=0.80  top_k=20  presence_penalty=1.5
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      presence_penalty: 0.0
    # Aggressive anti-repetition overrides were tested in the 2026-04-29 debug
    # run and made things worse (forced word-salad on a correctness-broken
    # model). Root cause was the FP8 weight-scale bug (`is_layer_skipped`
    # substring match — SGLANG_QWEN36_27B_FP8_UPSTREAM_BUG.md). PR #23467 is
    # merged upstream and shipped in SGLang v0.5.11; sglang_launch.sh applies
    # the same fix as a runtime monkey-patch on v0.5.10 (guard short-circuits
    # on v0.5.11). With the fix in place, the card defaults are sufficient.
    sampling_overrides: {}
    ep_size: 1
    tp_size: 4
    # MTP / speculative decoding (NEXTN) — Qwen3.6 is MTP-trained.
    # Two extra knobs (mamba_scheduler_strategy=extra_buffer + enable_spec_v2=true)
    # are required on both SGLang 0.5.10 and 0.5.11 to avoid a spec-v2-vs-radix-cache
    # crash on this hybrid Gated-DeltaNet arch.
    speculative_enabled: true
    speculative_algo: NEXTN
    speculative_num_steps: 3
    speculative_eagle_topk: 1
    speculative_num_draft_tokens: 4
    mamba_scheduler_strategy: extra_buffer
    enable_spec_v2: true
    # operational defaults — Case 10 winner config from the 18-case 0.5.11 sweep
    # on 4× DGX Spark TP=4 EP=1 (TESTLOG ..._sglang-0.5.11_qwen-3.6-27b-fp8_4n.md):
    # fi-attn + CG on + piecewise off + MTP NEXTN s=3/drafts=4/topk=1 →
    # 45.68 / 154.05 / 267.68 tok/s @ n=1/4/8.
    # +11.8 % vs the 0.5.10 best (Case 8 = 239.4 @ n=8).
    # Sweep findings:
    #   - num_steps=3 sweet spot; s=2/s=4 ≈5 % behind, s=5 collapses −10 %.
    #   - drafts=4 (default) best; larger pools cost more than they save.
    #   - topk=1 (pure NEXTN) best; topk=2 / topk=4 monotonically worse @ n=8.
    #   - piecewise on/off within run-to-run noise under MTP.
    # FP8 weight-scale fix (PR #23467) is upstream in v0.5.11; on v0.5.10 the
    # same fix is applied as a runtime monkey-patch in sglang_launch.sh.
    nccl_transport: roce
    disable_cuda_graph: false
    disable_piecewise_cuda_graph: true
    pp_async_batch_depth: 0
    cuda_graph_max_bs: 8
