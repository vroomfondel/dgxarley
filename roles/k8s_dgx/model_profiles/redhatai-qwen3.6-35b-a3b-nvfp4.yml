---
# Model profile: RedHatAI/Qwen3.6-35B-A3B-NVFP4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# RedHatAI re-packaged NVFP4 quantization of Qwen/Qwen3.6-35B-A3B
# (FP8 sibling: see qwen-qwen3.6-35b-a3b-fp8.yml). Selected over the
# unsloth/mmangkad/sakamakismile NVFP4 variants — RedHatAI has by far
# the most HF downloads (2.24M as of 2026-05-22).
#
# Winner config from the 0.5.12 matrix sweep (Test 45):
#   n=8 peak 438.07 tok/s (4n TP=4 EP=1) — best ever measured on this cluster,
#   +7.6 % over the best no-MTP NVFP4 result (Test 01: 407.25), +2.6 % over the
#   FP8 0.5.12 winner Test 21 (peak 426.76). First config where NVFP4 actually
#   beats FP8 on throughput on this hardware.
# See TESTLOGS/sglang_nn4_tp4_ep1/qwen-3.6-35b-a3b-nvfp4/TESTLOG_nv580.159_sglang-0.5.12_qwen-3.6-35b-a3b-nvfp4_4n.md
# for the full matrix and per-block findings.
_model_profile:
  "RedHatAI/Qwen3.6-35B-A3B-NVFP4":
    info_url: "https://huggingface.co/RedHatAI/Qwen3.6-35B-A3B-NVFP4"
    # 35B/3B MoE (Gated DeltaNet hybrid), NVFP4 quantization (~10–12 GB on-device
    # weights, vs. ~35 GB for the FP8 sibling). 256 experts, 8 routed + 1 shared
    # activated per token. Native 262K context (extensible to ~1M via YaRN).
    # MTP-trained — NEXTN speculative decoding active.
    # Hybrid-mamba arch: SGLang classifies this under its mamba scheduler path.
    context_length: 262144
    # RedHatAI uses compressed-tensors with format=nvfp4-pack-quantized
    # (verified via HF config.json: quantization_config.quant_method).
    # SGLang's `modelopt_fp4` would error out with:
    #   ValueError: Quantization method specified in the model config
    #   (compressed-tensors) does not match the quantization method
    #   specified in the `quantization` argument (modelopt_fp4).
    # nvidia/Qwen3.5-397B-A17B-NVFP4 (modelopt_fp4) is a different
    # packaging — do not copy that knob to RedHat repackages.
    quantization: "compressed-tensors"
    trust_remote_code: true
    kv_cache_dtype: "fp8_e4m3"
    # 0.75 with MTP: draft tokens need extra KV-cache headroom.
    # NVFP4 weights are ~3× smaller than FP8 so there is plenty of slack;
    # 0.75 is the safe first-contact setting matching the 397B-NVFP4 profile.
    mem_fraction_static: "0.6"
    # Winner shape: triton MoE + fi-attn + fi_cutlass-fp4 + piecewise CG.
    # The 0.5.12 matrix swept moe_runner × attention × fp4_gemm × CG variant:
    #   - fp4_gemm_backend: flashinfer_cudnn broke 12/12 (no cuDNN in image at the time)
    #   - moe_runner_backend: flashinfer_cutlass + flashinfer_cutedsl broke 18/18 on
    #     the SGLang server_args._handle_moe_kernel_config whitelist
    #     ('compressed-tensors' rejected; only modelopt_* / bf16 accepted).
    #   - moe_runner_backend: cutlass (direct) WORKED on this model — including
    #     eager mode — but did not beat triton MoE at n=8.
    # See matrixtest_matrices/sglang_nn4_tp4_ep1/qwen-3.6-35b-a3b-nvfp4/.
    nccl_transport: roce
    moe_runner_backend: triton
    attention_backend: flashinfer
    fp4_gemm_backend: flashinfer_cutlass
    disable_deep_gemm: true
    disable_cuda_graph: false
    disable_piecewise_cuda_graph: false
    pp_async_batch_depth: 0
    cuda_graph_max_bs: 32
    jit_max_jobs: 4
    ep_size: 1
    tp_size: 4
    num_experts: 256
    enable_eplb: false
    enable_expert_distribution_metrics: false
    reasoning_parser: "qwen3"
    tool_call_parser: "qwen3_coder"
    # supports thinking (default) and non-thinking modes; control via
    # chat_template_kwargs={"enable_thinking": False} per-request.
    #   thinking:        temperature=1.0  top_p=0.95  top_k=20  presence_penalty=1.5
    #   thinking_coding: temperature=0.6  top_p=0.95  top_k=20  presence_penalty=0.0
    #   non_thinking:    temperature=0.7  top_p=0.80  top_k=20  presence_penalty=1.5
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      presence_penalty: 1.5
    # MTP / speculative decoding (NEXTN) — required for the n=8 peak.
    # Two extra knobs (mamba_scheduler_strategy=extra_buffer + enable_spec_v2=true)
    # required to avoid the spec-v2-vs-radix-cache crash on this hybrid-mamba
    # MoE arch (same as FP8 sibling).
    #
    # speculative_num_steps=2 is the validated NVFP4 sweet spot from matrix Tests 45–48
    # (n=8 peak: s=2 → 438.07, s=3 → 387.42, s=4 → 366.38, s=5 → 350.36; monotonic
    # decay with depth, same shape as the FP8 sweep where s=2 also won).
    speculative_enabled: true
    speculative_algo: NEXTN
    speculative_num_steps: 2
    speculative_eagle_topk: 1
    speculative_num_draft_tokens: 3
    mamba_scheduler_strategy: extra_buffer
    enable_spec_v2: true
