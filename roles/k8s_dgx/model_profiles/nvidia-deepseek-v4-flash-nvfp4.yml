---
# Model profile: nvidia/DeepSeek-V4-Flash-NVFP4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
#
# STATUS 2026-07-06: the former upstream blocker has CLEARED (see STATUS section
# below). Non-spec decode RUNS on this cluster on the pinned 0.5.14-sm121 image.
# EAGLE-MTP is enabled first-contact and depends on image patches that the
# 0.5.14 recipe DISABLED — re-verify MTP/tilelang on the current image before
# trusting them (details in the STATUS + build-path notes). Background:
# UPSTREAM_DSV4_BUGS.md (§3/§5/§8), DEEPSEEK_V4_FLASH_NVFP4_SGLANG_GB10.md.
#
# WHAT THIS CHECKPOINT IS (verified against HF 2026-06-12; repo created
# 2026-05-18, last modified 2026-06-10 in the PR #25820 quant-config fix cycle):
#   NVIDIA's official ModelOpt repackage of deepseek-ai/DeepSeek-V4-Flash.
#   hf_quant_config.json: producer modelopt, version dsv4-nvfp4-experts,
#   quant_algo MIXED_PRECISION — NVFP4 (group 16) ONLY on layers.*.ffn.experts;
#   exclude_modules = *.attn.*, *.ffn.shared_experts.*, head, mtp.* .
#   config.json additionally embeds quantization_config quant_method="fp8"
#   (weight_block_size [128,128], scale_fmt ue8m0) for the non-expert base —
#   i.e. block-FP8 base + NVFP4 routed experts. config.json expert_dtype="fp4".
#   (A cast_mxfp4_to_nvfp4.log in the repo shows the experts were cast from an
#   MXFP4 master.) 168.3 GB safetensors total (46 shards) → ~42 GB/GPU at TP=4,
#   vs ~73.5 GB/GPU for sgl-project/DeepSeek-V4-Flash-FP8. That makes this the
#   lightest OFFICIAL V4-Flash variant: big KV headroom for long context, and
#   the FP8 profile's host-RAM/swap load story should not bite (the ~2× MoE
#   fusion spike starts from a much smaller resident set).
#   This is NOT compressed-tensors → the wqkv_a/fused_wqa_wkv matcher gap that
#   kills the RedHatAI/kylesayrs/canada-quant repos (UPSTREAM_DSV4_BUGS.md §2)
#   does NOT apply here.
#
# ── STATUS: former blocker CLEARED (was: SGLang NVFP4-MoE for V4 not merged) ───
#   PR sgl-project/sglang#25820 "[NVIDIA] Support NVFP4 MoE for DeepSeek-V4"
#   MERGED 2026-06-22 (commit c0bb04b) and ships NATIVELY in SGLang v0.5.14
#   (released 2026-06-26; the merge commit is an ancestor of the v0.5.14 tag).
#   Prereqs also merged: FP4 indexer (#26209, 2026-06-02) and SM120 inference
#   (#24692, 2026-06-01), both in v0.5.13. The cluster default image is
#   xomoxcc/dgx-spark-sglang:0.5.14-sm121 (bumped 2026-06-29), built from the
#   v0.5.14 tag with the NATIVE NVFP4-MoE dispatch; the old cherry-pick is
#   retired (APPLY_DSV4_NVFP4_PR25820=0 in sglang-0.5.14-sm121.recipe).
#   Non-spec boot VALIDATED 2026-06-20 (head Ready, coherent output) — the
#   known-good baseline; the profile pins that image below and is ready to
#   serve, NOT a preload-only staging target.
#   ⚠ MTP caveat, CONFIRMED via in-image source read 2026-07-06 (debug pod on
#   the running xomoxcc/dgx-spark-sglang:0.5.14-sm121 image, no GPU needed):
#   the marlin draft-MoE branch and the tilelang-0.1.8 indexer compat both used
#   to ride ON the now-disabled #25820 cherry-pick, so BOTH are confirmed
#   ABSENT from the currently-deployed 0.5.14-sm121 image — MTP as configured
#   below WILL crash on it (HybridFp8NvFp4Config still hardcodes the SM100-only
#   Mxfp4FlashinferTrtllmMoEMethod for the draft MoE; dsa/tilelang_kernel.py
#   still has the 1D alloc_shared TileLang-0.1.8 incompatibility).
#   FIX PREPARED, NOT YET BUILT: scripts/patches/sglang-dsv4-mtp-marlin-v0.5.14
#   .patch (new, minimal marlin-branch insertion against the native class) +
#   the existing sglang-tilelang-018-indexer-compat.patch (applies unchanged)
#   are wired into scripts/build_sm121_image.sh + sglang-0.5.14-sm121.recipe
#   via APPLY_DSV4_MTP_MARLIN_TILELANG=1. Until that image is actually rebuilt
#   + pushed + redeployed, keep speculative_enabled: false here (native
#   non-spec is unaffected and is the validated baseline) — flip to true only
#   after the rebuilt image is running.
#
# Architecture (DeepseekV4ForCausalLM, model_type=deepseek_v4) — identical to
# the other Flash checkpoints: 43 layers, hidden=4096, MQA (num_attention_heads
# =64, num_key_value_heads=1, head_dim=512; DSA index/sparse attention,
# index_topk=512), 256 routed experts + 1 shared, 6 active/token,
# moe_intermediate_size=2048, q_lora_rank=1024, o_lora_rank=1024, 3 hash_moe
# layers, 1 MTP head, vocab=129280. max_position_embeddings=1M via yarn
# (factor 16 over 65536). topk_method=noaux_tc, scoring_func=sqrtsoftplus.
#
# kv_lora_rank NOTE: unlike sgl-project's FP8 checkpoint (kv_lora_rank: null →
# strict-dataclass crash, UPSTREAM_DSV4_BUGS.md §1), this config.json OMITS the
# key entirely → transformers' DeepseekV3Config default (512) applies and the
# §1 crash should not fire. The sglang_launch.sh int|None widening patch stays
# harmless either way (no-op for absent/int values).
#
# SM121 walls: same arch as the validated FP8 deployment, so walls 4/5/7 of
# UPSTREAM_DSV4_BUGS.md §6 (DeepGEMM MHC-prenorm, paged_mqa_logits, TVM topk_v2)
# are pre-emptively flipped to their fallbacks below. On a v0.5.13+ image walls
# 0 and 6 are solved natively (§8) — the FlashMLA .pth hook and the seq_lens
# squeeze patch become redundant but stay harmless.
_model_profile:
  "nvidia/DeepSeek-V4-Flash-NVFP4":
    knowledge_cutoff: "2025-05"  # DeepSeek-V4-Flash base; not in official card. Aggregators (opencode.ai, typingmind) + self-report (deepseek-ai/DeepSeek-V3#1389). Medium confidence.
    release_date: "2026-04-22"  # DeepSeek-V4-Flash base; HF API createdAt (official API announcement 2026-04-24)
    info_url: "https://huggingface.co/nvidia/DeepSeek-V4-Flash-NVFP4"
    nccl_transport: "roce"
    tp_size: 4
    ep_size: 4
    # 131072 conservative first-contact (model supports 1M via yarn). NVFP4
    # experts free ~31 GB/GPU vs the FP8 checkpoint, so KV headroom is large —
    # raise to 262144 / 524288 / 1048576 once the n=1 baseline confirms KV fits
    # at the chosen mem_fraction_static.
    context_length: 262144
    # quantization: UNSET — auto-detect, like zai-org/GLM-4.7-FP8 and the
    # sgl-project FP8 profile. config.json quantization_config.quant_method is
    # "fp8" (the NVFP4 experts ride on moe_quant_algo/quantized_layers inside
    # it — exactly the mixed layout PR #25820 implements). Do NOT set
    # modelopt_fp4 (this is not a pure-ModelOpt-FP4 checkpoint like the
    # Nemotrons) and do NOT set compressed-tensors. Re-verify the detect path
    # once #25820 is merged — first thing to check in the boot log.
    trust_remote_code: true
    kv_cache_dtype: "fp8_e4m3"
    # Standard mmap loader first-contact. The FP8 checkpoint's host-RAM SIGKILL
    # at end-of-load (fusion spike on 121 GiB unified memory) is unlikely at
    # ~42 GB/GPU resident, but keep the page-cache drop as cheap insurance.
    load_format: "auto"
    weight_loader_disable_mmap: false
    weight_loader_drop_cache_after_load: true
    # mem_fraction_static = post-weight KV reserve (higher = more KV; see the
    # FP8 profile's wall-3 note). FP8 needed 0.90 because weights ate 73.5 of
    # 121 GiB; here weights are ~42 GB/GPU so 0.85 already yields a huge pool
    # (MQA num_key_value_heads=1 → tiny per-token KV anyway) while keeping a
    # real reserve for CUDA-graph capture — which, unlike the FP8 profile, is
    # ON here (see disable_cuda_graph below). Back off toward 0.80 if capture
    # OOMs; raise once the boot log shows the actual KV/free split.
    mem_fraction_static: "0.80"
    # Kernel choices — UNVALIDATED until #25820 lands; derived from (a) the
    # validated FP8-Flash deployment (identical arch/base quant) and (b) our
    # NVFP4 experience on other models:
    #  - flashinfer_cutlass MoE: the proven NVFP4-MoE path on this cluster
    #    (qwen3-235b, glm-4.7, minimax-m2.7, nemotron-3). flashinfer_trtllm is
    #    OFF THE TABLE — it asserts on exactly this model on B200 (#26324).
    #    Whether #25820 even honours the runner flag on the mixed fp8+nvfp4
    #    path is unknown (on the Nemotron modelopt path the triton flag was
    #    silently ignored) — read the boot log, don't trust the flag.
    #  - flashinfer attention: MLA/MQA-compatible (V4 DSA path), same as FP8.
    #  - fp8_gemm cutlass: for the block-FP8 base; SM121 auto-selects
    #    flashinfer→trtllm which is unsupported here.
    #  - fp4_gemm flashinfer_cutlass: same as every NVFP4 winner on SM121
    #    (fi_cudnn needs the cudnn wheel absent from our base images).
    moe_runner_backend: "flashinfer_cutlass"
    attention_backend: "flashinfer"
    fp8_gemm_runner_backend: "cutlass"
    fp4_gemm_backend: "flashinfer_cutlass"
    # wo_a (o-LoRA proj) is in the attn exclude set → quantization state in the
    # shards unverified (FP8 base or bf16). The sgl-project checkpoint shipped
    # it bf16 → opt-on crashed with "Downcasting not allowed" (§6 wall 2).
    # false = always-safe dequant-to-bf16; try true once the model loads clean.
    opt_fp8_wo_a_gemm: false
    # DeepGEMM has no sm_121 variant for two V4 kernels (DeepGEMM #317, SGLang
    # #23657) → route both to fallbacks, same as the FP8 profile (§6 walls 4/5).
    # Still required on v0.5.13 (§8: the gates check sm_version==120, not 121):
    #  - hc_prenorm (MHC) → TileLang (crashes at kernel_warmup otherwise)
    #  - paged_mqa_logits (DSA Lightning-Indexer) → torch (crashes at decode)
    opt_deepgemm_hc_prenorm: false
    # ═══ DSA INDEXER — the GB10 decode bottleneck; TileLang path lifts it ═══
    # fp8_paged_mqa_logits (DSA Lightning-Indexer hot kernel) runs EVERY decode step
    # across the 20 DSA layers (index_topk=512, 64 index heads). DeepGEMM has NO sm121
    # kernel (hard-blocked: _C.so arch allowlist + SM100 tensor-core ops absent on GB10;
    # DeepGEMM #317/#236 open, no fork). The pure-torch fallback ran per-step OUTSIDE
    # the cuda graph → capped aggregate decode at ~18 tok/s (4 or 12 req both ~18; per-
    # req drops with concurrency). MTP-on-torch baseline: n=1 ~13.5 tok/s (accept ~1.8),
    # 12-concurrent ~18 aggregate.
    # FIX (kernel validated 2026-06-20, live GPU test): SGLang's TileLang indexer
    # (opt_use_tilelang_indexer) runs on GB10 once the tilelang-0.1.8 compat patch is
    # baked in (scripts/patches/sglang-tilelang-018-indexer-compat.patch) — bit-correct
    # vs torch, CUDA-graph-capturable, 8-16x faster PER INDEXER STEP. End-to-end tok/s
    # lift pending the rebuild+redeploy measurement. Dispatch (indexer.py) checks the
    # TileLang branch BEFORE the torch branch, so fp8_paged_mqa_logits_torch stays true
    # as a SAFE ROLLBACK: flip opt_use_tilelang_indexer false → torch floor, never the
    # native-DeepGEMM crash (else) branch. Full background: reference memory.
    opt_use_tilelang_indexer: true  # NEEDS the tilelang-0.1.8 indexer patch in the image
    fp8_paged_mqa_logits_torch: true  # safe fallback (only reached if tilelang flag off)
    # C4-indexer top-k transform: the OLD TVM topk_transform_512_v2 died on sm_121
    # (topk_v2.cuh:472), which is why this was a torch fallback. RE-VALIDATED on
    # GB10 2026-06-20 (live GPU test, image 0.5.13-sm121): the current JIT
    # topk_v1.cuh kernel runs cleanly on sm121 and is BIT-IDENTICAL to the torch
    # path → fallback dropped to recover decode perf. (Note: fp8_paged_mqa_logits
    # above CANNOT be dropped — DeepGEMM hard-blocks sm121: _C.so allowlist is
    # SM100/SM120 only, and the JIT metadata path needs 128 KB SMEM > GB10's 100 KB.)
    topk_transform_512_torch: false
    disable_deep_gemm: true
    # CUDA graphs ON — deliberate flip vs the FP8 sibling (which runs eager):
    # eager mode is broken on any cutlass_moe_fp4 path on SM121 (kernel-crash
    # matrix in TURBOQUANT.md), and the NVFP4 MoE here is expected to dispatch
    # through exactly that family. Piecewise capture stays off (DSV4 piecewise
    # is a known upstream trouble spot, #25526, and full-CG is our validated
    # mode on every NVFP4 model).
    disable_cuda_graph: false
    disable_piecewise_cuda_graph: true
    cuda_graph_max_bs: 32
    jit_max_jobs: 1
    pp_async_batch_depth: 0
    num_experts: 256
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # DeepSeek V4 is NOT a hybrid-mamba arch (standard MoE + MLA/MQA) — leave
    # mamba_scheduler_strategy empty, enable_spec_v2 default (false).
    # SGLang parser registry (v0.5.12): reasoning "deepseek-v4" →
    # _DeepSeekV3Detector, tool-call "deepseekv4" → DeepSeekV4Detector.
    reasoning_parser: "deepseek-v4"
    tool_call_parser: "deepseekv4"
    # This repo's generation_config.json: temperature=1.0, top_p=1.0
    # (do_sample=true, no top_k) — same as sgl-project's FP8 checkpoint, NOT
    # the generic DeepSeek 0.6/0.95.
    recommended_sampling:
      temperature: 1.0
      top_p: 1.0
    # MTP speculative decoding via the single num_nextn_predict_layers head
    # (mtp.* is excluded from quantization → draft head stays high-precision).
    # Per the SGLang cookbook V4-Flash MTP runs under the EAGLE framework with
    # env SGLANG_ENABLE_SPEC_V2=1; balanced preset = steps 1 / draft-tokens 2.
    # 2026-06-20: NON-spec boot VALIDATED on this cluster (head Ready, coherent
    # output) once the #25820 patch IndentationError was fixed + image rebuilt.
    # EAGLE-MTP was validated 2026-06-20 against the THEN-current 0.5.13-sm121
    # image (digest a29aea1, built with APPLY_DSV4_NVFP4_PR25820=1 — the
    # cherry-pick that bundled the marlin draft-MoE branch + tilelang-018
    # compat). NOTE #25704: V4-Pro NVFP4 on B200 produced NaN/garbage in
    # NON-spec decode and only EAGLE worked — here non-spec is fine, so MTP is
    # a throughput play, not a correctness fix.
    # ⚠ 2026-06-29 the cluster moved to 0.5.14-sm121 (native NVFP4-MoE,
    # APPLY_DSV4_NVFP4_PR25820=0) — which silently DROPPED the marlin branch +
    # tilelang compat along with the retired cherry-pick. CONFIRMED via
    # in-image source read 2026-07-06: both are absent from the running
    # 0.5.14-sm121 image, so speculative_enabled: true WILL crash on it today.
    # DISABLED here until scripts/patches/sglang-dsv4-mtp-marlin-v0.5.14.patch +
    # sglang-tilelang-018-indexer-compat.patch (wired via
    # APPLY_DSV4_MTP_MARLIN_TILELANG=1 in sglang-0.5.14-sm121.recipe) are built
    # into a fresh image and that image is deployed — flip back to true only
    # after that. Non-spec (below false) is the current known-good baseline.
    # spec_v2 is AUTO-MANAGED for DSV4 — do NOT set enable_spec_v2 by hand (verified
    # in-image 2026-06-20): environ.py defaults SGLANG_ENABLE_SPEC_V2=True, AND
    # deepseek_v4_hook.py force-enables it whenever a speculative_algorithm is set.
    # So the ONLY knob to turn MTP on is speculative_enabled; spec_v2 follows.
    # ⚠️ The same hook asserts speculative_algorithm == "EAGLE" (NEXTN is REJECTED)
    # with speculative_eagle_topk == 1 → must be EAGLE for DSV4. With no external
    # draft path, launch.sh self-drafts (--speculative-draft-model-path = the model),
    # i.e. EAGLE drives the model's own num_nextn_predict_layers MTP head.
    speculative_enabled: false  # SAFETY: disabled 2026-07-06 — confirmed crash on the current 0.5.14-sm121 image (marlin branch + tilelang compat dropped); re-enable once the image is rebuilt with APPLY_DSV4_MTP_MARLIN_TILELANG=1
    speculative_algo: EAGLE  # was NEXTN — deepseek_v4_hook asserts EAGLE-only for DSV4
    speculative_num_steps: 1
    speculative_eagle_topk: 1
    speculative_num_draft_tokens: 2
    # SM121 MTP fix: force the nextn DRAFT MoE onto marlin (SM80+) — the default
    # nextn path hardcodes an sm100 trtllm kernel (Mxfp4FlashinferTrtllmMoEMethod)
    # that crashes on GB10. Needs the modelopt_quant marlin-branch added to
    # sglang-dsv4-nvfp4-pr25820.patch + an image rebuild. Inert while
    # speculative_enabled: false.
    speculative_moe_runner_backend: marlin
    # Image build: scripts/patches/sglang-0.5.14-sm121.recipe = SGLang v0.5.14
    # (SGLANG_REF=v0.5.14) with the NATIVE #25820 NVFP4-MoE path + #26209 FP4
    # indexer + #24692 SM120 (all merged upstream) + the SM121 sgl-kernel patch
    # stack. The #25820 cherry-pick is RETIRED (APPLY_DSV4_NVFP4_PR25820=0) — and
    # with it the marlin draft-MoE branch + tilelang-0.1.8 indexer-compat patch
    # are NO LONGER applied (both lived in that cherry-pick). So non-spec serving
    # is native, but EAGLE-MTP (marlin) and opt_use_tilelang_indexer need those
    # pieces re-added to the recipe (or an upstream equivalent) to work on
    # 0.5.14 — verify on the running image. Build via scripts/build_sm121_image.sh.
    # Any image whose SGLang predates v0.5.14 (e.g. 0.5.12.post1-sm121) canNOT
    # serve this model — the NVFP4-MoE dispatch fails without the rebased patch.
    sglang_image: "xomoxcc/dgx-spark-sglang:0.5.14-sm121"
