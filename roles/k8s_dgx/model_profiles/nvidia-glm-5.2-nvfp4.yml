# Model profile: nvidia/GLM-5.2-NVFP4
# Loaded by include_vars in k8s_dgx role, merged into sglang_model_profiles.
_model_profile:
  "nvidia/GLM-5.2-NVFP4":
    knowledge_cutoff: "2025-12"  # GLM-5.2 base; not in official card. Inherited estimate from GLM-5 family (apxml lists Dec 2025). Low confidence.
    release_date: "2026-06-16"  # GLM-5.2 base; Z.ai flagship release (zai-org/GLM-5.2 HF card ~2026-06-16). NVIDIA NVFP4 quant repo per card: HF 2026-06-25.
    info_url: "https://huggingface.co/nvidia/GLM-5.2-NVFP4"
    # 753B-total / 40B-active MoE (256 experts, top-8, sigmoid routing), NVFP4 quantized.
    # Same GLM-5-family architecture as nvidia/GLM-5-NVFP4 — base is GLM-5.2
    # (Z.ai's latest long-horizon flagship, truly usable 1M-token context),
    # quantized to NVFP4 by NVIDIA (official nvidia/GLM-5.2-NVFP4 repo, base_model
    # zai-org/GLM-5.2, license MIT, not gated; 47 safetensor shards).
    # Architecture: GlmMoeDsa — MLA (Multi-head Latent Attention) with DSA
    # (DeepSeek Sparse Attention; card calls the sparse-attn module an "IndexShare
    # indexer"). Geometry VERIFIED against the repo's config.json:
    # num_hidden_layers=78, first_k_dense_replace=3 (dense layers 0-2), rest MoE,
    # n_shared_experts=1 + n_routed_experts=256 (num_experts_per_tok=8) per MoE
    # layer. num_nextn_predict_layers=1 → MTP head for speculative decoding (NEXTN).
    # num_attention_heads=64, num_key_value_heads=64 (full MHA via MLA), head_dim=192.
    # TP must divide 64 → valid TP ∈ {1,2,4,8,…}; TP=6 is INVALID (64 ∤ 6).
    # 78 layers divide cleanly by PP=6 (13/node) and PP=3 (26/stage).
    # NVFP4 quantization VERIFIED against hf_quant_config.json (ModelOpt 0.46.0):
    #   quant_algo=NVFP4, group_size=16 (blockwise FP8 scales per 16 elements),
    #   kv_cache_quant_algo=FP8 (KV FP8 baked into the checkpoint).
    # Only the ROUTED expert MLPs are FP4. exclude_modules keep in BF16:
    #   lm_head, embed_tokens, the 3 dense layers (0-2), and per MoE layer BOTH the
    #   shared_experts AND the full self_attn block (q/k/v/o + DSA indexer).
    #   The MTP/NEXTN layer likewise stays BF16.
    # Post-training quantization (card): "Only the weights and activations of the
    # linear operators within transformer blocks in MoE experts are quantized. The
    # shared expert is not quantized." Accuracy holds vs FP8 baseline (GLM-5.2-FP8):
    # GPQA-Diamond 89.4 vs 89.5, SciCode 49.0 vs 49.9, IFBench 75.8 vs 75.0,
    # AA-LCR 70.1 vs 69.4, τ²-Bench-Telecom 98.3 vs 97.9 (temp 1.0, top_p 0.95).
    # EP=4/TP=4 OOM at weight init (~108 GB/GPU, exceeds 121 GB usable) — same
    # as GLM-5. Use PP=4/TP=1 instead: each GPU gets ~20 layers with all experts.
    # Recommended launch (NVIDIA model card #sglang, for 8-GPU B200/B300):
    #   pip install -U "transformers>=5.3.0" && \
    #   python3 -m sglang.launch_server --model nvidia/GLM-5.2-NVFP4 --tensor-parallel-size 8 \
    #     --quantization modelopt_fp4 --tool-call-parser glm47 --reasoning-parser glm45 \
    #     --trust-remote-code --chunked-prefill-size 16384 --mem-fraction-static 0.80
    # IMPORTANT (card): glm_moe_dsa needs transformers>=5.3.0 — install it in the
    # SGLang container before launch, or use the card's image lmsysorg/sglang:dev-glm52-nvfp4.
    # Card uses --chunked-prefill-size 16384 (NOT the 131072 of the GLM-5 card) and
    # mem-fraction 0.80 for TP=8 B300 (we use PP=4/TP=1 + mem-fraction 0.20 here).
    # Card does NOT specify --moe-runner-backend or --attention-backend.
    nccl_transport: "roce"
    tp_size: 1  # PP=nnodes, TP=1 — each GPU gets ~20 layers with all 256 experts
    context_length: 16384  # conservative; config.json max_position_embeddings=1048576 (1M), but KV headroom on 4 nodes is the real constraint
    quantization: "modelopt_fp4"
    # trust_remote_code: required because the GLM-5 family ships custom model code
    # (GlmMoeDsaForCausalLM, custom tokenizer) in the HF repo that SGLang must
    # execute. Without it, transformers refuses to load the model class. Safe here
    # because the code comes from NVIDIA's official nvidia/GLM-5.2-NVFP4 repo.
    trust_remote_code: true
    # Untested on DGX Spark — values below are initial defaults inherited from
    # nvidia/GLM-5-NVFP4, pending a test matrix for this checkpoint.
    moe_runner_backend: "flashinfer_cutlass"
    kv_cache_dtype: "fp8_e4m3"  # matches the checkpoint's native kv_cache_quant_algo=FP8
    mem_fraction_static: "0.20"  # PP=4 should leave enough room (~20 layers/GPU)
    attention_backend: "flashinfer"
    fp4_gemm_backend: "flashinfer_cutlass"
    jit_max_jobs: 4
    disable_piecewise_cuda_graph: true
    disable_cuda_graph: false
    cuda_graph_max_bs: 8
    pp_async_batch_depth: 0
    # DeepGemm is designed for FP8 with ue8m0 scale format. For NVFP4 models
    # (scale_fmt != ue8m0): (1) the JIT-compiled kernels aren't optimized for
    # this format and may degrade accuracy, (2) JIT compilation blocks the
    # scheduler forward loop synchronously, triggering the 300s watchdog kill,
    # (3) parallel nvcc/cicc processes exhaust system RAM. With DeepGemm
    # disabled, FP4 GEMM selection falls to fp4_gemm_backend.
    disable_deep_gemm: true
    # GLM-5 family reasoning/tool parsers (from model card):
    # "glm45" — GLM-4.5 detector, separates <think>...</think> into reasoning_content.
    # "glm47" — GLM-4.7 tool call format.
    reasoning_parser: "glm45"
    tool_call_parser: "glm47"
    num_experts: 256
    # ep_size: with TP=1/PP=4, EP must be 1 (EP requires ep_size <= tp_size).
    ep_size: 1
    # Verified against the repo's generation_config.json (do_sample=true).
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
    # MTP / speculative decoding (NEXTN): this checkpoint has a trained MTP head
    # (num_nextn_predict_layers=1, MTP layer stays BF16). NEXTN uses the model's own
    # head — no external draft model. Same GLM family as nvidia/GLM-4.7-NVFP4, where
    # MTP is VALIDATED (+68% n=1, +35% n=4/n=8); values mirror that profile.
    # UNVALIDATED on GLM-5.2 — flip speculative_enabled:false if the head misbehaves.
    speculative_enabled: true
    speculative_algo: NEXTN
    speculative_num_steps: 3
    speculative_num_draft_tokens: 4
