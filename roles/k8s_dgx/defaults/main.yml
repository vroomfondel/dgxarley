# ============================================================================
# LiteLLM — OpenAI-compatible proxy aggregating multiple LLM backends.
# Routes requests to SGLang, vLLM, and Ollama via unified API.
# ============================================================================

# Merged sampling defaults for the active SGLang model: recommended + overrides.
# Injected into litellm_model_list via combine() so LiteLLM sends them as
# per-request defaults (client params override these).
_sglang_sampling_defaults: >-
  {{ sglang_model_profiles[sglang_model].recommended_sampling | default({})
     | combine(sglang_model_profiles[sglang_model].sampling_overrides | default({})) }}

# extra_body defaults for the active SGLang model: chat_template_kwargs (reasoning
# toggles like enable_thinking, low_effort). Passed as LiteLLM extra_body so clients
# inherit reasoning defaults without explicit per-request config. Also flows to
# SGLang server via --chat-template-kwargs (sglang_chat_template_kwargs) as a
# server-side default. Per-request extra_body from clients overrides these.
_sglang_extra_body_defaults: >-
  {{ {'chat_template_kwargs': sglang_model_profiles[sglang_model].chat_template_kwargs}
     if sglang_model_profiles[sglang_model].chat_template_kwargs is defined
     else {} }}

litellm_enabled: true
litellm_namespace: "litellm"
litellm_image: "ghcr.io/berriai/litellm:main-latest"
litellm_port: 4000

# Model list: each entry maps a model_name to a backend endpoint.
# api_key defaults to "none" in the task template for local backends.
# Sampling defaults are set per model here — LiteLLM passes them as request
# defaults to the backend. Per-request params from the client override these.
# This replaces the previous generation_config.json patching hack in launch.sh.
litellm_model_list:
  - model_name: "{{ sglang_served_model_name }}"
    litellm_params:
      model: "openai/{{ sglang_served_model_name }}"
      api_base: "http://sglang.{{ sglang_namespace }}.svc.cluster.local:{{ sglang_port }}/v1"
      api_key: "none"
      # Sampling defaults from _sglang_sampling_defaults (recommended + overrides):
      temperature: "{{ _sglang_sampling_defaults.temperature | default(omit) }}"
      top_p: "{{ _sglang_sampling_defaults.top_p | default(omit) }}"
      top_k: "{{ _sglang_sampling_defaults.top_k | default(omit) }}"
      presence_penalty: "{{ _sglang_sampling_defaults.presence_penalty | default(omit) }}"
      frequency_penalty: "{{ _sglang_sampling_defaults.frequency_penalty | default(omit) }}"
      repetition_penalty: "{{ _sglang_sampling_defaults.repetition_penalty | default(omit) }}"
      min_p: "{{ _sglang_sampling_defaults.min_p | default(omit) }}"
      # Reasoning defaults from _sglang_extra_body_defaults (chat_template_kwargs):
      extra_body: "{{ _sglang_extra_body_defaults if _sglang_extra_body_defaults else omit }}"

  # Ollama models via native LiteLLM providers (ollama/ for embeddings,
  # ollama_chat/ for chat). LiteLLM's ollama provider forces TLS on all
  # connections — each Ollama pod runs a stunnel sidecar (self-signed cert,
  # port {{ ollama_tls_port }}) so the native provider works over HTTPS.
  # ssl_verify: false skips certificate verification for the self-signed cert.
  - model_name: "{{ ollama_embed_model }}"
    litellm_params:
      model: "ollama/{{ ollama_embed_model }}"
      api_base: "https://ollama-embed.ollama.svc.cluster.local:{{ ollama_tls_port }}"
      ssl_verify: false
  - model_name: "{{ ollama_model }}"
    litellm_params:
      model: "ollama_chat/{{ ollama_model }}"
      api_base: "https://ollama.ollama.svc.cluster.local:{{ ollama_tls_port }}"
      ssl_verify: false


# litellm_settings: rendered as the litellm_settings block in config.yaml
litellm_settings:
  num_retries: 2
  # End-to-end timeout (seconds) for the full upstream response — NOT an idle
  # timeout. Covers the entire request lifecycle from send to final byte.
  # Must be >= the longest backend timeout (SGLang HAProxy: {{ sglang_haproxy_timeout }}s,
  # vLLM: no proxy, but long-running thinking requests can take minutes).
  request_timeout: 1800
  # drop_params: false — pass through backend-specific params (top_k, min_p,
  # chat_template_kwargs, thinking_budget, custom logit processors, etc.)
  # so clients can use SGLang/vLLM-native features via extra_body.
  drop_params: false
  # ssl_verify: false — global override for the ollama/ embedding provider bug.
  # The ollama/ embedding codepath uses a module-level HTTP singleton that reads
  # litellm.ssl_verify at creation time but ignores per-model ssl_verify config.
  # This sets litellm.ssl_verify=False globally so the singleton skips cert
  # verification for self-signed certs on our HAProxy TLS sidecars.
  # See LITELLM_UPSTREAM_BUG.md for details.
  ssl_verify: false

