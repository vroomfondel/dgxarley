# ============================================================================
# LiteLLM — OpenAI-compatible proxy aggregating multiple LLM backends.
# Routes requests to SGLang, vLLM, and Ollama via unified API.
# ============================================================================

# Merged sampling defaults for the active SGLang model: recommended + overrides.
# Injected into litellm_model_list via combine() so LiteLLM sends them as
# per-request defaults (client params override these).
_sglang_sampling_defaults: >-
  {{ sglang_model_profiles[sglang_model].recommended_sampling | default({})
     | combine(sglang_model_profiles[sglang_model].sampling_overrides | default({})) }}

# extra_body defaults for the active SGLang model: chat_template_kwargs (reasoning
# toggles like enable_thinking, low_effort). Passed as LiteLLM extra_body so clients
# inherit reasoning defaults without explicit per-request config. Also flows to
# SGLang server via --chat-template-kwargs (sglang_chat_template_kwargs) as a
# server-side default. Per-request extra_body from clients overrides these.
_sglang_extra_body_defaults: >-
  {{ {'chat_template_kwargs': sglang_model_profiles[sglang_model].chat_template_kwargs}
     if sglang_model_profiles[sglang_model].chat_template_kwargs is defined
     else {} }}

# ComfyUI — local image generation playground (FLUX.1-schnell by default).
# Deploys to a single Spark, consumes one GPU time-slice share alongside SGLang.
# Nothing is precompiled into the image; the container clones ComfyUI on first
# start into hostPath and downloads the FLUX.1-schnell fp8 single-file checkpoint
# (~17 GB, Apache-2.0, no HF gating) into models/checkpoints.
comfyui_enabled: true
comfyui_namespace: "comfyui"
# Custom image built by scripts/build_comfyui_image.sh on top of NGC PyTorch
# (nvcr.io/nvidia/pytorch:26.03-py3 default since 2026-04-26). NGC base is
# the only verified-correct sm121 SDPA option — scitrera-pipeline bases ship
# a torch wheel with silently broken EFFICIENT_ATTENTION. See
# UPSTREAM_PYTORCH_SDPA_SM121.md / COMFYUI_PROMPT_FAIL.md for the diagnosis,
# and COMFYUI_ARM64_SM121.md / scripts/comfyui/Dockerfile for the build.
comfyui_image: "xomoxcc/comfyui:sm121"
comfyui_port: 8188
# Which Spark to pin ComfyUI to. spark4 is the least disruptive default (last
# SGLang worker; during image generation only rank 3 takes a latency hit).
comfyui_spark_id: "4"
# hostPath root on the chosen Spark. Holds the ComfyUI checkout, venv markers,
# model checkpoints and generated outputs. Nothing inside is managed by Ansible
# — create/destroy happens inside the container on first launch.
comfyui_hostpath_base: "/var/lib/k8s-data/comfyui"
# Initial model to download. Single-file checkpoint from Comfy-Org (packs UNet,
# CLIP, T5, VAE). Set to "" to skip model download (manual upload via UI).
comfyui_flux_schnell_repo: "Comfy-Org/flux1-schnell"
comfyui_flux_schnell_file: "flux1-schnell-fp8.safetensors"

litellm_enabled: true
litellm_namespace: "litellm"
# Official BerriAI/LiteLLM image on GitHub Container Registry.
# Tag choice: `main-stable` = release passed 12h load-test before publish
# (https://docs.litellm.ai/docs/proxy/deploy#docker). `main-latest` tracks
# HEAD of main and is NOT recommended for production. For pinned deploys
# use a specific version tag, e.g. `v1.83.7-stable`.
litellm_image: "ghcr.io/berriai/litellm:main-stable"
litellm_port: 4000

# Model list: each entry maps a model_name to a backend endpoint.
# api_key defaults to "none" in the task template for local backends.
# Sampling defaults are set per model here — LiteLLM passes them as request
# defaults to the backend. Per-request params from the client override these.
# This replaces the previous generation_config.json patching hack in launch.sh.
# Per-model token pricing (USD per token). LiteLLM multiplies prompt_tokens by
# input_cost_per_token and completion_tokens by output_cost_per_token to populate
# the spend table (per-key / per-user / per-team budgets). Local GPU inference
# has no $-per-token rate — but we deliberately mirror the hosted-SaaS price
# for the same model, so LiteLLM's /spend/* reports directly answer the question
# "what would this usage have cost on a SaaS provider?".
#
# Current defaults = OpenRouter weighted-average pricing for
# qwen/qwen3.5-397b-a17b (checked 2026-04-19 across providers):
#   OpenRouter (weighted):  $0.39 / $2.34 per 1M
#   Alibaba Cloud official: $0.39 / $0.90 per 1M
#   DeepInfra:              $0.54 / $3.40 per 1M
#   Together AI / Novita:   $0.60 / $3.60 per 1M
# OpenRouter-median picked as the middle-of-the-road community rate. This is
# ~realistic for our primary SGLang model (nvidia/Qwen3.5-397B-A17B-NVFP4).
#
# Fallback reference (if the served model changes to something Claude-class):
#   Anthropic Claude Sonnet 4.5: $3.00 / $15.00 per 1M
#
# Override per-model by adding input_cost_per_token / output_cost_per_token
# directly in litellm_model_list. Set both to 0 to track tokens without
# charging spend. All values are in USD — LiteLLM has no currency switch.
# litellm_default_input_cost_per_token: 0.00000039   # $0.39 per 1M input  — OpenRouter Qwen3.5-397B median
# litellm_default_output_cost_per_token: 0.00000234  # $2.34 per 1M output — OpenRouter Qwen3.5-397B median

litellm_default_input_cost_per_token: 0.000003    # $3.00 per 1M input  — Anthropic Claude Sonnet 4.5 (≤200K ctx)
litellm_default_output_cost_per_token: 0.000015   # $15.00 per 1M output — Anthropic Claude Sonnet 4.5 (≤200K ctx)


litellm_model_list:
  - model_name: "{{ sglang_served_model_name }}"
    litellm_params:
      model: "openai/{{ sglang_served_model_name }}"
      api_base: "http://sglang.{{ sglang_namespace }}.svc.cluster.local:{{ sglang_port }}/v1"
      api_key: "none"
      # Sampling defaults from _sglang_sampling_defaults (recommended + overrides):
      temperature: "{{ _sglang_sampling_defaults.temperature | default(omit) }}"
      top_p: "{{ _sglang_sampling_defaults.top_p | default(omit) }}"
      top_k: "{{ _sglang_sampling_defaults.top_k | default(omit) }}"
      presence_penalty: "{{ _sglang_sampling_defaults.presence_penalty | default(omit) }}"
      frequency_penalty: "{{ _sglang_sampling_defaults.frequency_penalty | default(omit) }}"
      repetition_penalty: "{{ _sglang_sampling_defaults.repetition_penalty | default(omit) }}"
      min_p: "{{ _sglang_sampling_defaults.min_p | default(omit) }}"
      # Reasoning defaults from _sglang_extra_body_defaults (chat_template_kwargs):
      extra_body: "{{ _sglang_extra_body_defaults if _sglang_extra_body_defaults else omit }}"
      # Spend tracking (nominal cost — edit litellm_default_*_cost_per_token above):
      input_cost_per_token: "{{ litellm_default_input_cost_per_token }}"
      output_cost_per_token: "{{ litellm_default_output_cost_per_token }}"

  # Ollama models via native LiteLLM providers (ollama/ for embeddings,
  # ollama_chat/ for chat). LiteLLM's ollama provider forces TLS on all
  # connections — each Ollama pod runs a stunnel sidecar (self-signed cert,
  # port {{ ollama_tls_port }}) so the native provider works over HTTPS.
  # ssl_verify: false skips certificate verification for the self-signed cert.
  - model_name: "{{ ollama_embed_model }}"
    litellm_params:
      model: "ollama/{{ ollama_embed_model }}"
      api_base: "https://ollama-embed.ollama.svc.cluster.local:{{ ollama_tls_port }}"
      ssl_verify: false
      input_cost_per_token: "{{ litellm_default_input_cost_per_token }}"
      output_cost_per_token: "{{ litellm_default_output_cost_per_token }}"
  - model_name: "{{ ollama_model }}"
    litellm_params:
      model: "ollama_chat/{{ ollama_model }}"
      api_base: "https://ollama.ollama.svc.cluster.local:{{ ollama_tls_port }}"
      ssl_verify: false
      input_cost_per_token: "{{ litellm_default_input_cost_per_token }}"
      output_cost_per_token: "{{ litellm_default_output_cost_per_token }}"


# litellm_settings: rendered as the litellm_settings block in config.yaml
litellm_settings:
  num_retries: 2
  # End-to-end timeout (seconds) for the full upstream response — NOT an idle
  # timeout. Covers the entire request lifecycle from send to final byte.
  # Must be >= the longest backend timeout (SGLang HAProxy: {{ sglang_haproxy_timeout }}s,
  # vLLM: no proxy, but long-running thinking requests can take minutes).
  request_timeout: 1800
  # drop_params: false — pass through backend-specific params (top_k, min_p,
  # chat_template_kwargs, thinking_budget, custom logit processors, etc.)
  # so clients can use SGLang/vLLM-native features via extra_body.
  drop_params: false
  # ssl_verify: false — global override for the ollama/ embedding provider bug.
  # The ollama/ embedding codepath uses a module-level HTTP singleton that reads
  # litellm.ssl_verify at creation time but ignores per-model ssl_verify config.
  # This sets litellm.ssl_verify=False globally so the singleton skips cert
  # verification for self-signed certs on our HAProxy TLS sidecars.
  # See LITELLM_UPSTREAM_BUG.md for details.
  ssl_verify: false


# ============================================================================
# Guardrails (DISABLED BY DEFAULT — uncomment entries to activate)
# ============================================================================
# Guardrails are pre/post/parallel hooks that inspect or modify prompts and
# responses. Each entry becomes one item in the `guardrails:` block of
# config.yaml. Rendering is gated: the ConfigMap task only emits the block
# when `litellm_guardrails` is non-empty — see tasks/litellm.yml.
#
# Modes:
#   pre_call      blocks/modifies prompt BEFORE LLM call (e.g. PII redaction)
#   post_call     blocks/modifies response AFTER LLM call (e.g. toxicity filter)
#   during_call   runs in parallel (cannot block, no added latency)
#   logging_only  observe only, never intervene
#
# default_on:
#   true   applies to every request globally ("Global Guardrail" in UI)
#   false  opt-in per request (body: "guardrails":["name"]) or per key/team
#
# Reference: https://docs.litellm.ai/docs/proxy/guardrails/quick_start
#
# --- Recommended minimal on-prem set (no SaaS dependencies) ---
#
# litellm_guardrails:
#   # 1) hide-secrets: built-in TruffleHog-based secret detector. Masks any
#   #    accidentally-pasted API keys, AWS creds, SSH keys, JWTs etc. in prompts
#   #    BEFORE they reach the LLM. Zero external deps, zero SaaS calls, local
#   #    regex/entropy scan. Cheap insurance against credential leaks.
#   - guardrail_name: "hide-secrets"
#     litellm_params:
#       guardrail: "hide-secrets"
#       mode: "pre_call"
#       default_on: true
#
#   # 2) presidio-pii-mask: Microsoft Presidio — PII detection + redaction
#     #  (names, emails, IBANs, phone numbers, ID numbers, etc.). Requires the
#     #  two Presidio containers running in-cluster (analyzer + anonymizer).
#     #  Deploy via a separate role/task before enabling this guardrail.
#     #  output_parse_pii: true also scrubs PII from the LLM's response.
#   - guardrail_name: "presidio-pii-mask"
#     litellm_params:
#       guardrail: "presidio"
#       mode: "pre_call"
#       presidio_analyzer_api_base: "http://presidio-analyzer.guardrails.svc.cluster.local:3000"
#       presidio_anonymizer_api_base: "http://presidio-anonymizer.guardrails.svc.cluster.local:5001"
#       output_parse_pii: true
#       default_on: false   # opt-in per key — not every workload wants PII redaction
#
# --- SaaS-based guardrails (require API keys in vault.yml) ---
#
#   # 3) lakera-prompt-injection: Prompt-injection & jailbreak detection.
#     #  during_call mode = runs parallel to the LLM request, no added latency,
#     #  but also cannot block — flags requests for later audit.
#   - guardrail_name: "lakera-prompt-injection"
#     litellm_params:
#       guardrail: "lakera_v2"
#       api_key: "os.environ/LAKERA_API_KEY"   # set via litellm-env Secret
#       mode: "during_call"
#       default_on: true
#
#   # 4) aporia: Content moderation, hallucination scoring, jailbreak detection.
#   - guardrail_name: "aporia-pre"
#     litellm_params:
#       guardrail: "aporia"
#       api_key: "os.environ/APORIA_API_KEY"
#       api_base: "os.environ/APORIA_API_BASE"
#       mode: "pre_call"
#       default_on: false
#
#   # 5) openai_moderation: OpenAI /moderations endpoint (hate, violence, sexual,
#     #  self-harm categories). Requires OPENAI_API_KEY — sends prompt text to
#     #  OpenAI, NOT recommended if our on-prem goal is data sovereignty.
#   - guardrail_name: "openai-moderation"
#     litellm_params:
#       guardrail: "openai_moderation"
#       api_key: "os.environ/OPENAI_API_KEY"
#       mode: "pre_call"
#       default_on: false
#
#   # 6) bedrock: AWS Bedrock Guardrails — denied topics, content filters,
#     #  word-policy, PII. Requires AWS creds. Guardrail must be pre-created
#     #  in the AWS console; supply its ID + version here.
#   - guardrail_name: "bedrock-content-filter"
#     litellm_params:
#       guardrail: "bedrock"
#       guardrailIdentifier: "os.environ/BEDROCK_GUARDRAIL_ID"
#       guardrailVersion: "DRAFT"
#       mode: "pre_call"
#       default_on: false
#
# --- Self-written custom guardrail ---
#
#   # 7) custom: Python class extending litellm.integrations.custom_guardrail.
#     #  CustomGuardrail — mounted into the pod via ConfigMap/PVC. Useful for
#     #  domain-specific rules (keyword blacklists, regex, LLM-as-judge etc.).
#     #  See docs: https://docs.litellm.ai/docs/proxy/guardrails/custom_guardrail
#   - guardrail_name: "domain-blacklist"
#     litellm_params:
#       guardrail: "custom_guardrail.MyGuardrail"
#       mode: "pre_call"
#       default_on: false

# Empty default — guardrails block is omitted from config.yaml when empty.
litellm_guardrails: []

# === Nous Hermes Agent (per-user deployments) ===
# Two independent Deployments per active user, both pinned to k3smaster:
#   hermes-agent-<user>  → official nousresearch/hermes-agent (`hermes dashboard`)
#   hermes-webui-<user>  → ghcr.io/nesquena/hermes-webui (alt browser UI)
# They share /opt/data via the same hostPath subdir, so sessions/skills/configs
# are identical across both UIs. Each one still spawns its own hermes processes
# when chatting — Hermes is a CLI, not a daemon; there is no shared agent
# process to multiplex onto.
hermes_namespace: "hermes"
hermes_image_tag: "v2026.4.30"
# NFS-backed hostPath base on k3smaster — per-user subdirs <base>/<username>
# are mounted as /opt/data inside the pod (subdir-only, no parent visibility).
hermes_data_base: "/mnt/nfs/hermes"
hermes_default_model: "Qwen/Qwen3.6-35B-A3B-FP8"
hermes_litellm_url: "http://litellm.litellm.svc.cluster.local:4000"
hermes_webui_image: "ghcr.io/nesquena/hermes-webui"
hermes_webui_image_tag: "latest"
hermes_webui_port: 8787
# Caddy sidecar in front of the agent dashboard. Cookie-session auth (via the
# caddy-security plugin) so WebSocket (TUI/PTY) and EventSource (events feed)
# work — BasicAuth credentials are NOT auto-included by browsers on those
# requests. oauth2-proxy v7 was tried first but rejects WS upgrades with 403
# even with --skip-auth-route; caddy-security checks the cookie only on the
# initial handshake and transparently passes the upgrade through. The image is
# greenpau/caddy-security packaged as `authcrunch/authcrunch` (multi-arch).
hermes_caddy_image: "ghcr.io/authcrunch/authcrunch"
hermes_caddy_image_tag: "latest"
hermes_agent_proxy_port: 9118
# Per-user defaults — overridable per entry in hermes_users.
hermes_dashboard_enabled_default: false
# enables chat-interface if set to true IF hermes_dashboard_enabled is even enabled
hermes_dashboard_tui_default: true
# enables webui-interface (alternative interface to native hermes dashboard)
hermes_webui_enabled_default: true
# Sets logging.level=DEBUG in the rendered config.yaml (otherwise INFO).
# Affects /opt/data/logs/agent.log — kubectl logs -c log-tail <pod> tails it.
hermes_debug_default: false
# Per-user list — real entries in group_vars/all/vault.yml.
# Schema: { username, uid, gid, litellm_token,
#           litellm_model?, basicauth_password?, webui_password?,
#           dashboard_enabled? (default true),
#           dashboard_tui?     (default true),
#           webui_enabled?     (default false),
#           hermes_debug?      (default false),
#           enabled }
# Hostnames: <username>.hermes-dashboard.<dns> (original)  +  <username>.hermes.<dns> (webui)
hermes_users: []

