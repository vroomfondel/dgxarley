sglang_image: "scitrera/dgx-spark-sglang:0.5.10"

sglang_nnodes: 4

# Model profiles: context_length, kv_cache_dtype, mem_fraction_static
sglang_model_profiles:
  "Qwen/Qwen2.5-Coder-32B-Instruct-AWQ":
    info_url: "https://huggingface.co/Qwen/Qwen2.5-Coder-32B-Instruct-AWQ"
    # 32B dense, AWQ 4-bit (~19 GB / ~9.7 GB per GPU with TP=2)
    # Auto-detection reads quant_method from config.json → AWQMarlinConfig.
    # Explicit "awq" also works for dense models but is unnecessary.
    context_length: 32768
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.50"
    recommended_sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      repetition_penalty: 1.05
  "unsloth/Qwen3-235B-A22B-Instruct-2507-FP8":
    # DISCOURAGED on 2× DGX Spark (128 GB each). FP8 weights alone consume ~118.5 GB
    # per GPU (TP=2), leaving only ~9.5 GB for CUDA context, activations, and KV cache.
    # Realistic context_length is ~32K with minimal concurrency. The ~1-2% quality gain
    # over AWQ 4-bit does not justify 8× less context and near-zero request parallelism.
    # Prefer the AWQ profile below (62 GB/GPU → 66 GB free → 262K context comfortably).
    info_url: "https://huggingface.co/unsloth/Qwen3-235B-A22B-Instruct-2507-FP8"
    # 235B/22B MoE, FP8 (~237 GB / ~118.5 GB per GPU with TP=2)
    # load_format: "sharded_state"  # default: auto
    context_length_max: 262144
    #context_length: 32768
    context_length: 65536
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.9"
    disable_deep_gemm: true
    fp8_gemm_runner_backend: "cutlass"
    attention_backend: "triton"
    tool_call_parser: "qwen3_coder"
    # non-thinking only — no <think> blocks, no reasoning_parser needed
    recommended_sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
  "QuantTrio/Qwen3-235B-A22B-Thinking-2507-AWQ":
    # NOTE: i cannot get this to work properly - NGRAM repeats, loops etc... stepping away from this model for now...
    info_url: "https://huggingface.co/QuantTrio/Qwen3-235B-A22B-Thinking-2507-AWQ"
    # 235B/22B MoE, AWQ 4-bit (~124 GB / ~62 GB per GPU with TP=2)
    load_format: "sharded_state"  # default: auto
    #load_format: "auto"
    context_length_max: 262144
    context_length: 262144
    #context_length: 131072
    #context_length: 65536
    #context_length: 32768
    # KV cache quantization options:
    #   "auto" / "bfloat16" — full precision, best quality, 2× memory vs fp8
    #   "fp8_e4m3"  — 3 mantissa bits, higher precision, better for long contexts
    #   "fp8_e5m2"  — 2 mantissa bits, wider range, but more rounding error
    #                  caused kv-degradation (loops/repeats) in earlier testing
    # fp8_e4m3 is the sweet spot: halves KV memory with minimal quality loss.
    # Use "auto" only if output quality degrades (doubles KV memory usage).
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.7"
    # quantization: "moe_wna16" avoids the Marlin repack that causes OOM on
    # memory-constrained GPUs. Auto-detect (no flag) creates AWQMarlinConfig which
    # works correctly but needs ~109 GB peak during repack (old+new tensors coexist).
    # moe_wna16 uses Triton INT4 kernels directly — no repack, peak = final ~62 GB.
    # --quantization awq is WRONG for MoE: AWQConfig.get_quant_method() returns None
    # for FusedMoE → falls through to unquantized FP16 → OOM.
    #
    # Quantization options for AWQ MoE models (e.g. Qwen3-235B) in SGLang 0.5.9:
    #
    #  ┌────────────────┬─────────────────────┬────────────────┬────────────────────┬──────────────────────────────────────┐
    #  │ --quantization │     Internal        │ MoE-compatible │       Repack       │              Notes                   │
    #  ├────────────────┼─────────────────────┼────────────────┼────────────────────┼──────────────────────────────────────┤
    #  │ (unset)        │ Auto-detect →       │                │ Yes (~109 GB peak  │ Default path, EP-aware via           │
    #  │                │ AWQMarlinConfig     │ Yes            │ at TP=2, ~55 GB    │ FusedMoE.weight_loader               │
    #  │                │                     │                │ at EP=2)           │                                      │
    #  ├────────────────┼─────────────────────┼────────────────┼────────────────────┼──────────────────────────────────────┤
    #  │ moe_wna16      │ MoeWNA16Config →    │ Yes            │ No (peak =         │ No repack, but qzeros EP bug         │
    #  │                │ Triton INT4         │                │ final)             │ (our monkey-patch)                   │
    #  ├────────────────┼─────────────────────┼────────────────┼────────────────────┼──────────────────────────────────────┤
    #  │ awq            │ AWQConfig           │ No             │ —                  │ get_quant_method() returns None for  │
    #  │                │                     │                │                    │ FusedMoE → FP16 fallback → OOM       │
    #  ├────────────────┼─────────────────────┼────────────────┼────────────────────┼──────────────────────────────────────┤
    #  │ awq_marlin     │ AWQMarlinConfig     │ Yes            │ Yes                │ Explicitly same as auto-detect       │
    #  └────────────────┴─────────────────────┴────────────────┴────────────────────┴──────────────────────────────────────┘
    #
    #  SGLang (via vLLM) also supports: gptq, gptq_marlin, marlin, fp8, compressed_tensors, bitsandbytes,
    #  experts_int8, gguf, squeezellm — but those are not relevant for AWQ models.
    #
    #  Full list in sglang/srt/layers/quantization/__init__.py.
    quantization: "moe_wna16"
    #quantization: "awq_marlin"
    attention_backend: "triton"
    disable_deep_gemm: true
    tool_call_parser: "qwen3_coder"
    # Expert parallelism: 128 experts split across 2 GPUs (64 each).
    # MoE layers use all-to-all instead of all-reduce — attention stays TP=2.
    # Re-run sglang_shard/sglang_cpu_shard after enabling (old shards incompatible).
    # SGLang 0.5.9 qzeros EP bug is monkey-patched at runtime in sglang_launch.sh
    # and sglang_shard_launch.sh (w13_qzeros/w2_qzeros expert_id remapping).
    num_experts: 128
    ep_size: "{{ sglang_nnodes if (128 % (sglang_nnodes | int) == 0) else 1 }}"
    # EPLB disabled: EPLBManager crashes after ~1000 forward passes with AttributeError:
    # 'Qwen3MoeForCausalLM' has no 'routed_experts_weights_of_layer' (eplb_manager.py:110).
    # Confirmed broken on both 0.5.9-t5 AND 0.5.9-dev2-acab24a7-t5 (PR #19767 does not
    # fix Qwen3MoE, only claims to fix Qwen3_5 — but Qwen3_5 also still crashes, see
    # SGLANG_TP_EP_MOE_UPSTREAM_BUG.md). EP=2 works fine with static assignment.
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # Standard MoE (128 experts, 8 active) — triton attention backend required
    # on SM121 (flashinfer has edge cases with large MoE models).
    # Weight loading (~170s for 25 shards) can be halved with pre-sharding:
    # run sglang_shard job, then enable load_format: "sharded_state" above.
    # thinking only!
    reasoning_parser: "qwen3"  #deepseek-r1
    # thinking_budget: caps reasoning tokens via Qwen3ThinkingBudgetLogitProcessor.
    # This is NOT a sampling param — it uses SGLang's custom logit processor.
    # Set per-profile here, override per-request via --thinking-budget CLI arg.
    #thinking_budget: 2048
    recommended_sampling:
      temperature: 0.6
      top_p: 0.95
      top_k: 20
#      min_p: 0
#    sampling_overrides:
#      presence_penalty: 1.0
#      temperature: 0.6
#      top_p: 0.95
#      top_k: 40
#      min_p: 0.1
#      repetition_penalty: 1.15
#      frequency_penalty: 0.3
  "QuantTrio/Qwen3-235B-A22B-Instruct-2507-AWQ":
    info_url: "https://huggingface.co/QuantTrio/Qwen3-235B-A22B-Instruct-2507-AWQ"
    # 235B/22B MoE, AWQ 4-bit (~124 GB / ~62 GB per GPU with TP=2)
    load_format: "sharded_state"  # default: auto
    context_length_max: 262144
    context_length: 262144
    #context_length: 131072
    #context_length: 65536
    #context_length: 32768
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.7"
    # quantization: "moe_wna16" avoids the Marlin repack that causes OOM on
    # memory-constrained GPUs. Auto-detect (no flag) creates AWQMarlinConfig which
    # works correctly but needs ~109 GB peak during repack (old+new tensors coexist).
    # moe_wna16 uses Triton INT4 kernels directly — no repack, peak = final ~62 GB.
    # --quantization awq is WRONG for MoE: AWQConfig.get_quant_method() returns None
    # for FusedMoE → falls through to unquantized FP16 → OOM.
    quantization: "moe_wna16"
    attention_backend: "triton"
    disable_deep_gemm: true
    tool_call_parser: "qwen3_coder"
    # Expert parallelism: monkey-patched at runtime (see Thinking profile comment).
    num_experts: 128
    ep_size: "{{ sglang_nnodes if (128 % (sglang_nnodes | int) == 0) else 1 }}"
    # EPLB disabled: see Thinking profile comment (Qwen3MoE missing attribute, crashes
    # after ~1000 iter). Still broken on 0.5.9-dev2-acab24a7-t5.
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # Standard MoE (128 experts, 8 active) — triton attention backend required
    # on SM121 (flashinfer has edge cases with large MoE models).
    # Weight loading (~170s for 25 shards) can be halved with pre-sharding:
    # run sglang_shard job, then enable load_format: "sharded_state" above.
    # non-thinking only — no <think> blocks, no reasoning_parser needed
    recommended_sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      presence_penalty: 1.0  # https://huggingface.co/QuantTrio/Qwen3-235B-A22B-Instruct-2507-AWQ#best-practices
#    sampling_overrides:
#      repetition_penalty: 1.1
#      frequency_penalty: 0.3

  "Qwen/Qwen3-Next-80B-A3B-Instruct-FP8":
    info_url: "https://huggingface.co/Qwen/Qwen3-Next-80B-A3B-Instruct-FP8"
    context_length_max: 262144
    context_length: 262144
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.50"
    attention_backend: "triton"
    disable_deep_gemm: true
    fp8_gemm_runner_backend: "cutlass"
    # FP8 quantized, non-thinking only — 80B/3B MoE hybrid (DeltaNet + Attention)
    recommended_sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
  "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8":
    info_url: "https://huggingface.co/Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8"
    context_length: 262144
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.50"
    disable_deep_gemm: true
    fp8_gemm_runner_backend: "cutlass"
    # non-thinking only — no <think> blocks
    recommended_sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      repetition_penalty: 1.05
    # local overrides (anti-repetition tuning, not from model card)
    sampling_overrides:
      top_k: -1
      min_p: 0.15
      presence_penalty: 1.5
      frequency_penalty: 0.8
      repetition_penalty: 1.55
  "Qwen/Qwen3-Coder-30B-A3B-Instruct":
    info_url: "https://huggingface.co/Qwen/Qwen3-Coder-30B-A3B-Instruct"
    context_length: 262144
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.70"
    # non-thinking only — no <think> blocks
    recommended_sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      repetition_penalty: 1.05
    # local overrides (anti-repetition tuning, not from model card)
    sampling_overrides:
      top_k: -1
      min_p: 0.15
      presence_penalty: 1.5
      frequency_penalty: 0.8
      repetition_penalty: 1.55
  "Qwen/Qwen3.5-35B-A3B-FP8":
    info_url: "https://huggingface.co/Qwen/Qwen3.5-35B-A3B-FP8"
    context_length: 262144
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.50"
    attention_backend: "triton"  # trtllm_mha
    disable_deep_gemm: true
    fp8_gemm_runner_backend: "cutlass"
    reasoning_parser: "qwen3"
    tool_call_parser: "qwen3_coder"
    # supports thinking (default) and non-thinking modes
    # Server-side defaults use "thinking" mode sampling (the default mode).
    # For other modes, override per-request via API params.
    #   thinking:              temperature=1.0  top_p=0.95  top_k=20  presence_penalty=1.5
    #   thinking_coding:       temperature=0.6  top_p=0.95  top_k=20  presence_penalty=0.0
    #   non_thinking:          temperature=0.7  top_p=0.8   top_k=20  presence_penalty=1.5
    #   non_thinking_reasoning: temperature=1.0  top_p=1.0   top_k=40  presence_penalty=2.0
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      presence_penalty: 1.5
  "Qwen/Qwen3.5-122B-A10B-FP8":
    # status: runs very well. 25t/s single-request throughput. works with sharding and tuned kernel. qualitatively good output
    info_url: "https://huggingface.co/Qwen/Qwen3.5-122B-A10B-FP8"
    # 122B/10B MoE (Gated DeltaNet hybrid), FP8 fine-grained (~127 GB / ~63.5 GB per GPU with TP=2)
    # Fits comfortably on 2× DGX Spark with full 262K context.
    # Community-confirmed: ~31 tok/s single-request on dual Spark.
    # Quality on par or better than Qwen3-235B-A22B despite fewer total params.
    load_format: "auto"  # "sharded_state"  # default: auto
    context_length: 262144
    kv_cache_dtype: "fp8_e4m3"
    # quantization: "auto"
    mem_fraction_static: "0.60"
    attention_backend: "flashinfer"
    disable_deep_gemm: true
    fp8_gemm_runner_backend: "cutlass"
    reasoning_parser: "qwen3"
    tool_call_parser: "qwen3_coder"
    #     quantization: "moe_wna16"
    #    attention_backend: "triton"
    #    disable_deep_gemm: true
    # Expert parallelism: monkey-patched at runtime (see Thinking profile comment).
    num_experts: 256
    # ep_size: "{{ sglang_nnodes if (256 % (sglang_nnodes | int) == 0) else 1 }}"
    ep_size: 4
    tp_size: 4
    # EPLB disabled: Qwen3_5MoeForConditionalGeneration also lacks
    # 'routed_experts_weights_of_layer'. Crashes after ~1000 forward passes.
    # Confirmed broken on 0.5.9-dev2-acab24a7-t5 (2026-03-20, pod sglang-head-5d7585955).
    # PR #19767 claims to fix this but the fix is not effective in this build.
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # Qwen3.5: all models think by default (no separate -Thinking variant).
    # Control via enable_thinking=false in API or chat_template_kwargs.
    # Server-side defaults use "thinking" mode sampling (the default mode).
    # For non-thinking or coding modes, override per-request via API params.
    #   thinking:          temperature=1.0  top_p=0.95  top_k=20  presence_penalty=1.5
    #   thinking_coding:   temperature=0.6  top_p=0.95  top_k=20  presence_penalty=0.0
    #   non_thinking:      temperature=0.7  top_p=0.8   top_k=20  presence_penalty=1.5
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      presence_penalty: 1.5
    nccl_transport: roce
    moe_runner_backend: triton
    disable_cuda_graph: false
    disable_piecewise_cuda_graph: true
    pp_async_batch_depth: 0
    cuda_graph_max_bs: 8
    speculative_enabled: false
  "nvidia/MiniMax-M2.5-NVFP4":
    info_url: "https://huggingface.co/nvidia/MiniMax-M2.5-NVFP4"
    # 229B/8-active MoE (256 experts, sigmoid routing), NVFP4 quantized (~139 GB weights).
    # num_key_value_heads=8 → not divisible by 3 → TP=3 impossible.
    # Uses Pipeline Parallelism (PP=nnodes) instead: each GPU gets ~21 of 62 layers
    # (~46 GB weights), leaving ~82 GB for KV cache. No head splitting needed (TP=1).
    # Trade-off: higher per-request latency (pipeline bubbles) but same throughput
    # with sufficient concurrency (micro-batching hides bubbles).
    # Recommended launch (NVIDIA model card):
    #   python3 -m sglang.launch_server --model nvidia/MiniMax-M2.5-NVFP4 --tensor-parallel-size 8 \
    #     --quantization modelopt_fp4 --trust-remote-code --reasoning-parser minimax-append-think \
    #     --tool-call-parser minimax-m2 --moe-runner-backend flashinfer_cutlass --attention-backend flashinfer
    # load_format: "sharded_state" — disabled for NVFP4 because:
    # 1. NVFP4 process_weights_after_loading runs on the empty model first, then
    #    shard tensors are copied in. This double-processing eats ~4 GB extra memory
    #    vs. the default loader (streaming weights → process once), leaving less
    #    headroom for CUDA graph capture.
    # 2. No real speedup observed with TP=2 EP=2: NVFP4 weight loading is dominated
    #    by process_weights_after_loading (scale recalibration, FP4 repacking), not
    #    by file I/O. Sharded loading skips the slow safetensors redistribute but
    #    the post-processing cost remains the same (~360s either way).
    # load_format: "sharded_state"
    nccl_transport: "roce"
    #nccl_transport: "roce"
    tp_size: 1  # PP=4 (nnodes/tp=4/1=4). TP=1 avoids KV head split issue (8 heads not divisible by 3 or 4 with EP).
    context_length: 196608
    quantization: "modelopt_fp4"
    # trust_remote_code: required because MiniMax-M2.5 ships custom model code
    # (minimax_m2.py, custom tokenizer) in the HF repo that SGLang must execute.
    # Without it, transformers refuses to load the model class. Safe here because
    # the code comes from NVIDIA's official nvidia/MiniMax-M2.5-NVFP4 repo.
    trust_remote_code: true
    # PP mode: triton MoE is mandatory — fi_cutlass MoE causes worker crashes
    # and Xid 13 on SM121. All 16 fi_cutlass tests (17–32) failed on PP=4.
    # PP=4 winner: Test 2 (triton moe, flashinfer attn, fi_cutlass fp4, eager) → 63.9 tok/s at 8∥.
    moe_runner_backend: "triton"
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.80"
    # mem_fraction_static: "0.40"  # for speculative_enabled=true
    # PP=4 winner uses flashinfer attention (Test 2: 63.9 at 8∥).
    # triton attention also stable (Test 5: 52.2 at 8∥, Test 13: 62.0 at 8∥).
    attention_backend: "flashinfer"
    # flashinfer_cutlass fp4: stable on PP=4. fi_cudnn also works but slightly
    # lower throughput (Test 9: 48.9 vs Test 1: 61.2 at 8∥).
    fp4_gemm_backend: "flashinfer_cutlass"
    jit_max_jobs: 4
    # Piecewise CUDA graphs: always OOM on PP (58 chunks × 256 experts per stage).
    disable_piecewise_cuda_graph: true
    # Eager mode: PP=4 winner. 1∥ is slower (5.5 vs 16.2 tok/s) but 8∥ is best
    # (63.9 tok/s). CUDA graphs (Test 1: 61.2) are close — switch back if TTFT matters.
    disable_cuda_graph: true
    cuda_graph_max_bs: 16
    pp_async_batch_depth: 0  # pp_async hurts throughput on PP=4 (Test 4: 50.0 vs Test 2: 63.9)
    # DeepGemm is designed for FP8 with ue8m0 scale format. For NVFP4 models
    # (scale_fmt != ue8m0): JIT kernels not optimized, blocks scheduler watchdog,
    # exhausts system RAM. Disabled — FP4 GEMM falls to fp4_gemm_backend above.
    disable_deep_gemm: true
    # "minimax" parser maps to Qwen3Detector which properly separates
    # <think>...</think> into reasoning_content. Works with OpenWebUI and CLI tools.
    reasoning_parser: "minimax"
    tool_call_parser: "minimax-m2"
    num_experts: 256
    # ep_size: "{{ sglang_nnodes if (256 % (sglang_nnodes | int) == 0) else 1 }}"  # for TP=4 EP=4 mode
    ep_size: 1  # PP mode: no expert parallelism, each pipeline stage has all 256 experts
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 40
    speculative_enabled: false
    speculative_algo: NEXTN
    speculative_num_steps: 3
    speculative_num_draft_tokens: 4
    speculative_draft_model_path: ""
  "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4":
    info_url: "https://huggingface.co/nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
    # 120B/12B LatentMoE (Mamba2-Transformer hybrid), NVFP4 quantized (~67 GB weights).
    # Fits on 1× DGX Spark (128 GB) with ~61 GB free for KV cache — no multi-node needed.
    # Context: 256K default, up to 1M with SGLANG_ALLOW_OVERWRITE_LONGER_CONTEXT_LEN=1.
    # Reasoning ON/OFF via chat_template_kwargs: enable_thinking (true/false), low_effort (true/false).
    # Multi-Token Prediction (MTP) enables native speculative decoding.
    # Supported languages: EN, FR, DE, IT, JA, ES, ZH.
    # Recommended launch (NVIDIA model card):
    #   sglang serve --model-path nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4 \
    #     --trust-remote-code --reasoning-parser nemotron_3 --tool-call-parser qwen3_coder
    # load_format: "sharded_state"
    load_format: "auto"
    context_length: 262144
    quantization: "modelopt_fp4"
    # moe_runner_backend: required with EP>1 on NVFP4. Without it, SGLang's
    # auto-select falls through to cutlass_moe_fp4 which has an assertion bug
    # ("Number of experts must match") with EP>1. flashinfer_cutlass bypasses
    # this and correctly handles EP-partitioned expert weights.
    # NVIDIA's Advanced Deployment Guide doesn't specify a backend, but uses
    # EP=TP which implies the flashinfer path (same as MiniMax-M2.5-NVFP4).
    moe_runner_backend: "flashinfer_cutlass"
    trust_remote_code: true
    kv_cache_dtype: "fp8_e4m3"
    num_experts: 512
    ep_size: "{{ sglang_nnodes if (512 % (sglang_nnodes | int) == 0) else 1 }}"
    mem_fraction_static: "0.80"
    attention_backend: "triton"
