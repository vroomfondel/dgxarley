---
# Traefik IP-Allowlist for internal services (overridden by vault)
traefik_internal_allowlist:
  - "192.168.123.0/24"
  - "192.168.124.0/24"

sglang_namespace: "sglang"
vllm_namespace: "vllm"
openwebui_namespace: "openwebui"

# curl -s 'https://hub.docker.com/v2/repositories/scitrera/dgx-spark-sglang/tags/?page_size=20&ordering=last_updated' | jq '.results[] | {name, last_updated}'
#sglang_image: "scitrera/dgx-spark-sglang:0.5.9-t5"
#sglang_image: "scitrera/dgx-spark-sglang:0.5.9-dev2-acab24a7-t5"
sglang_image: "scitrera/dgx-spark-sglang:0.5.10rc0"

sglang_nnodes: 3

# Model profiles: context_length, kv_cache_dtype, mem_fraction_static
sglang_model_profiles:
  "Qwen/Qwen2.5-Coder-32B-Instruct-AWQ":
    info_url: "https://huggingface.co/Qwen/Qwen2.5-Coder-32B-Instruct-AWQ"
    # 32B dense, AWQ 4-bit (~19 GB / ~9.7 GB per GPU with TP=2)
    # Auto-detection reads quant_method from config.json → AWQMarlinConfig.
    # Explicit "awq" also works for dense models but is unnecessary.
    context_length: 32768
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.50"
    recommended_sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      repetition_penalty: 1.05
  "unsloth/Qwen3-235B-A22B-Instruct-2507-FP8":
    # DISCOURAGED on 2× DGX Spark (128 GB each). FP8 weights alone consume ~118.5 GB
    # per GPU (TP=2), leaving only ~9.5 GB for CUDA context, activations, and KV cache.
    # Realistic context_length is ~32K with minimal concurrency. The ~1-2% quality gain
    # over AWQ 4-bit does not justify 8× less context and near-zero request parallelism.
    # Prefer the AWQ profile below (62 GB/GPU → 66 GB free → 262K context comfortably).
    info_url: "https://huggingface.co/unsloth/Qwen3-235B-A22B-Instruct-2507-FP8"
    # 235B/22B MoE, FP8 (~237 GB / ~118.5 GB per GPU with TP=2)
    # load_format: "sharded_state"  # default: auto
    context_length_max: 262144
    #context_length: 32768
    context_length: 65536
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.9"
    disable_deep_gemm: true
    fp8_gemm_runner_backend: "cutlass"
    attention_backend: "triton"
    tool_call_parser: "qwen3_coder"
    # non-thinking only — no <think> blocks, no reasoning_parser needed
    recommended_sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
  "QuantTrio/Qwen3-235B-A22B-Thinking-2507-AWQ":
    # NOTE: i cannot get this to work properly - NGRAM repeats, loops etc... stepping away from this model for now...
    info_url: "https://huggingface.co/QuantTrio/Qwen3-235B-A22B-Thinking-2507-AWQ"
    # 235B/22B MoE, AWQ 4-bit (~124 GB / ~62 GB per GPU with TP=2)
    load_format: "sharded_state"  # default: auto
    #load_format: "auto"
    context_length_max: 262144
    context_length: 262144
    #context_length: 131072
    #context_length: 65536
    #context_length: 32768
    # KV cache quantization options:
    #   "auto" / "bfloat16" — full precision, best quality, 2× memory vs fp8
    #   "fp8_e4m3"  — 3 mantissa bits, higher precision, better for long contexts
    #   "fp8_e5m2"  — 2 mantissa bits, wider range, but more rounding error
    #                  caused kv-degradation (loops/repeats) in earlier testing
    # fp8_e4m3 is the sweet spot: halves KV memory with minimal quality loss.
    # Use "auto" only if output quality degrades (doubles KV memory usage).
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.7"
    # quantization: "moe_wna16" avoids the Marlin repack that causes OOM on
    # memory-constrained GPUs. Auto-detect (no flag) creates AWQMarlinConfig which
    # works correctly but needs ~109 GB peak during repack (old+new tensors coexist).
    # moe_wna16 uses Triton INT4 kernels directly — no repack, peak = final ~62 GB.
    # --quantization awq is WRONG for MoE: AWQConfig.get_quant_method() returns None
    # for FusedMoE → falls through to unquantized FP16 → OOM.
    #
    # Quantization options for AWQ MoE models (e.g. Qwen3-235B) in SGLang 0.5.9:
    #
    #  ┌────────────────┬─────────────────────┬────────────────┬────────────────────┬──────────────────────────────────────┐
    #  │ --quantization │     Internal        │ MoE-compatible │       Repack       │              Notes                   │
    #  ├────────────────┼─────────────────────┼────────────────┼────────────────────┼──────────────────────────────────────┤
    #  │ (unset)        │ Auto-detect →       │                │ Yes (~109 GB peak  │ Default path, EP-aware via           │
    #  │                │ AWQMarlinConfig     │ Yes            │ at TP=2, ~55 GB    │ FusedMoE.weight_loader               │
    #  │                │                     │                │ at EP=2)           │                                      │
    #  ├────────────────┼─────────────────────┼────────────────┼────────────────────┼──────────────────────────────────────┤
    #  │ moe_wna16      │ MoeWNA16Config →    │ Yes            │ No (peak =         │ No repack, but qzeros EP bug         │
    #  │                │ Triton INT4         │                │ final)             │ (our monkey-patch)                   │
    #  ├────────────────┼─────────────────────┼────────────────┼────────────────────┼──────────────────────────────────────┤
    #  │ awq            │ AWQConfig           │ No             │ —                  │ get_quant_method() returns None for  │
    #  │                │                     │                │                    │ FusedMoE → FP16 fallback → OOM       │
    #  ├────────────────┼─────────────────────┼────────────────┼────────────────────┼──────────────────────────────────────┤
    #  │ awq_marlin     │ AWQMarlinConfig     │ Yes            │ Yes                │ Explicitly same as auto-detect       │
    #  └────────────────┴─────────────────────┴────────────────┴────────────────────┴──────────────────────────────────────┘
    #
    #  SGLang (via vLLM) also supports: gptq, gptq_marlin, marlin, fp8, compressed_tensors, bitsandbytes,
    #  experts_int8, gguf, squeezellm — but those are not relevant for AWQ models.
    #
    #  Full list in sglang/srt/layers/quantization/__init__.py.
    quantization: "moe_wna16"
    #quantization: "awq_marlin"
    attention_backend: "triton"
    disable_deep_gemm: true
    tool_call_parser: "qwen3_coder"
    # Expert parallelism: 128 experts split across 2 GPUs (64 each).
    # MoE layers use all-to-all instead of all-reduce — attention stays TP=2.
    # Re-run sglang_shard/sglang_cpu_shard after enabling (old shards incompatible).
    # SGLang 0.5.9 qzeros EP bug is monkey-patched at runtime in sglang_launch.sh
    # and sglang_shard_launch.sh (w13_qzeros/w2_qzeros expert_id remapping).
    num_experts: 128
    ep_size: "{{ sglang_nnodes if (128 % (sglang_nnodes | int) == 0) else 1 }}"
    # EPLB disabled: EPLBManager crashes after ~1000 forward passes with AttributeError:
    # 'Qwen3MoeForCausalLM' has no 'routed_experts_weights_of_layer' (eplb_manager.py:110).
    # Confirmed broken on both 0.5.9-t5 AND 0.5.9-dev2-acab24a7-t5 (PR #19767 does not
    # fix Qwen3MoE, only claims to fix Qwen3_5 — but Qwen3_5 also still crashes, see
    # SGLANG_TP_EP_MOE_UPSTREAM_BUG.md). EP=2 works fine with static assignment.
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # Standard MoE (128 experts, 8 active) — triton attention backend required
    # on SM121 (flashinfer has edge cases with large MoE models).
    # Weight loading (~170s for 25 shards) can be halved with pre-sharding:
    # run sglang_shard job, then enable load_format: "sharded_state" above.
    # thinking only!
    reasoning_parser: "qwen3"  #deepseek-r1
    # thinking_budget: caps reasoning tokens via Qwen3ThinkingBudgetLogitProcessor.
    # This is NOT a sampling param — it uses SGLang's custom logit processor.
    # Set per-profile here, override per-request via --thinking-budget CLI arg.
    #thinking_budget: 2048
    recommended_sampling:
      temperature: 0.6
      top_p: 0.95
      top_k: 20
#      min_p: 0
#    sampling_overrides:
#      presence_penalty: 1.0
#      temperature: 0.6
#      top_p: 0.95
#      top_k: 40
#      min_p: 0.1
#      repetition_penalty: 1.15
#      frequency_penalty: 0.3
  "QuantTrio/Qwen3-235B-A22B-Instruct-2507-AWQ":
    info_url: "https://huggingface.co/QuantTrio/Qwen3-235B-A22B-Instruct-2507-AWQ"
    # 235B/22B MoE, AWQ 4-bit (~124 GB / ~62 GB per GPU with TP=2)
    load_format: "sharded_state"  # default: auto
    context_length_max: 262144
    context_length: 262144
    #context_length: 131072
    #context_length: 65536
    #context_length: 32768
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.7"
    # quantization: "moe_wna16" avoids the Marlin repack that causes OOM on
    # memory-constrained GPUs. Auto-detect (no flag) creates AWQMarlinConfig which
    # works correctly but needs ~109 GB peak during repack (old+new tensors coexist).
    # moe_wna16 uses Triton INT4 kernels directly — no repack, peak = final ~62 GB.
    # --quantization awq is WRONG for MoE: AWQConfig.get_quant_method() returns None
    # for FusedMoE → falls through to unquantized FP16 → OOM.
    quantization: "moe_wna16"
    attention_backend: "triton"
    disable_deep_gemm: true
    tool_call_parser: "qwen3_coder"
    # Expert parallelism: monkey-patched at runtime (see Thinking profile comment).
    num_experts: 128
    ep_size: "{{ sglang_nnodes if (128 % (sglang_nnodes | int) == 0) else 1 }}"
    # EPLB disabled: see Thinking profile comment (Qwen3MoE missing attribute, crashes
    # after ~1000 iter). Still broken on 0.5.9-dev2-acab24a7-t5.
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # Standard MoE (128 experts, 8 active) — triton attention backend required
    # on SM121 (flashinfer has edge cases with large MoE models).
    # Weight loading (~170s for 25 shards) can be halved with pre-sharding:
    # run sglang_shard job, then enable load_format: "sharded_state" above.
    # non-thinking only — no <think> blocks, no reasoning_parser needed
    recommended_sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      presence_penalty: 1.0  # https://huggingface.co/QuantTrio/Qwen3-235B-A22B-Instruct-2507-AWQ#best-practices
#    sampling_overrides:
#      repetition_penalty: 1.1
#      frequency_penalty: 0.3

  "Qwen/Qwen3-Next-80B-A3B-Instruct-FP8":
    info_url: "https://huggingface.co/Qwen/Qwen3-Next-80B-A3B-Instruct-FP8"
    context_length_max: 262144
    context_length: 262144
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.50"
    attention_backend: "triton"
    disable_deep_gemm: true
    fp8_gemm_runner_backend: "cutlass"
    # FP8 quantized, non-thinking only — 80B/3B MoE hybrid (DeltaNet + Attention)
    recommended_sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
  "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8":
    info_url: "https://huggingface.co/Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8"
    context_length: 262144
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.50"
    disable_deep_gemm: true
    fp8_gemm_runner_backend: "cutlass"
    # non-thinking only — no <think> blocks
    recommended_sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      repetition_penalty: 1.05
    # local overrides (anti-repetition tuning, not from model card)
    sampling_overrides:
      top_k: -1
      min_p: 0.15
      presence_penalty: 1.5
      frequency_penalty: 0.8
      repetition_penalty: 1.55
  "Qwen/Qwen3-Coder-30B-A3B-Instruct":
    info_url: "https://huggingface.co/Qwen/Qwen3-Coder-30B-A3B-Instruct"
    context_length: 262144
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.70"
    # non-thinking only — no <think> blocks
    recommended_sampling:
      temperature: 0.7
      top_p: 0.8
      top_k: 20
      repetition_penalty: 1.05
    # local overrides (anti-repetition tuning, not from model card)
    sampling_overrides:
      top_k: -1
      min_p: 0.15
      presence_penalty: 1.5
      frequency_penalty: 0.8
      repetition_penalty: 1.55
  "Qwen/Qwen3.5-35B-A3B-FP8":
    info_url: "https://huggingface.co/Qwen/Qwen3.5-35B-A3B-FP8"
    context_length: 262144
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.50"
    attention_backend: "triton"  # trtllm_mha
    disable_deep_gemm: true
    fp8_gemm_runner_backend: "cutlass"
    reasoning_parser: "qwen3"
    tool_call_parser: "qwen3_coder"
    # supports thinking (default) and non-thinking modes
    # Server-side defaults use "thinking" mode sampling (the default mode).
    # For other modes, override per-request via API params.
    #   thinking:              temperature=1.0  top_p=0.95  top_k=20  presence_penalty=1.5
    #   thinking_coding:       temperature=0.6  top_p=0.95  top_k=20  presence_penalty=0.0
    #   non_thinking:          temperature=0.7  top_p=0.8   top_k=20  presence_penalty=1.5
    #   non_thinking_reasoning: temperature=1.0  top_p=1.0   top_k=40  presence_penalty=2.0
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      presence_penalty: 1.5
  "Qwen/Qwen3.5-122B-A10B-FP8":
    # status: runs very well. 25t/s single-request throughput. works with sharding and tuned kernel. qualitatively good output
    info_url: "https://huggingface.co/Qwen/Qwen3.5-122B-A10B-FP8"
    # 122B/10B MoE (Gated DeltaNet hybrid), FP8 fine-grained (~127 GB / ~63.5 GB per GPU with TP=2)
    # Fits comfortably on 2× DGX Spark with full 262K context.
    # Community-confirmed: ~31 tok/s single-request on dual Spark.
    # Quality on par or better than Qwen3-235B-A22B despite fewer total params.
    load_format: "sharded_state"  # default: auto
    context_length: 262144
    kv_cache_dtype: "fp8_e4m3"
    # quantization: "auto"
    mem_fraction_static: "0.70"
    attention_backend: "triton"
    disable_deep_gemm: true
    fp8_gemm_runner_backend: "cutlass"
    reasoning_parser: "qwen3"
    tool_call_parser: "qwen3_coder"
    #     quantization: "moe_wna16"
    #    attention_backend: "triton"
    #    disable_deep_gemm: true
    # Expert parallelism: monkey-patched at runtime (see Thinking profile comment).
    num_experts: 256
    ep_size: "{{ sglang_nnodes if (256 % (sglang_nnodes | int) == 0) else 1 }}"
    # EPLB disabled: Qwen3_5MoeForConditionalGeneration also lacks
    # 'routed_experts_weights_of_layer'. Crashes after ~1000 forward passes.
    # Confirmed broken on 0.5.9-dev2-acab24a7-t5 (2026-03-20, pod sglang-head-5d7585955).
    # PR #19767 claims to fix this but the fix is not effective in this build.
    enable_eplb: false
    enable_expert_distribution_metrics: false
    # Qwen3.5: all models think by default (no separate -Thinking variant).
    # Control via enable_thinking=false in API or chat_template_kwargs.
    # Server-side defaults use "thinking" mode sampling (the default mode).
    # For non-thinking or coding modes, override per-request via API params.
    #   thinking:          temperature=1.0  top_p=0.95  top_k=20  presence_penalty=1.5
    #   thinking_coding:   temperature=0.6  top_p=0.95  top_k=20  presence_penalty=0.0
    #   non_thinking:      temperature=0.7  top_p=0.8   top_k=20  presence_penalty=1.5
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 20
      presence_penalty: 1.5
  "nvidia/MiniMax-M2.5-NVFP4":
    info_url: "https://huggingface.co/nvidia/MiniMax-M2.5-NVFP4"
    # 229B/8-active MoE (256 experts, sigmoid routing), NVFP4 quantized (~139 GB weights).
    # num_key_value_heads=8 → not divisible by 3 → TP=3 impossible.
    # Uses Pipeline Parallelism (PP=nnodes) instead: each GPU gets ~21 of 62 layers
    # (~46 GB weights), leaving ~82 GB for KV cache. No head splitting needed (TP=1).
    # Trade-off: higher per-request latency (pipeline bubbles) but same throughput
    # with sufficient concurrency (micro-batching hides bubbles).
    # Recommended launch (NVIDIA model card):
    #   python3 -m sglang.launch_server --model nvidia/MiniMax-M2.5-NVFP4 --tensor-parallel-size 8 \
    #     --quantization modelopt_fp4 --trust-remote-code --reasoning-parser minimax-append-think \
    #     --tool-call-parser minimax-m2 --moe-runner-backend flashinfer_cutlass --attention-backend flashinfer
    # load_format: "sharded_state" — disabled for NVFP4 because:
    # 1. NVFP4 process_weights_after_loading runs on the empty model first, then
    #    shard tensors are copied in. This double-processing eats ~4 GB extra memory
    #    vs. the default loader (streaming weights → process once), leaving less
    #    headroom for CUDA graph capture.
    # 2. No real speedup observed with TP=2 EP=2: NVFP4 weight loading is dominated
    #    by process_weights_after_loading (scale recalibration, FP4 repacking), not
    #    by file I/O. Sharded loading skips the slow safetensors redistribute but
    #    the post-processing cost remains the same (~360s either way).
    # load_format: "sharded_state"
    nccl_transport: "socket"  # RoCE is 2× slower (IBext overhead, see TESTLOG). Socket until debugged.
    tp_size: 1  # PP=nnodes auto-derived (8 KV-heads not divisible by nnodes)
    context_length: 196608
    quantization: "modelopt_fp4"
    # trust_remote_code: required because MiniMax-M2.5 ships custom model code
    # (minimax_m2.py, custom tokenizer) in the HF repo that SGLang must execute.
    # Without it, transformers refuses to load the model class. Safe here because
    # the code comes from NVIDIA's official nvidia/MiniMax-M2.5-NVFP4 repo.
    trust_remote_code: true
    # flashinfer_cutlass MoE: OOM on first request (0.5.10rc0) and Xid 13 (0.5.9-dev2).
    # Too memory-hungry for 256-expert MoE with PP (all experts per stage).
    # triton MoE compiles at runtime for SM121, stable on both images.
    moe_runner_backend: "fi_cutlass"
    kv_cache_dtype: "fp8_e4m3"
    mem_fraction_static: "0.80"
    attention_backend: "flashinfer"
    # auto selects flashinfer_cudnn on SM121 — its FP4 GEMM kernel also triggers
    # Xid 13 independently. flashinfer_cutlass avoids the cuDNN JIT path.
    fp4_gemm_backend: "cudnn"
    jit_max_jobs: 16
    # Piecewise CUDA graph capture: OOM during capture — 58 chunks × separate graph
    # buffers exhaust GPU memory (NV_ERR_NO_MEMORY in _memdescAllocInternal).
    # Regular CUDA graphs (6 fixed batch sizes) work fine, only piecewise is too much.
    disable_piecewise_cuda_graph: true
    # CUDA graph capture: OOM with moe_runner_backend=flashinfer_cutlass (graph
    # buffers too large for 256-expert MoE layers). Only works with triton MoE.
    # Set to false when using moe_runner_backend=triton, true for flashinfer_cutlass.
    disable_cuda_graph: false
    cuda_graph_max_bs: 16
    # PP async micro-batching: overlaps forward passes across pipeline stages.
    # 0 = synchronous (default, one batch at a time). Higher values push more
    # micro-batches into the pipeline concurrently, hiding inter-stage latency.
    # pp_async_batch_depth: 2  # slower on both images (-7% 4∥, -32% 8∥ on 0.5.10rc0)
    pp_async_batch_depth: 0
    # DeepGemm is designed for FP8 with ue8m0 scale format. For NVFP4 models
    # (scale_fmt != ue8m0): (1) the JIT-compiled kernels aren't optimized for
    # this format and may degrade accuracy, (2) JIT compilation blocks the
    # scheduler forward loop synchronously, triggering the 300s watchdog kill,
    # (3) parallel nvcc/cicc processes exhaust system RAM. With DeepGemm
    # disabled, FP4 GEMM selection falls to fp4_gemm_backend (cutlass above;
    # default without override would be flashinfer_cudnn on SM121).
    disable_deep_gemm: true
    # NOTE: "minimax-append-think" does NOT separate reasoning_content — it dumps
    # everything into content with inline <think> tags (by design, see sgl-project/sglang#15508).
    # Use "minimax" instead — it maps to Qwen3Detector which properly separates
    # <think>...</think> into reasoning_content. Tradeoff: for multi-turn, the caller
    # must reconstruct interleaved thinking (pass reasoning_content back as
    # <think>...</think> in the assistant message).
    # OpenWebUI works with BOTH parsers: it renders reasoning_content natively as a
    # collapsible "Thought" block, and also detects inline <think> tags in content.
    # For multi-turn, OpenWebUI serializes reasoning back as <think>...</think> in
    # the assistant content regardless of which parser was used.
    # Our CLI tools (sglang_raw, sglang_integration_test) use ThinkingParser which
    # handles both modes, but "minimax" gives cleaner native separation.
    reasoning_parser: "minimax"
    tool_call_parser: "minimax-m2"
    num_experts: 256
    # ep_size: EP requires ep_size <= tp_size, and tp_size=1 here (PP mode).
    # ep_size: "{{ sglang_nnodes if (256 % (sglang_nnodes | int) == 0) else 1 }}"
    # Reasoning model: thinking is always on (chat template injects <think>\n).
    # Thinking tokens wrapped in <think>...</think>, exposed via reasoning_content field.
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95
      top_k: 40
    moe_runner: fi_cutlass
  "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4":
    info_url: "https://huggingface.co/nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
    # 120B/12B LatentMoE (Mamba2-Transformer hybrid), NVFP4 quantized (~67 GB weights).
    # Fits on 1× DGX Spark (128 GB) with ~61 GB free for KV cache — no multi-node needed.
    # Context: 256K default, up to 1M with SGLANG_ALLOW_OVERWRITE_LONGER_CONTEXT_LEN=1.
    # Reasoning ON/OFF via chat_template_kwargs: enable_thinking (true/false), low_effort (true/false).
    # Multi-Token Prediction (MTP) enables native speculative decoding.
    # Supported languages: EN, FR, DE, IT, JA, ES, ZH.
    # Recommended launch (NVIDIA model card):
    #   sglang serve --model-path nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4 \
    #     --trust-remote-code --reasoning-parser nemotron_3 --tool-call-parser qwen3_coder
    # load_format: "sharded_state"
    load_format: "auto"
    context_length: 262144
    quantization: "modelopt_fp4"
    # moe_runner_backend: required with EP>1 on NVFP4. Without it, SGLang's
    # auto-select falls through to cutlass_moe_fp4 which has an assertion bug
    # ("Number of experts must match") with EP>1. flashinfer_cutlass bypasses
    # this and correctly handles EP-partitioned expert weights.
    # NVIDIA's Advanced Deployment Guide doesn't specify a backend, but uses
    # EP=TP which implies the flashinfer path (same as MiniMax-M2.5-NVFP4).
    moe_runner_backend: "flashinfer_cutlass"
    trust_remote_code: true
    kv_cache_dtype: "fp8_e4m3"
    num_experts: 512
    ep_size: "{{ sglang_nnodes if (512 % (sglang_nnodes | int) == 0) else 1 }}"
    mem_fraction_static: "0.80"
    attention_backend: "triton"
    reasoning_parser: "nemotron_3"
    tool_call_parser: "qwen3_coder"
    chat_template_kwargs:
      enable_thinking: true
      low_effort: false
    recommended_sampling:
      temperature: 1.0
      top_p: 0.95



# Speculative decoding — predicts multiple tokens per forward pass, then
# verifies in one step. Increases throughput (up to ~60%) at the cost of
# higher VRAM usage. Speedup diminishes at high concurrency.
# Requires models with trained speculative modules (not all models have these).
sglang_speculative_enabled: false  # HT 2026-03-20  -> no real speedup detected...
# Caveat: Qwen3.5 MoE + speculative forces radix cache OFF (no prefix caching)
# and disables the overlap scheduler. Multi-turn / shared-prefix workloads may
# regress. Benchmark before enabling in production.
# Algorithm:
#   "NEXTN" — Multi-Token Prediction. Uses the model's own MTP heads to predict
#             N tokens ahead. Requires trained MTP modules (Qwen3.5, DeepSeek-V3).
#             Does NOT work with Qwen3 (no MTP heads).
#   "EAGLE" — External draft model. Uses a separate lightweight model to draft
#             tokens, then the main model verifies. Requires a compatible EAGLE
#             checkpoint (--speculative-draft-model-path).
sglang_speculative_algo: "NEXTN"
# num_steps: how many speculative steps per iteration (more = higher throughput
# but more wasted compute on rejected tokens). 2-4 is typical.
sglang_speculative_num_steps: 3
# eagle_topk: how many top-k candidates EAGLE considers per step.
# Only relevant for algo=EAGLE. Higher = better acceptance rate but slower drafting.
sglang_speculative_eagle_topk: 1
# num_draft_tokens: total draft tokens generated per speculative iteration.
# The model verifies all of them in a single forward pass.
# Higher = more throughput if acceptance rate is good, but wastes more on rejection.
sglang_speculative_num_draft_tokens: 4

# Select the active model — parameters are pulled from sglang_model_profiles
#sglang_model: "Qwen/Qwen3-Next-80B-A3B-Instruct-FP8"
#sglang_model: "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8"
#sglang_model: "Qwen/Qwen3.5-35B-A3B-FP8"
#sglang_model: "Qwen/Qwen3-Coder-30B-A3B-Instruct-FP8"

sglang_model: "nvidia/MiniMax-M2.5-NVFP4"
#sglang_model: "Qwen/Qwen3.5-122B-A10B-FP8"
#sglang_model: "QuantTrio/Qwen3-235B-A22B-Thinking-2507-AWQ"
#sglang_model: "QuantTrio/Qwen3-235B-A22B-Instruct-2507-AWQ"

# works
# sglang_model: "QuantTrio/Qwen3-235B-A22B-Instruct-2507-AWQ"  #load_format: "sharded_state" UND "auto"
# sglang_model: "Qwen/Qwen2.5-Coder-32B-Instruct-AWQ"

sglang_context_length: "{{ sglang_model_profiles[sglang_model].context_length }}"
sglang_kv_cache_dtype: "{{ sglang_model_profiles[sglang_model].kv_cache_dtype }}"
sglang_mem_fraction_static: "{{ sglang_model_profiles[sglang_model].mem_fraction_static }}"
sglang_reasoning_parser: "{{ sglang_model_profiles[sglang_model].reasoning_parser | default('') }}"
sglang_tool_call_parser: "{{ sglang_model_profiles[sglang_model].tool_call_parser | default('') }}"
sglang_quantization: "{{ sglang_model_profiles[sglang_model].quantization | default('') }}"
sglang_trust_remote_code: "{{ sglang_model_profiles[sglang_model].trust_remote_code | default(false) }}"
sglang_moe_runner_backend: "{{ sglang_model_profiles[sglang_model].moe_runner_backend | default('') }}"
# Load format: "auto" (default) or "sharded_state" (for pre-sharded models).
# Use "sharded_state" after running sglang_shard Job to reduce peak GPU memory.
sglang_load_format: "{{ sglang_model_profiles[sglang_model].load_format | default('auto') }}"
# Disable DeepGemm JIT (sets SGLANG_ENABLE_JIT_DEEPGEMM=false) — needed for
# FP8 models on GB10/SM121 where DeepGemm lacks recipes for certain kernel
# configs (crashes with "Unknown recipe" during CUDA graph capture).
sglang_disable_deep_gemm: "{{ sglang_model_profiles[sglang_model].disable_deep_gemm | default(false) }}"
# FP8 GEMM runner backend: "auto" (default), "cutlass", "deep_gemm", "flashinfer".
# On GB10/SM121, "auto" selects flashinfer which uses trtllm backend — unsupported
# on SM121. FP8 models must use "cutlass" explicitly.
sglang_fp8_gemm_runner_backend: "{{ sglang_model_profiles[sglang_model].fp8_gemm_runner_backend | default('auto') }}"
# FP4 GEMM backend: "auto" (default), "flashinfer_cudnn", "cutlass".
# Controls the GEMM kernel for W4A4 (FP4) quantized models. Not relevant for
# AWQ (W4A16) or FP8 models — those use FP16/FP8 GEMM paths respectively.
# On SM120 (Blackwell), "auto" selects flashinfer_cudnn (cuDNN-optimized kernels).
sglang_fp4_gemm_backend: "{{ sglang_model_profiles[sglang_model].fp4_gemm_backend | default('auto') }}"
# Maximum batch size for CUDA graph capture. Lower values reduce startup time.
# Set to 0 to also disable (prefer disable_cuda_graph: true in model profile).
# Default: 128 (SGLang default is 256, reduced for faster startup)
sglang_cuda_graph_max_bs: "{{ sglang_model_profiles[sglang_model].cuda_graph_max_bs | default(128) }}"
# Disable CUDA graph capture entirely (--disable-cuda-graph).
# Emergency kill switch — overrides cuda_graph_max_bs when true.
sglang_disable_cuda_graph: "{{ sglang_model_profiles[sglang_model].disable_cuda_graph | default(false) }}"
# Disable piecewise CUDA graph capture (--disable-piecewise-cuda-graph).
# Needed for NVFP4+EP models where capture OOMs on the all-reduce buffers.
sglang_disable_piecewise_cuda_graph: "{{ sglang_model_profiles[sglang_model].disable_piecewise_cuda_graph | default(false) }}"

# Served model name for the OpenAI-compatible API. When load_format is
# sharded_state, the model path becomes the shard directory — this overrides
# that so clients (OpenWebUI etc.) see the original model name.
sglang_served_model_name: "{{ sglang_model }}"

# sglang default: os.cpu_count()
sglang_jit_max_jobs: "{{ sglang_model_profiles[sglang_model].jit_max_jobs | default(16) }}"

# Tensor parallelism: from model profile or nnodes (default).
# With PP > 1 (pipeline parallelism), tp * pp = nnodes.
sglang_tp: "{{ sglang_model_profiles[sglang_model].tp_size | default(sglang_nnodes) }}"
# Pipeline parallelism: auto-derived as nnodes / tp_size.
# PP > 1 distributes model layers across pipeline stages instead of sharding
# weights via TP. Required when a model's num_key_value_heads isn't divisible
# by nnodes (e.g. MiniMax M2.5: 8 KV heads, 8 % 3 ≠ 0 → can't use TP=3).
sglang_pp: "{{ (sglang_nnodes | int) // (sglang_tp | int) }}"
# PP async micro-batching depth: overlaps forward passes across pipeline stages.
# 0 = synchronous (default). Only effective when pp > 1.
sglang_pp_async_batch_depth: "{{ sglang_model_profiles[sglang_model].pp_async_batch_depth | default(0) }}"
# Expert parallelism: partitions the TP group for MoE layers.
# EP must divide TP (ep_size <= tp_size). With EP=TP, MoE layers use
# all-to-all instead of all-reduce — more efficient for MoE over Ethernet.
# Attention layers remain tensor-parallel regardless of EP.
# Set per model profile; defaults to 1 (no expert parallelism).
sglang_ep: "{{ sglang_model_profiles[sglang_model].ep_size | default(1) }}"
# EP load balancer: dynamically rebalances expert assignment across ranks.
# Only effective when ep_size > 1.
sglang_enable_eplb: "{{ sglang_model_profiles[sglang_model].enable_eplb | default(false) }}"
# Expert distribution metrics: logs per-expert load statistics via Prometheus.
# Useful for monitoring EP balance. Only effective when ep_size > 1.
sglang_enable_expert_distribution_metrics: "{{ sglang_model_profiles[sglang_model].enable_expert_distribution_metrics | default(false) }}"
# NCCL transport: "roce" (RDMA/RoCE via IBext, GPU Direct) or "socket" (TCP/IP).
# RoCE requires SR-IOV VFs with correct RoCE devices, GID table, and DCBX/PFC.
# Socket is the safe fallback — works always, ~30% more latency per transfer.
# Default: socket (safe, proven). roce only if explicitly requested in profile AND SR-IOV is enabled.
# RoCE via IBext is currently 2× slower than socket (see TESTLOG) — do not auto-enable.
_sglang_nccl_transport_requested: "{{ sglang_model_profiles[sglang_model].nccl_transport | default('socket') }}"
sglang_nccl_transport: "{{ _sglang_nccl_transport_requested if (_sglang_nccl_transport_requested == 'socket' or (qsfp_sriov_enabled | default(false))) else 'socket' }}"
# NCCL env vars derived from transport mode. Merged into the SGLang ConfigMap.
# roce: RDMA/RoCE via HPC-X IBext plugin, GPU Direct DMABUF over SR-IOV VFs.
# socket: TCP/IP over QSFP. Safe fallback, no RoCE/IB dependencies.
_sglang_nccl_env_roce:
  NCCL_IB_HCA: "roce{{ qsfp_sriov_vf_prefix | regex_replace('^en', '') }}v{{ qsfp_sriov_assignments.sglang.vf }}"
  NCCL_IB_GID_INDEX: "3"
  NCCL_IB_MERGE_NICS: "0"
_sglang_nccl_env_socket:
  NCCL_NET: "Socket"
  NCCL_IB_DISABLE: "1"
sglang_nccl_env: "{{ _sglang_nccl_env_roce if sglang_nccl_transport == 'roce' else _sglang_nccl_env_socket }}"
sglang_port: 8000
sglang_internal_port: 30080
sglang_haproxy_timeout: 1800
sglang_dist_timeout: 1800
# Timeout (seconds) for the head's wait-for-worker initContainer.
# Must be long enough for all workers to become Ready (model download + pod scheduling).
sglang_wait_timeout: 1200
# Scheduler watchdog timeout (seconds). The scheduler subprocess is killed if
# no forward pass completes within this window. Default 300s is too short for
# the first forward pass on large MoE models — FlashInfer CUTLASS kernel loading
# and cuDNN autotuning on the first request can take several minutes.
sglang_watchdog_timeout: 3600

# Max concurrent requests. Limits how many requests SGLang processes in parallel.
# Set to 0 for unlimited (only bounded by KV-cache pool size).
sglang_max_running_requests: 32

# Schedule policy: "lpm" (longest prefix match) or "fcfs" (first come first served).
# lpm reuses cached prefixes across requests (better for shared system prompts / RAG).
# fcfs processes requests strictly in arrival order (fairer under heavy load).
sglang_schedule_policy: "lpm"

# Attention backend: per-model in sglang_model_profiles, defaults to "flashinfer".
# Set to "triton" for hybrid GDN models (MoE+Mamba) on Blackwell GPUs.
sglang_attention_backend: "{{ sglang_model_profiles[sglang_model].attention_backend | default('flashinfer') }}"

# Chat template kwargs: passed as --chat-template-kwargs JSON to SGLang CLI.
# Used for enable_thinking etc. — NOT for sampling params.
# NOTE: thinking_budget does NOT go here — it uses SGLang's custom logit processor
# system (Qwen3ThinkingBudgetLogitProcessor), set per request via custom_params.
# Dual-layer reasoning defaults: chat_template_kwargs from the active model profile
# flows to BOTH (1) SGLang server via --chat-template-kwargs (server-wide default)
# and (2) LiteLLM extra_body via _sglang_extra_body_defaults (client-visible default).
# Per-request extra_body from clients overrides both layers.
sglang_chat_template_kwargs: "{{ sglang_model_profiles[sglang_model].chat_template_kwargs | default({}) }}"

# MoE Triton kernel config directory (host path, under hf_cache_path).
# Tuned configs are produced by the sglang_tune_moe Job.
sglang_moe_config_path: "{{ hf_cache_path }}/moe_configs"
sglang_moe_config_dir: "/root/.cache/huggingface/moe_configs"

# ============================================================================
# vLLM — drop-in alternative to SGLang for distributed LLM inference.
# Uses the same model profiles, QSFP network, and HF cache.
# Key differences from SGLang:
#   - Multi-node via --distributed-executor-backend mp (no Ray needed)
#   - No HAProxy sidecar (no EADDRINUSE bug)
#   - EP is a boolean flag (--enable-expert-parallel), not numeric
#   - --enforce-eager instead of --disable-cuda-graph
#   - No generation_config.json patching (sampling defaults via API)
# Both deployments can coexist but NOT run simultaneously (GPU contention).
# ============================================================================
vllm_image: "scitrera/dgx-spark-vllm:0.17.0-t5"

# vLLM reuses sglang_model_profiles — same model, same quantization, same params.
# Select the active model independently from SGLang.
vllm_model: "{{ sglang_model }}"

# Derived from the shared model profile (same as sglang_* equivalents)
vllm_context_length: "{{ sglang_model_profiles[vllm_model].context_length }}"
vllm_kv_cache_dtype: "{{ sglang_model_profiles[vllm_model].kv_cache_dtype }}"
vllm_mem_fraction: "{{ sglang_model_profiles[vllm_model].mem_fraction_static }}"
vllm_reasoning_parser: "{{ sglang_model_profiles[vllm_model].reasoning_parser | default('') }}"
vllm_tool_call_parser: "{{ sglang_model_profiles[vllm_model].tool_call_parser | default('') }}"
vllm_quantization: "{{ sglang_model_profiles[vllm_model].quantization | default('') }}"
vllm_load_format: "{{ sglang_model_profiles[vllm_model].load_format | default('auto') }}"
vllm_served_model_name: "{{ vllm_model }}"
vllm_chat_template_kwargs: "{{ sglang_model_profiles[vllm_model].chat_template_kwargs | default({}) }}"

# Expert parallelism: boolean flag in vLLM (--enable-expert-parallel).
# EP size is implicit: EP = TP × DP. With TP=2, DP=1, EP=2.
vllm_enable_ep: "{{ (sglang_model_profiles[vllm_model].ep_size | default(1) | int) > 1 }}"

# CUDA graph: vLLM uses --enforce-eager to disable (no granular batch-size control).
# Enable eager mode for MoE models on SM121 where CUDA graph capture is slow/fragile.
vllm_enforce_eager: "{{ sglang_model_profiles[vllm_model].disable_deep_gemm | default(false) }}"

vllm_nnodes: 2
# Tensor parallelism: auto-derived from nnodes (1 GPU per DGX Spark).
vllm_tp: "{{ vllm_nnodes }}"
# Port 8001 to avoid clash with SGLang (8000) — both can have Services simultaneously.
vllm_port: 8001
vllm_dist_timeout: 1800
vllm_wait_timeout: 1200

# Max concurrent sequences (equivalent to sglang_max_running_requests)
vllm_max_num_seqs: 16

ollama_replicas: 1
ollama_embed_replicas: 1

# Ollama model profiles
ollama_model_profiles:
  "qwen3-coder:latest":
    info_url: "https://ollama.com/library/qwen3-coder"
    # 30B total / 3.3B active MoE, latest tag = 30b (~19 GB)
    context_length: 262144
  "qwen2.5-coder:latest":
    info_url: "https://ollama.com/library/qwen2.5-coder"
    # 7B dense, latest tag = 7b (~4.7 GB)
    context_length: 32768
  "qwen2.5-coder:14b":
    info_url: "https://ollama.com/library/qwen2.5-coder:14b"
    # 14B dense (~9 GB)
    context_length: 32768

# Ollama embedding model profiles
ollama_embed_model_profiles:
  "bge-m3":
    info_url: "https://ollama.com/library/bge-m3"
    # BAAI BGE-M3 multilingual embedding (~1.2 GB)
    context_length: 8192

# Active ollama model — parameters pulled from ollama_model_profiles
#ollama_model: "qwen3-coder:latest"
ollama_model: "qwen2.5-coder:latest"
ollama_preload_models:
  - "{{ ollama_model }}"

# Active ollama embedding model — parameters pulled from ollama_embed_model_profiles
ollama_embed_model: "bge-m3"
ollama_embed_preload_models:
  - "{{ ollama_embed_model }}"

ollama_embedding_model: "{{ ollama_embed_model }}"
ollama_embedding_model_max_ctx: "{{ ollama_embed_model_profiles[ollama_embed_model].context_length }}"
ollama_port: 11434
# TLS port for HAProxy sidecar — LiteLLM's ollama/ provider forces TLS on all
# connections. Each Ollama pod runs an HAProxy sidecar (self-signed cert) that
# terminates TLS and proxies to localhost:ollama_port.
ollama_tls_port: 11435

# Ollama runtime config
ollama_num_parallel: 1
ollama_max_loaded_models: 1
ollama_keep_alive: "-1"
ollama_flash_attention: 1
ollama_kv_cache_type: "q8_0"
ollama_context_length: "{{ ollama_model_profiles[ollama_model].context_length }}"

# Ollama-embed runtime config (embedding-only instance)
ollama_embed_num_parallel: 2
ollama_embed_max_loaded_models: 1
ollama_embed_keep_alive: "-1"
ollama_embed_flash_attention: 1
ollama_embed_kv_cache_type: "q8_0"
ollama_embed_context_length: "{{ ollama_embed_model_profiles[ollama_embed_model].context_length }}"

docling_port: 5001
openwebui_image: "ghcr.io/open-webui/open-webui:main"
pipelines_image: "ghcr.io/open-webui/pipelines:main"
pipelines_port: 9099
searxng_port: 8080
# OpenWebUI configuration
openwebui_secret_key: "CHANGEME_SECRET_KEY"
openwebui_admin_name: "Admin User"
openwebui_admin_email: "admin@example.com"
openwebui_admin_password: "changeme"

# Embedding engine: "openai" routes through LiteLLM (unified OpenAI-v1 interface).
# Switch back to "ollama" + ollama_url for direct access without LiteLLM proxy.
openwebui_embedding_engine: "openai"
openwebui_embedding_openai_url: "http://litellm.{{ litellm_namespace }}.svc.cluster.local:4000/v1"
openwebui_embedding_ollama_url: "http://ollama-embed.ollama.svc.cluster.local:{{ ollama_port }}"

openwebui_embedding_chunk_size: 20000
openwebui_embedding_chunk_overlap: 750
openwebui_embedding_chunk_min_size: 100
openwebui_embedding_batch_size: 16

openwebui_content_extraction_engine: "docling"
openwebui_docling_server_url: "http://docling.docling.svc.cluster.local:{{ docling_port }}"
# openwebui_tei_openai_api_base_url: "http://tei.ollama.svc.cluster.local:8080/v1"
openwebui_searxng_query_url: "http://searxng.searxng.svc.cluster.local:{{ searxng_port }}/search?q=<query>"
openwebui_web_search_result_count: 5

# Pipelines (filter/function plugins for OpenWebUI)
# Master toggle — controls Deployment, Service, and OpenAI connection registration.
pipelines_enabled: true
# Which pipeline filter scripts to seed (files in roles/k8s_dgx/files/pipelines/)
