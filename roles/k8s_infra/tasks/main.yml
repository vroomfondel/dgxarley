# === MONITORING ===

- name: Create monitoring namespace and shared middlewares
  import_tasks: monitoring/monitoring_core.yml
  tags: [monitoring_core, promstack]
  when:
    - isk3smaster is defined
    - isk3smaster

- name: Deploy kube-state-metrics
  import_tasks: monitoring/ksm.yml
  tags: [ksm, promstack]
  when:
    - isk3smaster is defined
    - isk3smaster

- name: Deploy node-exporter
  import_tasks: monitoring/nodeexporter.yml
  tags: [nodeexporter, promstack]
  when:
    - isk3smaster is defined
    - isk3smaster

- name: Deploy Prometheus
  import_tasks: monitoring/prometheus.yml
  tags: [prometheus, promstack]
  when:
    - isk3smaster is defined
    - isk3smaster

- name: Deploy Alertmanager
  import_tasks: monitoring/alertmanager.yml
  tags: [alertmanager, promstack]
  when:
    - isk3smaster is defined
    - isk3smaster

- name: Deploy Grafana
  import_tasks: monitoring/grafana.yml
  tags: [grafana, promstack]
  when:
    - isk3smaster is defined
    - isk3smaster

- name: import loki.yml if isk3smaster is defined and true
  import_tasks: monitoring/loki.yml
  tags: loki
  when:
    - isk3smaster is defined
    - isk3smaster

- name: import uptimekuma.yml if isk3smaster is defined and true
  import_tasks: monitoring/uptimekuma.yml
  tags:
    - uptimekuma
  when:
    - isk3smaster is defined
    - isk3smaster

