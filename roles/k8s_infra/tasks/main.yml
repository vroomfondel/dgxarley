---
- name: debug k8s_infra role start
  debug:
    msg: "DONE k8s_infra ON: {{ inventory_hostname }}"


# === CORE ===
- name: config coredns
  import_tasks: core/coredns.yml
  tags:
    - coredns
  when:
    - isk3smaster is defined
    - isk3smaster

- name: import certmanager.yml if isk3smaster is defined and true
  import_tasks: core/certmanager.yml
  tags: certmanager
  when:
    - isk3smaster is defined
    - isk3smaster

- name: import traefikdashboard.yml if isk3smaster is defined and true
  import_tasks: core/traefikdashboard.yml
  tags: traefikdashboard
  when:
    - isk3smaster is defined
    - isk3smaster

- name: config keel
  import_tasks: core/keel.yml
  tags:
    - keel
  when:
    - isk3smaster is defined
    - isk3smaster

- name: import eso_keyverno.yml if isk3smaster is defined and true
  import_tasks: core/eso_keyverno.yml
  tags:
    - eso
  when:
    - isk3smaster is defined
    - isk3smaster

- name: import eso_secrets.yml if isk3smaster is defined and true
  import_tasks: core/eso_secrets.yml
  tags:
    - eso
    - eso_secrets
  when:
    - isk3smaster is defined
    - isk3smaster


- name: import smarter_devices.yml if isk3smaster is defined and true
  import_tasks: core/smarter_devices.yml
