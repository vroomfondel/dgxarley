    - isk3smaster is defined
    - isk3smaster

- name: import nfd.yml if isk3smaster is defined and true
  import_tasks: core/nfd.yml
  tags:
    - nfd
  when:
    - isk3smaster is defined
    - isk3smaster

- name: import sealed_secrets.yml if isk3smaster is defined and true
  import_tasks: core/sealed_secrets.yml
  tags: sealed_secrets
  when:
    - isk3smaster is defined
    - isk3smaster

# === DATABASES ===

