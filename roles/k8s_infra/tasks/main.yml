    - kceve_kvm
  when:
    - isk3smaster is defined
    - isk3smaster

- name: Deploy NUT exporter for UPS monitoring
  import_tasks: monitoring/nut_exporter.yml
  tags: [nut_exporter, promstack]
  when:
    - isk3smaster is defined
    - isk3smaster

# === APPS ===
# User-facing app-layer services (moved here from the k8s_dgx role). Their
# shared inference coordinates live in group_vars/all/main.yml.

- name: Deploy SearXNG
  import_tasks: apps/searxng.yml
  tags: searxng
  when:
    - isk3smaster is defined
    - isk3smaster

- name: Deploy Open WebUI
  import_tasks: apps/openwebui.yml
  tags: openwebui
  when:
    - isk3smaster is defined
    - isk3smaster

- name: Deploy Pipelines
  import_tasks: apps/pipelines.yml
  tags: pipelines
  when:
    - isk3smaster is defined
    - isk3smaster

- name: Deploy Honcho AI memory backend
  import_tasks: apps/honcho.yml
  tags: honcho
  when:
    - isk3smaster is defined
    - isk3smaster

- name: Deploy Hindsight agent memory backend
  import_tasks: apps/hindsight.yml
  tags: hindsight
  when:
    - isk3smaster is defined
    - isk3smaster

- name: Deploy per-user Nous Hermes agents (agent + optional webui sidecar)
  import_tasks: apps/hermes.yml
  tags: hermes
  when:
    - isk3smaster is defined
    - isk3smaster

# === DNS ===

- name: Register DNS A records for k8s_infra ingress services
  import_tasks: dns.yml
  tags: dns
  when:
    - isk3smaster is defined
    - isk3smaster
