---
- name: debug k8s_infra role start
  debug:
    msg: "DONE k8s_infra ON: {{ inventory_hostname }}"


# === CORE ===
- name: config coredns
  import_tasks: core/kubectlstuff_coredns.yml
  tags:
    - coredns
  when:
    - isk3smaster is defined
    - isk3smaster

- name: import kubectlstuff_certmanager.yml if isk3smaster is defined and true
  import_tasks: core/kubectlstuff_certmanager.yml
  tags: certmanager
  when:
    - isk3smaster is defined
    - isk3smaster

- name: import kubectlstuff_traefikdashboard.yml if isk3smaster is defined and true
  import_tasks: core/kubectlstuff_traefikdashboard.yml
