---
# Matrix Synapse homeserver + Cinny and Element web clients in the `matrix`
# namespace.
#
# Ported from the sister repo's Keycloak-OIDC deployment
# (../ansible/roles/k8s_workloads/tasks/communication/kubectlstuff_matrix.yml)
# down to LOCAL Synapse auth — dgxarley has no Keycloak. All OIDC bits
# (oidc_providers, the modules oidc/oauth sub-blocks, the Keycloak realm/client
# provisioning, the matrix-admin-sync Job) are intentionally dropped. Element Web
# was dropped with them at first and came back later as an OIDC-free client.
#
# Three gate pairs (all in defaults/main/matrix.yml): matrix_enabled /
# matrix_teardown for the whole stack, plus matrix_cinny_* and matrix_element_*
# for the two web clients, so either client can be added or removed without
# touching Synapse. The client gates are SUBORDINATE: they live inside the
# matrix_enabled install block, so with matrix_enabled false they change nothing.
# Only the two client TEARDOWN blocks are outside it and thus always reachable.
#
# Design decisions:
#   - server_name == the public ingress host (matrix.<base_domain>): no split
#     between identity domain and server host, so NO .well-known delegation is
#     needed and federation "just works" by connecting to matrix.<base>:443.
#     User IDs are @user:matrix.<base_domain>.
#   - Domain is split main.yml/vault: matrix.base_domain holds ONLY the dummy
#     (example.eu) in group_vars/all/main + role defaults; the real kikube.eu is
#     in group_vars/all/vault/matrix.yml (git-crypt).
#   - Database: dedicated `synapse` DB on the shared PostgreSQL, created with the
#     C collation Synapse requires (LC_COLLATE/LC_CTYPE 'C', template0). DB
#     password flows postgresql-secrets -> k8s_info -> app Secret, like forgejo.
#     Dual-provisioned: 8_createdb_synapse.sh (fresh clusters) + the idempotent
#     k8s_exec block below (existing clusters).
#   - Storage: hostPath (matrix.data_base) -> /data (signing.key, media_store).
#     No PVC/StorageClass (dgxarley has none), matching forgejo/seafile.
#   - Auth: local password auth + closed registration; admin + bot_users created
#     via register_new_matrix_user. Optional synapse-token-authenticator jwt
#     module (HS512, symmetric secret) for Hermes-agent Matrix bots — no OIDC.
#   - Federation needs matrix.<base> reachable publicly on 443, so the matrix
#     IngressRoute carries NO ip-allowlist. Cinny and Element (convenience web
#     clients) are behind the internal allowlist — flip by removing the middleware
#     line from the respective route.
#   - Gated install + in-file teardown (matrix_enabled / matrix_teardown), same
#     pattern as honcho/hindsight. teardown deletes the namespace but PRESERVES
#     the synapse Postgres DB (holds rooms/messages) — drop it by hand to abandon.
#     Cinny and Element carry the same pattern one level down (own enable +
#     teardown flags, teardown blocks at the END of this file).

- name: Matrix — install
  when:
    - matrix_enabled | default(false) | bool
    - not (matrix_teardown | default(false) | bool)
  block:
    - name: Create matrix namespace
      kubernetes.core.k8s:
        name: "{{ matrix.namespace }}"
        api_version: v1
        kind: Namespace
        state: present

    # =======================================================================
    # PostgreSQL provisioning (idempotent, for already-initialised clusters).
    # Fresh clusters get the same DB via postgresql initdb 8_createdb_synapse.sh.
    # The C-collation clause is a HARD Synapse requirement and cannot be altered
    # after creation, so it must be present on CREATE (create-if-not-exists).
    # =======================================================================

    - name: Get synapse database password from postgresql-secrets
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Secret
        name: postgresql-secrets
        namespace: postgresql
      register: matrix_postgresql_secrets_info

    - name: Set synapse credential facts
      ansible.builtin.set_fact:
        synapse_db_password: "{{ matrix_postgresql_secrets_info.resources[0].data.SYNAPSE_POSTGRES_PASSWORD | b64decode }}"

    - name: Get PostgreSQL pod
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: postgresql
        label_selectors:
          - app=postgresql
      register: matrix_postgresql_pods

    - name: Set PostgreSQL pod name fact
      ansible.builtin.set_fact:
        matrix_postgresql_pod_name: "{{ matrix_postgresql_pods.resources[0].metadata.name }}"

    - name: Ensure synapse user and C-collated database exist in PostgreSQL
      kubernetes.core.k8s_exec:
        namespace: postgresql
        pod: "{{ matrix_postgresql_pod_name }}"
        command: |
          bash -c '
            set -e
            SYNAPSE_PASSWORD="{{ synapse_db_password }}"

            if psql -U postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='\''synapse'\''" | grep -q 1; then
              psql -U postgres -c "ALTER USER synapse WITH PASSWORD '\''${SYNAPSE_PASSWORD}'\'';"
              echo "User synapse: exists (password ensured)"
            else
              psql -U postgres -c "CREATE USER synapse WITH PASSWORD '\''${SYNAPSE_PASSWORD}'\'';"
              echo "User synapse: created"
            fi

            # Synapse REQUIRES the C collation; it refuses to start otherwise.
            if psql -U postgres -tAc "SELECT 1 FROM pg_database WHERE datname='\''synapse'\''" | grep -q 1; then
              echo "Database synapse: exists"
            else
              psql -U postgres -c "CREATE DATABASE synapse OWNER synapse ENCODING '\''UTF8'\'' LC_COLLATE '\''C'\'' LC_CTYPE '\''C'\'' TEMPLATE template0;"
              psql -U postgres -c "GRANT ALL PRIVILEGES ON DATABASE synapse TO synapse;"
              echo "Database synapse: created"
            fi
          '
      register: matrix_db_ensure
      changed_when: "'created' in matrix_db_ensure.stdout"

    # =======================================================================
    # Synapse config — homeserver.yaml + log.config live in a Secret (not a
    # ConfigMap) because homeserver.yaml embeds the DB password and the Synapse
    # symmetric secrets in plaintext. Mounted read-only via subPath.
    # =======================================================================

    - name: Create synapse-config Secret (homeserver.yaml + log.config)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: synapse-config
            namespace: "{{ matrix.namespace }}"
          type: Opaque
          stringData:
            homeserver.yaml: "{{ lookup('template', 'matrix/matrix_homeserver.yaml.j2') }}"
            log.config: "{{ lookup('template', 'matrix/matrix_log.config.j2') }}"

    # =======================================================================
    # Synapse server
    # =======================================================================

    - name: Create synapse Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: synapse
            namespace: "{{ matrix.namespace }}"
            labels:
              app: synapse
          spec:
            selector:
              app: synapse
            ports:
              - port: 8008
                name: http
                targetPort: 8008

    - name: Create synapse Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: synapse
            namespace: "{{ matrix.namespace }}"
            labels:
              app: synapse
            annotations:
              keel.sh/policy: force
              keel.sh/match-tag: "true"
              keel.sh/pollSchedule: "@every 24h"
              keel.sh/trigger: poll
          spec:
            replicas: 1
            strategy:
              type: Recreate
            selector:
              matchLabels:
                app: synapse
            template:
              metadata:
                labels:
                  app: synapse
              spec:
                restartPolicy: Always
                # Pin to amd64 (k3smaster is the only amd64 node) — keeps it off
                # the ARM64 GPU sparks. NB: the hostPath data dir lives on k3smaster;
                # if a second amd64 node is ever added, pin back to `node-role:
                # k3smaster` so Synapse doesn't move away from its data.
                nodeSelector:
                  kubernetes.io/arch: "amd64"
                securityContext:
                  # Kept for a possible future move back to a PVC, but NOTE: fsGroup
                  # does NOT apply to hostPath volumes, so it does nothing here. The
                  # sister repo gets away with fsGroup alone because its data volume
                  # is a PVC; this port swapped that for hostPath. The fix-perms
                  # initContainer below is what actually makes /data writable.
                  fsGroup: 991
                dnsConfig:
                  options:
                    - name: ndots
                      value: "1"
                initContainers:
                  # /start.py only chowns the data dir in its config-GENERATE path.
                  # We ship a ready-made homeserver.yaml via SYNAPSE_CONFIG_PATH, so
                  # it takes the existing-config path, skips the chown and gosu's
                  # straight to 991 — which then cannot create /data/signing.key on a
                  # root-owned hostPath. Same fix-perms pattern as the hermes pods.
                  - name: fix-perms
                    image: busybox:stable
                    imagePullPolicy: Always
                    command: ["sh", "-c", "chown -R 991:991 /data && chmod 0750 /data"]
                    securityContext:
                      runAsUser: 0
                    volumeMounts:
                      - name: data
                        mountPath: /data
                containers:
                  - name: synapse
                    image: "{{ matrix.images.synapse.repo }}:{{ matrix.images.synapse.tag }}"
                    imagePullPolicy: Always
                    # Always go through /start.py (stock entrypoint). When token
                    # auth is on, pip-install the module first — the `{% if %}`
                    # sits inside this block scalar, so it's Jinja-safe.
                    #
                    # The sed is what makes $NODE_IP usable: Synapse does NOT expand
                    # env vars in a supplied homeserver.yaml (start.py only renders
                    # its OWN template, and only in the config-generate path we never
                    # take), so the placeholder is substituted here, before it ever
                    # reads the file. The secret mount is read-only, hence the render
                    # into the tmpfs at /run/synapse — which also keeps the DB
                    # password and macaroon secret off disk. Runs unconditionally: on
                    # a config without the placeholder the sed is just a copy.
                    command: ["/bin/sh", "-c"]
                    args:
                      - |
                        set -e
                        sed "s|__NODE_IP__|${NODE_IP}|g" /config/homeserver.yaml > /run/synapse/homeserver.yaml
                        chown 991:991 /run/synapse/homeserver.yaml
                        chmod 0400 /run/synapse/homeserver.yaml
                        {% if matrix.enable_token_authenticator %}pip install --no-cache-dir synapse-token-authenticator && {% endif %}exec /start.py
                    env:
                      - name: SYNAPSE_CONFIG_PATH
                        value: /run/synapse/homeserver.yaml
                      # The pod's own node — see the sed above and the smtp_host
                      # rationale in defaults/main/matrix.yml. Must be the node the
                      # pod actually landed on (/data is NFS, so it can move).
                      - name: NODE_IP
                        valueFrom:
                          fieldRef:
                            fieldPath: status.hostIP
                      - name: TZ
                        value: "{{ matrix.time_zone }}"
                      - name: UID
                        value: "991"
                      - name: GID
                        value: "991"
                    ports:
                      - containerPort: 8008
                        name: http
                    startupProbe:
                      httpGet:
                        path: /health
                        port: 8008
                      failureThreshold: 30
                      periodSeconds: 10
                    readinessProbe:
                      httpGet:
                        path: /health
                        port: 8008
                      periodSeconds: 10
                      timeoutSeconds: 3
                    livenessProbe:
                      tcpSocket:
                        port: 8008
                      periodSeconds: 30
                      timeoutSeconds: 5
                      failureThreshold: 3
                    resources:
                      requests:
                        cpu: "{{ matrix.resources.synapse.cpu_request }}"
                        memory: "{{ matrix.resources.synapse.memory_request }}"
                      limits:
                        cpu: "{{ matrix.resources.synapse.cpu_limit }}"
                        memory: "{{ matrix.resources.synapse.memory_limit }}"
                    volumeMounts:
                      - name: data
                        mountPath: /data
                      - name: synapse-config
                        mountPath: /config/homeserver.yaml
                        subPath: homeserver.yaml
                        readOnly: true
                      - name: synapse-config
                        mountPath: /data/log.config
                        subPath: log.config
                        readOnly: true
                      - name: config-rendered
                        mountPath: /run/synapse
                volumes:
                  - name: data
                    hostPath:
                      path: "{{ matrix.data_base }}"
                      type: DirectoryOrCreate
                  - name: synapse-config
                    secret:
                      secretName: synapse-config
                  # Target of the __NODE_IP__ sed. Memory-backed on purpose: the
                  # rendered file carries the DB password and macaroon secret, and
                  # this way they never touch the node's disk.
                  - name: config-rendered
                    emptyDir:
                      medium: Memory

    # =======================================================================
    # Web clients (Cinny + Element). Both are static SPAs pointed straight at
    # matrix.<base>, both optional and independently gated.
    #
    # These tasks are inside the matrix_enabled block, so the client gates only
    # ever narrow an install that is already happening; they cannot trigger one.
    #
    # The gates are resolved into two facts rather than repeated per task,
    # because each client's objects live in TWO places in this file (workload
    # here, IngressRoutes down in the ingress section) — a single `block:` per
    # client would only cover one of them. `not <x>_teardown` is part of the
    # install gate so a teardown run cannot re-create what it is about to
    # delete. The teardown blocks themselves are at the END of this file,
    # outside the install block, so they stay reachable with <x>_enabled false.
    # =======================================================================

    - name: Resolve web client install gates
      ansible.builtin.set_fact:
        _matrix_cinny_install: >-
          {{ (matrix_cinny_enabled | default(true) | bool)
             and not (matrix_cinny_teardown | default(false) | bool) }}
        _matrix_element_install: >-
          {{ (matrix_element_enabled | default(true) | bool)
             and not (matrix_element_teardown | default(false) | bool) }}

    # Rendered once into a fact so the ConfigMap and the Deployment's rollout
    # checksum are driven by the exact same string. Hashing the INPUTS instead
    # (cluster_cidr + the ip list) looks equivalent but is not: a fix to the
    # rendering itself leaves the inputs untouched, so the hash would not move,
    # no new pod template would be produced, and the ConfigMap edit would sit
    # there unused behind a subPath mount that never refreshes.
    # Rationale for the file's contents is in the template's header.
    - name: Render web client nginx realip snippet
      ansible.builtin.set_fact:
        _matrix_client_realip_conf: "{{ lookup('template', 'matrix/matrix_client_realip.conf.j2') }}"

    - name: Create cinny-config ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: cinny-config
            namespace: "{{ matrix.namespace }}"
          data:
            config.json: |
              {
                "defaultHomeserver": 0,
                "homeserverList": [
                  "https://matrix.{{ matrix.base_domain }}"
                ]
              }
            realip.conf: "{{ _matrix_client_realip_conf }}"
      when: _matrix_cinny_install | bool

    - name: Create cinny Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: cinny
            namespace: "{{ matrix.namespace }}"
            labels:
              app: cinny
          spec:
            selector:
              app: cinny
            ports:
              - port: 80
                name: http
                targetPort: 80
      when: _matrix_cinny_install | bool

    - name: Create cinny Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: cinny
            namespace: "{{ matrix.namespace }}"
            labels:
              app: cinny
            annotations:
              keel.sh/policy: force
              keel.sh/match-tag: "true"
              keel.sh/pollSchedule: "@every 24h"
              keel.sh/trigger: poll
          spec:
            replicas: 1
            strategy:
              type: RollingUpdate
            selector:
              matchLabels:
                app: cinny
            template:
              metadata:
                labels:
                  app: cinny
                annotations:
                  # A subPath mount never refreshes in place, and even a plain mount
                  # would not make nginx re-read its config. Without this hash an edit
                  # to realip.conf would update the ConfigMap and silently do nothing
                  # until something else happened to roll the pod. Hashes the rendered
                  # content, not its inputs — see the fact above for why.
                  checksum/realip-conf: "{{ _matrix_client_realip_conf | hash('sha1') }}"
              spec:
                restartPolicy: Always
                enableServiceLinks: false
                nodeSelector:
                  kubernetes.io/arch: "amd64"
                containers:
                  - name: cinny
                    image: "{{ matrix.images.cinny.repo }}:{{ matrix.images.cinny.tag }}"
                    imagePullPolicy: Always
                    ports:
                      - containerPort: 80
                        name: http
                    readinessProbe:
                      httpGet:
                        path: /
                        port: 80
                      periodSeconds: 10
                    livenessProbe:
                      httpGet:
                        path: /
                        port: 80
                      periodSeconds: 30
                    resources:
                      requests:
                        cpu: "{{ matrix.resources.cinny.cpu_request }}"
                        memory: "{{ matrix.resources.cinny.memory_request }}"
                      limits:
                        cpu: "{{ matrix.resources.cinny.cpu_limit }}"
                        memory: "{{ matrix.resources.cinny.memory_limit }}"
                    volumeMounts:
                      - name: cinny-config
                        mountPath: /app/config.json
                        subPath: config.json
                        readOnly: true
                      # subPath, so the image's own default.conf in this directory
                      # survives instead of being shadowed by the ConfigMap.
                      - name: cinny-config
                        mountPath: /etc/nginx/conf.d/realip.conf
                        subPath: realip.conf
                        readOnly: true
                volumes:
                  - name: cinny-config
                    configMap:
                      name: cinny-config
      when: _matrix_cinny_install | bool

    # =======================================================================
    # Element Web — the second (optional) client, gated by matrix_element_enabled.
    # Same homeserver, same allowlist, own host element.<base_domain>. Everything
    # is static SPA + nginx, so it shares cinny's realip snippet.
    # =======================================================================

    # Same reasoning as for realip.conf above: rendered once into a fact so the
    # ConfigMap and the Deployment's rollout checksum are driven by the identical
    # string. config.json is a subPath mount too, so without a checksum an edit
    # here would update the ConfigMap and silently do nothing until the pod
    # happened to roll for some unrelated reason.
    #
    # Trimmed against the sister repo's config: no logout_redirect_url — that one
    # ends a Keycloak SSO session, this homeserver has local password auth.
    # disable_custom_urls pins the client to OUR homeserver, matching cinny's
    # single-entry homeserverList; set it false to let users type another server.
    #
    # Built as a dict and serialised with to_nice_json instead of a JSON literal:
    # the three call-related keys below are OPTIONAL, and stitching optional
    # members into hand-written JSON means getting the commas right in Jinja. The
    # dict merge cannot produce invalid JSON. Only the keys we actually want to
    # deviate on are emitted, so Element keeps its upstream defaults everywhere
    # else (that is also why an unset knob adds NO key at all).
    #
    # Call stack, the two independent halves:
    #   jitsi.preferred_domain  — which Jitsi the room-widget conferences use.
    #     Unset => Element's own meet.element.io. NOTE it is ignored if the widget
    #     came from an integration manager or if the homeserver advertises jitsi in
    #     /.well-known/matrix/client; ours does neither, so this wins.
    #   element_call.disable    — kills the NATIVE group-call stack (Element Call),
    #     which is a separate thing from the Jitsi widget and on by default,
    #     pointed at Element's hosted instance. Key is `disable`, NOT `disabled`:
    #     the schema (packages/shared-types/lib/config.json.d.ts) and the reader
    #     (hooks/room/useRoomCall.ts) both say `disable`, docs/config.md has it
    #     wrong in one bullet.
    - name: Render element config.json
      vars:
        _element_cfg_base:
          default_server_config:
            m.homeserver:
              base_url: "https://matrix.{{ matrix.base_domain }}"
              server_name: "matrix.{{ matrix.base_domain }}"
          brand: "Element"
          default_theme: "dark"
          disable_custom_urls: true
          disable_guests: true
          room_directory:
            servers: ["matrix.{{ matrix.base_domain }}"]
        _element_cfg_jitsi: >-
          {{ {'jitsi': {'preferred_domain': matrix_element_jitsi_domain}}
             if (matrix_element_jitsi_domain | default('') | length > 0) else {} }}
        _element_cfg_jitsi_widget: >-
          {{ {'jitsi_widget': {'skip_built_in_welcome_screen': true}}
             if (matrix_element_jitsi_skip_welcome | default(false) | bool) else {} }}
        _element_cfg_call: >-
          {{ {'element_call': {'disable': true}}
             if not (matrix_element_call_enabled | default(true) | bool) else {} }}
      ansible.builtin.set_fact:
        _matrix_element_config_json: >-
          {{ _element_cfg_base
             | combine(_element_cfg_jitsi, _element_cfg_jitsi_widget, _element_cfg_call)
             | to_nice_json }}
      when: _matrix_element_install | bool

    - name: Create element-config ConfigMap
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: element-config
            namespace: "{{ matrix.namespace }}"
          data:
            config.json: "{{ _matrix_element_config_json }}"
            realip.conf: "{{ _matrix_client_realip_conf }}"
      when: _matrix_element_install | bool

    - name: Create element-web Service
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: element-web
            namespace: "{{ matrix.namespace }}"
            labels:
              app: element-web
          spec:
            selector:
              app: element-web
            ports:
              - port: 80
                name: http
                targetPort: http
      when: _matrix_element_install | bool

    - name: Create element-web Deployment
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: element-web
            namespace: "{{ matrix.namespace }}"
            labels:
              app: element-web
            annotations:
              keel.sh/policy: force
              keel.sh/match-tag: "true"
              keel.sh/pollSchedule: "@every 24h"
              keel.sh/trigger: poll
          spec:
            replicas: 1
            strategy:
              type: RollingUpdate
            selector:
              matchLabels:
                app: element-web
            template:
              metadata:
                labels:
                  app: element-web
                annotations:
                  # Both files are subPath mounts, which never refresh in place,
                  # and nginx would not re-read its config anyway. Hashes the
                  # rendered content, not its inputs — see the facts above for why.
                  checksum/realip-conf: "{{ _matrix_client_realip_conf | hash('sha1') }}"
                  checksum/element-config: "{{ _matrix_element_config_json | hash('sha1') }}"
              spec:
                restartPolicy: Always
                enableServiceLinks: false
                nodeSelector:
                  kubernetes.io/arch: "amd64"
                containers:
                  - name: element-web
                    image: "{{ matrix.images.element.repo }}:{{ matrix.images.element.tag }}"
                    imagePullPolicy: Always
                    # The image is nginx-unprivileged (runs as uid 101) but ships
                    # ELEMENT_WEB_PORT=80 as its default, which only binds because
                    # the container runtime happens to set
                    # net.ipv4.ip_unprivileged_port_start=0. Moving it to 8080
                    # takes that assumption out of the picture; the Service still
                    # publishes 80, so nothing downstream changes.
                    env:
                      - name: ELEMENT_WEB_PORT
                        value: "8080"
                    ports:
                      - containerPort: 8080
                        name: http
                    readinessProbe:
                      httpGet:
                        path: /
                        port: http
                      periodSeconds: 10
                    livenessProbe:
                      httpGet:
                        path: /
                        port: http
                      periodSeconds: 30
                    resources:
                      requests:
                        cpu: "{{ matrix.resources.element.cpu_request }}"
                        memory: "{{ matrix.resources.element.memory_request }}"
                      limits:
                        cpu: "{{ matrix.resources.element.cpu_limit }}"
                        memory: "{{ matrix.resources.element.memory_limit }}"
                    volumeMounts:
                      # /app is where the entrypoint reads config*.json from before
                      # copying it to the /tmp dir nginx actually serves /config
                      # out of, so the mount belongs here and not in /tmp.
                      - name: element-config
                        mountPath: /app/config.json
                        subPath: config.json
                        readOnly: true
                      # subPath, so the default.conf that the image's entrypoint
                      # renders into this directory survives instead of being
                      # shadowed by the ConfigMap.
                      - name: element-config
                        mountPath: /etc/nginx/conf.d/realip.conf
                        subPath: realip.conf
                        readOnly: true
                volumes:
                  - name: element-config
                    configMap:
                      name: element-config
      when: _matrix_element_install | bool

    # =======================================================================
    # DNS (nsupdate) — register A records for matrix + cinny (+ element) under
    # base_domain.
    # Every nsupdate parameter is overridable per-matrix via the OPTIONAL
    # matrix.dns.* sub-dict (server / zone / tsig_key_name / tsig_key_secret /
    # tsig_algorithm / ttl / ingress_ip); each key falls back to the cluster-wide
    # nsupdate_* value (zone -> nsupdate_zone) when omitted.
    # IMPORTANT: the record is <item>.<base_domain> (matrix.kikube.eu), and
    # nsupdate REFUSES a record outside its zone. So if base_domain is a zone of
    # its OWN (kikube.eu), you MUST set matrix.dns.zone (+ likely server/TSIG) to
    # match — the nsupdate_zone fallback only fits when base_domain sits under it.
    # kikube.eu is a separate zone, so it typically needs its own server + TSIG +
    # ingress IP here. If none is available, set matrix.manage_dns=false and
    # manage DNS externally. record MUST be the full FQDN with a trailing dot.
    # =======================================================================

    # Hosts that get an A record AND a certificate. A client only joins the list
    # while it is being installed — a disabled client must not leave a record
    # pointing at an ingress route that 404s, nor burn an ACME order on a host
    # nobody serves. matrix. is unconditional, it is Synapse itself.
    - name: Build matrix host list
      ansible.builtin.set_fact:
        _matrix_hosts: >-
          {{ ['matrix']
             + (['cinny'] if _matrix_cinny_install | bool else [])
             + (['element'] if _matrix_element_install | bool else []) }}

    - name: Register DNS A records for the matrix hosts
      community.general.nsupdate:
        server: "{{ matrix.dns.server | default(nsupdate_server) }}"
        zone: "{{ matrix.dns.zone | default(nsupdate_zone) }}"
        key_name: "{{ matrix.dns.tsig_key_name | default(nsupdate_tsig_key_name) }}"
        key_secret: "{{ matrix.dns.tsig_key_secret | default(nsupdate_tsig_key_secret) }}"
        key_algorithm: "{{ matrix.dns.tsig_algorithm | default(nsupdate_tsig_algorithm) }}"
        record: "{{ item }}.{{ matrix.base_domain }}."
        type: A
        ttl: "{{ matrix.dns.ttl | default(nsupdate_ttl) }}"
        value: "{{ matrix.dns.ingress_ip | default(nsupdate_ingress_ip) }}"
        state: present
      loop: "{{ _matrix_hosts }}"
      when: matrix.manage_dns | bool

    # =======================================================================
    # Ingress (Traefik) + TLS. Shared middlewares, then per-host cert + routes.
    # matrix.<base> is PUBLIC (federation/clients need it) — no ip-allowlist.
    # cinny.<base> sits behind the internal allowlist (remove its middleware
    # line below to expose Cinny publicly too).
    # =======================================================================

    - name: Create matrix redirect-myhttps Middleware
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: Middleware
          metadata:
            name: redirect-myhttps
            namespace: "{{ matrix.namespace }}"
          spec:
            redirectScheme:
              scheme: https

    - name: Create matrix ip allowlist Middleware
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: Middleware
          metadata:
            name: matrix-ip-allowlist
            namespace: "{{ matrix.namespace }}"
          spec:
            ipAllowList:
              # traefik_internal_allowlist covers only RFC1918 — that is enough for
              # internal clients, which pihole (sister repo, 14-meine-ips.conf) points
              # straight at the cluster ingress. Remote colleagues arrive via the
              # wireguard-host nginx, so Traefik sees THAT proxy's public source IP and
              # would 403 without this entry. Same value that the public A record points
              # at, hence the shared ingress_ip stanza rather than a second literal.
              sourceRange: "{{ traefik_internal_allowlist + [matrix.dns.ingress_ip | default(nsupdate_ingress_ip) ~ '/32'] }}"

    - name: Create TLS certificates for the matrix hosts
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: cert-manager.io/v1
          kind: Certificate
          metadata:
            name: "{{ item }}.{{ matrix.base_domain }}"
            namespace: "{{ matrix.namespace }}"
          spec:
            dnsNames:
              - "{{ item }}.{{ matrix.base_domain }}"
            secretName: "{{ item }}.{{ matrix.base_domain }}"
            issuerRef:
              # ClusterIssuer whose dns_zones cover matrix.base_domain — one of the
              # certmanager_acme_issuers entries (see certmanager.yml). Configurable
              # because base_domain may live in a zone letsencrypt-production's
              # solver (scoped to dns_external_domain_suffix) cannot solve.
              name: "{{ matrix_tls_issuer }}"
              kind: ClusterIssuer
      loop: "{{ _matrix_hosts }}"

    # --- Synapse (public) ---
    - name: Create synapse http IngressRoute (redirect to https)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: synapse-ingress
            namespace: "{{ matrix.namespace }}"
          spec:
            entryPoints:
              - web
            routes:
              - kind: Rule
                match: "Host(`matrix.{{ matrix.base_domain }}`)"
                priority: 10
                services:
                  - kind: Service
                    name: synapse
                    namespace: "{{ matrix.namespace }}"
                    passHostHeader: true
                    port: 8008
                middlewares:
                  - name: redirect-myhttps

    # Unlike the sister repo's homeserver, this one does NOT federate, so nothing
    # outside needs to reach Synapse directly: remote clients come in through the
    # wireguard-host nginx (whose IP the allowlist carries) and internal ones are
    # pointed at the cluster ingress by pihole. The allowlist therefore closes the
    # direct-to-Traefik path without costing any legitimate client. Enabling
    # federation later means dropping the middleware from the https route below.
    - name: Create synapse https IngressRoute (allowlisted — no federation)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: synapse-https-ingress
            namespace: "{{ matrix.namespace }}"
          spec:
            entryPoints:
              - websecure
            routes:
              - kind: Rule
                match: "Host(`matrix.{{ matrix.base_domain }}`)"
                priority: 10
                services:
                  - kind: Service
                    name: synapse
                    namespace: "{{ matrix.namespace }}"
                    passHostHeader: true
                    port: 8008
                middlewares:
                  - name: matrix-ip-allowlist
            tls:
              secretName: "matrix.{{ matrix.base_domain }}"

    # --- Cinny (internal allowlist) ---
    - name: Create cinny http IngressRoute (redirect to https)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: cinny-ingress
            namespace: "{{ matrix.namespace }}"
          spec:
            entryPoints:
              - web
            routes:
              - kind: Rule
                match: "Host(`cinny.{{ matrix.base_domain }}`)"
                priority: 10
                services:
                  - kind: Service
                    name: cinny
                    namespace: "{{ matrix.namespace }}"
                    passHostHeader: true
                    port: 80
                middlewares:
                  - name: redirect-myhttps
                  - name: matrix-ip-allowlist
      when: _matrix_cinny_install | bool

    - name: Create cinny https IngressRoute
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: cinny-https-ingress
            namespace: "{{ matrix.namespace }}"
          spec:
            entryPoints:
              - websecure
            routes:
              - kind: Rule
                match: "Host(`cinny.{{ matrix.base_domain }}`)"
                priority: 10
                middlewares:
                  - name: matrix-ip-allowlist
                services:
                  - kind: Service
                    name: cinny
                    namespace: "{{ matrix.namespace }}"
                    passHostHeader: true
                    port: 80
            tls:
              secretName: "cinny.{{ matrix.base_domain }}"
      when: _matrix_cinny_install | bool

    # --- Element (internal allowlist, same as cinny) ---
    - name: Create element http IngressRoute (redirect to https)
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: element-ingress
            namespace: "{{ matrix.namespace }}"
          spec:
            entryPoints:
              - web
            routes:
              - kind: Rule
                match: "Host(`element.{{ matrix.base_domain }}`)"
                priority: 10
                services:
                  - kind: Service
                    name: element-web
                    namespace: "{{ matrix.namespace }}"
                    passHostHeader: true
                    port: 80
                middlewares:
                  - name: redirect-myhttps
                  - name: matrix-ip-allowlist
      when: _matrix_element_install | bool

    - name: Create element https IngressRoute
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: traefik.io/v1alpha1
          kind: IngressRoute
          metadata:
            name: element-https-ingress
            namespace: "{{ matrix.namespace }}"
          spec:
            entryPoints:
              - websecure
            routes:
              - kind: Rule
                match: "Host(`element.{{ matrix.base_domain }}`)"
                priority: 10
                middlewares:
                  - name: matrix-ip-allowlist
                services:
                  - kind: Service
                    name: element-web
                    namespace: "{{ matrix.namespace }}"
                    passHostHeader: true
                    port: 80
            tls:
              secretName: "element.{{ matrix.base_domain }}"
      when: _matrix_element_install | bool

    # =======================================================================
    # Admin + bot bootstrap (idempotent). register_new_matrix_user authenticates
    # via registration_shared_secret (NOT OIDC), so it works with local auth
    # even though enable_registration is false. `|| true` swallows the harmless
    # "user already exists" error on re-runs.
    # =======================================================================

    - name: Wait for synapse Deployment to be available
      kubernetes.core.k8s_info:
        api_version: apps/v1
        kind: Deployment
        name: synapse
        namespace: "{{ matrix.namespace }}"
        wait: true
        wait_condition:
          type: Available
          status: "True"
        wait_timeout: 600

    - name: Get synapse pod
      kubernetes.core.k8s_info:
        api_version: v1
        kind: Pod
        namespace: "{{ matrix.namespace }}"
        label_selectors:
          - app=synapse
        field_selectors:
          - status.phase=Running
      register: matrix_synapse_pods

    - name: Set synapse pod name fact
      ansible.builtin.set_fact:
        matrix_synapse_pod_name: "{{ matrix_synapse_pods.resources[0].metadata.name }}"

    # Idempotency comes from --exists-ok (rc 0 + "User already exists. Skipping."),
    # NOT from matching on the error text: without the flag an existing user is a
    # hard `400 User ID already taken.` — which is neither the "User already exists"
    # the old failed_when looked for, nor was "User registered" ever printed on
    # success ("Success!" is). Both strings were wrong, so the task could only ever
    # report ok-but-never-changed, or die on the second run.
    - name: Ensure synapse admin user exists
      kubernetes.core.k8s_exec:
        namespace: "{{ matrix.namespace }}"
        pod: "{{ matrix_synapse_pod_name }}"
        command: >
          register_new_matrix_user
          -c /config/homeserver.yaml
          -u {{ matrix.admin.username | quote }}
          -p {{ matrix.admin.password | quote }}
          --exists-ok
          -a
          http://localhost:8008
      register: matrix_admin_ensure
      changed_when: "'Success!' in matrix_admin_ensure.stdout"

    - name: Ensure synapse regular users exist (non-admin)
      kubernetes.core.k8s_exec:
        namespace: "{{ matrix.namespace }}"
        pod: "{{ matrix_synapse_pod_name }}"
        command: >
          register_new_matrix_user
          -c /config/homeserver.yaml
          -u {{ item.user | quote }}
          -p {{ item.password | quote }}
          --exists-ok
          --no-admin
          http://localhost:8008
      loop: "{{ matrix.users | default([]) }}"
      loop_control:
        label: "{{ item.user }}"
      register: matrix_user_ensure
      changed_when: "'Success!' in matrix_user_ensure.stdout"

    - name: Ensure synapse bot users exist (non-admin)
      kubernetes.core.k8s_exec:
        namespace: "{{ matrix.namespace }}"
        pod: "{{ matrix_synapse_pod_name }}"
        command: >
          register_new_matrix_user
          -c /config/homeserver.yaml
          -u {{ item.user | quote }}
          -p {{ item.password | quote }}
          --exists-ok
          --no-admin
          http://localhost:8008
      loop: "{{ matrix.bot_users | default([]) }}"
      loop_control:
        label: "{{ item.user }}"
      register: matrix_bot_ensure
      changed_when: "'Success!' in matrix_bot_ensure.stdout"

    # --- Email addresses (3PIDs) -------------------------------------------
    # register_new_matrix_user has no way to attach a third-party ID, so the
    # optional per-user `email` is applied here, after the accounts exist. Setting
    # it through the admin API marks it verified immediately — no confirmation mail
    # (there is no SMTP config), which is exactly why this path is used.
    - name: Collect accounts that declare an email address
      ansible.builtin.set_fact:
        matrix_3pid_accounts: >-
          {{ ((matrix.users | default([])) + (matrix.bot_users | default([])))
             | selectattr('email', 'defined')
             | selectattr('email', 'ne', '')
             | list }}

    - name: Log in as admin to obtain an admin API token
      kubernetes.core.k8s_exec:
        namespace: "{{ matrix.namespace }}"
        pod: "{{ matrix_synapse_pod_name }}"
        command: >
          curl -sS -X POST http://localhost:8008/_matrix/client/v3/login
          -H Content-Type:application/json
          -d {{ {'type': 'm.login.password',
                 'identifier': {'type': 'm.id.user', 'user': matrix.admin.username},
                 'password': matrix.admin.password} | to_json | quote }}
      register: matrix_admin_login
      changed_when: false
      no_log: true
      when: matrix_3pid_accounts | length > 0

    # Read first, write only on drift: the admin API replaces the WHOLE threepids
    # list on PUT, so an unconditional write would silently drop any address a user
    # added themselves, and would report `changed` on every single run.
    - name: Read current 3PIDs of those accounts
      kubernetes.core.k8s_exec:
        namespace: "{{ matrix.namespace }}"
        pod: "{{ matrix_synapse_pod_name }}"
        command: >
          curl -sS
          -H {{ ('Authorization: Bearer ' ~ (matrix_admin_login.stdout | from_json).access_token) | quote }}
          http://localhost:8008/_synapse/admin/v2/users/@{{ item.user }}:matrix.{{ matrix.base_domain }}
      loop: "{{ matrix_3pid_accounts }}"
      loop_control:
        label: "{{ item.user }}"
      register: matrix_3pid_current
      changed_when: false
      no_log: true
      when: matrix_3pid_accounts | length > 0

    - name: Set email address on synapse accounts
      kubernetes.core.k8s_exec:
        namespace: "{{ matrix.namespace }}"
        pod: "{{ matrix_synapse_pod_name }}"
        command: >
          curl -sS -X PUT
          -H {{ ('Authorization: Bearer ' ~ (matrix_admin_login.stdout | from_json).access_token) | quote }}
          -H Content-Type:application/json
          http://localhost:8008/_synapse/admin/v2/users/@{{ item.item.user }}:matrix.{{ matrix.base_domain }}
          -d {{ {'threepids': [{'medium': 'email', 'address': item.item.email}]} | to_json | quote }}
      loop: "{{ matrix_3pid_current.results | default([]) }}"
      loop_control:
        label: "{{ item.item.user }} -> {{ item.item.email }}"
      when:
        - matrix_3pid_accounts | length > 0
        - item.item.email not in ((item.stdout | from_json).threepids | default([]) | map(attribute='address') | list)
      no_log: true

# ===========================================================================
# Teardown (opt-in `-e matrix_teardown=true`). Namespace delete cascades all
# matrix resources (Deployments, Services, ConfigMap, Secrets, Middlewares,
# Certificates, IngressRoutes). The `synapse` Postgres DB is DELIBERATELY
# PRESERVED (holds rooms/messages/media metadata) — drop by hand to abandon:
#   psql -U postgres -c 'DROP DATABASE synapse;'
# Uses only kubernetes.core.k8s / nsupdate (no bare kubectl — dgxarley rule).
# ===========================================================================

- name: Matrix — teardown (opt-in `-e matrix_teardown=true`)
  when: matrix_teardown | default(false) | bool
  block:
    - name: Delete matrix namespace (cascades all matrix resources)
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Namespace
        name: "{{ matrix.namespace }}"

    # The client hosts are listed unconditionally, NOT via _matrix_hosts: teardown
    # has to clean up after a run that had them enabled, and nsupdate state=absent
    # on a record that was never created is a no-op.
    - name: Remove matrix + cinny + element DNS A records
      community.general.nsupdate:
        server: "{{ matrix.dns.server | default(nsupdate_server) }}"
        zone: "{{ matrix.dns.zone | default(nsupdate_zone) }}"
        key_name: "{{ matrix.dns.tsig_key_name | default(nsupdate_tsig_key_name) }}"
        key_secret: "{{ matrix.dns.tsig_key_secret | default(nsupdate_tsig_key_secret) }}"
        key_algorithm: "{{ matrix.dns.tsig_algorithm | default(nsupdate_tsig_algorithm) }}"
        record: "{{ item }}.{{ matrix.base_domain }}."
        type: A
        state: absent
      loop:
        - matrix
        - cinny
        - element
      when: matrix.manage_dns | bool

# ===========================================================================
# Per-client teardown (opt-in `-e matrix_cinny_teardown=true` /
# `-e matrix_element_teardown=true`). Removes ONE web client and leaves Synapse,
# the namespace, the DB and the other client alone — the surgical counterpart to
# matrix_teardown, which nukes the whole namespace.
#
# Both blocks sit OUTSIDE the install block on purpose, so they stay reachable
# with <x>_enabled false (that flag only skips the install, it deletes nothing).
#
# Deleted per client: Deployment, Service, ConfigMap, both IngressRoutes, the
# Certificate AND its TLS secret (cert-manager does NOT garbage-collect the
# secret when the Certificate goes), plus the A record.
# NOT deleted: the shared middlewares redirect-myhttps / matrix-ip-allowlist
# (Synapse's own routes reference them) and the namespace.
# Uses only kubernetes.core.k8s / nsupdate (no bare kubectl — dgxarley rule).
# ===========================================================================

- name: Cinny — teardown (opt-in `-e matrix_cinny_teardown=true`)
  when: matrix_cinny_teardown | default(false) | bool
  block:
    - name: Delete cinny resources
      kubernetes.core.k8s:
        state: absent
        api_version: "{{ item.api_version }}"
        kind: "{{ item.kind }}"
        name: "{{ item.name }}"
        namespace: "{{ matrix.namespace }}"
      loop:
        - {api_version: "apps/v1", kind: "Deployment", name: "cinny"}
        - {api_version: "v1", kind: "Service", name: "cinny"}
        - {api_version: "v1", kind: "ConfigMap", name: "cinny-config"}
        - {api_version: "traefik.io/v1alpha1", kind: "IngressRoute", name: "cinny-ingress"}
        - {api_version: "traefik.io/v1alpha1", kind: "IngressRoute", name: "cinny-https-ingress"}
        - {api_version: "cert-manager.io/v1", kind: "Certificate", name: "cinny.{{ matrix.base_domain }}"}
        - {api_version: "v1", kind: "Secret", name: "cinny.{{ matrix.base_domain }}"}
      loop_control:
        label: "{{ item.kind }}/{{ item.name }}"

    - name: Remove cinny DNS A record
      community.general.nsupdate:
        server: "{{ matrix.dns.server | default(nsupdate_server) }}"
        zone: "{{ matrix.dns.zone | default(nsupdate_zone) }}"
        key_name: "{{ matrix.dns.tsig_key_name | default(nsupdate_tsig_key_name) }}"
        key_secret: "{{ matrix.dns.tsig_key_secret | default(nsupdate_tsig_key_secret) }}"
        key_algorithm: "{{ matrix.dns.tsig_algorithm | default(nsupdate_tsig_algorithm) }}"
        record: "cinny.{{ matrix.base_domain }}."
        type: A
        state: absent
      when: matrix.manage_dns | bool

- name: Element — teardown (opt-in `-e matrix_element_teardown=true`)
  when: matrix_element_teardown | default(false) | bool
  block:
    - name: Delete element resources
      kubernetes.core.k8s:
        state: absent
        api_version: "{{ item.api_version }}"
        kind: "{{ item.kind }}"
        name: "{{ item.name }}"
        namespace: "{{ matrix.namespace }}"
      loop:
        - {api_version: "apps/v1", kind: "Deployment", name: "element-web"}
        - {api_version: "v1", kind: "Service", name: "element-web"}
        - {api_version: "v1", kind: "ConfigMap", name: "element-config"}
        - {api_version: "traefik.io/v1alpha1", kind: "IngressRoute", name: "element-ingress"}
        - {api_version: "traefik.io/v1alpha1", kind: "IngressRoute", name: "element-https-ingress"}
        - {api_version: "cert-manager.io/v1", kind: "Certificate", name: "element.{{ matrix.base_domain }}"}
        - {api_version: "v1", kind: "Secret", name: "element.{{ matrix.base_domain }}"}
      loop_control:
        label: "{{ item.kind }}/{{ item.name }}"

    - name: Remove element DNS A record
      community.general.nsupdate:
        server: "{{ matrix.dns.server | default(nsupdate_server) }}"
        zone: "{{ matrix.dns.zone | default(nsupdate_zone) }}"
        key_name: "{{ matrix.dns.tsig_key_name | default(nsupdate_tsig_key_name) }}"
        key_secret: "{{ matrix.dns.tsig_key_secret | default(nsupdate_tsig_key_secret) }}"
        key_algorithm: "{{ matrix.dns.tsig_algorithm | default(nsupdate_tsig_algorithm) }}"
        record: "element.{{ matrix.base_domain }}."
        type: A
        state: absent
      when: matrix.manage_dns | bool
