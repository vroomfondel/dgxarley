# Retired Caddy auth-sidecar resources. The render tasks above are commented
# out, so `apply` never touches these standalone objects — they'd be orphaned
# without an explicit absent-assert. (The in-Deployment caddy container/volumes
# are pruned by deleting+recreating the Deployment once; see the deploy runbook.)
- name: Remove retired Caddy ConfigMap (replaced by hermes BasicAuthProvider)
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: ConfigMap
    namespace: "{{ hermes.namespace }}"
    name: "hermes-caddy-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove retired Caddy Secret (replaced by hermes BasicAuthProvider)
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    namespace: "{{ hermes.namespace }}"
    name: "hermes-caddy-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

# Legacy Traefik BasicAuth + oauth2-proxy artefacts — replaced by Caddy
# sidecar (caddy-security cookie auth, fixes WS+SSE). Kept as absent-asserts
# so removal is clean on existing deployments.
- name: Remove legacy oauth2-proxy Secret (replaced by Caddy)
