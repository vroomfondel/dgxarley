---
# Per-user Nous Hermes Agent deployment (k8s_dgx tag `hermes`).
# Pinned to k3smaster (amd64, NFS-local). Loop key: hermes_users (vault).
#
# Two independent Deployments per active user:
#   hermes-agent-<user> → official `hermes dashboard` UI (port 9119)
#                          published as <username>.hermes-dashboard.<dns>
#   hermes-webui-<user> → ghcr.io/nesquena/hermes-webui (port 8787)
#                          published as <username>.hermes.<dns>
# Both pods mount the same NFS subdir as /opt/data so sessions/skills/configs
# are shared. They are still independent processes — each spawns its own
# `hermes` subprocesses for chat/tools (upstream-documented limitation #681).
#
# Per-user gates (in hermes_users entry):
#   dashboard_enabled (default true)  → deploy hermes-agent pod + ingress
#   dashboard_tui     (default true)  → adds the embedded chat tab
#   webui_enabled     (default false) → deploy hermes-webui pod + ingress

- name: Filter enabled hermes users
  ansible.builtin.set_fact:
    _hermes_active_users: "{{ hermes_users | selectattr('enabled', 'true') | list }}"

# --- Per-namespace NetworkPolicies for the Hermes pods (gated by
# hermes_network_policies_enabled, default OFF). One egress + one ingress policy,
# selecting ALL hermes pods via `app: hermes` (both agent and webui carry it), so
# they isolate every user from every other. INERT until k3s network-policy
# enforcement is re-enabled cluster-wide (disable-network-policy currently true).
- name: Create hermes egress NetworkPolicy
  when: hermes_network_policies_enabled | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: hermes-egress
        namespace: "{{ hermes.namespace }}"
      spec:
        podSelector:
          matchLabels:
            app: hermes
        policyTypes:
          - Egress
        egress:
          # DNS → CoreDNS (kube-system). Without this nothing resolves.
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
                podSelector:
                  matchLabels:
                    k8s-app: kube-dns
            ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53
          # LiteLLM namespace (LLM backend) — whole namespace, any port.
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: litellm
          # SearXNG namespace (web-search backend) — whole namespace, any port.
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: searxng
          # Internet + LAN, but NOT the cluster pod/service CIDRs → blocks every
          # other in-cluster pod (incl. other users' hermes pods) while keeping
          # full outbound internet (Matrix/email/PyPI). LAN stays open, so own
          # Traefik-exposed services (e.g. Seafile sync via the ingress IP) work.
          - to:
              - ipBlock:
                  cidr: 0.0.0.0/0
                  except:
                    - "{{ cluster_cidr }}"
                    - "{{ service_cidr }}"

# Ingress: only Traefik (kube-system) may reach the hermes pods → web-UI /
# dashboard via Traefik works, but no other pod (incl. other users) can connect.
# kube-router does not block node-local kubelet probes, so liveness/readiness
# should keep working — verify on first enablement.
- name: Create hermes ingress NetworkPolicy
  when: hermes_network_policies_enabled | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: hermes-ingress
        namespace: "{{ hermes.namespace }}"
      spec:
        podSelector:
          matchLabels:
            app: hermes
        policyTypes:
          - Ingress
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: traefik

# One-shot migration cleanup for the pre-rename / pre-split layouts.
# Safe to keep — both are idempotent absent-asserts.
- name: Remove legacy combined Deployment (pre-split into agent + webui)
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ hermes.namespace }}"
    name: "hermes-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy combined Service (pre-split into agent + webui)
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    namespace: "{{ hermes.namespace }}"
    name: "hermes-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy per-user TLS Certificate (dotted name, pre-rename)
  kubernetes.core.k8s:
    state: absent
    api_version: cert-manager.io/v1
    kind: Certificate
    namespace: "{{ hermes.namespace }}"
    name: "hermes-{{ item.username }}.{{ dns_external_domain_suffix }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy per-user TLS Certificate (combined-pod name, pre-split)
  kubernetes.core.k8s:
    state: absent
    api_version: cert-manager.io/v1
    kind: Certificate
    namespace: "{{ hermes.namespace }}"
    name: "hermes-{{ item.username }}-tls"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy combined dashboard IngressRoute (pre-split name)
  kubernetes.core.k8s:
    state: absent
    api_version: traefik.io/v1alpha1
    kind: IngressRoute
    namespace: "{{ hermes.namespace }}"
    name: "hermes-{{ item.username }}-dashboard"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy combined webui IngressRoute (pre-split name)
  kubernetes.core.k8s:
    state: absent
    api_version: traefik.io/v1alpha1
    kind: IngressRoute
    namespace: "{{ hermes.namespace }}"
    name: "hermes-{{ item.username }}-webui"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy per-user DNS A record (pre-rename hostname)
  community.general.nsupdate:
    server: "{{ nsupdate_server }}"
    zone: "{{ nsupdate_zone }}"
    key_name: "{{ nsupdate_tsig_key_name }}"
    key_secret: "{{ nsupdate_tsig_key_secret }}"
    key_algorithm: "{{ nsupdate_tsig_algorithm }}"
    record: "hermes-{{ item.username }}.{{ dns_external_domain_suffix }}."
    type: A
    state: absent
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Create hermes namespace
  kubernetes.core.k8s:
    name: "{{ hermes.namespace }}"
    api_version: v1
    kind: Namespace
    state: present

# === Seafile workspace provisioning (gated) ==================================
# Creates one Seafile account + library + token per user with
# seafile.workspace_enabled (or the global default). Writes a K8s Secret
# `hermes-seafile-<user>` consumed by the seadrive sidecar in agent + webui.

- name: Provision Seafile users + libraries
  import_tasks: hermes_seafile_provision.yml
  tags:
    - hermes_seafile
    - hermes_seafile_provision

# === Cluster-wide patch ConfigMap (subPath-overlaid onto the agent image) ===
# Local fix for upstream plugins/platforms/email/adapter.py — adds Working/Done
# folder lifecycle, IMAP APPEND to Sent, and EMAIL_PROCESS_EXISTING. File is
# pinned to the upstream source tree of hermes.image_tag (currently v2026.7.1);
# bump both together (re-fetch upstream adapter.py, re-apply [PATCH-N] sections).
# NOTE: at v2026.7.1 upstream #41112 MOVED this file — it was
# gateway/platforms/email.py through v2026.6.19. The ConfigMap data key and the
# webui-pod subPath mount are now adapter.py.
# Only the hermes-email sidecar consumes it (subPath mount in the webui pod).

- name: Render hermes email-gateway patch ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: hermes-email-patch
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
      data:
        adapter.py: "{{ lookup('file', 'hermes_email_gateway_patched.py') }}"

# Gateway-status refresher script — consumed by the gateway-state-refresh
# sidecar in the webui pod. Keeps gateway_state.json's updated_at fresh WHILE
# the email gateway holds its runtime flock, so the WebUI badge stays green
# without shareProcessNamespace (which would crashloop the s6-based email
# sidecar). Cosmetic only; see the script header for full rationale.
- name: Render hermes seadrive sidecar entrypoint ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: hermes-seadrive
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
      data:
        hermes_seadrive_start.sh: "{{ lookup('file', 'hermes_seadrive_start.sh') }}"

- name: Render hermes merge-config ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: hermes-merge-config
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
      data:
        hermes_merge_config.py: "{{ lookup('file', 'hermes_merge_config.py') }}"

- name: Render hermes gateway-state refresher ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: hermes-gw-refresh
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
      data:
        hermes_gateway_state_refresher.py: "{{ lookup('file', 'hermes_gateway_state_refresher.py') }}"

# === Per-user shared ConfigMaps + Secrets (used by both agent + webui pods) ===

- name: Render per-user hermes config.yaml ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "hermes-config-{{ item.username }}"
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
          hermes-user: "{{ item.username }}"
      data:
        config.yaml: "{{ lookup('template', 'hermes/hermes_config.yaml.j2') }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Render per-user hermes Secret (.env + WEBUI_PASSWORD)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "hermes-env-{{ item.username }}"
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
          hermes-user: "{{ item.username }}"
      type: Opaque
      stringData:
        ".env": "{{ lookup('template', 'hermes/hermes_env.j2') }}"
        WEBUI_PASSWORD: "{{ item.webui_password | default(item.basicauth_password | default(item.litellm_token)) }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Create per-user Caddy ConfigMap (Caddyfile)
  # Caddyfile + caddy-security config — see template for full rationale.
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "hermes-caddy-{{ item.username }}"
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
          hermes-user: "{{ item.username }}"
      data:
        Caddyfile: "{{ lookup('template', 'hermes/hermes_caddyfile.j2') }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Create per-user Caddy Secret (users.json + JWT signing_key)
  # users.json holds the bcrypt password for caddy-security's local identity
  # store; signing_key is the symmetric key for JWT cookies. signing_key is
  # deterministically derived from username + password so it stays stable
  # across Ansible runs (no separate vault entry needed) and so changing the
  # password also rotates the cookie keys.
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "hermes-caddy-{{ item.username }}"
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
          hermes-user: "{{ item.username }}"
      type: Opaque
      stringData:
        users.json: "{{ lookup('template', 'hermes/hermes_caddy_users.json.j2') }}"
        signing_key: "{{ (item.username ~ '|hermes-caddy-jwt|' ~ (item.basicauth_password | default(item.litellm_token))) | hash('sha512') }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

# Legacy Traefik BasicAuth + oauth2-proxy artefacts — replaced by Caddy
# sidecar (caddy-security cookie auth, fixes WS+SSE). Kept as absent-asserts
# so removal is clean on existing deployments.
- name: Remove legacy oauth2-proxy Secret (replaced by Caddy)
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    namespace: "{{ hermes.namespace }}"
    name: "hermes-oauth2-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy hermes BasicAuth Secret (replaced by oauth2-proxy)
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Secret
    namespace: "{{ hermes.namespace }}"
    name: "hermes-basicauth-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy hermes BasicAuth Middleware (replaced by oauth2-proxy)
  kubernetes.core.k8s:
    state: absent
    api_version: traefik.io/v1alpha1
    kind: Middleware
    namespace: "{{ hermes.namespace }}"
    name: "hermes-basicauth-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

# === Hermes Agent (original dashboard UI) — gated ===

- name: Apply per-user hermes-agent Deployment
  kubernetes.core.k8s:
    state: present
    apply: true
    definition: "{{ lookup('template', 'hermes/hermes_agent_deployment.yaml.j2') | from_yaml }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default)

- name: Remove hermes-agent Deployment when gate is off
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ hermes.namespace }}"
    name: "hermes-agent-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: not (item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default))

- name: Apply per-user hermes-agent Service
  # Single port: `auth` → oauth2-proxy sidecar (which forwards in-pod to
  # localhost:9119). The bare hermes port is intentionally NOT exposed via
  # the Service — every external request must terminate auth at oauth2-proxy.
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "hermes-agent-{{ item.username }}"
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
          hermes-component: agent
          hermes-user: "{{ item.username }}"
      spec:
        selector:
          app: hermes
          hermes-component: agent
          hermes-user: "{{ item.username }}"
        ports:
          - name: auth
            port: "{{ hermes.agent.proxy_port }}"
            targetPort: "{{ hermes.agent.proxy_port }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default)

- name: Remove hermes-agent Service when gate is off
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    namespace: "{{ hermes.namespace }}"
    name: "hermes-agent-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: not (item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default))

- name: Apply per-user hermes-agent TLS Certificate
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: "hermes-agent-{{ item.username }}-tls"
        namespace: "{{ hermes.namespace }}"
      spec:
        dnsNames:
          - "{{ item.username }}.hermes-dashboard.{{ dns_external_domain_suffix }}"
        secretName: "hermes-agent-{{ item.username }}-tls"
        issuerRef:
          name: letsencrypt-production
          kind: ClusterIssuer
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default)

- name: Remove hermes-agent Certificate when gate is off
  kubernetes.core.k8s:
    state: absent
    api_version: cert-manager.io/v1
    kind: Certificate
    namespace: "{{ hermes.namespace }}"
    name: "hermes-agent-{{ item.username }}-tls"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: not (item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default))

- name: Apply per-user hermes-agent IngressRoute (auth via oauth2-proxy sidecar)
  # All paths route through the oauth2-proxy sidecar (cookie session). Bypassing
  # oauth2-proxy for /api/(ws|events|pty) was considered but rejected: those
  # endpoints carry the live PTY/chat stream, which means leaking the
  # ?token=... URL via Traefik access logs / browser history would expose all
  # chat content. Auth must terminate at oauth2-proxy for every request.
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: "hermes-agent-{{ item.username }}"
        namespace: "{{ hermes.namespace }}"
      spec:
        entryPoints:
          - websecure
        routes:
          - kind: Rule
            match: "Host(`{{ item.username }}.hermes-dashboard.{{ dns_external_domain_suffix }}`)"
            priority: 10
            services:
              - kind: Service
                name: "hermes-agent-{{ item.username }}"
                passHostHeader: true
                port: "{{ hermes.agent.proxy_port }}"
        tls:
          secretName: "hermes-agent-{{ item.username }}-tls"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default)

- name: Remove hermes-agent IngressRoute when gate is off
  kubernetes.core.k8s:
    state: absent
    api_version: traefik.io/v1alpha1
    kind: IngressRoute
    namespace: "{{ hermes.namespace }}"
    name: "hermes-agent-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: not (item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default))

- name: Register DNS A record for hermes-agent (dashboard hostname)
  community.general.nsupdate:
    server: "{{ nsupdate_server }}"
    zone: "{{ nsupdate_zone }}"
    key_name: "{{ nsupdate_tsig_key_name }}"
    key_secret: "{{ nsupdate_tsig_key_secret }}"
    key_algorithm: "{{ nsupdate_tsig_algorithm }}"
    record: "{{ item.username }}.hermes-dashboard.{{ dns_external_domain_suffix }}."
    type: A
    ttl: "{{ nsupdate_ttl }}"
    value: "{{ nsupdate_ingress_ip }}"
    state: "{{ 'present' if (item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default)) else 'absent' }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

# === Hermes WebUI (nesquena/hermes-webui) — gated ===

- name: Apply per-user hermes-webui Deployment
  kubernetes.core.k8s:
    state: present
    apply: true
    definition: "{{ lookup('template', 'hermes/hermes_webui_deployment.yaml.j2') | from_yaml }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: item.webui_enabled | default(hermes.webui.enabled_default)

- name: Remove hermes-webui Deployment when gate is off
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ hermes.namespace }}"
    name: "hermes-webui-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: not (item.webui_enabled | default(hermes.webui.enabled_default))

- name: Apply per-user hermes-webui Service
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "hermes-webui-{{ item.username }}"
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
          hermes-component: webui
          hermes-user: "{{ item.username }}"
      spec:
        selector:
          app: hermes
          hermes-component: webui
          hermes-user: "{{ item.username }}"
        ports:
          - name: webui
            port: "{{ hermes.webui.port }}"
            targetPort: "{{ hermes.webui.port }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: item.webui_enabled | default(hermes.webui.enabled_default)

- name: Remove hermes-webui Service when gate is off
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    namespace: "{{ hermes.namespace }}"
    name: "hermes-webui-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: not (item.webui_enabled | default(hermes.webui.enabled_default))

- name: Apply per-user hermes-webui TLS Certificate
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: "hermes-webui-{{ item.username }}-tls"
        namespace: "{{ hermes.namespace }}"
      spec:
        dnsNames:
          - "{{ item.username }}.hermes.{{ dns_external_domain_suffix }}"
        secretName: "hermes-webui-{{ item.username }}-tls"
        issuerRef:
          name: letsencrypt-production
          kind: ClusterIssuer
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: item.webui_enabled | default(hermes.webui.enabled_default)

- name: Remove hermes-webui Certificate when gate is off
  kubernetes.core.k8s:
    state: absent
    api_version: cert-manager.io/v1
    kind: Certificate
    namespace: "{{ hermes.namespace }}"
    name: "hermes-webui-{{ item.username }}-tls"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: not (item.webui_enabled | default(hermes.webui.enabled_default))

- name: Apply per-user hermes-webui IngressRoute (port 8787)
  # No Traefik BasicAuth middleware — the webui has its own HERMES_WEBUI_PASSWORD
  # cookie-session auth (HMAC-signed, 30d TTL) which is enforced server-side.
  # Doubling up with Traefik BasicAuth was just causing a redundant popup.
  # The agent dashboard IngressRoute keeps BasicAuth because `hermes dashboard
  # --insecure` has no auth of its own.
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: "hermes-webui-{{ item.username }}"
        namespace: "{{ hermes.namespace }}"
      spec:
        entryPoints:
          - websecure
        routes:
          - kind: Rule
            match: "Host(`{{ item.username }}.hermes.{{ dns_external_domain_suffix }}`)"
            priority: 10
            services:
              - kind: Service
                name: "hermes-webui-{{ item.username }}"
                passHostHeader: true
                port: "{{ hermes.webui.port }}"
        tls:
          secretName: "hermes-webui-{{ item.username }}-tls"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: item.webui_enabled | default(hermes.webui.enabled_default)

- name: Remove hermes-webui IngressRoute when gate is off
  kubernetes.core.k8s:
    state: absent
    api_version: traefik.io/v1alpha1
    kind: IngressRoute
    namespace: "{{ hermes.namespace }}"
    name: "hermes-webui-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: not (item.webui_enabled | default(hermes.webui.enabled_default))

- name: Register DNS A record for hermes-webui hostname
  community.general.nsupdate:
    server: "{{ nsupdate_server }}"
    zone: "{{ nsupdate_zone }}"
    key_name: "{{ nsupdate_tsig_key_name }}"
    key_secret: "{{ nsupdate_tsig_key_secret }}"
    key_algorithm: "{{ nsupdate_tsig_algorithm }}"
    record: "{{ item.username }}.hermes.{{ dns_external_domain_suffix }}."
    type: A
    ttl: "{{ nsupdate_ttl }}"
    value: "{{ nsupdate_ingress_ip }}"
    state: "{{ 'present' if (item.webui_enabled | default(hermes.webui.enabled_default)) else 'absent' }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
