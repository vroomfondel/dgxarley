---
# Per-user Nous Hermes Agent deployment (k8s_dgx tag `hermes`).
# Pinned to k3smaster (amd64, NFS-local). Loop key: hermes_users (vault).
#
# Two independent Deployments per active user:
#   hermes-agent-<user> → official `hermes dashboard` UI (port 9119)
#                          published as <username>.hermes.<dns>
#   hermes-webui-<user> → ghcr.io/nesquena/hermes-webui (port 8787)
#                          published as <username>.hermes-webui.<dns>
# Both pods mount the same NFS subdir as /opt/data so sessions/skills/configs
# are shared. They are still independent processes — each spawns its own
# `hermes` subprocesses for chat/tools (upstream-documented limitation #681).
#
# Per-user gates (in hermes_users entry):
#   dashboard_enabled (default true)  → deploy hermes-agent pod + ingress
#   webui_enabled     (default false) → deploy hermes-webui pod + ingress

- name: Filter enabled hermes users
  ansible.builtin.set_fact:
    _hermes_active_users: "{{ hermes_users | selectattr('enabled', 'true') | list }}"

# --- Per-namespace NetworkPolicies for the Hermes pods (gated by
# hermes_network_policies_enabled, default OFF). One egress + one ingress policy,
# selecting ALL hermes pods via `app: hermes` (both agent and webui carry it), so
# they isolate every user from every other. INERT until k3s network-policy
# enforcement is re-enabled cluster-wide (disable-network-policy currently true).
- name: Create hermes egress NetworkPolicy
  when: hermes_network_policies_enabled | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: hermes-egress
        namespace: "{{ hermes.namespace }}"
      spec:
        podSelector:
          matchLabels:
            app: hermes
        policyTypes:
          - Egress
        egress:
          # DNS → CoreDNS (kube-system). Without this nothing resolves.
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
                podSelector:
                  matchLabels:
                    k8s-app: kube-dns
            ports:
              - protocol: UDP
                port: 53
              - protocol: TCP
                port: 53
          # LiteLLM namespace (LLM backend) — whole namespace, any port.
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: litellm
          # SearXNG namespace (web-search backend) — whole namespace, any port.
          - to:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: searxng
          # Internet + LAN, but NOT the cluster pod/service CIDRs → blocks every
          # other in-cluster pod (incl. other users' hermes pods) while keeping
          # full outbound internet (Matrix/email/PyPI). LAN stays open, so own
          # Traefik-exposed services (e.g. Seafile sync via the ingress IP) work.
          - to:
              - ipBlock:
                  cidr: 0.0.0.0/0
                  except:
                    - "{{ cluster_cidr }}"
                    - "{{ service_cidr }}"

# Ingress: only Traefik (kube-system) may reach the hermes pods → web-UI /
# dashboard via Traefik works, but no other pod (incl. other users) can connect.
# kube-router does not block node-local kubelet probes, so liveness/readiness
# should keep working — verify on first enablement.
- name: Create hermes ingress NetworkPolicy
  when: hermes_network_policies_enabled | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: hermes-ingress
        namespace: "{{ hermes.namespace }}"
      spec:
        podSelector:
          matchLabels:
            app: hermes
        policyTypes:
          - Ingress
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: kube-system
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: traefik

# One-shot migration cleanup for the pre-rename / pre-split layouts.
# Safe to keep — both are idempotent absent-asserts.
- name: Remove legacy combined Deployment (pre-split into agent + webui)
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ hermes.namespace }}"
    name: "hermes-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy combined Service (pre-split into agent + webui)
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    namespace: "{{ hermes.namespace }}"
    name: "hermes-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy per-user TLS Certificate (dotted name, pre-rename)
  kubernetes.core.k8s:
    state: absent
    api_version: cert-manager.io/v1
    kind: Certificate
    namespace: "{{ hermes.namespace }}"
    name: "hermes-{{ item.username }}.{{ dns_external_domain_suffix }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy per-user TLS Certificate (combined-pod name, pre-split)
  kubernetes.core.k8s:
    state: absent
    api_version: cert-manager.io/v1
    kind: Certificate
    namespace: "{{ hermes.namespace }}"
    name: "hermes-{{ item.username }}-tls"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy combined dashboard IngressRoute (pre-split name)
  kubernetes.core.k8s:
    state: absent
    api_version: traefik.io/v1alpha1
    kind: IngressRoute
    namespace: "{{ hermes.namespace }}"
    name: "hermes-{{ item.username }}-dashboard"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy combined webui IngressRoute (pre-split name)
  kubernetes.core.k8s:
    state: absent
    api_version: traefik.io/v1alpha1
    kind: IngressRoute
    namespace: "{{ hermes.namespace }}"
    name: "hermes-{{ item.username }}-webui"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy per-user DNS A record (pre-rename hostname)
  community.general.nsupdate:
    server: "{{ nsupdate_server }}"
    zone: "{{ nsupdate_zone }}"
    key_name: "{{ nsupdate_tsig_key_name }}"
    key_secret: "{{ nsupdate_tsig_key_secret }}"
    key_algorithm: "{{ nsupdate_tsig_algorithm }}"
    record: "hermes-{{ item.username }}.{{ dns_external_domain_suffix }}."
    type: A
    state: absent
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Create hermes namespace
  kubernetes.core.k8s:
    name: "{{ hermes.namespace }}"
    api_version: v1
    kind: Namespace
    state: present

# === venv site-packages discovery (ONCE, image-derived — NOT per-user) =======
# The health-patch .py + .pth must be subPath-mounted into the agent image's
# venv site-packages, whose path carries a pythonX.Y segment that bumps with the
# base image. Rather than hardcode "python3.13", probe the image ONCE with its
# own venv interpreter and derive the real dir. Runs before the per-user loop so
# a fact set here is reused by every user's Deployment render (the venv is a
# property of the IMAGE, identical across users). Falls back to a literal path
# set in the last task of this block if the probe is skipped or yields nothing.
- name: Discover hermes venv site-packages path (once)
  when: _hermes_active_users | length > 0
  tags:
    - hermes
  block:
    - name: Launch venv-probe pod
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Pod
          metadata:
            name: hermes-venv-probe
            namespace: "{{ hermes.namespace }}"
            labels:
              app: hermes
          spec:
            restartPolicy: Never
            nodeSelector:
              node-role: k3smaster
            containers:
              - name: probe
                image: "nousresearch/hermes-agent:{{ hermes.image_tag }}"
                # Use the venv's OWN interpreter so sysconfig reports the venv
                # site-packages (a system python3 would report the system dir).
                # /opt/hermes/.venv is the stable venv root; only the pythonX.Y
                # segment below it is what we must not hardcode.
                command:
                  - /opt/hermes/.venv/bin/python
                  - -c
                  - "import sysconfig; print(sysconfig.get_paths()['purelib'])"

    - name: Wait for venv-probe pod to complete
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ hermes.namespace }}"
        name: hermes-venv-probe
      register: _venv_probe
      until: >-
        _venv_probe.resources | length > 0
        and _venv_probe.resources[0].status.phase in ['Succeeded', 'Failed']
      retries: 40
      delay: 5

    - name: Fetch venv-probe logs
      kubernetes.core.k8s_log:
        kind: Pod
        namespace: "{{ hermes.namespace }}"
        name: hermes-venv-probe
      register: _venv_probe_log

    - name: Set hermes_venv_site_packages fact from probe (validated)
      ansible.builtin.set_fact:
        hermes_venv_site_packages: "{{ _venv_probe_candidate }}"
      vars:
        _venv_probe_lines: "{{ (_venv_probe_log.log | default('') | trim).split('\n') | map('trim') | select | list }}"
        _venv_probe_candidate: "{{ (_venv_probe_lines | last) if (_venv_probe_lines | length > 0) else '' }}"
      when: _venv_probe_candidate is match('^/.+/site-packages$')

    # Fallback (single source — deliberately NOT in defaults/main/hermes.yml): used only
    # if the probe was skipped or returned nothing valid. Carries the version-
    # specific pythonX.Y segment; if it drifts from the image the subPath mount
    # silently no-ops (patch inert, no crash).
    - name: Fall back to a literal venv site-packages path if the probe set nothing
      ansible.builtin.set_fact:
        hermes_venv_site_packages: "/opt/hermes/.venv/lib/python3.13/site-packages"
      when: hermes_venv_site_packages is not defined
  always:
    - name: Remove venv-probe pod
      kubernetes.core.k8s:
        state: absent
        api_version: v1
        kind: Pod
        namespace: "{{ hermes.namespace }}"
        name: hermes-venv-probe

# === Seafile workspace provisioning (gated) ==================================
# Creates one Seafile account + library + token per user with
# seafile.workspace_enabled (or the global default). Writes a K8s Secret
# `hermes-seafile-<user>` consumed by the seadrive sidecar in agent + webui.

- name: Provision Seafile users + libraries
  import_tasks: hermes_seafile_provision.yml
  tags:
    - hermes_seafile
    - hermes_seafile_provision

# === Cluster-wide patch ConfigMap (subPath-overlaid onto the agent image) ===
# Local fix for upstream plugins/platforms/email/adapter.py — adds Working/Done
# folder lifecycle, IMAP APPEND to Sent, and EMAIL_PROCESS_EXISTING. File is
# pinned to the upstream source tree of hermes.image_tag (currently v2026.7.1);
# bump both together (re-fetch upstream adapter.py, re-apply [PATCH-N] sections).
# NOTE: at v2026.7.1 upstream #41112 MOVED this file — it was
# gateway/platforms/email.py through v2026.6.19. The ConfigMap data key and the
# webui-pod subPath mount are now adapter.py.
# Only the hermes-email sidecar consumes it (subPath mount in the webui pod).

- name: Render hermes email-gateway patch ConfigMap
  kubernetes.core.k8s:
    state: present
    # apply (kubectl-apply three-way merge) so a renamed data key is pruned
    # instead of lingering — a plain strategic merge left a stale `email.py`
    # key behind when this file moved email.py → adapter.py (upstream #41112).
    apply: true
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: hermes-email-patch
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
      data:
        adapter.py: "{{ lookup('file', 'hermes_email_gateway_patched.py') }}"

# Gateway api_server health-endpoint patch — makes /health(/detailed) public so
# the dashboard's unauthenticated liveness probe stops logging a per-poll 401
# WARNING (and the "Gateway" badge gets the richer /health/detailed payload).
# Upstream regression NousResearch/hermes-agent#56260 authenticated the endpoint
# but never updated the probe; no upstream fix as of the pinned image. The .py is
# imported at interpreter start via the zz_*.pth (both subPath-mounted into the
# venv site dir of the gateway container). Shared across users (identical patch).
- name: Render hermes gateway health-patch ConfigMap
  kubernetes.core.k8s:
    state: present
    apply: true  # kubectl-apply three-way merge → prune renamed/removed data keys
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: hermes-health-patch
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
      data:
        hermes_health_patch.py: "{{ lookup('file', 'hermes_health_patch.py') }}"
        # One-line .pth: site.py runs its import at startup (immune to the
        # sitecustomize shadow). zz_ prefix so it sorts after other .pth files.
        zz_hermes_health_patch.pth: "import hermes_health_patch\n"

# Gateway-status refresher script — consumed by the gateway-state-refresh
# sidecar in the webui pod. Keeps gateway_state.json's updated_at fresh WHILE
# the email gateway holds its runtime flock, so the WebUI badge stays green
# without shareProcessNamespace (which would crashloop the s6-based email
# sidecar). Cosmetic only; see the script header for full rationale.
- name: Render hermes seadrive sidecar entrypoint ConfigMap
  kubernetes.core.k8s:
    state: present
    apply: true  # kubectl-apply three-way merge → prune renamed/removed data keys
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: hermes-seadrive
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
      data:
        hermes_seadrive_start.sh: "{{ lookup('file', 'hermes_seadrive_start.sh') }}"

- name: Render hermes merge-config ConfigMap
  kubernetes.core.k8s:
    state: present
    apply: true  # kubectl-apply three-way merge → prune renamed/removed data keys
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: hermes-merge-config
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
      data:
        hermes_merge_config.py: "{{ lookup('file', 'hermes_merge_config.py') }}"

- name: Render hermes gateway-state refresher ConfigMap
  kubernetes.core.k8s:
    state: present
    apply: true  # kubectl-apply three-way merge → prune renamed/removed data keys
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: hermes-gw-refresh
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
      data:
        hermes_gateway_state_refresher.py: "{{ lookup('file', 'hermes_gateway_state_refresher.py') }}"

- name: Render hermes dashboard user-themes ConfigMap
  # Shipped dashboard themes (one YAML per key). The init-dashboard-themes
  # initContainer in the agent pod copies these into $HERMES_HOME/dashboard-
  # themes/ where `_discover_user_themes()` reads them. Add more themes by
  # adding data keys here (each `<name>.yaml` → files/hermes_dashboard_theme_*).
  kubernetes.core.k8s:
    state: present
    apply: true  # kubectl-apply three-way merge → prune renamed/removed data keys
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: hermes-dashboard-themes
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
      data:
        cyberpunk-lg.yaml: "{{ lookup('file', 'hermes_dashboard_theme_cyberpunk_lg.yaml') }}"

# === Derive the LiteLLM-alias context window from the active SGLang profile ===
# hermes-default is a LiteLLM alias with no probe-able context metadata, so Hermes
# would default to 256,000 ("probe-down" INFO). The single source of truth is the
# SGLang model profile (roles/k8s_dgx/model_profiles/<model>.yml → context_length),
# the SAME value k8s_dgx feeds SGLang. We load those profiles here (mirroring the
# k8s_dgx loader) and index the pinned model (sglang_model, a group_vars/all
# global). Result flows into config.yaml as model.context_length. An explicit
# hermes.context_length (or per-user item.context_length) still overrides this.
# Skipped when hermes.context_length is set — no need to load profiles then.
- name: Load SGLang model profiles (for hermes-default context_length)
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: "_hermes_mp_{{ idx }}"
  loop: "{{ lookup('fileglob', playbook_dir ~ '/roles/k8s_dgx/model_profiles/*.yml', wantlist=True) | sort }}"
  loop_control:
    index_var: idx
    label: "{{ item | basename }}"
  when: (hermes.context_length | default('')) | string | length == 0

- name: Merge SGLang model profiles into sglang_model_profiles
  ansible.builtin.set_fact:
    sglang_model_profiles: >-
      {{ sglang_model_profiles | default({}) | combine(
         lookup('vars', '_hermes_mp_' ~ item)._model_profile | default({}),
         recursive=True
      ) }}
  loop: "{{ range(lookup('fileglob', playbook_dir ~ '/roles/k8s_dgx/model_profiles/*.yml', wantlist=True) | length) | list }}"
  loop_control:
    label: "profile {{ item }}"
  when: (hermes.context_length | default('')) | string | length == 0

# Empty string when: hermes.context_length is set (skips the load above), the
# pinned model has no profile file, or the profile omits context_length. Empty →
# the template falls back to hermes.context_length, then to Hermes' 256k default.
- name: Derive hermes-default context_length from the active SGLang model profile
  ansible.builtin.set_fact:
    _hermes_default_context_length: "{{ (sglang_model_profiles[sglang_model] | default({})).context_length | default('') if ((hermes.context_length | default('')) | string | length == 0) else '' }}"

# === Per-user shared ConfigMaps + Secrets (used by both agent + webui pods) ===

- name: Render per-user hermes config.yaml ConfigMap
  kubernetes.core.k8s:
    state: present
    apply: true  # kubectl-apply three-way merge → prune renamed/removed data keys
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: "hermes-config-{{ item.username }}"
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
          hermes-user: "{{ item.username }}"
      data:
        config.yaml: "{{ lookup('template', 'hermes/hermes_config.yaml.j2') }}"
        # Non-secret per-profile spec (list). merge-config seeds one
        # /opt/data/profiles/<name>/ per entry; api_keys are NOT here (see the
        # Secret's profiles-secrets.json). Empty list `[]` when the user has no
        # profiles: — a harmless no-op in merge-config.
        profiles.json: "{{ lookup('template', 'hermes/hermes_profiles_spec.json.j2') }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Render per-user hermes Secret (.env + WEBUI_PASSWORD)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: "hermes-env-{{ item.username }}"
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
          hermes-user: "{{ item.username }}"
      type: Opaque
      stringData:
        ".env": "{{ lookup('template', 'hermes/hermes_env.j2') }}"
        # Secret per-profile env-var map ({name: {KEY: VALUE}}). merge-config folds
        # each profile's vars into /opt/data/profiles/<name>/.env and injects the
        # model.api_key from them. Empty `{}` when no profile brings its own key.
        "profiles-secrets.json": "{{ lookup('template', 'hermes/hermes_profiles_secrets.json.j2') }}"
        WEBUI_PASSWORD: "{{ item.webui_password | default(item.basicauth_password | default(item.litellm_token)) }}"
        # hermes' built-in BasicAuthProvider (the dashboard's own auth) —
        # password = per-user basicauth_password, falling back to litellm_token
        # (same value the retired Caddy users.json used). Consumed by the
        # dashboard container as HERMES_DASHBOARD_BASIC_AUTH_PASSWORD.
        DASHBOARD_BASIC_AUTH_PASSWORD: "{{ item.basicauth_password | default(item.litellm_token) }}"
        # Token-signing secret for the stateless HMAC session tokens. Derived
        # deterministically from username+password so it stays stable across
        # playbook runs AND pod restarts (sessions survive restart — the whole
        # point of setting `secret` explicitly per the provider docs), yet
        # rotates when the password changes. No separate vault entry needed.
        DASHBOARD_BASIC_AUTH_SECRET: "{{ (item.username ~ '|hermes-dashboard-basic-auth|' ~ (item.basicauth_password | default(item.litellm_token))) | hash('sha512') }}"
        # API key for the gateway's api_server (b): connect() refuses to start
        # it without a >=16-char key. localhost-only in-pod; the dashboard's
        # /health probe is unauthenticated so it never needs this. Guards the
        # /v1 OpenAI endpoints the same server exposes on 127.0.0.1:<port>.
        GATEWAY_API_SERVER_KEY: "{{ (item.username ~ '|hermes-gateway-api|' ~ (item.basicauth_password | default(item.litellm_token))) | hash('sha256') }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

