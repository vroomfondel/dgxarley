    name: "hermes-basicauth-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

- name: Remove legacy hermes BasicAuth Middleware (replaced by oauth2-proxy)
  kubernetes.core.k8s:
    state: absent
    api_version: traefik.io/v1alpha1
    kind: Middleware
    namespace: "{{ hermes.namespace }}"
    name: "hermes-basicauth-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

# === Hermes Agent (original dashboard UI) — gated ===

- name: Apply per-user hermes-agent Deployment
  kubernetes.core.k8s:
    state: present
    apply: true
    definition: "{{ lookup('template', 'hermes/hermes_agent_deployment.yaml.j2') | from_yaml }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default)

- name: Remove hermes-agent Deployment when gate is off
  kubernetes.core.k8s:
    state: absent
    api_version: apps/v1
    kind: Deployment
    namespace: "{{ hermes.namespace }}"
    name: "hermes-agent-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: not (item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default))

- name: Apply per-user hermes-agent Service
  # The Service targets the dashboard port directly (hermes binds
  # 0.0.0.0:<dashboard_port> and does its OWN BasicAuth). There is no in-pod
  # auth hop — the former Caddy `proxy_port` sidecar is retired.
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "hermes-agent-{{ item.username }}"
        namespace: "{{ hermes.namespace }}"
        labels:
          app: hermes
          hermes-component: agent
          hermes-user: "{{ item.username }}"
      spec:
        selector:
          app: hermes
          hermes-component: agent
          hermes-user: "{{ item.username }}"
        ports:
          - name: dashboard
            port: "{{ hermes.agent.dashboard_port }}"
            targetPort: "{{ hermes.agent.dashboard_port }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default)

- name: Remove hermes-agent Service when gate is off
  kubernetes.core.k8s:
    state: absent
    api_version: v1
    kind: Service
    namespace: "{{ hermes.namespace }}"
    name: "hermes-agent-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: not (item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default))

- name: Apply per-user hermes-agent TLS Certificate
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: "hermes-agent-{{ item.username }}-tls"
        namespace: "{{ hermes.namespace }}"
      spec:
        dnsNames:
          - "{{ item.username }}.{{ hermes.agent.subdomain }}.{{ dns_external_domain_suffix }}"
        secretName: "hermes-agent-{{ item.username }}-tls"
        issuerRef:
          name: letsencrypt-production
          kind: ClusterIssuer
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default)

- name: Remove hermes-agent Certificate when gate is off
  kubernetes.core.k8s:
    state: absent
    api_version: cert-manager.io/v1
    kind: Certificate
    namespace: "{{ hermes.namespace }}"
    name: "hermes-agent-{{ item.username }}-tls"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: not (item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default))

- name: Apply per-user hermes-agent IngressRoute (auth via hermes BasicAuthProvider)
  # Traefik terminates TLS and forwards straight to the dashboard port.
  # Authentication is hermes' OWN built-in BasicAuthProvider (engaged by the
  # 0.0.0.0 bind); WS/PTY/events are authorised in-app via hermes' single-use
  # ?ticket= mechanism (dashboard_auth/ws_tickets.py), so no auth proxy is
  # needed in front. NOTE: this route has no ip-allowlist/redirect
  # middleware — the hermes login IS the access gate now (same as when Caddy was
  # the gate). Add an ip-allowlist middleware here if defence-in-depth is wanted.
  kubernetes.core.k8s:
    state: present
    apply: true
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: "hermes-agent-{{ item.username }}"
        namespace: "{{ hermes.namespace }}"
      spec:
        entryPoints:
          - websecure
        routes:
          - kind: Rule
            match: "Host(`{{ item.username }}.{{ hermes.agent.subdomain }}.{{ dns_external_domain_suffix }}`)"
            priority: 10
            services:
              - kind: Service
                name: "hermes-agent-{{ item.username }}"
                passHostHeader: true
                port: "{{ hermes.agent.dashboard_port }}"
        tls:
          secretName: "hermes-agent-{{ item.username }}-tls"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default)

- name: Remove hermes-agent IngressRoute when gate is off
  kubernetes.core.k8s:
    state: absent
    api_version: traefik.io/v1alpha1
    kind: IngressRoute
    namespace: "{{ hermes.namespace }}"
    name: "hermes-agent-{{ item.username }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"
  when: not (item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default))

- name: Register DNS A record for hermes-agent (dashboard hostname)
  community.general.nsupdate:
    server: "{{ nsupdate_server }}"
    zone: "{{ nsupdate_zone }}"
    key_name: "{{ nsupdate_tsig_key_name }}"
    key_secret: "{{ nsupdate_tsig_key_secret }}"
    key_algorithm: "{{ nsupdate_tsig_algorithm }}"
    record: "{{ item.username }}.{{ hermes.agent.subdomain }}.{{ dns_external_domain_suffix }}."
    type: A
    ttl: "{{ nsupdate_ttl }}"
    value: "{{ nsupdate_ingress_ip }}"
    state: "{{ 'present' if (item.dashboard_enabled | default(hermes.agent.dashboard_enabled_default)) else 'absent' }}"
  loop: "{{ _hermes_active_users }}"
  loop_control:
    label: "{{ item.username }}"

