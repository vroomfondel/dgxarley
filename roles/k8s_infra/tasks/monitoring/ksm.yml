---
# =============================================================================
# KUBE-STATE-METRICS
# =============================================================================

- name: Create kube-state-metrics ServiceAccount
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: kube-state-metrics
        namespace: kube-system

- name: Create kube-state-metrics ClusterRole
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: kube-state-metrics
      rules:
      - apiGroups: ["", "apps", "batch", "extensions", "networking.k8s.io", "admissionregistration.k8s.io", "certificates.k8s.io", "policy", "storage.k8s.io", "coordination.k8s.io", "autoscaling", "discovery.k8s.io"]
        resources:
        - configmaps
        - secrets
        - nodes
        - pods
        - services
        - resourcequotas
        - replicationcontrollers
        - limitranges
        - persistentvolumeclaims
        - persistentvolumes
        - namespaces
        - endpointslices
        - endpoints
        - deployments
        - statefulsets
        - daemonsets
        - cronjobs
        - jobs
        - replicasets
        - ingresses
        - networkpolicies
        - mutatingwebhookconfigurations
        - validatingwebhookconfigurations
        - certificatesigningrequests
        - poddisruptionbudgets
        - storageclasses
        - volumeattachments
        - leases
        - horizontalpodautoscalers
        verbs: ["list", "watch"]

- name: Create kube-state-metrics ClusterRoleBinding
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: kube-state-metrics
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: kube-state-metrics
      subjects:
      - kind: ServiceAccount
        name: kube-state-metrics
        namespace: kube-system

- name: Create kube-state-metrics Deployment
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kube-state-metrics
        namespace: kube-system
      spec:
        replicas: 1
        selector:
          matchLabels:
            app.kubernetes.io/name: kube-state-metrics
        template:
          metadata:
            labels:
              app.kubernetes.io/name: kube-state-metrics
            annotations:
              keel.sh/policy: patch
              keel.sh/match-tag: "true"
              keel.sh/pollSchedule: "@every 24h"
              keel.sh/trigger: poll
          spec:
            nodeSelector:
              kubernetes.io/arch: amd64
            serviceAccountName: kube-state-metrics
            containers:
            - name: kube-state-metrics
              image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.18.0
              ports:
              - containerPort: 8080
                name: http-metrics
              - containerPort: 8081
                name: telemetry
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 256Mi

- name: Create kube-state-metrics Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: kube-state-metrics
        namespace: kube-system
        labels:
          app.kubernetes.io/name: kube-state-metrics
      spec:
        ports:
        - name: http-metrics
          port: 8080
          targetPort: http-metrics
        - name: telemetry
          port: 8081
          targetPort: telemetry
        selector:
          app.kubernetes.io/name: kube-state-metrics
