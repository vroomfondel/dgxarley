---
# =============================================================================
# GRAFANA SECRETS (local auth — no Keycloak OIDC)
# =============================================================================

- name: Create grafana-secrets with local auth configuration
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: grafana-secrets
        namespace: monitoring
      type: Opaque
      stringData:
        GF_SECURITY_ADMIN_USER: 'admin'
        GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
        GF_SECURITY_ALLOW_EMBEDDING: 'true'
        GF_SECURITY_COOKIE_SAMESITE: 'disabled'
        GF_AUTH_ANONYMOUS_ENABLED: 'false'
        GF_SERVER_ROOT_URL: "{{ grafana_root_url }}"
  register: grafana_secrets

# =============================================================================
# GRAFANA RESOURCES (ConfigMaps, Deployment, Service, Ingress)
# =============================================================================

- name: Create grafana-provisioning ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: grafana-provisioning
        namespace: monitoring
      data:
        datasources.yaml: |
          apiVersion: 1
          deleteDatasources:
            - name: Prometheus
              orgId: 1
          datasources:
          - name: Prometheus
            type: prometheus
            url: http://prometheus.monitoring.svc.cluster.local:9090
            access: proxy
            isDefault: true
            uid: prometheus
            jsonData:
              httpMethod: POST
              manageAlerts: true
              prometheusType: Prometheus
              prometheusVersion: "3.9.1"
        dashboards.yaml: |
          apiVersion: 1
          providers:
          - name: 'Default'
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards
  register: grafana_provisioning

- name: Create grafana-download-dashboards-script ConfigMap
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: grafana-download-dashboards-script
        namespace: monitoring
      data:
        download-dashboards.sh: "{{ lookup('file', role_path ~ '/files/download-dashboards.sh') }}"
  register: grafana_dashboards_script

- name: Create grafana Deployment
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: grafana
        namespace: monitoring
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: grafana
        template:
          metadata:
            labels:
              app: grafana
            annotations:
              checksum/config: "{{ (grafana_secrets.result.data | to_json + grafana_provisioning.result.data | to_json + grafana_dashboards_script.result.data | to_json) | hash('sha256') }}"
              kubectl.kubernetes.io/default-container: "grafana"
              keel.sh/policy: force
              keel.sh/match-tag: "true"
              keel.sh/pollSchedule: "@every 24h"
              keel.sh/trigger: poll
          spec:
            nodeSelector:
              kubernetes.io/arch: amd64
            dnsConfig:
              options:
                - name: ndots
                  value: "2"
            initContainers:
            - name: fix-permissions
              image: busybox
              command: ["sh", "-c", "chown -R 472:472 /var/lib/grafana"]
              volumeMounts:
              - name: grafana-storage
                mountPath: /var/lib/grafana
            - name: download-dashboards
              image: alpine:latest
              command: ["/bin/sh", "/scripts/download-dashboards.sh"]
              env:
                - name: GRAFANA_DASHBOARD_CACHE_TTL_DAYS
                  value: "{{ grafana_dashboard_cache_ttl_days | default(7) | string }}"
              volumeMounts:
              - name: download-script
                mountPath: /scripts
              - name: grafana-dashboards
                mountPath: /var/lib/grafana/dashboards
            containers:
            - name: grafana
              image: grafana/grafana:12.4-ubuntu
              ports:
              - name: grafanaport
                containerPort: 3000
              envFrom:
              - secretRef:
                  name: grafana-secrets
              volumeMounts:
              - name: grafana-storage
                mountPath: /var/lib/grafana
              - name: grafana-provisioning
                mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
                subPath: datasources.yaml
              - name: grafana-provisioning
                mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
                subPath: dashboards.yaml
              - name: grafana-dashboards
                mountPath: /var/lib/grafana/dashboards
              resources:
                requests:
                  cpu: 250m
                  memory: 250Mi
                limits:
                  cpu: 2000m
                  memory: 950Mi
            volumes:
            - name: download-script
              configMap:
                name: grafana-download-dashboards-script
                defaultMode: 0755
            - name: grafana-storage
              hostPath:
                path: /var/lib/k8s-data/grafana
                type: DirectoryOrCreate
            - name: grafana-provisioning
              configMap:
                name: grafana-provisioning
            - name: grafana-dashboards
              hostPath:
                path: /var/lib/k8s-data/grafana-dashboards
                type: DirectoryOrCreate

- name: Create grafana Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: grafana
        namespace: monitoring
      spec:
        selector:
          app: grafana
        type: ClusterIP
        ports:
        - port: 3000
          targetPort: grafanaport

- name: Create grafana HTTP IngressRoute
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: grafanahttpingress
        namespace: monitoring
      spec:
        entryPoints:
          - web
        routes:
        - kind: Rule
          match: "Host(`promgrafana.{{ dns_external_domain_suffix }}`)"
          priority: 10
          services:
          - kind: Service
            name: grafana
            namespace: monitoring
            passHostHeader: true
            port: 3000
          middlewares:
            - name: ip-source-limiter
              namespace: monitoring
            - name: redirect-myhttps
              namespace: monitoring

- name: Create grafana TLS Certificate
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: "promgrafana.{{ dns_external_domain_suffix }}"
        namespace: monitoring
      spec:
        dnsNames:
          - "promgrafana.{{ dns_external_domain_suffix }}"
        secretName: "promgrafana.{{ dns_external_domain_suffix }}"
        issuerRef:
          name: letsencrypt-production
          kind: ClusterIssuer

- name: Create grafana HTTPS IngressRoute
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: pghttpsingress
        namespace: monitoring
      spec:
        entryPoints:
          - websecure
        routes:
          - kind: Rule
            match: "Host(`promgrafana.{{ dns_external_domain_suffix }}`)"
            priority: 10
            services:
            - kind: Service
              name: grafana
              namespace: monitoring
              passHostHeader: true
              port: 3000
            middlewares:
              - name: ip-source-limiter
                namespace: monitoring
        tls:
          secretName: "promgrafana.{{ dns_external_domain_suffix }}"

- name: Register DNS A record for promgrafana
  community.general.nsupdate:
    server: "{{ nsupdate_server }}"
    zone: "{{ nsupdate_zone }}"
    key_name: "{{ nsupdate_tsig_key_name }}"
    key_secret: "{{ nsupdate_tsig_key_secret }}"
    key_algorithm: "{{ nsupdate_tsig_algorithm }}"
    record: "promgrafana.{{ dns_external_domain_suffix }}."
    type: A
    ttl: "{{ nsupdate_ttl }}"
    value: "{{ nsupdate_ingress_ip }}"
    state: present
