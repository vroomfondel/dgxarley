---
# =============================================================================
# MONITORING NAMESPACE AND SHARED MIDDLEWARES
# =============================================================================

- name: Create monitoring namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: monitoring

- name: Create shared monitoring middlewares
  kubernetes.core.k8s:
    state: present
    definition:
      - apiVersion: traefik.io/v1alpha1
        kind: Middleware
        metadata:
          name: ip-source-limiter
          namespace: monitoring
        spec:
          ipAllowList:
            sourceRange: "{{ traefik_internal_allowlist }}"
      - apiVersion: traefik.io/v1alpha1
        kind: Middleware
        metadata:
          name: redirect-myhttps
          namespace: monitoring
        spec:
          redirectScheme:
            scheme: https
