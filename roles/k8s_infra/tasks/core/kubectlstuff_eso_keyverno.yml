---
# mainly via group_vars
- name: Set ESO variables
  ansible.builtin.set_fact:
    policy_reporter_fqdn: "policy-reporter.{{ dns_external_domain_suffix }}"
#    eso_service_account: external-secrets
#    eso_namespace: external-secrets
#    eso_secrets_namespace: admin-secrets
#    dns_external_domain_suffix: "example.com"
#    policy_reporter_fqdn: "policy-reporter.{{ dns_external_domain_suffix }}"
#    traefik_internal_allowlist:
#      - "192.168.123.0/24"
#      - "192.168.234.0/24"


- name: Create ESO secrets namespace
  kubernetes.core.k8s:
    name: "{{ eso_secrets_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Create ESO namespace
  kubernetes.core.k8s:
    name: "{{ eso_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Install External Secrets Operator via Kustomize
  vars:
    # gh api repos/external-secrets/external-secrets/releases/latest --jq '.tag_name'
    eso_version: "v2.1.0"
    eso_temp_dir: "/tmp/eso-install"
  block:
    - name: Ensure ESO temporary directory exists
      ansible.builtin.file:
        path: "{{ eso_temp_dir }}"
        state: directory
        mode: '0755'

    # ┌───────────────────────────────┬─────────────┬───────────┬────────────────┬──────────────┐
    # │          Controller           │ CPU Request │ CPU Limit │ Memory Request │ Memory Limit │
    # ├───────────────────────────────┼─────────────┼───────────┼────────────────┼──────────────┤
    # │ external-secrets              │ 100m        │ 500m      │ 128Mi          │ 512Mi        │
    # ├───────────────────────────────┼─────────────┼───────────┼────────────────┼──────────────┤
    # │ external-secrets-cert-ctrl    │ 50m         │ 200m      │ 64Mi           │ 128Mi        │
    # ├───────────────────────────────┼─────────────┼───────────┼────────────────┼──────────────┤
    # │ external-secrets-webhook      │ 50m         │ 250m      │ 64Mi           │ 256Mi        │
    # └───────────────────────────────┴─────────────┴───────────┴────────────────┴──────────────┘
    - name: Create ESO kustomization.yaml
      ansible.builtin.copy:
        dest: "{{ eso_temp_dir }}/kustomization.yaml"
        mode: '0644'
        content: |
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization

          namespace: {{ eso_namespace }}

          resources:
            - https://github.com/external-secrets/external-secrets/releases/download/{{ eso_version }}/external-secrets.yaml

          patches:
            # Main controller resources
            - target:
                kind: Deployment
                name: external-secrets
              patch: |-
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: external-secrets
                spec:
                  template:
                    spec:
                      containers:
                        - name: external-secrets
                          resources:
                            requests:
                              cpu: 100m
                              memory: 128Mi
                            limits:
                              cpu: 500m
                              memory: 512Mi
            # Cert-controller: fix namespace args + resources
            - target:
                kind: Deployment
                name: external-secrets-cert-controller
              patch: |-
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: external-secrets-cert-controller
                spec:
                  template:
                    spec:
                      containers:
                        - name: cert-controller
                          args:
                            - certcontroller
                            - --crd-requeue-interval=5m
                            - --service-name=external-secrets-webhook
                            - --service-namespace={{ eso_namespace }}
                            - --secret-name=external-secrets-webhook
                            - --secret-namespace={{ eso_namespace }}
                            - --metrics-addr=:8080
                            - --healthz-addr=:8081
                            - --loglevel=info
                            - --zap-time-encoding=epoch
                            - --enable-partial-cache=true
                          resources:
                            requests:
                              cpu: 50m
                              memory: 64Mi
                            limits:
                              cpu: 200m
                              memory: 128Mi
            # nodeSelector: pin all ESO pods to amd64
            - target:
                kind: Deployment
              patch: |-
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: placeholder
                spec:
                  template:
                    spec:
                      nodeSelector:
                        kubernetes.io/arch: amd64
            # Webhook: fix dns-name arg + resources
            - target:
                kind: Deployment
                name: external-secrets-webhook
              patch: |-
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: external-secrets-webhook
                spec:
                  template:
                    spec:
                      containers:
                        - name: webhook
                          args:
                            - webhook
                            - --port=10250
                            - --dns-name=external-secrets-webhook.{{ eso_namespace }}.svc
                            - --cert-dir=/tmp/certs
                            - --check-interval=5m
                            - --metrics-addr=:8080
                            - --healthz-addr=:8081
                            - --loglevel=info
                            - --zap-time-encoding=epoch
                          resources:
                            requests:
                              cpu: 50m
                              memory: 64Mi
                            limits:
                              cpu: 250m
                              memory: 256Mi

#    - name: Build ESO Kustomize manifest
#      ansible.builtin.shell:
#        cmd: kubectl kustomize . > external-secrets-rendered.yaml
#        chdir: "{{ eso_temp_dir }}"
#      changed_when: true
#
#    - name: Apply ESO Kustomize build to cluster
#      kubernetes.core.k8s:
#        state: present
#        src: "{{ eso_temp_dir }}/external-secrets-rendered.yaml"
#        server_side_apply:
#          field_manager: ansible

    - name: Apply ESO Kustomize build to cluster
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('kubernetes.core.kustomize', dir=eso_temp_dir) }}"
        server_side_apply:
          field_manager: ansible

  always:
    - name: Cleanup ESO temporary directory
      ansible.builtin.file:
        path: "{{ eso_temp_dir }}"
        state: absent

- name: Wait for External Secrets Cert Controller to be ready first
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: external-secrets-cert-controller
    namespace: "{{ eso_namespace }}"
  register: eso_cert_deployment_initial
  until: >
    eso_cert_deployment_initial.resources | length > 0 and
    (eso_cert_deployment_initial.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 30
  delay: 10

- name: Wait for External Secrets Webhook Secret to be created
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: external-secrets-webhook
    namespace: "{{ eso_namespace }}"
  register: eso_webhook_secret
  until: eso_webhook_secret.resources | length > 0
  retries: 30
  delay: 10

- name: Wait for External Secrets Operator to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: external-secrets
    namespace: "{{ eso_namespace }}"
  register: eso_deployment
  until: >
    eso_deployment.resources | length > 0 and
    (eso_deployment.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 30
  delay: 10

- name: Wait for External Secrets Webhook to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: external-secrets-webhook
    namespace: "{{ eso_namespace }}"
  register: eso_webhook_deployment
  until: >
    eso_webhook_deployment.resources | length > 0 and
    (eso_webhook_deployment.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 30
  delay: 10

- name: Create ESO reader role in secrets namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        namespace: "{{ eso_secrets_namespace }}"
        name: eso-reader-role
      rules:
        - apiGroups: [""]
          resources: ["secrets"]
          verbs: ["get", "list", "watch"]

- name: Create RoleBinding for ESO ServiceAccount
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        namespace: "{{ eso_secrets_namespace }}"
        name: eso-reader-binding
      subjects:
        - kind: ServiceAccount
          name: "{{ eso_service_account }}"
          namespace: "{{ eso_namespace }}"
      roleRef:
        kind: Role
        name: eso-reader-role
        apiGroup: rbac.authorization.k8s.io

- name: Create ClusterSecretStore for Kubernetes secrets
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: external-secrets.io/v1
      kind: ClusterSecretStore
      metadata:
        name: "{{ eso_default_store_name }}"
      spec:
        provider:
          kubernetes:
            server:
              url: "https://kubernetes.default.svc.cluster.local."
              caProvider:
                type: ConfigMap
                name: kube-root-ca.crt
                key: ca.crt
                namespace: kube-system
            auth:
              serviceAccount:
                name: "{{ eso_service_account }}"
                namespace: "{{ eso_namespace }}"
            remoteNamespace: "{{ eso_secrets_namespace }}"

- name: Install Kyverno via Kustomize
  vars:
    # gh api repos/kyverno/kyverno/releases/latest --jq '.tag_name'
    kyverno_version: "v1.17.1"
    kyverno_temp_dir: "/tmp/kyverno-install"
  block:
    - name: Ensure Kyverno temporary directory exists
      ansible.builtin.file:
        path: "{{ kyverno_temp_dir }}"
        state: directory
        mode: '0755'

    # ┌───────────────────────┬─────────────┬───────────┬────────────────┬──────────────┬──────────────────────────────────────────┐
    # │      Controller       │ CPU Request │ CPU Limit │ Memory Request │ Memory Limit │ Probe Overrides                          │
    # ├───────────────────────┼─────────────┼───────────┼────────────────┼──────────────┼──────────────────────────────────────────┤
    # │ admission-controller  │ 100m        │ 500m      │ 128Mi          │ 384Mi        │ liveness fTh=6, startup timeout=5        │
    # ├───────────────────────┼─────────────┼───────────┼────────────────┼──────────────┼──────────────────────────────────────────┤
    # │ background-controller │ 50m         │ 250m      │ 64Mi           │ 256Mi        │                                          │
    # ├───────────────────────┼─────────────┼───────────┼────────────────┼──────────────┼──────────────────────────────────────────┤
    # │ cleanup-controller    │ 50m         │ 250m      │ 64Mi           │ 256Mi        │ liveness fTh=6, startup timeout=5        │
    # ├───────────────────────┼─────────────┼───────────┼────────────────┼──────────────┼──────────────────────────────────────────┤
    # │ reports-controller    │ 50m         │ 250m      │ 64Mi           │ 256Mi        │                                          │
    # └───────────────────────┴─────────────┴───────────┴────────────────┴──────────────┴──────────────────────────────────────────┘
    # Cross-component podAntiAffinity (preferred) on app.kubernetes.io/instance=kyverno for all 4 deployments
    - name: Create Kyverno kustomization.yaml
      ansible.builtin.copy:
        dest: "{{ kyverno_temp_dir }}/kustomization.yaml"
        mode: '0644'
        content: |
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization

          resources:
            - https://github.com/kyverno/kyverno/releases/download/{{ kyverno_version }}/install.yaml
            # OpenReports CRDs (required for --openreportsEnabled=true)
            - https://raw.githubusercontent.com/openreports/reports-api/main/config/crd/openreports.io_reports.yaml
            - https://raw.githubusercontent.com/openreports/reports-api/main/config/crd/openreports.io_clusterreports.yaml

          patches:
            # admission-controller resources
            - target:
                kind: Deployment
                name: kyverno-admission-controller
                namespace: kyverno
              patch: |-
                - op: add
                  path: /spec/template/spec/containers/0/resources
                  value:
                    requests:
                      cpu: 100m
                      memory: 128Mi
                    limits:
                      cpu: 500m
                      memory: 384Mi
                - op: add
                  path: /spec/template/spec/containers/0/args/-
                  value: "--admissionReports=true"
                - op: replace
                  path: /spec/template/spec/containers/0/livenessProbe/failureThreshold
                  value: 6
                - op: replace
                  path: /spec/template/spec/containers/0/startupProbe/timeoutSeconds
                  value: 5
            # background-controller resources
            - target:
                kind: Deployment
                name: kyverno-background-controller
                namespace: kyverno
              patch: |-
                - op: add
                  path: /spec/template/spec/containers/0/resources
                  value:
                    requests:
                      cpu: 50m
                      memory: 64Mi
                    limits:
                      cpu: 250m
                      memory: 256Mi
            # cleanup-controller resources + probe tuning
            - target:
                kind: Deployment
                name: kyverno-cleanup-controller
                namespace: kyverno
              patch: |-
                - op: add
                  path: /spec/template/spec/containers/0/resources
                  value:
                    requests:
                      cpu: 50m
                      memory: 64Mi
                    limits:
                      cpu: 250m
                      memory: 256Mi
                - op: replace
                  path: /spec/template/spec/containers/0/livenessProbe/failureThreshold
                  value: 6
                - op: replace
                  path: /spec/template/spec/containers/0/startupProbe/timeoutSeconds
                  value: 5
            # reports-controller resources + openreportsEnabled (strategic merge)
            - target:
                kind: Deployment
                name: kyverno-reports-controller
                namespace: kyverno
              patch: |-
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: kyverno-reports-controller
                spec:
                  template:
                    spec:
                      containers:
                        - name: controller
                          resources:
                            requests:
                              cpu: 50m
                              memory: 64Mi
                            limits:
                              cpu: 250m
                              memory: 256Mi
                          args:
                            - --disableMetrics=false
                            - --openreportsEnabled=true
                            - --otelConfig=prometheus
                            - --metricsPort=8000
                            - --resyncPeriod=15m
                            - --admissionReports=true
                            - --aggregateReports=true
                            - --policyReports=true
                            - --validatingAdmissionPolicyReports=true
                            - --mutatingAdmissionPolicyReports=false
                            - --backgroundScan=true
                            - --backgroundScanWorkers=2
                            - --backgroundScanInterval=1h
                            - --skipResourceFilters=true
                            - --enableConfigMapCaching=true
                            - --enableDeferredLoading=true
                            - --maxAPICallResponseLength=2000000
                            - --loggingFormat=text
                            - --v=2
                            - --omitEvents=PolicyApplied,PolicySkipped
                            - --enablePolicyException=false
                            - --allowInsecureRegistry=false
                            - --registryCredentialHelpers=default,google,amazon,azure,github
                            - --enableReporting=validate,mutate,mutateExisting,imageVerify,generate
            # Cross-component anti-affinity: spread all Kyverno pods across nodes
            - target:
                kind: Deployment
                namespace: kyverno
              patch: |-
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: placeholder
                spec:
                  template:
                    spec:
                      nodeSelector:
                        kubernetes.io/arch: amd64
                      affinity:
                        podAntiAffinity:
                          preferredDuringSchedulingIgnoredDuringExecution:
                            - weight: 50
                              podAffinityTerm:
                                labelSelector:
                                  matchExpressions:
                                    - key: app.kubernetes.io/instance
                                      operator: In
                                      values:
                                        - kyverno
                                topologyKey: kubernetes.io/hostname

    - name: Apply Kyverno Kustomize build to cluster
      kubernetes.core.k8s:
        definition: "{{ lookup('kubernetes.core.kustomize', dir=kyverno_temp_dir) }}"
        state: present
#        wait: true
#        wait_timeout: 300

  always:
    - name: Cleanup Kyverno temporary directory
      ansible.builtin.file:
        path: "{{ kyverno_temp_dir }}"
        state: absent

- name: Wait for Kyverno deployment to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: kyverno-admission-controller
    namespace: kyverno
  register: kyverno_deployment
  until: >
    kyverno_deployment.resources | length > 0 and
    (kyverno_deployment.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 30
  delay: 10

- name: Create Kyverno policy for namespace-based secret isolation
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: kyverno.io/v1
      kind: ClusterPolicy
      metadata:
        name: eso-namespace-secret-isolation
      spec:
        background: true
        rules:
          - name: restrict-secrets-to-namespace-prefix
            match:
              any:
                - resources:
                    kinds:
                      - ExternalSecret
            validate:
              failureAction: Enforce
              message: "ExternalSecrets dürfen nur Secrets referenzieren, die mit '{% raw %}{{request.namespace}}{% endraw %}-' beginnen"
              foreach:
                # Prüft spec.data (einzelne Key-Mappings)
                - list: "request.object.spec.data"
                  deny:
                    conditions:
                      all:
                        - key: "{% raw %}{{ starts_with(element.remoteRef.key, '{{request.namespace}}-') }}{% endraw %}"
                          operator: NotEquals
                          value: true
                # Prüft spec.dataFrom mit extract (alle Keys aus einem Secret)
                - list: "request.object.spec.dataFrom"
                  deny:
                    conditions:
                      all:
                        - key: "{% raw %}{{ starts_with(element.extract.key, '{{request.namespace}}-') }}{% endraw %}"
                          operator: NotEquals
                          value: true
  register: kyverno_policy_result
  retries: 6
  delay: 10
  until: kyverno_policy_result is not failed


# ============================================================================
# Kyverno Policy Reporter - Dashboard für Policy Reports
# ============================================================================
- name: Create policy-reporter namespace
  kubernetes.core.k8s:
    name: policy-reporter
    api_version: v1
    kind: Namespace
    state: present

- name: Install Kyverno Policy Reporter via Kustomize
  vars:
    policy_reporter_temp_dir: "/tmp/policy-reporter-install"
  block:
    - name: Ensure Policy Reporter temporary directory exists
      ansible.builtin.file:
        path: "{{ policy_reporter_temp_dir }}"
        state: directory
        mode: '0755'

    # ┌───────────────────────────────┬─────────────┬───────────┬────────────────┬──────────────┐
    # │          Component            │ CPU Request │ CPU Limit │ Memory Request │ Memory Limit │
    # ├───────────────────────────────┼─────────────┼───────────┼────────────────┼──────────────┤
    # │ policy-reporter               │ 50m         │ 200m      │ 64Mi           │ 256Mi        │
    # ├───────────────────────────────┼─────────────┼───────────┼────────────────┼──────────────┤
    # │ policy-reporter-ui            │ 25m         │ 100m      │ 32Mi           │ 128Mi        │
    # ├───────────────────────────────┼─────────────┼───────────┼────────────────┼──────────────┤
    # │ policy-reporter-kyverno-plugin│ 25m         │ 100m      │ 32Mi           │ 128Mi        │
    # └───────────────────────────────┴─────────────┴───────────┴────────────────┴──────────────┘
    - name: Create Policy Reporter kustomization.yaml
      ansible.builtin.copy:
        dest: "{{ policy_reporter_temp_dir }}/kustomization.yaml"
        mode: '0644'
        content: |
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization

          resources:
            - https://raw.githubusercontent.com/kyverno/policy-reporter/main/manifests/policy-reporter-kyverno-ui/install.yaml

          patches:
            # policy-reporter resources
            - target:
                kind: Deployment
                name: policy-reporter
                namespace: policy-reporter
              patch: |-
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: policy-reporter
                spec:
                  template:
                    spec:
                      containers:
                        - name: policy-reporter
                          resources:
                            requests:
                              cpu: 50m
                              memory: 64Mi
                            limits:
                              cpu: 200m
                              memory: 256Mi
            # nodeSelector: pin all Policy Reporter pods to amd64
            - target:
                kind: Deployment
                namespace: policy-reporter
              patch: |-
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: placeholder
                spec:
                  template:
                    spec:
                      nodeSelector:
                        kubernetes.io/arch: amd64
            # policy-reporter-ui resources
            - target:
                kind: Deployment
                name: policy-reporter-ui
                namespace: policy-reporter
              patch: |-
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: policy-reporter-ui
                spec:
                  template:
                    spec:
                      containers:
                        - name: policy-reporter-ui
                          resources:
                            requests:
                              cpu: 25m
                              memory: 32Mi
                            limits:
                              cpu: 100m
                              memory: 128Mi
            # policy-reporter-kyverno-plugin resources
            - target:
                kind: Deployment
                name: policy-reporter-kyverno-plugin
                namespace: policy-reporter
              patch: |-
                apiVersion: apps/v1
                kind: Deployment
                metadata:
                  name: policy-reporter-kyverno-plugin
                spec:
                  template:
                    spec:
                      containers:
                        - name: policy-reporter-kyverno-plugin
                          resources:
                            requests:
                              cpu: 25m
                              memory: 32Mi
                            limits:
                              cpu: 100m
                              memory: 128Mi

    - name: Apply Policy Reporter Kustomize build to cluster
      kubernetes.core.k8s:
        definition: "{{ lookup('kubernetes.core.kustomize', dir=policy_reporter_temp_dir) }}"
        state: present

  always:
    - name: Cleanup Policy Reporter temporary directory
      ansible.builtin.file:
        path: "{{ policy_reporter_temp_dir }}"
        state: absent

- name: Wait for Policy Reporter deployment to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: policy-reporter
    namespace: policy-reporter
  register: policy_reporter_deployment
  until: >
    policy_reporter_deployment.resources | length > 0 and
    (policy_reporter_deployment.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 30
  delay: 10

# Kyverno Plugin Secret for showing blocked requests (Enforce mode)
- name: Create Kyverno Plugin config for block events
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: policy-reporter-kyverno-plugin-config
        namespace: policy-reporter
      stringData:
        config.yaml: |
          blockReports:
            enabled: true
            results:
              maxPerReport: 200
              keepOnlyLatest: false

# RBAC for Kyverno Plugin to read Events (needed for blockReports)
- name: Create ClusterRole for Kyverno Plugin events access
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRole
      metadata:
        name: policy-reporter-kyverno-plugin-events
      rules:
        - apiGroups: [""]
          resources: ["events"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["wgpolicyk8s.io"]
          resources: ["policyreports", "clusterpolicyreports"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- name: Create ClusterRoleBinding for Kyverno Plugin events access
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: policy-reporter-kyverno-plugin-events
      subjects:
        - kind: ServiceAccount
          name: policy-reporter-kyverno-plugin
          namespace: policy-reporter
      roleRef:
        kind: ClusterRole
        name: policy-reporter-kyverno-plugin-events
        apiGroup: rbac.authorization.k8s.io

- name: Restart Kyverno Plugin to pick up config
  ansible.builtin.command:
    cmd: kubectl rollout restart deployment/policy-reporter-kyverno-plugin -n policy-reporter
  changed_when: true

- name: Wait for Kyverno Plugin rollout
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/policy-reporter-kyverno-plugin -n policy-reporter --timeout=120s
  changed_when: false

- name: Create Policy Reporter IP allowlist middleware
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: policy-reporter-ip-allowlist
        namespace: policy-reporter
      spec:
        ipAllowList:
          sourceRange: "{{ traefik_internal_allowlist }}"

- name: Create Policy Reporter UI IngressRoute (HTTP)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: policy-reporter-ui-ingress
        namespace: policy-reporter
      spec:
        entryPoints:
          - web
        routes:
          - kind: Rule
            match: Host(`{{ policy_reporter_fqdn }}`)
            priority: 10
            middlewares:
              - name: policy-reporter-ip-allowlist
                namespace: policy-reporter
            services:
              - kind: Service
                name: policy-reporter-ui
                namespace: policy-reporter
                passHostHeader: true
                port: 8080

- name: Create Policy Reporter TLS certificate
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: "{{ policy_reporter_fqdn }}"
        namespace: policy-reporter
      spec:
        dnsNames:
          - "{{ policy_reporter_fqdn }}"
        secretName: "{{ policy_reporter_fqdn }}"
        issuerRef:
          name: letsencrypt-production
          kind: ClusterIssuer

- name: Create Policy Reporter UI IngressRoute (HTTPS)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: policy-reporter-ui-ingress-tls
        namespace: policy-reporter
      spec:
        entryPoints:
          - websecure
        routes:
          - kind: Rule
            match: Host(`{{ policy_reporter_fqdn }}`)
            priority: 10
            middlewares:
              - name: policy-reporter-ip-allowlist
                namespace: policy-reporter
            services:
              - kind: Service
                name: policy-reporter-ui
                namespace: policy-reporter
                passHostHeader: true
                port: 8080
        tls:
          secretName: "{{ policy_reporter_fqdn }}"

- name: Register DNS A record for policy-reporter
  community.general.nsupdate:
    server: "{{ nsupdate_server }}"
    zone: "{{ nsupdate_zone }}"
    key_name: "{{ nsupdate_tsig_key_name }}"
    key_secret: "{{ nsupdate_tsig_key_secret }}"
    key_algorithm: "{{ nsupdate_tsig_algorithm }}"
    record: "{{ policy_reporter_fqdn }}."
    type: A
    ttl: "{{ nsupdate_ttl }}"
    value: "{{ nsupdate_ingress_ip }}"
    state: present


