---

# --- INSTALL (runs on a normal play when sealed_secrets_enabled and NOT sealed_secrets_teardown) ---
- name: Sealed Secrets controller — install
  when:
    - sealed_secrets_enabled | default(true) | bool
    - not (sealed_secrets_teardown | default(false) | bool)
  block:
    - name: Install Sealed Secrets via Kustomize
      vars:
        # sealed_secrets_version lives in defaults/main.yml so install + the
        # teardown block below apply/delete the SAME upstream manifest.
        # gh api repos/bitnami-labs/sealed-secrets/releases/latest --jq '.tag_name'
        temp_dir: "/tmp/sealed-secrets-install"
      block:
        - name: Debug host information
          debug:
            msg:
              - "Target Host (inventory_hostname): {{ inventory_hostname }}"
              - "Actual execution (ansible_host): {{ ansible_host | default(inventory_hostname) }}"

        # 1. Verzeichnis vorbereiten
        - name: Ensure temporary directory exists
          file:
            path: "{{ temp_dir }}"
            state: directory
            mode: '0777'

        # 2. Das kustomization.yaml schreiben
        # Hier definieren wir die Remote-URL und patchen direkt Einstellungen
        - name: Create kustomization.yaml
          copy:
            dest: "{{ temp_dir }}/kustomization.yaml"
            content: |
              apiVersion: kustomize.config.k8s.io/v1beta1
              kind: Kustomization

              resources:
                - https://github.com/bitnami-labs/sealed-secrets/releases/download/{{ sealed_secrets_version }}/controller.yaml

              # Optional: Patches, um Standardwerte zu ändern (hier: Rotation deaktivieren)
              patches:
                - target:
                    kind: Deployment
                    name: sealed-secrets-controller
                    namespace: kube-system
                  patch: |-
                    - op: add
                      path: /spec/template/spec/containers/0/command/-
                      value: "--key-renew-period=0"
                    - op: add
                      path: /spec/template/spec/containers/0/resources
                      value:
                        requests:
                          cpu: "10m"
                          memory: "32Mi"
                        limits:
                          cpu: "200m"
                          memory: "128Mi"
                    - op: add
                      path: /metadata/annotations/keel.sh~1policy
                      value: "patch"
                    - op: add
                      path: /metadata/annotations/keel.sh~1match-tag
                      value: "true"
                    - op: add
                      path: /metadata/annotations/keel.sh~1pollSchedule
                      value: "@every 24h"
                    - op: add
                      path: /metadata/annotations/keel.sh~1trigger
                      value: "poll"
                    - op: add
                      path: /spec/template/spec/nodeSelector
                      value:
                        kubernetes.io/arch: amd64

        # 3. Kustomize Build ausführen und auf Cluster anwenden
        # Der 'lookup' führt lokal 'kustomize build' aus und übergibt das Ergebnis an das K8s-Modul
        - name: Apply Kustomize build to Cluster
          kubernetes.core.k8s:
            definition: "{{ lookup('kubernetes.core.kustomize', dir=temp_dir) }}"
            state: present
      always:
        # 4. Aufräumen (Optional)
        - name: Cleanup temporary directory
          file:
            path: "{{ temp_dir }}"
            state: absent
      # delegate_to: localhost

# --- TEARDOWN (opt-in: run the play with -e sealed_secrets_teardown=true) ---
# Sealed Secrets controller — TEARDOWN.
# Opt-in: runs only with `-e sealed_secrets_teardown=true` (e.g.
# `--tags sealed_secrets -e sealed_secrets_teardown=true`); NOT triggered by
# `sealed_secrets_enabled: false` (that flag only skips the install).
#
# Deletes exactly what the install applied — controller Deployment/Service(s),
# ServiceAccount, cluster + kube-system RBAC and the SealedSecret CRD — enumerated
# explicitly and removed via the k8s module (which inherits the play's context).
# These object NAMES are stable across sealed-secrets versions, so this is version-
# independent (unlike a `kubectl delete -f <pinned-version>/controller.yaml`, which
# both shells out past module_defaults AND assumes the installed version == the pin).
# Deleting the CRD cascades to every SealedSecret object in the cluster.
#
# PRESERVED ON PURPOSE:
#   - the controller's signing-key Secret(s) in kube-system
#     (label sealedsecrets.bitnami.com/sealed-secrets-key). It is generated at
#     RUNTIME and is NOT listed below, so this teardown never touches it.
#     Keeping it means a later re-install can still decrypt existing SealedSecrets.
#     Delete it by hand only to deliberately rotate/abandon the key.
#   - plain Secrets the controller already unsealed into app namespaces (ordinary
#     Secrets now; they survive the CRD deletion).
- name: Sealed Secrets controller — teardown
  when: sealed_secrets_teardown | default(false) | bool
  block:
    - name: Delete Sealed Secrets namespaced objects (kube-system)
      kubernetes.core.k8s:
        state: absent
        api_version: "{{ item.api_version }}"
        kind: "{{ item.kind }}"
        name: "{{ item.name }}"
        namespace: kube-system
      loop:
        - { api_version: apps/v1, kind: Deployment, name: sealed-secrets-controller }
        - { api_version: v1, kind: Service, name: sealed-secrets-controller }
        - { api_version: v1, kind: Service, name: sealed-secrets-controller-metrics }
        - { api_version: v1, kind: ServiceAccount, name: sealed-secrets-controller }
        - { api_version: rbac.authorization.k8s.io/v1, kind: Role, name: sealed-secrets-key-admin }
        - { api_version: rbac.authorization.k8s.io/v1, kind: Role, name: sealed-secrets-service-proxier }
        - { api_version: rbac.authorization.k8s.io/v1, kind: RoleBinding, name: sealed-secrets-controller }
        - { api_version: rbac.authorization.k8s.io/v1, kind: RoleBinding, name: sealed-secrets-service-proxier }
      loop_control:
        label: "{{ item.kind }}/{{ item.name }}"

    - name: Delete Sealed Secrets cluster-scoped objects (RBAC + CRD)
      kubernetes.core.k8s:
        state: absent
        api_version: "{{ item.api_version }}"
        kind: "{{ item.kind }}"
        name: "{{ item.name }}"
        wait: false   # CRD deletion cascades to all SealedSecrets server-side
      loop:
        - { api_version: rbac.authorization.k8s.io/v1, kind: ClusterRole, name: secrets-unsealer }
        - { api_version: rbac.authorization.k8s.io/v1, kind: ClusterRoleBinding, name: sealed-secrets-controller }
        - { api_version: apiextensions.k8s.io/v1, kind: CustomResourceDefinition, name: sealedsecrets.bitnami.com }
      loop_control:
        label: "{{ item.kind }}/{{ item.name }}"

