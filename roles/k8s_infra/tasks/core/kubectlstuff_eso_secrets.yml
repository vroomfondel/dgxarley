---
# via group_vars

- name: Create ESO secrets namespace
  kubernetes.core.k8s:
    name: "{{ eso_secrets_namespace }}"
    api_version: v1
    kind: Namespace
    state: present

- name: Create test-secret for fail-test
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: failme-secret
        namespace: "{{ eso_secrets_namespace }}"
      type: Opaque
      stringData:
        ONEKEY: "onevalue"
        SECONDKEY: "secondvalue"

- name: Create default-FAIL-test-secrets (should be blocked by Kyverno policy)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: failme-secrets-external
        namespace: default
      spec:
        refreshInterval: 1m
        secretStoreRef: "{{ eso_default_store_ref }}"
        target:
          name: default-secrets   # this will be the name of the secret created in this namespace
        dataFrom:
          - extract:
              key: failme-secret
  register: fail_test
  ignore_errors: true
  retries: 3
  delay: 10
  until: >
    (fail_test is succeeded) or
    ('eso-namespace-secret-isolation' in (fail_test.msg | default('')))

- name: Verify Kyverno policy blocked the invalid ExternalSecret
  ansible.builtin.assert:
    that:
      - fail_test.failed
      - "'eso-namespace-secret-isolation' in fail_test.msg"
    fail_msg: "ERROR: Kyverno policy should have blocked this ExternalSecret!"
    success_msg: "OK: Kyverno policy correctly blocked the invalid ExternalSecret (failme-secret does not start with 'default-')"
