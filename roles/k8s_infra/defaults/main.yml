---
# hostPath base directory on k3smaster
k8s_infra_data_base: "/var/lib/k8s-data"
# Subdirectories: postgresql, redis, keel, loki, grafana, grafana-dashboards,
#                 prometheus, alertmanager, uptimekuma, tang, pgbackup

# Secrets (overridden by vault)
postgresql_postgres_password: "changeme"
postgresql_openwebui_password: "changeme"
postgresql_forgejo_password: "changeme"
grafana_admin_password: "changeme"
grafana_root_url: "https://grafana.example.com"
# Dashboard download cache TTL (days) for the download-dashboards initContainer.
# Re-fetch a cached dashboard only if older than this. N>0 = refresh after N days;
# 0 = always re-fetch (old behaviour); -1 = cache forever (full airgap).
grafana_dashboard_cache_ttl_days: 7
keel_basic_auth_password: "changeme"
keel_gotify_token: "CHANGEME_GOTIFY_TOKEN"
keel_gotify_url: "https://gotify.example.com"
alertmanager_smtp_smarthost: "mail.example.com:25"
alertmanager_smtp_mailfrom: "alertmanager@example.com"
alertmanager_alert_email: "admin@example.com"
alertmanager_gotify_token: "CHANGEME_GOTIFY_TOKEN"
alertmanager_gotify_url: "https://gotify.example.com"
traefik_internal_allowlist:
  - "192.168.123.0/24"
  - "192.168.124.0/24"
nut_exporter_server: "192.168.124.100"
nut_exporter_username: "monuser"
nut_exporter_password: "changeme"
# nut_ups_name, nut_ups_secondary_name — defined in group_vars/all/main.yml
traefik_dashboard_password: "changeme"

# === Secret-management component gates (ESO / Kyverno / Sealed Secrets) ===
# Each component task file (core/eso.yml, kyverno.yml, kyverno_policy.yml,
# policy_reporter.yml, sealed_secrets.yml) carries BOTH its install and its
# teardown as two conditional blocks:
#   - install block  → runs when `<x>_enabled`  AND NOT `<x>_teardown`
#   - teardown block → runs when `<x>_teardown`  (opt-in, default false)
# So `<x>_enabled: false` only STOPS re-installing; it deletes nothing. Deletion
# is the deliberate `-e <x>_teardown=true` opt-in, targeted with the install tag:
#   ansible-playbook k8s_infra.yml --tags eso            -e eso_teardown=true
#   ansible-playbook k8s_infra.yml --tags kyverno        -e kyverno_teardown=true
#   ansible-playbook k8s_infra.yml --tags policy         -e kyverno_policy_teardown=true
#   ansible-playbook k8s_infra.yml --tags policyreporter -e policy_reporter_teardown=true
#   ansible-playbook k8s_infra.yml --tags sealed_secrets -e sealed_secrets_teardown=true
# Teardown works even when the matching `_enabled` flag is false (teardown ignores it).
#
# Coupling note: in this cluster Kyverno exists SOLELY to enforce the ESO
# `eso-namespace-secret-isolation` policy, and Policy-Reporter is only its
# dashboard. So the sensible combinations are all-on, or ESO-only with the
# isolation guardrail off (kyverno* off). Kyverno/policy on with ESO off leaves
# the policy with nothing to enforce.
eso_enabled: false              # External Secrets Operator + ClusterSecretStore + RBAC
kyverno_enabled: false          # Kyverno policy engine (ESO isolation guardrail)
kyverno_policy_enabled: false   # the eso-namespace-secret-isolation ClusterPolicy
policy_reporter_enabled: false  # Kyverno Policy-Reporter dashboard/UI
sealed_secrets_enabled: false   # bitnami sealed-secrets controller
# Teardown opt-ins — DEFAULT false. Flip to true (preferably via -e on the CLI,
# not by editing this file) to delete the corresponding component. Destructive:
# CRD deletion cascades to all ExternalSecrets/SealedSecrets cluster-wide. See
# each component file's teardown-block header for what is deliberately preserved.
eso_teardown: false
kyverno_teardown: false
kyverno_policy_teardown: false
policy_reporter_teardown: false
sealed_secrets_teardown: false
# Upstream sealed-secrets release; used by both install and teardown so they
# apply/delete the SAME manifest.
# gh api repos/bitnami-labs/sealed-secrets/releases/latest --jq '.tag_name'
sealed_secrets_version: "v0.38.4"
# Upstream External Secrets Operator manifest release (used in the Kustomize
# resource URL in core/eso.yml). NOTE: external-secrets ships two interleaved
# release streams (vX.Y.Z = operator manifest, helm-chart-X.Y.Z = Helm chart),
# so `releases/latest` returns whichever was published last (often the chart) —
# filter to the v* stream explicitly:
# gh api 'repos/external-secrets/external-secrets/releases?per_page=30' --jq '[.[].tag_name | select(startswith("v"))] | first'
eso_version: "v2.7.0"
# Upstream Kyverno manifest release (used in the Kustomize resource URL in
# core/kyverno.yml).
# gh api repos/kyverno/kyverno/releases/latest --jq '.tag_name'
kyverno_version: "v1.18.1"

# KCEVE KVM RS232 serial device on k3smaster (USB-to-RS232 adapter)
kceve_kvm_serial_device: "/dev/ttyACM0"

# === Seafile (CE) ===
# Public hostname rendered into Ingress + SEAFILE_SERVER_HOSTNAME.
# Storage layout (see seafile.yml header for rationale):
#   data_base         — /shared content-addressed blobs, NFS-safe
#   mariadb_data_base — InnoDB random I/O, MUST be local fast disk
# Secrets (admin, db, jwt_secret) are overridden by vault.
# jwt_secret is the Django-SECRET_KEY equivalent — 50+ random chars,
# used by Seafile to sign session cookies + JWT for the internal
# notification/seadoc endpoints.
seafile:
  data_base: "/mnt/nfs/seafile-data"
  mariadb_data_base: "/var/lib/k8s-data/seafile-mariadb"
  namespace: "seafile"
  hostname: "seafile.{{ dns_external_domain_suffix }}"
  time_zone: "Europe/Berlin"
  jwt_secret: "CHANGEME_50_CHARS_OF_RANDOM"
  admin:
    email: "admin@example.com"
    password: "changeme"
  db:
    root_password: "changeme"
    password: "changeme"
  images:
    server:    { repo: "seafileltd/seafile-mc", tag: "13.0-latest" }
    mariadb:   { repo: "mariadb",               tag: "11.4" }
    memcached: { repo: "memcached",             tag: "1.6-alpine" }
  # Resource sizing for k3smaster (32GB box, shared with everything else).
  resources:
    server:    { memory_request: "512Mi", memory_limit: "2Gi" }
    mariadb:   { memory_request: "256Mi", memory_limit: "1Gi" }
    memcached: { memory_limit: "128Mi" }

# === Forgejo (Gitea fork) ===
# Self-hosted git forge. DB lives on the shared PostgreSQL (postgresql_forgejo_password
# above); all other secrets are in this dict. With hash_behaviour=replace, vault.yml's
# `forgejo:` REPLACES this whole block — keep all keys in sync across this file,
# group_vars/all/main.yml and group_vars/all/vault.yml (same rule as seafile).
#   data_base      — /data (git repos + app.ini), hostPath on the NFS pool
#   disable_ssh    — true = HTTPS-only (Traefik can't proxy raw TCP SSH)
#   secret_key / internal_token / *_jwt_secret — symmetric keys; MUST be stable
#                    across restarts or encrypted data (2FA/OAuth/sessions) is lost.
#   admin.*        — first admin, bootstrapped once via `forgejo admin user create`.
forgejo:
  data_base: "/mnt/nfs/forgejo-data"
  namespace: "forgejo"
  hostname: "forgejo.{{ dns_external_domain_suffix }}"
  time_zone: "Europe/Berlin"
  app_name: "Forgejo"
  uid: 1000
  gid: 1000
  disable_ssh: true
  disable_registration: true
  # Traefik pods source X-Forwarded-For from the K3s pod CIDR.
  trusted_proxies: "10.68.0.0/16,10.69.0.0/16"
  secret_key: "CHANGEME_SECRET_KEY"
  internal_token: "CHANGEME_INTERNAL_TOKEN"
  oauth2_jwt_secret: "CHANGEME_OAUTH2_JWT"
  lfs_jwt_secret: "CHANGEME_LFS_JWT"
  admin:
    username: "admin"
    email: "admin@example.com"
    password: "changeme"
  images:
    server: { repo: "codeberg.org/forgejo/forgejo", tag: "15.0.3" }
  resources:
    server: { memory_request: "256Mi", memory_limit: "1Gi" }


# ============================================================================
# App-layer services moved here from the k8s_dgx role
# ----------------------------------------------------------------------------
# openwebui, pipelines, searxng, hermes, honcho, hindsight. Their shared
# inference coordinates (sglang_*, litellm_*, ollama_*, docling_port,
# traefik_internal_allowlist) live in group_vars/all/main.yml.
# ============================================================================

openwebui_namespace: "openwebui"

openwebui_image: "ghcr.io/open-webui/open-webui:main"
pipelines_image: "ghcr.io/open-webui/pipelines:main"
pipelines_port: 9099
searxng_port: 8080
# OpenWebUI configuration
openwebui_secret_key: "CHANGEME_SECRET_KEY"
openwebui_admin_name: "Admin User"
openwebui_admin_email: "admin@example.com"
openwebui_admin_password: "changeme"

# Embedding engine: "openai" routes through LiteLLM (unified OpenAI-v1 interface).
# Switch back to "ollama" + ollama_url for direct access without LiteLLM proxy.
openwebui_embedding_engine: "openai"
openwebui_embedding_openai_url: "http://litellm.{{ litellm_namespace }}.svc.cluster.local:4000/v1"
# Bearer token for the embedding endpoint — override in group_vars/all/vault.yml.
# Use a LiteLLM virtual key (scoped to the embedding model) in production.
openwebui_embedding_openai_key: "CHANGEME_LITELLM_EMBED_KEY"
openwebui_embedding_ollama_url: "http://ollama-embed.ollama.svc.cluster.local:{{ ollama_port }}"
# Embedding model NAME sent to LiteLLM — GATED on enable_embedding_model (cutover):
#   false → ollama_embedding_model (qwen3-embedding:4b-q8_0, the ollama LiteLLM entry).
#   true  → embed-default (stable alias → sglang-embed). OpenWebUI already routes via
#           LiteLLM (openai engine) either way; only the model name flips. Both are
#           2560-dim Qwen3-Embedding-4B, so the existing RAG vectors stay valid (no
#           re-index). NOTE: the embedding virtual key (openwebui_embedding_openai_key)
#           must be allowed to call embed-default in LiteLLM (unrestricted keys are fine).
openwebui_embedding_model: "{{ litellm_embed_alias_model if (enable_embedding_model | default(false)) else ollama_embedding_model }}"

openwebui_embedding_chunk_size: 20000
openwebui_embedding_chunk_overlap: 750
openwebui_embedding_chunk_min_size: 100
openwebui_embedding_batch_size: 16

openwebui_content_extraction_engine: "docling"
openwebui_docling_server_url: "http://docling.docling.svc.cluster.local:{{ docling_port }}"
# openwebui_tei_openai_api_base_url: "http://tei.ollama.svc.cluster.local:8080/v1"
openwebui_searxng_query_url: "http://searxng.searxng.svc.cluster.local:{{ searxng_port }}/search?q=<query>"
openwebui_web_search_result_count: 5

# Pipelines (filter/function plugins for OpenWebUI)
# Master toggle — controls Deployment, Service, and OpenAI connection registration.
pipelines_enabled: true
# Which pipeline filter scripts to seed (files in roles/k8s_dgx/files/pipelines/)
pipelines_filters:
  - "pipelines_self_reflection_filter.py"

# pipeline will be deployed, but this valve will disable it
openwebui_self_reflection_enabled: false

# OpenAI-compatible connections for OpenWebUI.
# Pipelines URL is appended automatically when pipelines_enabled is true.
# openwebui_connections_openai_keys must have the same length as
# openwebui_connections_openai (positional mapping — keys[i] is the bearer
# token for urls[i]). Override both in group_vars/all/vault.yml when the
# endpoint requires auth (e.g. LiteLLM).
openwebui_connections_openai:
  - "http://sglang.{{ sglang_namespace }}.svc.cluster.local:{{ sglang_port }}/v1"
openwebui_connections_openai_keys:
  - "CHANGEME_LITELLM_CHAT_KEY"

# === Nous Hermes Agent (per-user deployments) ===
# Two independent Deployments per active user, both pinned to k3smaster:
#   hermes-agent-<user>  → official nousresearch/hermes-agent (`hermes dashboard`)
#   hermes-webui-<user>  → ghcr.io/nesquena/hermes-webui (alt browser UI)
# They share /opt/data via the same hostPath subdir, so sessions/skills/configs
# are identical across both UIs. Each one still spawns its own hermes processes
# when chatting — Hermes is a CLI, not a daemon; there is no shared agent
# process to multiplex onto.
# Apply the per-namespace egress/ingress NetworkPolicies for the Hermes pods.
# STANDALONE var (NOT inside the hermes: dict) to avoid the hash_behaviour=replace
# trap. Default OFF: the policies are written/version-controlled but NOT applied,
# because this cluster currently runs with `disable-network-policy: true`
# (roles/k3sserver/templates/etc_rancher_k3s_config.yaml.j2) → any NetworkPolicy
# is silently IGNORED. To activate isolation you need BOTH: (1) remove that line
# + restart k3s on k3smaster (re-enables the kube-router policy controller), and
# (2) set this true. The policies block all cross-pod traffic (incl. other users'
# hermes pods) while allowing DNS, the litellm + searxng namespaces, full
# internet/LAN egress, and Traefik-only ingress.
hermes_network_policies_enabled: false

# Global (non-secret) Hermes config — nested dict. Defined ONLY here (single
# file) so it sidesteps the hash_behaviour=replace trap that forces seafile:/
# forgejo: to duplicate every key across three files. Access as hermes.<group>.
# <key> in templates/tasks. NOTE: hermes_users stays a SEPARATE top-level var
# (it lives in vault) — see the comment on it below.
hermes:
  namespace: "hermes"
  # v2026.5.28 restructured the image: tini → s6-overlay (PID 1 = /init),
  # gosu → s6-setuidgid, node:22-bookworm-slim build stage (size 2.63 → 1.12 GB).
  # The pre-s6 entrypoint contract is preserved ("Architecture B"): default
  # ENTRYPOINT /init runs cont-init (stage2-hook.sh: usermod $HERMES_UID/$HERMES_GID
  # + chown), then our `args:` via docker/main-wrapper.sh → `s6-setuidgid hermes
  # hermes <args>`. We never hard-code command:, so the swap is transparent.
  # Email adapter MOVED at v2026.7.1: upstream #41112 relocated it from
  # gateway/platforms/email.py → plugins/platforms/email/adapter.py and swapped
  # the static _PLATFORMS dict for a register(ctx) plugin entry point. The
  # hermes_email_gateway_patched.py re-sync (all 7 [PATCH-N] sections re-applied,
  # + upstream SPF/DKIM/DMARC sender-auth folded in), the email-patch ConfigMap
  # data key, and the webui subPath mount were all re-targeted to adapter.py.
  # Re-synced against v2026.7.1 (md5 8d01ff755f33df1b9867b5ecf0febc11) 2026-07-06.
  image_tag: "v2026.7.1"             # agent image (nousresearch/hermes-agent)
  # NFS-backed hostPath base on k3smaster — per-user subdirs <base>/<username>
  # are mounted as /opt/data inside the pod (subdir-only, no parent visibility).
  data_base: "/mnt/nfs/hermes"
  # Second NFS-backed hostPath base, mounted as /workspace inside the pod.
  # Intended as the user's input/output shelf: drop files from desktop NFS,
  # LLM reads/writes via the hermes-cli terminal toolset. Same per-user subdir
  # isolation pattern as hermes.data_base. Pre-req: NFS export mounted on
  # k3smaster at this path before the pod starts.
  files_base: "/mnt/nfs/hermes-files"
  default_model: "{{ litellm_hermes_alias_model }}"  # stable alias → current SGLang model
  # Auxiliary VISION model for image tasks (vision_analyze). The main model
  # behind hermes-default is text-only, so Hermes falls back to this aux model to
  # describe images. Stable LiteLLM alias → the sglang-vision companion. Empty
  # ("") → no auxiliary.vision block rendered (image tasks then route to the
  # text-only main model and fail). Per-user override via item.vision_model.
  # Wired whenever the vision-default alias EXISTS (litellm_vision_alias_model
  # non-empty) — i.e. with enable_vision_model OR litellm_vision_alias_fallback_to_base.
  # Rationale: enabling the fallback is an operator statement that the base model
  # IS vision-capable (otherwise leave the switch off), so Hermes should route
  # image tasks at the same vision-default alias the LiteLLM router exposes. Empty
  # alias → no auxiliary.vision block (image tasks then hit the text main model
  # and fail). Per-user override via item.vision_model still wins regardless.
  vision_model: "{{ litellm_vision_alias_model | default('') }}"
  litellm_url: "http://litellm.litellm.svc.cluster.local:4000"
  # Timezone for the hermes pods. The container images default to UTC (no TZ),
  # so the WebUI "System Status" / dashboard render timestamps (e.g. "Last
  # active") 2h off from CEST. Injected as the TZ env var into the webui, agent
  # and gateway containers — matches the cluster nodes (common role sets
  # Europe/Berlin via /etc/localtime). Override per deploy if ever needed.
  timezone: "Europe/Berlin"
  # Sets logging.level=DEBUG in the rendered config.yaml (otherwise INFO).
  # Affects /opt/data/logs/agent.log — kubectl logs -c log-tail <pod> tails it.
  debug_default: false
  # WebUI frontend (alternative interface to the native hermes dashboard).
  webui:
    image: "ghcr.io/nesquena/hermes-webui"
    image_tag: "latest"
    port: 8787
    enabled_default: true            # deploy the webui pod by default
  # Native dashboard (`hermes dashboard`) + its Caddy auth sidecar.
  agent:
    proxy_port: 9118
    dashboard_enabled_default: false
    dashboard_tui_default: false     # chat tab inside the dashboard (needs dashboard_enabled_default)
  # Caddy sidecar in front of the agent dashboard. Cookie-session auth (via the
  # caddy-security plugin) so WebSocket (TUI/PTY) and EventSource (events feed)
  # work — BasicAuth credentials are NOT auto-included by browsers on those
  # requests. oauth2-proxy v7 was tried first but rejects WS upgrades with 403
  # even with --skip-auth-route; caddy-security checks the cookie only on the
  # initial handshake and transparently passes the upgrade through. The image is
  # greenpau/caddy-security packaged as `authcrunch/authcrunch` (multi-arch).
  caddy:
    image: "ghcr.io/authcrunch/authcrunch"
    image_tag: "latest"
  # Default for the per-user email gateway. When true, the webui pod gets the
  # hermes-gateway sidecar running `hermes gateway run` against EMAIL_* vars in
  # /opt/data/.env. Needs IMAP/SMTP credentials per user; enabling it without
  # those just idles ("no platforms configured"). Implies webui enabled.
  email:
    enabled_default: true
  # Matrix gateway. When true (per-user via hermes_users[*].matrix.enabled), the
  # SAME hermes-gateway sidecar in the webui pod also serves Matrix — no extra
  # pod/process: `hermes gateway run` auto-starts every platform with creds in
  # /opt/data/.env. Pure-env (MATRIX_*), no source patch. E2EE deps (mautrix
  # [encryption], olm) ship in the agent image; the crypto store persists under
  # /opt/data (NFS) keyed by a stable MATRIX_DEVICE_ID. Off by default.
  matrix:
    enabled_default: false
  # Seafile-backed /workspace. When workspace_enabled: (1) the hermes role
  # provisions a Seafile user (using <hermes_users[*].email> + seafile.web_password)
  # and a `hermes-workspace` library via the Seafile REST API, (2) a seadrive
  # FUSE sidecar is injected into both pods, mounting that library at /workspace
  # via mountPropagation. When false (default), /workspace stays on the
  # hermes.files_base NFS subpath. Per-user override via
  # hermes_users[*].seafile.workspace_enabled. server_url is the same external
  # hostname the seadrive sidecar syncs against.
  seafile:
    workspace_enabled_default: false
    server_url: "https://seafile.{{ dns_external_domain_suffix }}"
    library_name: "hermes-workspace"
  # seadrive client image (official, FUSE-mode). amd64-only — fine since hermes
  # pods are pinned to k3smaster anyway.
  seadrive:
    image: "seafileltd/seadrive-fuse"
    image_tag: "latest"

# Per-user list — real entries in group_vars/all/vault.yml.
#
# ⚠️  WHY THIS IS A SEPARATE TOP-LEVEL VAR (and NOT hermes.users):
# Ansible's hash_behaviour defaults to `replace` (this repo does NOT set it to
# `merge` — and that default is deprecated, so we don't rely on it). Under
# `replace`, when the SAME dict key is defined in two files, the higher-precedence
# file's value REPLACES the whole dict — sub-keys are NOT deep-merged.
# The real user list lives in vault (group_vars/all/vault.yml). If it were
# `hermes.users`, that vault file would define `hermes:` with only the `users`
# key — and being higher precedence, it would REPLACE the entire `hermes:` config
# dict above, silently wiping namespace/image_tag/webui/seafile/… (every key).
# That is exactly the trap documented for the `seafile:`/`forgejo:` dicts, which
# "solve" it by duplicating ALL keys across all three files. Keeping the user
# list as its own flat top-level var sidesteps it: `hermes_users` in vault simply
# overrides `hermes_users: []` here, and the `hermes:` config dict (single file)
# is never touched. DO NOT fold this into the hermes dict.
# Schema: { username, uid, gid, litellm_token,
#           litellm_model?, basicauth_password?, webui_password?,
#           dashboard_enabled? (default true),
#           dashboard_tui?     (default true),
#           webui_enabled?     (default false),
#           hermes_debug?      (default false),
#           email?: {           (default disabled — omit block to skip)
#               enabled,        (default hermes.email.enabled_default)
#               address, password, imap_host, smtp_host,
#               imap_port?      (default 993),
#               smtp_port?      (default 587),
#               poll_interval?  (default 15),
#               home_address?,
#               allow_all_users?, allowed_users?,
#               skip_attachments?,
#               cpu_limit?, memory_limit?
#           },
#           matrix?: {          (default disabled — omit block to skip)
#               enabled,        (default hermes.matrix.enabled_default)
#               homeserver,     (e.g. https://matrix.example.org)
#               access_token?   OR  user_id? + password?  (both allowed;
#                               access_token wins in matrix.py — user/pass is
#                               the way to bootstrap a token on first login),
#               device_id?      (default 'hermes-<username>', stable for E2EE),
#               e2ee_mode?      (off|optional|required, default required),
#               allowed_users?, allowed_rooms?,  (lists or comma strings)
#               home_room?      (room for cron/notification delivery)
#           },
#           gateway?: {         (optional sidecar resource override; falls
#               cpu_limit?,     back to email.cpu_limit/memory_limit, then
#               memory_limit?   '500m'/'512Mi')
#           },
#           enabled }
# Hostnames: <username>.hermes-dashboard.<dns> (original)  +  <username>.hermes.<dns> (webui)
hermes_users: []



# ============================================================================
# Honcho — AI memory / ambient-agent personalization backend
# ============================================================================
# Deployed by roles/k8s_dgx/tasks/honcho.yml (tag: honcho). Two Deployments
# from one pinned image (ghcr.io/plastic-labs/honcho, public multi-arch):
#   honcho-api      — FastAPI on :8000 (/health), Alembic migrations run as an
#                     initContainer (scripts/provision_db.py) before serving.
#   honcho-deriver  — poll-based background worker (python -m src.deriver); no
#                     HTTP port; derives memory + runs the periodic "dream"
#                     consolidation against the LLM. Waits for honcho-api/health
#                     via an initContainer so the schema is migrated first.
# Postgres: dedicated `honcho` DB on the shared instance, pgvector enabled IN
# that DB (VECTOR_STORE_TYPE=pgvector keeps embeddings in the app DB). Password
# flows postgresql-secrets → k8s_info → app Secret, same as litellm.
# Config: non-sensitive model routing lives in a mounted config.toml (ConfigMap);
# only DB_CONNECTION_URI / LLM_OPENAI_API_KEY / AUTH_JWT_SECRET are env (Secret).
# env overrides config.toml in Honcho's settings precedence.
honcho_enabled: true
honcho_namespace: "honcho"
# PINNED — Honcho moves fast and auto-migrates the DB schema on api start, so a
# pinned tag avoids surprise schema changes on pull. Bump deliberately; re-check
# .env.template / config.toml.example for new/renamed keys when you do. No keel
# auto-update annotations on this deployment by design.
honcho_image: "ghcr.io/plastic-labs/honcho:v3.0.10"
honcho_port: 8000
# Number of deriver worker pods. Safe to scale >1 — derivers coordinate via the
# Postgres job queue with startup jitter (no external broker).
honcho_deriver_replicas: 1

# Per-feature LLM endpoint routing — every Honcho feature (deriver, dialectic,
# summary, dream, AND embedding) gets its OWN base_url + model + API key, broken
# out explicitly so any single feature can be repointed at a different provider
# WITHOUT touching the others. Replaces the old shared honcho_model /
# honcho_litellm_base (split per-feature 2026-06).
# The API KEYS are intentionally NOT here (sensitive): dummies live in
# group_vars/all/main.yml, real values in group_vars/all/vault.yml. They are
# injected per-feature into the honcho-env Secret and referenced from config.toml
# via `api_key_env`, so credentials never land in this public file.
#
# Defaults below merely point at what the cluster runs today (text-gen → LiteLLM
# hermes-default alias; embedding → ollama-embed). They are NOT hardwired — set
# any *_base / *_model to another OpenAI-compatible endpoint and its key in vault.
# NOTE: text-gen features need TOOL/FUNCTION-CALLING models — the SGLang model
# behind hermes-default must have a working tool_call_parser, else the deriver
# rejects/errors.

# --- base URLs (OpenAI-compatible /v1) ---
honcho_deriver_base: "http://litellm.{{ litellm_namespace }}.svc.cluster.local:{{ litellm_port }}/v1"
honcho_dialectic_base: "http://litellm.{{ litellm_namespace }}.svc.cluster.local:{{ litellm_port }}/v1"
honcho_summary_base: "http://litellm.{{ litellm_namespace }}.svc.cluster.local:{{ litellm_port }}/v1"
honcho_dream_base: "http://litellm.{{ litellm_namespace }}.svc.cluster.local:{{ litellm_port }}/v1"
# Embedding endpoint — GATED on enable_embedding_model (the sglang-embed cutover):
#   false → ollama-embed direct /v1 (legacy path, same as OpenWebUI used).
#   true  → LiteLLM, via the stable `embed-default` alias (→ sglang-embed). Routing
#           through LiteLLM (openai/ provider) gives the same alias-stability benefit
#           as the text-gen paths and drops the ollama/ coupling. honcho_embedding_api_key
#           is already litellm_master_key in vault, so no key change is needed.
# Auto-switches when the master switch flips — safe to set now (inert until cutover).
honcho_embedding_base: "{{ ('http://litellm.' ~ litellm_namespace ~ '.svc.cluster.local:' ~ litellm_port ~ '/v1') if (enable_embedding_model | default(false)) else (openwebui_embedding_ollama_url ~ '/v1') }}"
# --- models ---
honcho_deriver_model: "{{ litellm_hermes_alias_model }}"
honcho_dialectic_model: "{{ litellm_hermes_alias_model }}"
honcho_summary_model: "{{ litellm_hermes_alias_model }}"
honcho_dream_model: "{{ litellm_hermes_alias_model }}"
# embed-default (LiteLLM alias) at cutover, else the ollama model name. Same 2560-dim
# either way (Qwen3-Embedding-4B) → honcho_embedding_dimensions unchanged, no DB wipe.
honcho_embedding_model: "{{ litellm_embed_alias_model if (enable_embedding_model | default(false)) else ollama_embed_model }}"

# --- per-feature API keys (DUMMIES) ---
# Lowest-precedence dummies so the role is self-contained and never undefined.
# Overridden by the public dummies in group_vars/all/main.yml and ultimately by
# the REAL values in group_vars/all/vault.yml (defaults < group_vars main < vault).
# Sensitive — never put a real key here. Referenced by api_key_env in config.toml
# (HONCHO_<FEATURE>_API_KEY) via the honcho-env Secret.
honcho_deriver_api_key: "sk-changeme"
honcho_dialectic_api_key: "sk-changeme"
honcho_summary_api_key: "sk-changeme"
honcho_dream_api_key: "sk-changeme"
honcho_embedding_api_key: "sk-changeme"

# CRITICAL: must equal the embedding model's native dimension
# (Qwen3-Embedding-4B = 2560; was 1024 for bge-m3 / Qwen3-Embedding-0.6B).
# pgvector fixes the column dimension at the FIRST migration — changing this
# later requires re-creating the honcho DB (wipe + re-provision).
honcho_embedding_dimensions: 2560


# ============================================================================
# Hindsight — agent memory backend (vectorize-io/hindsight)
# ============================================================================
# Deployed by roles/k8s_dgx/tasks/hindsight.yml (tag: hindsight). Modelled on
# honcho but Hindsight ships THREE components from TWO pinned images (per the
# upstream helm/hindsight chart):
#   hindsight-api           — FastAPI on :8888 (/health). Runs Alembic migrations
#                             on startup (HINDSIGHT_API_RUN_MIGRATIONS_ON_STARTUP)
#                             and, when the worker is disabled, an INTERNAL task
#                             worker. Image ghcr.io/vectorize-io/hindsight-api.
#   hindsight-worker        — OPTIONAL dedicated task worker on :8889 (same image,
#                             internal api worker is disabled when it runs). Off
#                             by default — the api's internal worker suffices for
#                             a single-tenant cluster. Waits on api/health first.
#   hindsight-control-plane — Next.js web UI on :3000. Image
#                             ghcr.io/vectorize-io/hindsight-control-plane.
# Postgres: dedicated `hindsight` DB on the shared instance, pgvector enabled IN
# that DB (HINDSIGHT_API_VECTOR_EXTENSION=pgvector). Password flows
# postgresql-secrets → k8s_info → app Secret, same as honcho/litellm.
# Config: Hindsight is configured ENTIRELY via HINDSIGHT_* env vars (no config
# file), so non-sensitive routing goes in a ConfigMap (hindsight-config) and
# only credentials in a Secret (hindsight-env) — both injected via envFrom.
# Reranker defaults to `rrf` (reciprocal rank fusion) so NO local cross-encoder
# model is downloaded — keeps the pods stateless and airgap-friendly, matching
# the no-PVC honcho design. Flip hindsight_reranker_provider to enable reranking.
hindsight_enabled: true
hindsight_namespace: "hindsight"
# PINNED to the helm chart appVersion. Both images share this tag. Bump
# deliberately — re-check helm/hindsight/values.yaml for new/renamed env keys
# when you do. No keel auto-update annotations by design.
hindsight_version: "0.8.3"
hindsight_api_image: "ghcr.io/vectorize-io/hindsight-api:{{ hindsight_version }}"
hindsight_cp_image: "ghcr.io/vectorize-io/hindsight-control-plane:{{ hindsight_version }}"
hindsight_api_port: 8888
hindsight_cp_port: 3000

# Dedicated worker pods (StatefulSet upstream; a plain Deployment here as we keep
# no per-replica model cache). OFF by default — the api runs an internal worker.
hindsight_worker_enabled: false
hindsight_worker_replicas: 1
hindsight_worker_port: 8889

# --- LLM (text-gen) → LiteLLM hermes-default alias, OpenAI-compatible ---
# NOTE: Hindsight's retain/reflect/consolidate steps use tool/function calling —
# the SGLang model behind hermes-default must have a working tool_call_parser.
hindsight_llm_provider: "openai"
hindsight_llm_base_url: "http://litellm.{{ litellm_namespace }}.svc.cluster.local:{{ litellm_port }}/v1"
hindsight_llm_model: "{{ litellm_hermes_alias_model }}"

# --- Embeddings — GATED on enable_embedding_model (the sglang-embed cutover) ---
# Provider `openai`. Dimensions are intentionally NOT sent
# (HINDSIGHT_API_EMBEDDINGS_OPENAI_DIMENSIONS unset): the backend returns the
# model's native-dim vectors (Qwen3-Embedding-4B = 2560) and rejecting an
# unsupported `dimensions` param is avoided. Hindsight fixes the pgvector column
# on first migration — the model stays 2560-dim across the cutover, so no wipe.
#   false → ollama-embed direct /v1 (legacy path).
#   true  → LiteLLM, via the stable `embed-default` alias (→ sglang-embed). Needs
#           hindsight_embeddings_api_key == litellm_master_key (set in vault).
# Auto-switches when the master switch flips — safe to set now (inert until cutover).
hindsight_embeddings_provider: "openai"
hindsight_embeddings_base_url: "{{ ('http://litellm.' ~ litellm_namespace ~ '.svc.cluster.local:' ~ litellm_port ~ '/v1') if (enable_embedding_model | default(false)) else (openwebui_embedding_ollama_url ~ '/v1') }}"
hindsight_embeddings_model: "{{ litellm_embed_alias_model if (enable_embedding_model | default(false)) else ollama_embed_model }}"

# --- Reranker: `rrf` disables model-based reranking (no HF download). Set to
# `litellm` / `cohere` / `local` etc. to enable; see configuration docs. ---
hindsight_reranker_provider: "rrf"

# Vector + text-search backends on the shared pgvector Postgres.
hindsight_vector_extension: "pgvector"

# Control-plane → dataplane wiring. The browser UI calls the api under /api on
# the SAME public host (Traefik routes /api → hindsight-api), so the api runs
# with a matching base path. Mirrors the upstream helm ingress mapping.
hindsight_api_base_path: "/api"
hindsight_cp_dataplane_api_url: "https://hindsight.{{ dns_external_domain_suffix }}{{ hindsight_api_base_path }}"

# Tenant auth — ON by default, via our OWN TenantExtension (no Supabase/GoTrue).
# roles/k8s_dgx/files/hindsight_tenant_keymap.py is shipped into the api/worker
# containers via the hindsight-tenant-ext ConfigMap and loaded with
# HINDSIGHT_API_TENANT_EXTENSION=hindsight_tenant_keymap:KeyMapTenantExtension
# (PYTHONPATH=/opt/hindsight-ext). It maps each bearer key to its OWN Postgres
# schema "<prefix>_<tenant>" → real per-user memory isolation with static keys.
# Set false to fall back to the no-auth DefaultTenantExtension (open, single
# schema, protected only by the Traefik ip-allowlist).
hindsight_auth_enabled: true
hindsight_tenant_extension_module: "hindsight_tenant_keymap:KeyMapTenantExtension"
hindsight_tenant_ext_dir: "/opt/hindsight-ext"
hindsight_tenant_schema_prefix: "tenant"

# key -> tenant map (DUMMY) — the SINGLE source of truth for API auth. Each api
# key authenticates a request and routes it to schema
# "<hindsight_tenant_schema_prefix>_<tenant>"; unmapped keys are REJECTED (no
# fallback tenant). Tenant names must be valid Postgres identifiers. SENSITIVE
# (contains keys) — real map in group_vars/all/vault.yml; keys are NOT templated,
# set literal strings.
hindsight_tenant_keymap:
  "changeme-hindsight-key": "admin"

# Upstream-provider keys (DUMMIES; real in vault). hindsight_llm_api_key is the
# text-gen key (LiteLLM master key here); hindsight_embeddings_api_key is sent to
# ollama-embed, which ignores it.
hindsight_llm_api_key: "sk-changeme"
hindsight_embeddings_api_key: "sk-changeme"

# Control-plane → which tenant the UI browses. NON-secret: just a tenant NAME
# that must exist in hindsight_tenant_keymap; the actual bearer is looked up from
# the keymap (so a key is never written twice). Empty (default) → the UI gets NO
# dataplane key, i.e. it can't read the authenticated API and the UI login is
# open behind the ip-allowlist. Set it to e.g. "admin" to point the UI at that
# tenant. Override hindsight_cp_access_key to use a different UI-login password.
hindsight_cp_tenant: ""
hindsight_cp_dataplane_key: >-
  {{ (hindsight_tenant_keymap | dict2items
        | selectattr('value', 'equalto', hindsight_cp_tenant)
        | map(attribute='key') | first) | default('', true) }}
hindsight_cp_access_key: "{{ hindsight_cp_dataplane_key }}"
