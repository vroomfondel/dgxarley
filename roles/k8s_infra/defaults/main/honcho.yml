---
# ============================================================================
# Honcho — AI memory / ambient-agent personalization backend
# ============================================================================
# Deployed by roles/k8s_dgx/tasks/honcho.yml (tag: honcho). Two Deployments
# from one pinned image (ghcr.io/plastic-labs/honcho, public multi-arch):
#   honcho-api      — FastAPI on :8000 (/health), Alembic migrations run as an
#                     initContainer (scripts/provision_db.py) before serving.
#   honcho-deriver  — poll-based background worker (python -m src.deriver); no
#                     HTTP port; derives memory + runs the periodic "dream"
#                     consolidation against the LLM. Waits for honcho-api/health
#                     via an initContainer so the schema is migrated first.
# Postgres: dedicated `honcho` DB on the shared instance, pgvector enabled IN
# that DB (VECTOR_STORE_TYPE=pgvector keeps embeddings in the app DB). Password
# flows postgresql-secrets → k8s_info → app Secret, same as litellm.
# Config: non-sensitive model routing lives in a mounted config.toml (ConfigMap);
# only DB_CONNECTION_URI / LLM_OPENAI_API_KEY / AUTH_JWT_SECRET are env (Secret).
# env overrides config.toml in Honcho's settings precedence.
# Enable-gate (import-level in tasks/main.yml). false = NOT deployed at all
# (no namespace, no DB, no ingress). Disabling does NOT remove an existing
# install — that's the opt-in teardown: `-e honcho_teardown=true` (deletes the
# honcho namespace; the honcho Postgres DB is deliberately PRESERVED — drop it
# by hand only to abandon the stored memories).
honcho_enabled: false
honcho_teardown: false
honcho_namespace: "honcho"
# PINNED — Honcho moves fast and auto-migrates the DB schema on api start, so a
# pinned tag avoids surprise schema changes on pull. Bump deliberately; re-check
# .env.template / config.toml.example for new/renamed keys when you do. No keel
# auto-update annotations on this deployment by design.
honcho_image: "ghcr.io/plastic-labs/honcho:v3.0.10"
honcho_port: 8000
# Number of deriver worker pods. Safe to scale >1 — derivers coordinate via the
# Postgres job queue with startup jitter (no external broker).
honcho_deriver_replicas: 1

# Per-feature LLM endpoint routing — every Honcho feature (deriver, dialectic,
# summary, dream, AND embedding) gets its OWN base_url + model + API key, broken
# out explicitly so any single feature can be repointed at a different provider
# WITHOUT touching the others. Replaces the old shared honcho_model /
# honcho_litellm_base (split per-feature 2026-06).
# The API KEYS are intentionally NOT here (sensitive): dummies live in
# group_vars/all/main/honcho.yml, real values in group_vars/all/vault/honcho.yml. They are
# injected per-feature into the honcho-env Secret and referenced from config.toml
# via `api_key_env`, so credentials never land in this public file.
#
# Defaults below merely point at what the cluster runs today (text-gen → LiteLLM
# hermes-default alias; embedding → ollama-embed). They are NOT hardwired — set
# any *_base / *_model to another OpenAI-compatible endpoint and its key in vault.
# NOTE: text-gen features need TOOL/FUNCTION-CALLING models — the SGLang model
# behind hermes-default must have a working tool_call_parser, else the deriver
# rejects/errors.

# --- base URLs (OpenAI-compatible /v1) ---
honcho_deriver_base: "http://litellm.{{ litellm_namespace }}.svc.cluster.local:{{ litellm_port }}/v1"
honcho_dialectic_base: "http://litellm.{{ litellm_namespace }}.svc.cluster.local:{{ litellm_port }}/v1"
honcho_summary_base: "http://litellm.{{ litellm_namespace }}.svc.cluster.local:{{ litellm_port }}/v1"
honcho_dream_base: "http://litellm.{{ litellm_namespace }}.svc.cluster.local:{{ litellm_port }}/v1"
# Embedding endpoint — GATED on enable_embedding_model (the sglang-embed cutover):
#   false → ollama-embed direct /v1 (legacy path, same as OpenWebUI used).
#   true  → LiteLLM, via the stable `embed-default` alias (→ sglang-embed). Routing
#           through LiteLLM (openai/ provider) gives the same alias-stability benefit
#           as the text-gen paths and drops the ollama/ coupling. honcho_embedding_api_key
#           is already litellm_master_key in vault, so no key change is needed.
# Auto-switches when the master switch flips — safe to set now (inert until cutover).
honcho_embedding_base: "{{ ('http://litellm.' ~ litellm_namespace ~ '.svc.cluster.local:' ~ litellm_port ~ '/v1') if (enable_embedding_model | default(false) | bool) else (openwebui_embedding_ollama_url ~ '/v1') }}"
# --- models ---
honcho_deriver_model: "{{ litellm_hermes_alias_model }}"
honcho_dialectic_model: "{{ litellm_hermes_alias_model }}"
honcho_summary_model: "{{ litellm_hermes_alias_model }}"
honcho_dream_model: "{{ litellm_hermes_alias_model }}"
# embed-default (LiteLLM alias) at cutover, else the ollama model name. Same 2560-dim
# either way (Qwen3-Embedding-4B) → honcho_embedding_dimensions unchanged, no DB wipe.
honcho_embedding_model: "{{ litellm_embed_alias_model if (enable_embedding_model | default(false) | bool) else ollama_embed_model }}"

# --- per-feature API keys (DUMMIES) ---
# Lowest-precedence dummies so the role is self-contained and never undefined.
# Overridden by the public dummies in group_vars/all/main/honcho.yml and ultimately
# by the REAL values in group_vars/all/vault/honcho.yml (defaults < group_vars main < vault).
# Sensitive — never put a real key here. Referenced by api_key_env in config.toml
# (HONCHO_<FEATURE>_API_KEY) via the honcho-env Secret.
honcho_deriver_api_key: "sk-changeme"
honcho_dialectic_api_key: "sk-changeme"
honcho_summary_api_key: "sk-changeme"
honcho_dream_api_key: "sk-changeme"
honcho_embedding_api_key: "sk-changeme"

# CRITICAL: must equal the embedding model's native dimension
# (Qwen3-Embedding-4B = 2560; was 1024 for bge-m3 / Qwen3-Embedding-0.6B).
# pgvector fixes the column dimension at the FIRST migration — changing this
# later requires re-creating the honcho DB (wipe + re-provision).
honcho_embedding_dimensions: 2560
