---
# === Matrix (Synapse homeserver + Cinny and Element web clients) ===
# Ported from the sister repo's Keycloak-OIDC deployment
# (../ansible/roles/k8s_workloads/tasks/communication/kubectlstuff_matrix.yml)
# down to LOCAL Synapse auth (dgxarley has no Keycloak). Same Traefik +
# cert-manager + nsupdate + shared-PostgreSQL pattern as forgejo/seafile/honcho.
#
# hash_behaviour=replace: vault.yml's `matrix:` REPLACES this whole block, so all
# keys are duplicated across this file, group_vars/all/main/matrix.yml and
# group_vars/all/vault/matrix.yml (same rule as forgejo/seafile). Keep in sync.
#
#   base_domain   — the Matrix identity/server domain. server_name and every
#                   hostname derive from it: server_name/public_baseurl =
#                   matrix.<base_domain>, Cinny = cinny.<base_domain>, Element =
#                   element.<base_domain>. The REAL value (kikube.eu) lives ONLY
#                   in vault; dummy here.
#   data_base     — /data (signing.key, media_store, homeserver.pid), hostPath.
#                   Matrix media is content-addressed → NFS-safe (DB is on PG).
#   manage_dns    — true = auto-register A records via nsupdate. Requires the
#                   cluster TSIG key to authorise records under <base_domain>;
#                   set false and manage DNS externally otherwise.
#   enable_registration — false = closed signup; users via register_new_matrix_user
#                   (admin + bot_users bootstrapped at the end of the task).
#   enable_token_authenticator — true installs synapse-token-authenticator at
#                   container start and wires its `jwt:` (HS512, symmetric-secret)
#                   bot-login module — for Hermes-agent Matrix bots. No OIDC.
#   *_secret / jwt_secret — Synapse symmetric secrets; MUST be stable across
#                   restarts (rotating macaroon/form invalidates sessions/CSRF).
#                   Generate with `openssl rand -hex 32`.
#   admin.*       — first server admin, bootstrapped once (register_new_matrix_user -a).
#   users         — regular human accounts, list of {user, password, email?}, each
#                   registered --no-admin (created directly at deploy time).
#                   email is OPTIONAL and applied AFTER registration via the admin
#                   API (register_new_matrix_user cannot set 3PIDs) — admin-set
#                   addresses count as verified, no confirmation mail involved.
#                   Without an `email:` (SMTP) section it enables login-by-address
#                   and directory lookup only; no reset/notification mails.
#   bot_users     — bot accounts, same {user, password, email?} shape, --no-admin.
#                   (users + bot_users are functionally identical — just a naming
#                   split for humans vs. bots.) Real passwords belong in vault.
# matrix_enabled is the MASTER switch for this whole stack and the precondition
# for everything below it: the install block it gates is what contains Synapse AND
# both web clients, so with matrix_enabled false the per-client matrix_cinny_* /
# matrix_element_* enable flags have NO effect whatsoever — nothing is installed,
# no matter what they say. Enable matrix first, then pick the clients.
# The per-client TEARDOWN flags are the exception: those blocks sit outside the
# install block, so they still run with matrix_enabled false (that is deliberate,
# it keeps cleanup reachable after the stack has been switched off).
matrix_enabled: false
matrix_teardown: false

# --- Mail -------------------------------------------------------------------
# matrix.email.* drives Synapse's `email:` section (password resets + notifs).
# notif_from is the ONLY required key once enabled (Synapse refuses to start
# without it). Port default follows force_tls upstream (465/25); we pin 25.
#
# smtp_host defaults to the literal __NODE_IP__ placeholder, which the container
# start command rewrites to the pod's OWN node IP (status.hostIP, projected as
# $NODE_IP). Reason: every node in this cluster runs a postfix on :25 relaying to
# the same smarthost, and mynetworks is 10.0.0.0/8 — which the POD IP falls into.
# That match only holds SAME-NODE: cross-node traffic to another node's :25 gets
# masqueraded by flannel to 192.168.191.x and postfix rejects the relay. So the
# pod must always talk to its own node, and a hardcoded IP would break the moment
# the pod is scheduled elsewhere (its /data is on NFS, so it CAN move freely).
#
# Substitution is needed because Synapse does NOT expand env vars in a supplied
# homeserver.yaml — /start.py only renders its own template via jinja in the
# config-GENERATE path, which we never take (we mount a finished config).
#
# Set smtp_host to a real hostname to bypass all of this (sed then finds nothing).

# cert-manager ClusterIssuer that mints the matrix/cinny TLS certs. MUST be one of
# the `name:`s in certmanager_acme_issuers (group_vars/all/main/dns.yml) whose
# dns_zones cover <base_domain>. A standalone scalar (not inside the matrix dict,
# which is hash_behaviour=replace) so it needs no vault duplication.
matrix_tls_issuer: "letsencrypt-secondary"

# --- Web clients (Cinny, Element) -------------------------------------------
# Two interchangeable clients against the SAME homeserver and the same local
# password auth, each on its own host (cinny./element.<base_domain>) behind the
# same allowlist. Both can run together, either alone, or neither (Synapse
# serves any external Matrix client just as well).
#
# Standalone scalars, deliberately NOT inside the hash_behaviour=replace `matrix`
# dict, so flipping one needs no vault duplication.
#
# SUBORDINATE TO matrix_enabled: these four only refine what the matrix install
# does, they cannot switch it on. matrix_enabled false => no client is deployed
# regardless of the two _enabled flags here (the teardowns still run, see there).
#
# Same semantics as every other gate pair in this role:
#   <x>_enabled: false   only SKIPS the install, it deletes NOTHING.
#   <x>_teardown: true   is the opt-in removal, and it works regardless of
#                        <x>_enabled (the teardown blocks sit outside the install
#                        block). It drops the Deployment, Service, ConfigMap,
#                        both IngressRoutes, the Certificate WITH its TLS secret
#                        (cert-manager leaves that behind on its own) and the A
#                        record, but never the namespace or Synapse.
#   ansible-playbook k8s_infra.yml --tags matrix -e matrix_cinny_teardown=true
#
# The full matrix_teardown deletes the whole namespace, so it removes both
# clients no matter how these four flags are set.
matrix_cinny_enabled: true
matrix_cinny_teardown: false
matrix_element_enabled: true
matrix_element_teardown: false

# --- Element call stack (Jitsi widget + Element Call) ------------------------
# Element ships TWO independent group-call paths, both pointed at Element's own
# hosted services by default. These three scalars are the only place we deviate;
# an unset knob emits NO key at all, so upstream's default stays in force. All
# three land in element-config's config.json, which is hashed into the pod
# annotation, so changing one rolls the Element pod on the next run.
#
#   matrix_element_jitsi_domain — config.json `jitsi.preferred_domain`: the Jitsi
#     instance the room CONFERENCE WIDGET dials. Empty = upstream default
#     (meet.element.io). Point it at an external/self-hosted Jitsi, hostname
#     only, no scheme: "jitsi.example.eu". Caveat from upstream docs: the value
#     is IGNORED when the widget was created by an integration manager or when
#     the homeserver advertises jitsi in /.well-known/matrix/client. Ours does
#     neither, so the client config wins. Nothing to deploy on our side, this is
#     purely which third party the browser talks to.
#   matrix_element_jitsi_skip_welcome — config.json
#     `jitsi_widget.skip_built_in_welcome_screen`: true drops Element's "Join
#     Conference" intermediate screen and joins straight away. Only sensible if
#     the Jitsi instance has its own pre-join/device-check page.
#   matrix_element_call_enabled — false emits `element_call.disable: true`, which
#     turns off the NATIVE group-call stack (Element Call). That is a SEPARATE
#     thing from the Jitsi widget above: leaving it on means calls can go to
#     Element's hosted Element Call regardless of the Jitsi setting, so switching
#     the cluster off Element-hosted services needs BOTH knobs.
#     The key really is `disable`, not `disabled` — upstream's schema
#     (packages/shared-types/lib/config.json.d.ts) and the reader
#     (apps/web/src/hooks/room/useRoomCall.ts) agree, docs/config.md does not.
matrix_element_jitsi_domain: ""
matrix_element_jitsi_skip_welcome: false
matrix_element_call_enabled: true

matrix:
  namespace: "matrix"
  base_domain: "example.eu"
  data_base: "/mnt/nfs/matrix-synapse"
  time_zone: "Europe/Berlin"
  manage_dns: true
  # Optional per-matrix nsupdate overrides. kikube.eu is a separate zone from the
  # cluster domain, so it usually needs its own DNS server / TSIG key / ingress IP.
  # Any omitted key falls back to the cluster-wide nsupdate_* var. Keys:
  #   server, zone, tsig_key_name, tsig_key_secret, tsig_algorithm, ttl, ingress_ip
  # Real values (TSIG secret!) belong in vault. Leave {} to inherit cluster values.
  dns: {}
  enable_registration: false
  enable_token_authenticator: true
  email:
    enabled: false
    smtp_host: "__NODE_IP__"
    smtp_port: 25
    notif_from: "Matrix <matrix@matrix.example.eu>"
    app_name: "Matrix"
    # Missed-message mails. Password reset does NOT need this (only smtp_host +
    # notif_from). Upstream default is false; the two notif_* below only bite
    # while this is true, but are spelled out rather than left to the upstream.
    enable_notifs: false
    notif_for_new_users: true      # false = accounts start unsubscribed
    notif_delay_before_mail: "10m" # grace period to see it in a client first
    # --- Auth / TLS — unset on purpose, the node-local postfix wants neither ---
    # It authorises by source IP (mynetworks 10.0.0.0/8 covers the pod), and the
    # hop is pod -> its own node, i.e. never leaves the host. Uncomment (here AND
    # in vault, hash_behaviour=replace) when pointing smtp_host at a real relay:
    #
    # smtp_user: "matrix@example.eu"   # set -> smtp_user+smtp_pass get rendered
    # smtp_pass: "CHANGEME"
    # force_tls: false                 # true -> implicit TLS, use smtp_port 465
    # require_transport_security: true # refuse to send if STARTTLS failed (587)
    # enable_tls: true                 # false -> never attempt STARTTLS at all
    # tlsname: "mail.example.eu"       # cert hostname, if != smtp_host
  # Traefik pods source X-Forwarded-For from the K3s pod CIDR.
  trusted_proxies: "10.68.0.0/16,10.69.0.0/16"
  registration_shared_secret: "CHANGEME_REGISTRATION_SHARED_SECRET"
  macaroon_secret_key: "CHANGEME_MACAROON_SECRET"
  form_secret: "CHANGEME_FORM_SECRET"
  jwt_secret: "CHANGEME_JWT_SECRET"
  admin:
    username: "admin"
    password: "changeme"
  users: []
  bot_users: []
  images:
    synapse: {repo: "matrixdotorg/synapse", tag: "latest"}
    cinny: {repo: "ghcr.io/cinnyapp/cinny", tag: "latest"}
    # GHCR half of the official element-web release (same manifest as Docker Hub
    # vectorim/element-web, multi-arch), picked to stay off Docker Hub's rate
    # limit. Base image is nginx-unprivileged, so the pod runs as uid 101 and the
    # listen port comes from ELEMENT_WEB_PORT (see the Deployment).
    element: {repo: "ghcr.io/element-hq/element-web", tag: "latest"}
  resources:
    synapse: {cpu_request: "500m", memory_request: "1Gi", cpu_limit: "2000m", memory_limit: "2Gi"}
    cinny: {cpu_request: "50m", memory_request: "64Mi", cpu_limit: "500m", memory_limit: "256Mi"}
    element: {cpu_request: "50m", memory_request: "64Mi", cpu_limit: "500m", memory_limit: "256Mi"}
