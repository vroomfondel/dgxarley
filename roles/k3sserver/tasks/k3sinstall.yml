---
- name: ensure k3smaster is set in /etc/hosts for non-k3smaster
  lineinfile:
    path: /etc/hosts
    regexp: '\sk3smaster\s*$'
    line: "{{ k3smasterip }}	k3smaster"
  when:
    - k3smasterip is defined
    - isk3smaster is not defined or not isk3smaster

- name: ensure k3smaster is set in /etc/hosts for k3smaster to 127.0.0.1
  lineinfile:
    path: /etc/hosts
    regexp: '\sk3smaster\s*$'
    line: "127.0.0.1	k3smaster"
  when:
    - isk3smaster is defined
    - isk3smaster

- name: ensure /etc/rancher/k3s exists
  file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: 0766

- name: copy template /etc/rancher/k3s/config.yaml
  template:
    src: "etc_rancher_k3s_config.yaml.j2"
    dest: "/etc/rancher/k3s/config.yaml"
    owner: root
    group: root
    mode: "0644"

- name: Populate service facts
  service_facts:
  no_log: true

