---
- name: ensure k3smaster is set in /etc/hosts for non-k3smaster
  lineinfile:
    path: /etc/hosts
    regexp: '\sk3smaster\s*$'
    line: "{{ k3smasterip }}	k3smaster"
  when:
    - k3smasterip is defined
    - isk3smaster is not defined or not isk3smaster

- name: ensure k3smaster is set in /etc/hosts for k3smaster to 127.0.0.1
  lineinfile:
    path: /etc/hosts
    regexp: '\sk3smaster\s*$'
    line: "127.0.0.1	k3smaster"
  when:
    - isk3smaster is defined
    - isk3smaster

- name: ensure /etc/rancher/k3s exists
  file:
    path: /etc/rancher/k3s
    state: directory
    owner: root
    group: root
    mode: 0766

- name: copy template /etc/rancher/k3s/config.yaml
  template:
    src: "etc_rancher_k3s_config.yaml.j2"
    dest: "/etc/rancher/k3s/config.yaml"
    owner: root
    group: root
    mode: "0644"

# Node-swap KubeletConfiguration (KEP-2400). Only when k3s_node_swap_enabled;
# referenced from config.yaml via kubelet-arg config=. NOTE: neither this nor the
# config.yaml task restarts k3s — k3s reads both only at startup. Restart
# k3s/k3s-agent manually (with consent) after a swap device exists on the node.
- name: copy template kubelet-config.yaml (node swap)
  template:
    src: "etc_rancher_k3s_kubelet-config.yaml.j2"
    dest: "{{ k3s_kubelet_config_path }}"
    owner: root
    group: root
    mode: "0644"
  when: k3s_node_swap_enabled | default(false)

- name: remove kubelet-config.yaml when node swap disabled
  ansible.builtin.file:
    path: "{{ k3s_kubelet_config_path }}"
    state: absent
  when: not (k3s_node_swap_enabled | default(false))

- name: Populate service facts
  service_facts:
  no_log: true

