- name: check if /etc/rancher/k3s/config.yaml exists
  stat:
    path: "/etc/rancher/k3s/config.yaml"
  register: k3sconf


- name: copy k3s_install_server.sh script
  template:
    src: "k3s_install_server.sh.j2"
    dest: "/root/k3s_install_server.sh"
    owner: root
    group: root
    mode: "u=rwx,g=rw,o="
  when:
    - k3sconf.stat.exists == True
    - isk3smaster is defined
    - isk3smaster
  register: k3s_install_server

- name: execute curl installer for k3s-server
  shell: "/root/k3s_install_server.sh"
  args:
    chdir: /root
  when:
    - k3sconf.stat.exists == True
    - isk3smaster is defined
    - isk3smaster
    - (services is defined and 'k3s.service' not in services) or k3s_install_server.changed


- name: ensure /var/lib/rancher/k3s/server/manifests exists
  file:
    path: /var/lib/rancher/k3s/server/manifests
    state: directory
    owner: root
    group: root
    mode: '0755'
  when:
    - isk3smaster is defined
    - isk3smaster

- name: copy traefik-extend.yaml to k3smaster
  template:
    src: "traefik-extend.yaml.j2"
    dest: "/var/lib/rancher/k3s/server/manifests/traefik-extend.yaml"
  tags:
    - traefik-extend
  when:
    - isk3smaster is defined
    - isk3smaster
  # notify: restart k3s

- name: copy metrics-server-extend.yaml to k3smaster
  copy:
    src: "metrics-server-extend.yaml"
    dest: "/var/lib/rancher/k3s/server/manifests/metrics-server-extend.yaml"
  tags:
    - metrics-server-extend
  when:
    - isk3smaster is defined
    - isk3smaster

- name: copy local-path-provisioner-extend.yaml to k3smaster
  copy:
    src: "local-path-provisioner-extend.yaml"
    dest: "/var/lib/rancher/k3s/server/manifests/local-path-provisioner-extend.yaml"
  tags:
    - local-path-provisioner-extend
  when:
    - isk3smaster is defined
    - isk3smaster

- name: template coredns-extend.yaml to k3smaster
  template:
    src: "coredns-extend.yaml.j2"
    dest: "/var/lib/rancher/k3s/server/manifests/coredns-extend.yaml"
  tags:
    - coredns-extend
  when:
    - isk3smaster is defined
    - isk3smaster


- name: slurp node-token from k3s-master
  slurp:
      src: /var/lib/rancher/k3s/server/node-token
  register: slurpedtoken
  delegate_to: "{{ groups['k3sserver'] | map('extract', hostvars) | selectattr('isk3smaster', 'defined') | selectattr('isk3smaster') | map(attribute='inventory_hostname') | first }}"
  run_once: yes

- name: set info for others
  set_fact:
      k3stoken: "{{ slurpedtoken.content | b64decode }}"
  delegate_to: "{{ item }}"
  loop: "{{ ansible_play_batch }}"
  run_once: yes

- name: print k3s token to screen
  debug:
    msg: "k3stoken: {{ k3stoken }}"
  when:
    - k3stoken is defined

- name: copy k3s_install_agent.sh script
  template:
    src: "k3s_install_agent.sh.j2"
    dest: "/root/k3s_install_agent.sh"
    owner: root
    group: root
    mode: "u=rwx,g=rw,o="
  when:
    - k3sconf.stat.exists == True
    - isk3smaster is not defined or not isk3smaster
  register: k3s_install_agent



- name: execute curl installer for k3s-agent
  shell: "/root/k3s_install_agent.sh"
  args:
    chdir: /root
  when:
    - k3sconf.stat.exists == True
    - services is defined
    - isk3smaster is not defined or not isk3smaster
    - (services is defined and 'k3s-agent.service' not in services) or k3s_install_agent.changed



