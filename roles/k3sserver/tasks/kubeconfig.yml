---
# Fast-track: skip if context already exists locally
- name: check if kubectl context '{{ kubeconfig_context_name }}' exists locally
  command: kubectl config get-contexts {{ kubeconfig_context_name }} -o name
  delegate_to: localhost
  become: false
  run_once: true
  register: _kubeconfig_ctx_check
  changed_when: false
  failed_when: false

- name: create local kubeconfig context from k3s master
  command: >
    python3 {{ playbook_dir }}/k3shelperstuff/update_local_k3s_keys.py
    --create --yes
    -H {{ k3smasterip }}
    -c {{ kubeconfig_context_name }}
    --server {{ kubeconfig_api_server }}
  delegate_to: localhost
  become: false
  run_once: true
  when: _kubeconfig_ctx_check.rc != 0
