---
# file: roles/k3sserver/tasks/ensure_cgroups.yml
# Ensure cgroup v2 memory/cpuset are enabled in /boot/firmware/cmdline.txt on RPi/aarch64.
# K3s requires: cgroup_enable=cpuset cgroup_memory=1 cgroup_enable=memory

- name: Check if /boot/firmware/cmdline.txt exists
  stat:
    path: /boot/firmware/cmdline.txt
  register: cmdline_stat

- name: Read current cmdline.txt
  slurp:
    src: /boot/firmware/cmdline.txt
  register: cmdline_content
  when: cmdline_stat.stat.exists

- name: Ensure cgroup parameters in cmdline.txt
  vars:
    current_cmdline: "{{ cmdline_content.content | b64decode | trim }}"
    cgroup_params:
      - cgroup_enable=cpuset
      - cgroup_memory=1
      - cgroup_enable=memory
    missing_params: "{{ cgroup_params | reject('in', current_cmdline) | list }}"
  copy:
    content: "{{ current_cmdline }} {{ missing_params | join(' ') }}\n"
    dest: /boot/firmware/cmdline.txt
    owner: root
    group: root
    mode: '0755'
  when:
    - cmdline_stat.stat.exists
    - missing_params | length > 0
  register: cgroup_cmdline_changed

- name: Warn that reboot is required for cgroup changes
  debug:
    msg: "WARNING: cgroup parameters were added to cmdline.txt — a reboot is required for K3s to work!"
  when: cgroup_cmdline_changed is changed
