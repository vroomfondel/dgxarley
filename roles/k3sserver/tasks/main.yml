---
- name: ensure basic packages for this group are installed
  import_tasks: installbasicpackages.yml
  tags:
    - installbasicpackages

- name: ensure nfs-mountdir is there
  file:
    path: /mnt/nfs
    state: directory
    owner: root
    group: root
    mode: 0777
  when:
    - nfsmasterip is defined
    - nfs_share_path is defined
    - wantsnfsmount | default(false)
  tags:
    - nfsmount
    - k3sinstall

- name: ensure nfs-HF-CACHE mountdir is there
  file:
    path: /mnt/nfs-HF-CACHE
    state: directory
    owner: root
    group: root
    mode: 0777
  when:
    - nfsmasterip is defined
    - nfs_hf_cache_share_path is defined
    - wantsnfsmount | default(false)
  tags:
    - nfsmount
    - k3sinstall

# Stale-source detection + forced unmount BEFORE the (re-)mount tasks below.
# `ansible.posix.mount` with `state: mounted` updates fstab when src changes,
# but does NOT unmount and remount the active mount — so a host that was
# previously mounting from an OLD nfsmasterip would silently keep using the
# old server (until reboot). To make `nfsmasterip` flips actually take effect,
# we read the current SOURCE via `findmnt` and unmount if the IP no longer
# matches what we're about to set. `findmnt` is run with `failed_when: false`
# so a not-mounted path is a no-op (empty stdout → mismatch check below
# short-circuits via `length > 0`).
- name: detect current /mnt/nfs source (if any)
  ansible.builtin.command:
    cmd: findmnt -n -o SOURCE /mnt/nfs
  register: _current_nfs_src
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - nfsmasterip is defined
    - wantsnfsmount | default(false)
    - nfs_share_path is defined
  tags:
    - nfsmount
    - k3sinstall

- name: unmount /mnt/nfs if source no longer matches nfsmasterip
  ansible.posix.mount:
    path: /mnt/nfs
    state: unmounted
  when:
    - nfsmasterip is defined
    - wantsnfsmount | default(false)
    - nfs_share_path is defined
    - _current_nfs_src.stdout | default('') | length > 0
    - (nfsmasterip ~ ':') not in _current_nfs_src.stdout
  tags:
    - nfsmount
    - k3sinstall

- name: detect current /mnt/nfs-HF-CACHE source (if any)
  ansible.builtin.command:
    cmd: findmnt -n -o SOURCE /mnt/nfs-HF-CACHE
  register: _current_hf_src
  changed_when: false
  failed_when: false
  check_mode: false
  when:
    - nfsmasterip is defined
    - wantsnfsmount | default(false)
    - nfs_hf_cache_share_path is defined
  tags:
    - nfsmount
    - k3sinstall

- name: unmount /mnt/nfs-HF-CACHE if source no longer matches nfsmasterip
  ansible.posix.mount:
    path: /mnt/nfs-HF-CACHE
    state: unmounted
  when:
    - nfsmasterip is defined
    - wantsnfsmount | default(false)
    - nfs_hf_cache_share_path is defined
    - _current_hf_src.stdout | default('') | length > 0
    - (nfsmasterip ~ ':') not in _current_hf_src.stdout
  tags:
    - nfsmount
    - k3sinstall

- name: ensure nfs is mounted in /etc/fstab
  ansible.posix.mount:
    path: /mnt/nfs
    src: "{{ nfsmasterip }}:/{{ nfs_share_path }}"
    fstype: nfs4
    opts: "defaults,noatime,nodiratime,_netdev"
    dump: 0
    passno: 0
    state: mounted
  when:
    - nfsmasterip is defined
    - wantsnfsmount | default(false)
    - nfs_share_path is defined
  tags:
    - nfsmount
    - k3sinstall

- name: ensure nfs-HF-CACHE is mounted in /etc/fstab
  ansible.posix.mount:
    path: /mnt/nfs-HF-CACHE
    src: "{{ nfsmasterip }}:/{{ nfs_hf_cache_share_path }}"
    fstype: nfs4
    opts: "defaults,noatime,nodiratime,_netdev"
    dump: 0
    passno: 0
    state: mounted
  when:
    - nfsmasterip is defined
    - wantsnfsmount | default(false)
    - nfs_hf_cache_share_path is defined
  tags:
    - nfsmount
    - k3sinstall

# Cleanup is split into unmount + fstab-line-removal (no rmdir) because
# /mnt/nfs may double as the local NFS-server export-root on the master,
# and contain bind-mounts (e.g. HF-CACHE, k3shared) as sub-paths. Using
# `state: absent` would try to rmdir the directory and fail with ENOTEMPTY
# on a master that has already been migrated to local exports.
#
# `isnfsmaster` gate: on a host that serves NFS locally, /mnt/nfs and
# /mnt/nfs-HF-CACHE are bind-mount targets established by
# roles/common/tasks/nfs_server.yml (from `nfs_bind_mounts`). Without
# this gate, the cleanup tears the bind down in the same playbook run
# that just set it up.
- name: ensure old nfs client mount is unmounted (no rmdir — dir may host local bind-mounts)
  ansible.posix.mount:
    path: /mnt/nfs
    state: unmounted
  when:
    - not (wantsnfsmount | default(false))
    - not (isnfsmaster | default(false))
  tags:
    - nfsmount
    - k3sinstall

- name: ensure old nfs client fstab entry is removed
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: '^[^#].*\s/mnt/nfs\s+nfs'
    state: absent
  when:
    - not (wantsnfsmount | default(false))
    - not (isnfsmaster | default(false))
  tags:
    - nfsmount
    - k3sinstall

# /mnt/nfs-HF-CACHE is a legacy standalone mountpoint (separate from the
# main /mnt/nfs tree). Full removal incl. rmdir is fine here — no bind-mounts
# nested inside.
- name: ensure nfs-HF-CACHE is unmounted and removed from /etc/fstab
  ansible.posix.mount:
    path: /mnt/nfs-HF-CACHE
    state: absent
  when:
    - not (wantsnfsmount | default(false))
    - not (isnfsmaster | default(false))
  tags:
    - nfsmount
    - k3sinstall

#- name: ensure nfs is actually mounted to /mnt/nfs
#  ansible.posix.mount:
#    path: /mnt/nfs
#    state: mounted


- name: ensure cgroup v2 memory/cpuset enabled on RPi
  import_tasks: ensure_cgroups.yml
  tags:
    - cgroups
    - k3sinstall

- name: import k3sinstall.yml to install clients and server and join them together
  import_tasks: k3sinstall.yml
  tags:
    - k3sinstall

- name: merge kubeconfig to local control node
  import_tasks: kubeconfig.yml
  tags:
    - k3sinstall
    - kubeconfig

- name: crontab
  import_tasks: crontab.yml
  tags:
    - crontab

- name: import haproxy.yml if isk3smaster is defined and true
  import_tasks: haproxy.yml
  tags:
    - haproxy
  when:
    - isk3smaster is defined
    - isk3smaster

- name: configure rsyslog for remote logging from pods
  import_tasks: rsyslog.yml
  tags:
    - rsyslog

- name: install rustfs-cli on all k3sservers
  import_tasks: rustfs_client.yml
  tags:
    - rustfs

- name: install sops + age on all k3sservers
  import_tasks: sops_age.yml
  tags:
    - sops_age

- name: debug also non-master k3sservers
  debug:
    msg: "DONE ON: {{ inventory_hostname }}"

