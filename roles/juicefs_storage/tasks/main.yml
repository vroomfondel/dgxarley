---
# juicefs_storage — see defaults/main.yml for the architecture overview.
# Tasks are host-gated so a single play over `k3sserver` configures every role:
#   - JuiceFS binary    -> all nodes in the play
#   - RustFS            -> every storage node (juicefs_rustfs_nodes)
#   - Valkey            -> the primary storage node only (metadata is single-node)
#   - format (once)     -> the primary storage node only
#   - FUSE mount        -> nodes in juicefs_mount_group
#   - meta-backup timer -> the backup node (storage node by default)
# Ansible runs each imported task across the batch in order, so the backend is
# up before the format step, and the format is done before mount nodes mount.

- name: Install the JuiceFS client binary
  ansible.builtin.import_tasks: binaries_juicefs.yml
  tags: [juicefs_bin]

- name: Deploy metadata + object backend (Valkey + RustFS)
  ansible.builtin.import_tasks: backend.yml
  # RustFS runs on every storage node (juicefs_rustfs_nodes = the single node in
  # single mode, the full set in distributed mode). Valkey + the metrics exporter
  # are gated to the primary INSIDE backend.yml (metadata stays single-node).
  when: inventory_hostname in juicefs_rustfs_nodes
  tags: [juicefs_backend]

- name: Format the JuiceFS filesystem (idempotent, once)
  ansible.builtin.import_tasks: format.yml
  when: inventory_hostname == juicefs_primary_node
  tags: [juicefs_format]

- name: Mount JuiceFS on mount nodes
  ansible.builtin.import_tasks: mount.yml
  # Hosts in juicefs_mount_group always; the k3s master ONLY when explicitly
  # opted in via juicefs_mount_master (it has no QSFP → mounts over the mgmt
  # VLAN, which requires the Valkey dual-bind + per-client address resolution
  # in defaults/main.yml). isk3smaster is set inline for the master in hosts.yml.
  # juicefs_mount_enabled is the per-host opt-out (hosts.yml inline) for group
  # members that can't reach the backend yet (e.g. spark5 until its QSFP is cabled).
  when: >-
    (inventory_hostname in groups[juicefs_mount_group]
     or (juicefs_mount_master | bool and isk3smaster | default(false) | bool))
    and juicefs_mount_enabled | default(true) | bool
  tags: [juicefs_mount]

- name: Configure metadata-backup cron job
  ansible.builtin.import_tasks: backup.yml
  tags: [juicefs_backup]
