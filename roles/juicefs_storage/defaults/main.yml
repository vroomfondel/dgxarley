---
# ============================================================================
# juicefs_storage — distributed JuiceFS storage layer, host-level (systemd)
# ============================================================================
# Runs ENTIRELY outside k3s as native systemd services, so the storage layer is
# independent of the k3s lifecycle (no FUSE-pod-restart fragility, no kubelet
# OOM). JuiceFS has NO master: every mount talks DIRECTLY to Valkey (metadata)
# and RustFS (S3 object store). One "storage node" holds the USB-SSD and runs
# Valkey + RustFS; every node in juicefs_mount_group runs the FUSE mount.
#
# Deploy order is handled within the role (binaries -> backend -> format ->
# mount -> backup). Run via: ansible-playbook storage.yml

# --- Topology ---------------------------------------------------------------
# juicefs_storage_node (THE placement knob — inventory_hostname of the node with
# the USB-SSD, running Valkey+RustFS) and juicefs_mount_master (opt-in mount on
# the QSFP-less master) are PROMOTED to group_vars/all/main/juicefs.yml, because the
# `common` role's iptables template needs them to open the backend ports for a
# master mount. They are authoritative there; do NOT redefine them here (a role
# default would just be shadowed by the group_vars value). All other juicefs_*
# knobs stay in this file. When juicefs_mount_master is on, three things engage
# automatically:
#   1. mount.yml also runs on the master (see the gate in tasks/main.yml);
#   2. juicefs_storage_address resolves to the storage node's k3s IP for any
#      host without QSFP (the per-client logic below);
#   3. Valkey is dual-homed on the storage node (juicefs_valkey_bind_addresses),
#      and the storage node's firewall opens 6379/9000 (common iptables template).

# Inventory group whose hosts get the JuiceFS mount: juicefs_mount_group is
# PROMOTED to group_vars/all/main/juicefs.yml (2026-07, with juicefs_metrics_enabled) —
# common's iptables template and k8s_infra's Prometheus scrape loop need it.
# Do NOT redefine it here; a role default would just be shadowed.

# Address a mount client uses to reach Valkey + RustFS on the storage node.
# Resolved PER CLIENT: a QSFP-capable client (a spark) uses the storage node's
# QSFP IP (200GbE mesh); a client WITHOUT QSFP (the master) falls back to the
# storage node's k3s VLAN IP. If the storage node itself has no QSFP, everyone
# uses its k3s IP. Override per host only for unusual routing.
juicefs_storage_address: >-
  {{ hostvars[juicefs_storage_node].qsfp_ip
     if (qsfp_ip is defined and hostvars[juicefs_storage_node].qsfp_ip is defined)
     else hostvars[juicefs_storage_node].k3s_node_ip }}

# Addresses Valkey binds on the storage node (127.0.0.1 is always added in the
# template). Always the address spark clients dial (the storage node's QSFP IP,
# or its k3s IP if the storage node has no QSFP); PLUS its k3s IP when
# juicefs_mount_master is on, so the QSFP-less master can reach the metadata
# engine over the management network. RustFS already binds 0.0.0.0 (all NICs);
# Valkey is bind-scoped, so it needs this explicit list.
juicefs_valkey_bind_addresses: >-
  {{ (
       ([hostvars[juicefs_storage_node].qsfp_ip] if hostvars[juicefs_storage_node].qsfp_ip is defined
        else [hostvars[juicefs_storage_node].k3s_node_ip])
       + ([hostvars[juicefs_storage_node].k3s_node_ip] if juicefs_mount_master | bool else [])
     ) | select | list | unique | join(' ') }}

# Safety: refuse to deploy RustFS unless juicefs_disk_path is a real mountpoint
# (so RustFS data never lands on the OS disk by accident). Override only for tests.
juicefs_require_disk_mount: true

# --- Disk / paths -----------------------------------------------------------
# Mountpoint of the USB-SSD on the storage node. You mount the SSD here yourself
# (fstab / systemd.mount); this role does NOT partition or format the SSD.
# Real mountpoint is set in group_vars/all/vault/juicefs.yml (host-specific).
juicefs_disk_path: /mnt/jfs-usb
# RustFS object data dir on the USB-SSD.
juicefs_rustfs_data_dir: "{{ juicefs_disk_path }}/rustfs"

# Host mountpoint of the shared FS on every mount node.
# PROMOTED to group_vars/all/main/juicefs.yml (k8s_dgx derives hf_cache_juicefs_root
# from it, cross-play). Do NOT redefine here — a role default would be shadowed.
# Per-node local read cache on the NVMe.
juicefs_cache_dir: /var/lib/jfs-cache
# Per-node cache size in MiB (JuiceFS unit is MiB). Keep well below free NVMe.
# Raised at Phase 6 of JUICEFS_MIGRATION_HOWTO.md (2026-07-09): the old local
# /var/lib/hf-cache/hub copies are deleted, ~1.5 TiB free per spark — and the
# sparks' NVMe has little else to do, so most of it serves the read cache.
juicefs_cache_size_mib: 1_100_000  # ~1.05 TiB

# --- Filesystem format (set once at format time, immutable afterwards) -------
juicefs_fs_name: dgxfs
juicefs_meta_db: 1               # Valkey logical DB index
juicefs_block_size_kib: 4096     # object size in KiB; 4096 = 4 MiB (the default)
juicefs_compress: none           # LLM weights are effectively incompressible
juicefs_trash_days: 0            # no trash (reproducible data)

# --- Mount-time options -----------------------------------------------------
# Buffer writes locally and flush async to S3 (faster ingest, small durability
# window — acceptable for reproducible weights). Off by default.
juicefs_writeback: false
# allow_other so non-root processes / containers (via hostPath) can read it.
juicefs_allow_other: true
# Interval for the client's AUTOMATIC metadata dump into the bucket's meta/
# prefix (--backup-meta; upstream default 1h). The clients coordinate via a
# global lock and the SHORTEST configured interval wins, so this template sets
# it identically on every mount. Retention is hardcoded client-side
# (pkg/vfs/backup.go rotate(): all ≤2d, 1/day ≤2w, 1/week ≤2m, 1/month ≤2y) —
# NOT tunable, NOT an S3 lifecycle feature. "0" disables the auto-backup.
# Independent of the external daily off-box dump (backup.yml).
juicefs_backup_meta_interval: "24h"

# --- Versions ---------------------------------------------------------------
# No automatic upgrade check for these pins (deliberate — the rustfs server
# holds the object data, juicefs must stay consistent across all mounts).
# Check upstream for newer releases with:
#   juicefs:  curl -s https://api.github.com/repos/juicedata/juicefs/releases/latest | jq -r .tag_name
#             (tag has a "v" prefix — strip it for the var below)
#   rustfs:   curl -s "https://api.github.com/repos/rustfs/rustfs/releases?per_page=1" | jq -r '.[0].tag_name'
#             (or: gh release list -R rustfs/rustfs -L 1)
#             NOTE: every rustfs release is flagged Pre-release, so the usual
#             releases/latest endpoint returns 404 — hence the list query.
juicefs_version: "1.4.0"                 # juicedata/juicefs release (arm64+amd64, LTS)
juicefs_rustfs_version: "1.0.0-beta.8"   # rustfs/rustfs release
juicefs_rustfs_libc: musl                # musl (static) or gnu
juicefs_valkey_apt_package: valkey-server  # noble: 7.2.x — sufficient for JuiceFS

# --- RustFS server ----------------------------------------------------------
juicefs_rustfs_s3_port: 9000
juicefs_rustfs_console_port: 9001
juicefs_rustfs_console_enable: true
juicefs_rustfs_bucket: juicefs
juicefs_rustfs_user: rustfs              # native system user (NOT the container's 10001)
# Optional cgroup page-cache containment. RECOMMENDED on a spark storage node,
# where page cache competes with GPU unified memory. Empty = unlimited.
# Example: "16G". Uses MemoryHigh (soft reclaim) not MemoryMax (hard OOM).
juicefs_rustfs_memory_high: ""

# --- Credentials — DUMMIES. Real values go in group_vars/all/vault/juicefs.yml
# RustFS S3 root creds (RUSTFS_ACCESS_KEY / RUSTFS_SECRET_KEY; secret >= 8 chars).
juicefs_rustfs_access_key: "changeme-access-key"
juicefs_rustfs_secret_key: "changeme-secret-key-min8"
# Valkey requirepass == JuiceFS META_PASSWORD.
juicefs_valkey_password: "changeme-valkey-password"

# --- Metadata backup (root cron -> external backup S3 via the rc CLI) --------
# Insurance against the Valkey SPOF: a juicefs dump uploaded off the single disk.
# Reuses the existing rustfs_rc_* alias from the k3sserver role (group_vars/k3sserver/vault/rustfs.yml).
juicefs_meta_backup_enabled: true
juicefs_meta_backup_node: "{{ juicefs_storage_node }}"
# Schedule (root crontab, cron module — matches the repo convention).
juicefs_meta_backup_minute: "30"
juicefs_meta_backup_hour: "3"
juicefs_meta_backup_weekday: "*"
juicefs_meta_backup_bucket: "{{ rustfs_rc_backup_bucket | default('dgx-backups') }}"
juicefs_meta_backup_prefix: "juicefs-meta"
juicefs_meta_backup_keep: 14                        # retained dumps in the bucket
juicefs_meta_backup_log: /var/log/juicefs-meta-backup.log
