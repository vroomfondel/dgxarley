---
# file: roles/nut/defaults/main.yml

# ─── Primary UPS: Green Cell UPS 1000VA 600W (UPS03) ──────────────────
# Product: https://greencell.global/en/uninterruptible-power-supplies/1087
# Specs:   1000VA / 600W, Line-Interactive AVR, modified sine
# Battery: 2×12V/7Ah AGM in series → 24V nominal, 168Wh
# USB:     MEC/MEC0003, vendor:product 0001:0000 (Megatec/Q1 protocol)
# Driver:  blazer_usb (ignores "port" — uses libusb with vendorid/productid/busport)
# nut_ups_name — defined in group_vars/all/main.yml (shared with k8s_infra)
nut_ups_driver: "blazer_usb"
nut_ups_port: "auto"
nut_ups_desc: "Green Cell UPS 1000VA 600W"
nut_ups_vendorid: "0001"
nut_ups_productid: "0000"
nut_ups_busport: "004"              # physical USB port (nut-scanner -U → busport), stable across reboots
# langid_fix: required for Green Cell USB communication
# norating/novendor: suppress garbage USB queries, use overrides instead
# Voltage thresholds for 2×12V AGM in series:
#   high = 2×13.8V = 27.6V (fully charged)
#   low  = 2×10.5V = 21.0V (empty, cutoff)
# runtimecal format: sec_full,load%,sec_half,load%
#   168Wh @ 600W full → ~480s (80% inverter eff, Peukert losses)
#   168Wh @ 300W half → ~1200s (85% inverter eff, Peukert losses)
#   Tune after a real battery discharge test.
nut_ups_extra_options:
  - "langid_fix = 0x409"
  - "norating"
  - "novendor"
  - "default.battery.voltage.high = 27.6"
  - "default.battery.voltage.low = 21.0"
  - "runtimecal = 480,100,1200,50"
  - 'override.device.mfr = "Green Cell"'
  - 'override.device.model = "UPS 1000VA 600W"'
  - "override.ups.realpower.nominal = 600"

# ─── Secondary UPS: Green Cell UPS 2000VA 1200W (UPS05) ───────────────
# Product: https://greencell.global/en/uninterruptible-power-supplies/1089
# Specs:   2000VA / 1200W, Line-Interactive AVR, modified sine
# Battery: 2×12V/9Ah AGM in series → 24V nominal, 216Wh
# USB:     identical to primary (MEC/MEC0003, 0001:0000) — distinguished by busport
# Determine busport: nut-scanner -U → busport field
# nut_ups_secondary_name — defined in group_vars/all/main.yml (shared with k8s_infra)
nut_ups_secondary_driver: "blazer_usb"
nut_ups_secondary_port: "auto"
nut_ups_secondary_bus: "001"
nut_ups_secondary_busport: "001"     # physical USB port 1 (nut-scanner -U → busport)
nut_ups_secondary_desc: "Green Cell UPS 2000VA 1200W"
nut_ups_secondary_vendorid: "0001"
nut_ups_secondary_productid: "0000"
# Same 24V AGM chemistry → same voltage thresholds (27.6V/21.0V)
# runtimecal scaled from primary: factor = (9Ah/7Ah) × (600W/1200W) = 0.643
#   216Wh @ 1200W full → ~300s (vs 480s @ 600W for 7Ah)
#   216Wh @  600W half → ~780s (vs 1200s @ 300W for 7Ah)
#   Tune after a real battery discharge test.
nut_ups_secondary_extra_options:
  - "langid_fix = 0x409"
  - "norating"
  - "novendor"
  - "default.battery.voltage.high = 27.6"
  - "default.battery.voltage.low = 21.0"
  - "runtimecal = 300,100,780,50"
  - 'override.device.mfr = "Green Cell"'
  - 'override.device.model = "UPS 2000VA 1200W"'
  - "override.ups.realpower.nominal = 1200"

# ────────────────────────────────────────────────────────────────────────

# NUT mode: netserver allows remote clients (nut-exporter) to query upsd
nut_mode: "netserver"
nut_listen_address: "0.0.0.0"
nut_listen_port: 3493

# upsd users (override passwords via vault)
nut_admin_user: "admin"
nut_admin_password: "changeme"
nut_monitor_user: "monuser"
nut_monitor_password: "changeme"

# ─── Per-UPS shutdown targets ──────────────────────────────────────────
# Which UPS powers the NUT server (this host). Its MONITOR line gets
# powervalue=1; when it goes critical, upsmon calls SHUTDOWNCMD for local
# shutdown. The other UPS gets powervalue=0 — its FSD only triggers
# NOTIFYCMD (drain + remote shutdown), the local host stays up.
nut_ups_powers_self: "greencell"

# Map UPS name → K8s nodes to drain + hosts to SSH-shutdown on FSD.
# Override in vault with actual node/host assignments per UPS.
nut_ups_shutdown_map:
  greencell:
    drain_nodes:
      - spark1
      - spark2
    ssh_hosts:
      - "192.168.124.101"
      - "192.168.124.102"
  greencell2:
    drain_nodes:
      - spark3
    ssh_hosts:
      - "192.168.124.103"
