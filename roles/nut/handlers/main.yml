---
# file: roles/nut/handlers/main.yml

- name: restart nut-driver
  service:
    name: nut-driver@{{ nut_ups_name }}
    state: restarted

# Second UPS — uncomment when nut_ups_secondary_name is defined:
# - name: restart nut-driver-secondary
#   service:
#     name: nut-driver@{{ nut_ups_secondary_name | default("greencell2") }}
#     state: restarted

- name: restart nut-server
  service:
    name: nut-server
    state: restarted

- name: restart nut-monitor
  service:
    name: nut-monitor
    state: restarted
