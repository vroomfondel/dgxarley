---
# config_nut.yml
# Install and configure Network UPS Tools (NUT) for USB HID UPS monitoring.
#
# Requires:
#   - wantsnut: true on the host
#   - UPS connected via USB (detected as HID device)
#
# Usage:
#   ansible-playbook common.yml --tags nut
#   ansible-playbook common.yml --limit k3smaster --tags nut
#
# ─── Dual-UPS support ──────────────────────────────────────────────────
#
# Two identical UPS units (same USB vendor:product ID) are distinguished
# via stable udev symlinks (/dev/ups-1, /dev/ups-2) keyed by USB KERNELS path.
#
# Per-UPS shutdown logic:
#   nut_ups_powers_self  — which UPS powers this host (powervalue=1 in MONITOR)
#   nut_ups_shutdown_map — maps UPS name → {drain_nodes, ssh_hosts}
#
# On FSD of a non-self UPS: NOTIFYCMD (nut_notify.sh) drains + shuts down
#   only the mapped nodes. Local host stays up.
# On FSD of the self UPS: SHUTDOWNCMD (nut_shutdown.sh) drains mapped nodes
#   + local shutdown. upsmon triggers this via MINSUPPLIES.
#
# The secondary UPS is automatically configured when nut_ups_secondary_name
# is defined in defaults (all templates, handlers, and verify tasks are
# conditional on this variable).
#
# ────────────────────────────────────────────────────────────────────────

- name: install NUT packages
  apt:
    pkg:
      - nut
      - nut-client
      - nut-server
      - libusb-1.0-0-dev
    state: present
    update_cache: true

- name: deploy udev rule to unbind kernel driver from UPS USB device
  template:
    src: etc_udev_rules.d_99-nut-ups.rules.j2
    dest: /etc/udev/rules.d/99-nut-ups.rules
    owner: root
    group: root
    mode: '0644'
  register: nut_udev_rule

- name: reload udev rules and re-trigger USB subsystem
  shell: udevadm control --reload-rules && udevadm trigger --subsystem-match=usb --action=add
  when: nut_udev_rule is changed

- name: deploy nut.conf
  template:
    src: etc_nut_nut.conf.j2
    dest: /etc/nut/nut.conf
    owner: root
    group: nut
    mode: '0640'
  notify: restart nut-server

- name: deploy ups.conf
  template:
    src: etc_nut_ups.conf.j2
    dest: /etc/nut/ups.conf
    owner: root
    group: nut
    mode: '0640'
  notify:
    - restart nut-driver
    - restart nut-driver-secondary
    - restart nut-server

- name: deploy upsd.conf
  template:
    src: etc_nut_upsd.conf.j2
    dest: /etc/nut/upsd.conf
    owner: root
    group: nut
    mode: '0640'
  notify: restart nut-server

- name: deploy upsd.users
  template:
    src: etc_nut_upsd.users.j2
    dest: /etc/nut/upsd.users
    owner: root
    group: nut
    mode: '0640'
  notify: restart nut-server

- name: deploy upsmon.conf
  template:
    src: etc_nut_upsmon.conf.j2
    dest: /etc/nut/upsmon.conf
    owner: root
    group: nut
    mode: '0640'
  notify: restart nut-monitor

- name: deploy UPS cluster shutdown script (SHUTDOWNCMD)
  template:
    src: nut_shutdown.sh.j2
    dest: /usr/local/bin/nut_shutdown.sh
    owner: root
    group: root
    mode: '0755'

- name: deploy UPS notification script (NOTIFYCMD)
  template:
    src: nut_notify.sh.j2
    dest: /usr/local/bin/nut_notify.sh
    owner: root
    group: root
    mode: '0755'

- name: enable and start nut-server
  service:
    name: nut-server
    state: started
    enabled: true

- name: enable and start nut-monitor
  service:
    name: nut-monitor
    state: started
    enabled: true

- name: flush handlers before verify
  meta: flush_handlers

- name: verify UPS is detected by NUT
  command: upsc {{ nut_ups_name }}@localhost
  register: nut_ups_status
  changed_when: false
  failed_when: false

- name: display UPS status
  debug:
    msg: "{{ nut_ups_status.stdout_lines[:15] }}"
  when: nut_ups_status.rc == 0

- name: warn if UPS not detected
  debug:
    msg: "WARNING — upsc could not query UPS '{{ nut_ups_name }}'. Check USB connection and driver."
  when: nut_ups_status.rc != 0

- name: verify secondary UPS is detected by NUT
  command: upsc {{ nut_ups_secondary_name }}@localhost
  register: nut_ups_secondary_status
  changed_when: false
  failed_when: false
  when: nut_ups_secondary_name is defined

- name: display secondary UPS status
  debug:
    msg: "{{ nut_ups_secondary_status.stdout_lines[:15] }}"
  when: nut_ups_secondary_name is defined and nut_ups_secondary_status.rc == 0

- name: warn if secondary UPS not detected
  debug:
    msg: "WARNING — upsc could not query UPS '{{ nut_ups_secondary_name }}'. Check USB connection and driver."
  when: nut_ups_secondary_name is defined and nut_ups_secondary_status.rc != 0
