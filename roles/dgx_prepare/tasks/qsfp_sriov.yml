---
# Enable or disable SR-IOV Virtual Functions on the QSFP PF.
# Gated by qsfp_sriov_enabled (default: false).
#
# Single source of truth is qsfp_sriov_pf_iface (the PF netdev name). The PCI
# address is RESOLVED from the interface at runtime via /sys/class/net/<iface>/device
# (set as the qsfp_sriov_pf_pci fact for the systemd unit + reset script). This keeps
# it correct-by-construction per host even when PCIe-domain enumeration differs across
# nodes, and it can never drift out of sync with the interface name.

# Tolerate a slow ConnectX-7 driver bind (e.g. node just booted): the sysfs attr
# appears only once mlx5_core has named the netdev. Retry rather than hard-fail on
# the first miss. When disabled, a single best-effort probe is enough.
- name: Wait for QSFP PF interface to expose SR-IOV
  ansible.builtin.stat:
    path: "/sys/class/net/{{ qsfp_sriov_pf_iface }}/device/sriov_totalvfs"
  register: _sriov_sysfs
  until: _sriov_sysfs.stat.exists
  retries: "{{ 12 if qsfp_sriov_enabled else 0 }}"
  delay: 5
  failed_when: false

- name: Fail if QSFP PF does not support SR-IOV
  ansible.builtin.fail:
    msg: >-
      Interface {{ qsfp_sriov_pf_iface }} on {{ inventory_hostname }} did not expose
      sriov_totalvfs within 60s. Check that the ConnectX-7 driver is bound and the
      interface is present (ip link show {{ qsfp_sriov_pf_iface }}), that the interface
      name is correct for this host, and that SR-IOV is enabled in NIC firmware
      (mlxconfig -d <pci> query | grep SRIOV_EN).
  when: qsfp_sriov_enabled and not _sriov_sysfs.stat.exists

# Resolve PCI from the interface for the templates that need it at boot time
# (systemd unit + reset script address the PF by PCI, which is stable across reboots).
- name: Resolve QSFP PF PCI address from interface
  ansible.builtin.command: "readlink -f /sys/class/net/{{ qsfp_sriov_pf_iface }}/device"
  register: _sriov_pf_dev
  changed_when: false
  when: _sriov_sysfs.stat.exists

- name: Set resolved PF PCI fact
  ansible.builtin.set_fact:
    qsfp_sriov_pf_pci: "{{ _sriov_pf_dev.stdout | basename }}"
  when: _sriov_sysfs.stat.exists

- name: Read max supported VFs
  ansible.builtin.slurp:
    src: "/sys/class/net/{{ qsfp_sriov_pf_iface }}/device/sriov_totalvfs"
  register: _sriov_max_raw
  when: qsfp_sriov_enabled

- name: Validate requested VF count
  ansible.builtin.fail:
    msg: "Requested {{ qsfp_sriov_numvfs }} VFs but PF only supports {{ _sriov_max_raw.content | b64decode | trim }}"
  when: qsfp_sriov_enabled and (qsfp_sriov_numvfs | int) > (_sriov_max_raw.content | b64decode | trim | int)

- name: Deploy SR-IOV systemd service
  ansible.builtin.template:
    src: qsfp_sriov.service.j2
    dest: /etc/systemd/system/qsfp-sriov.service
    mode: "0644"
  register: _sriov_unit
  when: qsfp_sriov_enabled

- name: Enable and start SR-IOV service
  ansible.builtin.systemd:
    name: qsfp-sriov.service
    daemon_reload: "{{ _sriov_unit is changed }}"
    enabled: true
    state: started
  when: qsfp_sriov_enabled

- name: Apply netplan for VF MTU and MAC settings
  ansible.builtin.command: netplan apply
  when: qsfp_sriov_enabled
  changed_when: false

- name: Read current VF count
  ansible.builtin.slurp:
    src: "/sys/class/net/{{ qsfp_sriov_pf_iface }}/device/sriov_numvfs"
  register: _sriov_cur_raw
  when: qsfp_sriov_enabled

- name: Restart SR-IOV service if VF count changed
  ansible.builtin.systemd:
    name: qsfp-sriov.service
    state: restarted
  when: >
    qsfp_sriov_enabled and
    (_sriov_cur_raw.content | b64decode | trim | int) != (qsfp_sriov_numvfs | int)

- name: Stop, disable and remove SR-IOV service
  when: not qsfp_sriov_enabled
  block:
    - name: Check if SR-IOV service exists
      ansible.builtin.stat:
        path: /etc/systemd/system/qsfp-sriov.service
      register: _sriov_unit_file

    - name: Disable SR-IOV VFs
      ansible.builtin.shell: echo 0 > /sys/class/net/{{ qsfp_sriov_pf_iface }}/device/sriov_numvfs
      when: _sriov_unit_file.stat.exists and _sriov_sysfs.stat.exists
      failed_when: false

    - name: Stop and disable SR-IOV service
      ansible.builtin.systemd:
        name: qsfp-sriov.service
        state: stopped
        enabled: false
        daemon_reload: true
      when: _sriov_unit_file.stat.exists
      failed_when: false

    - name: Remove SR-IOV service file
      ansible.builtin.file:
        path: /etc/systemd/system/qsfp-sriov.service
        state: absent

# Emergency recovery script — always deployed when SR-IOV is enabled.
# Cleans orphaned CNI namespaces and resets VFs. Safe to run manually.
- name: Deploy SR-IOV emergency reset script
  ansible.builtin.template:
    src: reset_qsfp_sriov.sh.j2
    dest: /usr/local/bin/reset_qsfp_sriov.sh
    mode: "0755"
  when: qsfp_sriov_enabled | default(false)
