---
# DGX-Spark ConnectX-7 firmware: arm the official updater + install read-only tools.
# This task NEVER actively flashes from Ansible — at most it ARMS the vendor's
# boot-time flasher (enable-only, see below).
#
# The DGX-Spark NIC runs an OEM firmware (PSID NVD0000000087, part
# cx7_P4242_HORIZON_PK_Ax). Neither fwupd/LVFS nor NVIDIA's public CDN carry an
# image for that PSID — so `fwupdmgr` ("no updates") and `mlxfwmanager --online`
# ("No matching image found") both come up empty. That is EXPECTED, not a sign the
# NIC is current, and it means self-flashing against the CDN is NOT the update path.
#
# The real channel is the apt package `nvidia-spark-mlnx-firmware-manager` (spark/
# baseos repo): it bundles the OEM fw-ConnectX7.bin + a systemd service that, on
# boot, force-flashes when the running FW differs from the bundled one. A NIC FW
# update therefore arrives via `apt upgrade` (newer package → newer .bin) and lands
# at the next reboot. We pin the package present + enable the service here.
#
# Separately we install `mft` (mst / flint / mlxfwmanager, from the CUDA sbsa repo)
# purely as read-only MONITORING — `mlxfwmanager --query` shows which FW is actually
# on the NIC after a DGX-OS upgrade. Manual flashing stays a conscious out-of-band
# step (needs mlxfwreset / reboot — see feedback_no_reboot).

# The official DGX-Spark NIC firmware updater. Bundles the OEM fw-ConnectX7.bin and
# a systemd service that force-flashes on boot when running != bundled (see the
# defaults comment). Usually pulled in by the spark/baseos repo already; pinned here
# so a fresh node is deterministic. `enabled` only creates the boot WantedBy symlink
# — it does NOT start the unit now, so there is no immediate flash.
- name: Ensure NVIDIA Spark Mellanox Firmware Manager is installed
  ansible.builtin.apt:
    name: "{{ dgx_mlnx_fwmgr_package }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: dgx_mlnx_fwmgr_enabled | default(true)

- name: Arm the firmware-manager service at boot (enable only, no immediate flash)
  ansible.builtin.systemd:
    name: "{{ dgx_mlnx_fwmgr_service }}"
    enabled: true
  when:
    - dgx_mlnx_fwmgr_enabled | default(true)
    - dgx_mlnx_fwmgr_service_enable | default(true)

- name: Install NVIDIA MFT (ConnectX firmware tooling)
  ansible.builtin.apt:
    name: "{{ dgx_mlxfw_package }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: dgx_mlxfw_enabled | default(true)

# mlxfwmanager reads firmware over the PCI config space directly (mtcr), so it does
# not need the `mst` service for a plain query. --query (no --online) is fully
# offline and read-only: it just prints the installed FW version + PSID per device.
- name: Query installed ConnectX firmware (read-only, no flash)
  ansible.builtin.command:
    cmd: mlxfwmanager --query
  register: _mlxfw_query
  changed_when: false
  failed_when: false
  when: dgx_mlxfw_enabled | default(true)

- name: Report installed ConnectX firmware
  ansible.builtin.debug:
    var: _mlxfw_query.stdout_lines
  when:
    - dgx_mlxfw_enabled | default(true)
    - _mlxfw_query.stdout_lines | default([]) | length > 0
