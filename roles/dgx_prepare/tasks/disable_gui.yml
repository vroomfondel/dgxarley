---
- name: Check if desktop metapackages are installed
  ansible.builtin.shell: dpkg-query -W -f='${Package}\n' ubuntu-desktop ubuntu-desktop-minimal 2>/dev/null || true
  register: desktop_pkgs_check
  changed_when: false

- name: Remove desktop metapackages (prevents autoremove conflicts)
  ansible.builtin.apt:
    name:
      - ubuntu-desktop
      - ubuntu-desktop-minimal
    state: absent
    purge: true
  when: desktop_pkgs_check.stdout | length > 0

- name: Autoremove orphaned desktop dependencies
  ansible.builtin.apt:
    autoremove: true
  when: desktop_pkgs_check.stdout | length > 0

- name: Check current default target
  ansible.builtin.command: systemctl get-default
  register: current_default_target
  changed_when: false

- name: Set default target to multi-user.target
  ansible.builtin.command: systemctl set-default multi-user.target
  when: current_default_target.stdout != 'multi-user.target'

- name: Disable, stop and mask gdm3 service
  ansible.builtin.systemd:
    name: gdm3
    state: stopped
    enabled: false
    masked: true

- name: Disable and stop DGX dashboard services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - dgx-dashboard
    - dgx-dashboard-admin
    - cups
    - cups.socket
    - cups.path

- name: Disable Plymouth splash screen services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
  loop:
    - plymouth-start
    - plymouth-read-write
    - plymouth-quit
    - plymouth-quit-wait
  failed_when: false

- name: Read current kernel cmdline
  ansible.builtin.slurp:
    src: /etc/kernel/cmdline
  register: _kernel_cmdline_raw

- name: Remove splash and quiet from kernel cmdline
  ansible.builtin.copy:
    content: "{{ _kernel_cmdline_raw.content | b64decode | regex_replace('\\s*(splash|quiet)', '') | trim }}\n"
    dest: /etc/kernel/cmdline
    mode: "0644"
  register: _kernel_cmdline_changed
  when: _kernel_cmdline_raw.content | b64decode is search('splash|quiet')

- name: Update bootloader after cmdline change
  ansible.builtin.command: bootctl update
  when: _kernel_cmdline_changed is changed

- name: Disable and stop Docker services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - docker
    - docker.socket
  failed_when: false
