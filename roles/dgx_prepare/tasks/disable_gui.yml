---
- name: Check if desktop metapackages are installed
  ansible.builtin.shell: dpkg-query -W -f='${Package}\n' ubuntu-desktop ubuntu-desktop-minimal 2>/dev/null || true
  register: desktop_pkgs_check
  changed_when: false

- name: Remove desktop metapackages (prevents autoremove conflicts)
  ansible.builtin.apt:
    name:
      - ubuntu-desktop
      - ubuntu-desktop-minimal
    state: absent
    purge: true
  when: desktop_pkgs_check.stdout | length > 0

- name: Autoremove orphaned desktop dependencies
  ansible.builtin.apt:
    autoremove: true
  when: desktop_pkgs_check.stdout | length > 0

- name: Check current default target
  ansible.builtin.command: systemctl get-default
  register: current_default_target
  changed_when: false

- name: Set default target to multi-user.target
  ansible.builtin.command: systemctl set-default multi-user.target
  when: current_default_target.stdout != 'multi-user.target'

# On Ubuntu the real display-manager unit is gdm.service; `gdm3.service` is only
# an alias symlink (/lib/systemd/system/gdm3.service -> gdm.service). Masking the
# ALIAS (gdm3) replaces /etc/systemd/system/gdm3.service with -> /dev/null, which
# DECOUPLES the alias: `gdm3` then resolves to the mask (inactive) while the real
# gdm.service keeps running — the GUI never actually stops. Operate on the canonical
# units instead. gdm.service is `static` (no [Install]) so `enabled: false` is a
# no-op there; masked: true is what blocks the start, and set-default multi-user
# (above) keeps graphical.target out of the boot. display-manager.service is the
# DM-agnostic handle (symlink -> gdm.service) — masked too, belt and suspenders.
- name: Disable, stop and mask the display manager (gdm / display-manager)
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    masked: true
  loop:
    - gdm.service
    - display-manager.service
  failed_when: false

- name: Disable and stop DGX dashboard services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - dgx-dashboard
    - dgx-dashboard-admin
    - cups
    - cups.socket
    - cups.path

# nvidia-dgx-sol is NVIDIA's "Sign of Life" telemetry service that phones home
# every 5 minutes. Since we block events.telemetry.data.nvidia.com via DNS, this
# just spams "Event callback returned failure." into the journal.
- name: Disable and stop NVIDIA DGX telemetry service
  ansible.builtin.systemd:
    name: nvidia-dgx-sol
    state: stopped
    enabled: false
  failed_when: false

- name: Mask PipeWire user services globally
  ansible.builtin.systemd:
    name: "{{ item }}"
    masked: true
    scope: global
  loop:
    - pipewire.service
    - pipewire.socket
    - pipewire-pulse.service
    - pipewire-pulse.socket
    - wireplumber.service
  failed_when: false

- name: Disable Plymouth splash screen services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: false
  loop:
    - plymouth-start
    - plymouth-read-write
    - plymouth-quit
    - plymouth-quit-wait
  failed_when: false

- name: Check if systemd-boot cmdline exists
  ansible.builtin.stat:
    path: /etc/kernel/cmdline
  register: _kernel_cmdline_file

- name: Read current kernel cmdline (systemd-boot)
  ansible.builtin.slurp:
    src: /etc/kernel/cmdline
  register: _kernel_cmdline_raw
  when: _kernel_cmdline_file.stat.exists

- name: Remove splash and quiet from kernel cmdline (systemd-boot)
  ansible.builtin.copy:
    content: "{{ _kernel_cmdline_raw.content | b64decode | regex_replace('\\s*(splash|quiet)', '') | trim }}\n"
    dest: /etc/kernel/cmdline
    mode: "0644"
  register: _kernel_cmdline_changed
  when:
    - _kernel_cmdline_file.stat.exists
    - _kernel_cmdline_raw.content | b64decode is search('splash|quiet')

- name: Update bootloader after cmdline change (systemd-boot)
  ansible.builtin.command: bootctl update
  when: _kernel_cmdline_changed is changed

# DGX-OS appends `quiet splash` (via /etc/default/grub.d/menu.cfg) and
# `plymouth.use-simpledrm plymouth.ignore-serial-consoles` (via
# /etc/default/grub.d/nvidia-console-settings.cfg) to the GRUB cmdline,
# overriding any GRUB_CMDLINE_LINUX_DEFAULT="" set in /etc/default/grub.
# A `zz-` snippet sorts last and strips them back out so we get raw
# kernel-log output on tty0 instead of the Plymouth splash.
- name: Drop zz-no-splash GRUB snippet to strip splash/plymouth flags
  ansible.builtin.copy:
    dest: /etc/default/grub.d/zz-no-splash.cfg
    mode: "0644"
    content: |
      GRUB_CMDLINE_LINUX_DEFAULT="$(echo "$GRUB_CMDLINE_LINUX_DEFAULT" | sed -e 's/\bquiet\b//g' -e 's/\bsplash\b//g')"
      GRUB_CMDLINE_LINUX="$(echo "$GRUB_CMDLINE_LINUX" | sed -e 's/\bplymouth\.use-simpledrm\b//g' -e 's/\bplymouth\.ignore-serial-consoles\b//g')"
  register: _grub_snippet_changed
  when: not _kernel_cmdline_file.stat.exists

# DGX-OS ships /etc/default/grub.d/no-grubmenu.cfg which forces TIMEOUT=0,
# STYLE=hidden, RECORDFAIL_TIMEOUT=0 — meaning the GRUB menu flashes by with
# no chance to interact. Re-enable a visible 10s countdown.
# Without nvidia-drm.modeset=1 the console stays on simpledrm, which inherits
# whatever resolution UEFI/GOP set up at boot — and that is unreliable on the
# sparks (sometimes 1920x1080, sometimes 800x600 with the same hardware).
# With KMS enabled, nvidia-drm registers fb0 and does proper EDID detection.
#
# When no monitor is attached (or its EDID can't be read) nvidia-modeset falls
# back to its internal CEA mode list — which tops out at 1024x768. The kernel
# `video=...M@60` flag does NOT help: nvidia-modeset ignores the DRM cmdline
# mode-selector. The reliable fix is to inject a synthetic 1920x1080 EDID via
# drm_kms_helper.edid_firmware so the connector behaves as if a 1080p monitor
# were attached. The blob lives in roles/dgx_prepare/files/edid_1920x1080.bin
# (generic Linux 1920x1080@60 EDID, no vendor-specific content).
- name: Ensure /lib/firmware/edid directory exists
  ansible.builtin.file:
    path: /lib/firmware/edid
    state: directory
    mode: "0755"

- name: Install synthetic 1920x1080 EDID firmware blob
  ansible.builtin.copy:
    src: edid_1920x1080.bin
    dest: /lib/firmware/edid/1920x1080.bin
    mode: "0644"

- name: Drop zz-nvidia-drm GRUB snippet (enable nvidia-drm KMS for stable console)
  ansible.builtin.copy:
    dest: /etc/default/grub.d/zz-nvidia-drm.cfg
    mode: "0644"
    content: |
      GRUB_CMDLINE_LINUX="$GRUB_CMDLINE_LINUX nvidia-drm.modeset=1 drm.edid_firmware=HDMI-A-1:edid/1920x1080.bin"
  register: _grub_nvidia_drm_changed
  when: not _kernel_cmdline_file.stat.exists

- name: Drop zz-grub-timeout GRUB snippet (10s with visible countdown)
  ansible.builtin.copy:
    dest: /etc/default/grub.d/zz-grub-timeout.cfg
    mode: "0644"
    content: |
      GRUB_TIMEOUT=10
      GRUB_TIMEOUT_STYLE=countdown
      GRUB_RECORDFAIL_TIMEOUT=10
  register: _grub_timeout_changed
  when: not _kernel_cmdline_file.stat.exists

- name: Update GRUB after cmdline change
  ansible.builtin.command: update-grub
  when: _grub_snippet_changed is changed or _grub_timeout_changed is changed or _grub_nvidia_drm_changed is changed

# Without this, getty@tty1 wipes the kernel boot log the moment it starts —
# you lose all dmesg-style output on the local console and just see a login
# prompt. The drop-in keeps the VT contents so post-boot inspection works.
- name: Ensure getty@tty1.service.d drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/getty@tty1.service.d
    state: directory
    mode: "0755"

- name: Drop-in override to keep kernel log on tty1 (no VT disallocate)
  ansible.builtin.copy:
    dest: /etc/systemd/system/getty@tty1.service.d/noclear.conf
    mode: "0644"
    content: |
      [Service]
      TTYVTDisallocate=no
  register: _tty1_noclear

- name: Reload systemd after tty1 override
  ansible.builtin.systemd:
    daemon_reload: true
  when: _tty1_noclear is changed

- name: Find active XDG autostart desktop files
  ansible.builtin.find:
    paths: /etc/xdg/autostart
    patterns: "*.desktop"
  register: _xdg_autostart_files

- name: Rename XDG autostart files to .desktop.OFF
  ansible.builtin.command: mv "{{ item.path }}" "{{ item.path }}.OFF"
  loop: "{{ _xdg_autostart_files.files }}"
  loop_control:
    label: "{{ item.path | basename }}"
  when: _xdg_autostart_files.files | length > 0

- name: Disable and stop Docker services
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop:
    - docker
    - docker.socket
  failed_when: false
