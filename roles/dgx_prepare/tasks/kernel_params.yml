---
- name: Set net.core.rmem_max
  ansible.posix.sysctl:
    name: net.core.rmem_max
    value: "16777216"
    sysctl_file: /etc/sysctl.d/90-dgx-nccl.conf
    reload: true

- name: Set net.core.wmem_max
  ansible.posix.sysctl:
    name: net.core.wmem_max
    value: "16777216"
    sysctl_file: /etc/sysctl.d/90-dgx-nccl.conf
    reload: true

- name: Set net.core.rmem_default
  ansible.posix.sysctl:
    name: net.core.rmem_default
    value: "16777216"
    sysctl_file: /etc/sysctl.d/90-dgx-nccl.conf
    reload: true

- name: Set net.core.wmem_default
  ansible.posix.sysctl:
    name: net.core.wmem_default
    value: "16777216"
    sysctl_file: /etc/sysctl.d/90-dgx-nccl.conf
    reload: true

- name: Set net.ipv4.tcp_rmem
  ansible.posix.sysctl:
    name: net.ipv4.tcp_rmem
    value: "4096 87380 16777216"
    sysctl_file: /etc/sysctl.d/90-dgx-nccl.conf
    reload: true

- name: Set net.ipv4.tcp_wmem
  ansible.posix.sysctl:
    name: net.ipv4.tcp_wmem
    value: "4096 65536 16777216"
    sysctl_file: /etc/sysctl.d/90-dgx-nccl.conf
    reload: true

- name: Set vm.overcommit_memory
  ansible.posix.sysctl:
    name: vm.overcommit_memory
    value: "1"
    sysctl_file: /etc/sysctl.d/90-dgx-nccl.conf
    reload: true
