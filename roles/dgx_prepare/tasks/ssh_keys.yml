---
# Keygen + fetch run on ALL sparks (delegate_to bypasses --limit),
# so the authorize step always has every key available.

- name: Ensure /root/.ssh directory exists on all sparks
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    mode: "0700"
    owner: root
    group: root
  delegate_to: "{{ item }}"
  loop: "{{ groups['dgxsparks'] }}"
  run_once: true

- name: Generate ed25519 SSH key if not present on all sparks
  ansible.builtin.command:
    cmd: ssh-keygen -t ed25519 -f /root/.ssh/id_ed25519 -N ""
    creates: /root/.ssh/id_ed25519
  delegate_to: "{{ item }}"
  loop: "{{ groups['dgxsparks'] }}"
  run_once: true

- name: Fetch public key from all sparks to controller
  ansible.builtin.fetch:
    src: /root/.ssh/id_ed25519.pub
    dest: /tmp/dgxarley_spark_pubkeys/{{ item }}.pub
    flat: true
  delegate_to: "{{ item }}"
  loop: "{{ groups['dgxsparks'] }}"
  run_once: true

- name: Authorize all spark keys on all sparks
  ansible.posix.authorized_key:
    user: root
    key: "{{ lookup('file', '/tmp/dgxarley_spark_pubkeys/' + item.1 + '.pub') }}"
    state: present
  delegate_to: "{{ item.0 }}"
  loop: "{{ groups['dgxsparks'] | product(groups['dgxsparks']) | list }}"
  loop_control:
    label: "{{ item.1 }} -> {{ item.0 }}"
  run_once: true
