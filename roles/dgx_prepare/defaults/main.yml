---
qsfp_mtu: 9000
qsfp_interfaces:
  - "enp1s0f0np0"
  - "enp1s0f1np1"
  - "enP2p1s0f0np0"
  - "enP2p1s0f1np1"
# SR-IOV: create Virtual Functions on the QSFP PF used by Multus
# When enabled, pods get VFs instead of the raw PF — allows multiple pods on QSFP.
# qsfp_sriov_enabled lives in group_vars/all/main/qsfp.yml (shared with k8s_dgx)
qsfp_sriov_numvfs: 8
qsfp_sriov_pf_pci: "0000:01:00.0"
qsfp_sriov_pf_iface: "enp1s0f0np0"
# qsfp_sriov_vf_prefix lives in group_vars/all/main/qsfp.yml (shared with k8s_dgx)

# Manual DCBX/PFC — only if switch DCBX auto-negotiation doesn't work
set_dcbx_manually: false
qsfp_dcbx_roce_tc: 3

# ConnectX-7 firmware MONITORING tools (NVIDIA MFT), managed by tasks/mlxfw.yml
# (tag: mlxfw). NOT the update channel — that's nvidia-spark-mlnx-firmware-manager
# below. MFT (mst/flint/mlxfwmanager) from the CUDA sbsa repo is installed purely so
# `mlxfwmanager --query` can report which FW is actually on the NIC (e.g. after a
# DGX-OS upgrade). The task only installs + queries (read-only); it never flashes.
#   ansible-playbook dgx.yml --tags mlxfw            # install tools + report current FW
dgx_mlxfw_enabled: true
dgx_mlxfw_package: mft

# NVIDIA Spark Mellanox Firmware Manager — the ACTUAL ConnectX-7 FW update channel
# on DGX Spark (fwupd/LVFS and mlxfwmanager --online have no image for the OEM PSID
# NVD0000000087). This apt package bundles the OEM image (fw-ConnectX7.bin) and a
# systemd service that compares running-vs-bundled (mstflint) and force-flashes on
# boot when they differ. It usually arrives via the spark/baseos repo already, but
# we pin it present + enable the service so a fresh spark deterministically gets NIC
# FW updates on apt upgrade. enabled (not started): only arms the boot-time symlink,
# so NO immediate flash — the flash happens at the next reboot, and only if a newer
# bundled image exists. Set dgx_mlnx_fwmgr_service_enable=false to leave the service
# state untouched (e.g. to manage flashing entirely by hand).
dgx_mlnx_fwmgr_enabled: true
dgx_mlnx_fwmgr_package: nvidia-spark-mlnx-firmware-manager
dgx_mlnx_fwmgr_service: nvidia-spark-mlnx-firmware-manager.service
dgx_mlnx_fwmgr_service_enable: true

memlock_limit: "unlimited"
stack_limit: 67108864

# CPU idle management: when true, disable all C-states via cpupower (legacy
# NCCL-socket-era tuning). Default false — kernel idle governor handles C-states,
# which is fine since NCCL bulk traffic runs over RoCE and bypasses the CPU.
disablecpuidlemanagement: false
nvidia_cdi_output: "/etc/cdi/nvidia.yaml"
# Check latest: curl -s https://api.github.com/repos/containernetworking/plugins/releases/latest | jq -r .tag_name
cni_plugins_version: "1.9.1"
cni_extra_plugins:
  - host-device
  - static
pytorch_venv_path: "/root/pytorch-env"
pytorch_index_url: "https://download.pytorch.org/whl/cu130"
pytorch_packages:
  - torch
  - torchvision
  - torchaudio

# Disk-backed swapfile (KEP-2400 node swap), managed by tasks/swap.yml (tag: swap).
# Gated by k3s_node_swap_enabled — the SAME flag that drives the kubelet
# swapBehavior in the k3sserver role, so the swap *device* and the kubelet
# *policy* stay in lockstep (enabled in group_vars/dgxsparks). This task only
# creates/activates (or removes) the swapfile; it does NOT touch kubelet config.
# Purpose: absorb the transient weight-load peak of borderline models (only
# Burstable pods with a memory request actually swap — see sglang_shard).
#   ansible-playbook dgx.yml --tags swap                                 # apply state
#   ansible-playbook dgx.yml --tags swap -e dgx_swap_size=64G            # resize
#   ansible-playbook dgx.yml --tags swap -e k3s_node_swap_enabled=false  # disable
dgx_swap_file: "/swapfile"
dgx_swap_size: "100G"
dgx_swap_swappiness: 100
# Add an /etc/fstab entry so swap survives reboot. Off by default (transient).
dgx_swap_persist: false
# Refuse to create a swapfile that would drop free space on the swapfile's
# filesystem below this % — mirrors the kubelet nodefs.available<10% eviction
# threshold (a too-big file → DiskPressure taint). Override: -e dgx_swap_force=true.
dgx_swap_min_free_pct: 10
# Foreign swapfiles to ALSO remove on disable (k3s_node_swap_enabled=false). The
# role only ever CREATES dgx_swap_file, but DGX-OS / the Ubuntu installer ship a
# default /swap.img (16G, fstab-persistent, prio -2). Without listing it here a
# "disabled" node would still have OS-default swap active — masking failSwapOn and
# the kubelet swapBehavior policy. Only file-backed swap belongs here (these get
# swapoff'd, rm'd, and stripped from fstab); never put a block-device partition here.
dgx_swap_foreign_files:
  - /swap.img

# Protect DGX-OS platform packages from `apt autoremove` (tasks/protect_platform_pkgs.yml).
# DGX-OS installs GPU/boot/kernel-tuning packages as AUTO-marked deps of a
# metapackage, so a bare `apt autoremove` offers to sweep essentials. This regex
# is matched against `apt-mark showauto`; matching packages are flipped to
# "manual" (apt-mark only touches the flag — never installs/removes). Kept broad
# on purpose: marking any nvidia/dgx package manual is always safe on a DGX node.
# Pure utilities (ipcalc, python3-psutil) are deliberately NOT matched.
dgx_protect_pkg_regex: '^(nvidia-|nv-|nvgpu-|dgx-|hpc-sdk-repo|kdump-tools|kexec-tools|linux-crashdump|makedumpfile|msecli|tpm2-tools|libtss2-)'
