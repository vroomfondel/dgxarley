---
# file: roles/clevis/defaults/main.yml

# Clevis/Tang NBDE configuration (for hosts with wantsclevis: true)
clevis_tang_servers:
  - "http://tang.example.com"
  - "http://tang2.example.com:9090"
clevis_sss_threshold: 2

# Release the clevis/tang boot-time DHCP lease at the end of initramfs
# (init-bottom) so the upstream DHCP server (e.g. Fritzbox) drops it and stops
# reflecting the host under the stale boot IP via mDNS `<host>.local` /
# `<host>.fritz.box`. klibc ipconfig never releases; the deployed script uses
# the initramfs' dhcpcd to send a proper DHCPRELEASE. See
# roles/clevis/files/initramfs_init-bottom_dhcp-release and
# scripts/debughelper/mdns_who.py. Set false to skip (and remove) the script.
clevis_dhcp_release_enabled: true
