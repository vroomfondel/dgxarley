# ~/.tmux.conf — dgxarley cluster nodes (Ansible-managed: roles/common/files/)

bind S copy-mode
bind O setw synchronize-panes    # toggle: broadcast keystrokes to all panes (spark1..5 at once)
set -g display-panes-time 3000

# --- terminal / colours ---
# tmux-256color terminfo verified present on the noble nodes; -ga override enables
# truecolor (RGB) passthrough so nvtop/btm/vim render full-colour over SSH.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"

# --- usability ---
set -g mouse on                 # scroll + click to select panes/windows
set -g history-limit 50000      # deep scrollback for build / inference logs
set -sg escape-time 0           # kill the ESC delay (vim/nvtop responsiveness)
set -g focus-events on
setw -g mode-keys vi            # vi-style movement in copy-mode

# reload this config without restarting tmux
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# intuitive splits that keep the current pane's working directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# --- status bar: which node am I on? (spark1..5 / elite800) ---
set -g status-interval 5
set -g status-style "bg=colour236,fg=colour250"
set -g status-left " #[bold]#H#[nobold] "
set -g status-left-length 20
set -g status-right " %Y-%m-%d %H:%M "
set -g status-right-length 40
