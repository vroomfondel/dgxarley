---
# roles/common/defaults/main.yml

# Postfix relayhost - set to empty string for direct delivery
postfix_relayhost: "[mail.example.com]"

# AppArmor removal - set to true for cloud/dns servers
deinstall_apparmor: false

# smartd monitoring
smartd_mail_recipients: "root,admin@example.com"
smartd_devices: []  # Override per host in hosts.yml

# iptables (overridden by vault)
iptables_xosrc_ips: []
iptables_lifeline_ips: []
iptables_k3s_external_ips: []
iptables_static_dns_ips: []

# DynDNS hostname for ipset updates (overridden by vault)
dyndns_hostname: "dyn.example.com"

# WiFi access points for netplan (overridden by vault)
wifi_access_points: []

# Podman unqualified image search registries (containers-registries.conf v2).
# A single entry keeps short-name resolution unambiguous and suppresses Podman's
# interactive registry-selection prompt. Applied only when `wantspodman: true`.
podman_unqualified_search_registries:
  - docker.io
podman_short_name_mode: permissive

# NFS server exports — only applied when `isnfsmaster: true`.
# Schema: list of { path, clients: [{ cidr, options? }], owner?, group?, mode? }
# Define in host_vars/<host>/vault/ (e.g. host_vars/k3smaster/vault/nfs.yml).
nfs_exports: []
nfs_exports_default_options: "rw,sync,no_subtree_check,no_root_squash"