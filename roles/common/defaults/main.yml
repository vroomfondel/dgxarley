---
# roles/common/defaults/main.yml

# Postfix relayhost - set to empty string for direct delivery
postfix_relayhost: "[mail.example.com]"

# AppArmor removal - set to true for cloud/dns servers
deinstall_apparmor: false

# smartd monitoring
smartd_mail_recipients: "root,admin@example.com"
smartd_devices: []  # Override per host in hosts.yml

# iptables (overridden by vault)
iptables_xosrc_ips: []
iptables_lifeline_ips: []
iptables_k3s_external_ips: []
iptables_static_dns_ips: []

# DynDNS hostname for ipset updates (overridden by vault)
dyndns_hostname: "dyn.example.com"

# WiFi access points for netplan (overridden by vault)
wifi_access_points: []

# Podman unqualified image search registries (containers-registries.conf v2).
# A single entry keeps short-name resolution unambiguous and suppresses Podman's
# interactive registry-selection prompt. Applied only when `wantspodman: true`.
podman_unqualified_search_registries:
  - docker.io
podman_short_name_mode: permissive

# Static Podman overlay (mgoltzsche/podman-static). When true, a fully static rootful
# podman stack (podman + crun/runc/conmon/netavark/aardvark-dns/fuse-overlayfs/pasta +
# quadlet + systemd units + default etc/containers configs) is installed under
# /usr/local, which wins on PATH over the apt /usr/bin/podman. The apt podman/buildah
# packages STAY installed as the system-dependency base — they pull iptables (netavark
# hard-dep for bridge NAT/port-forward), newuidmap/slirp4netns, buildah and seed
# subuid/subgid; the static bundle ships none of those. Enable per host/group
# (host_vars/group_vars) — default false = no change anywhere until opted in.
# Upstream containers/podman ships NO self-contained static bundle, so mgoltzsche is
# the only practical source and it lags upstream by a few weeks; check for a newer
# arm64 bundle before bumping: https://github.com/mgoltzsche/podman-static/releases
podman_static_enabled: true
# curl -s https://api.github.com/repos/mgoltzsche/podman-static/releases/latest | jq -r '.tag_name'
podman_static_version: "5.8.4"

# NFS server exports — only applied when `isnfsmaster: true`.
# Schema: list of { path, clients: [{ cidr, options? }], owner?, group?, mode? }
# Define in host_vars/<host>/vault/ (e.g. host_vars/k3smaster/vault/nfs.yml).
nfs_exports: []
nfs_exports_default_options: "rw,sync,no_subtree_check,no_root_squash"