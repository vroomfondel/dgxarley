---
# file: roles/common/tasks/installpodman.yml

- name: install podman
  apt:
    pkg:
      - podman
      - buildah
    state: present
    update_cache: true

- name: Check if local id_podman.pub exists
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.ssh/id_podman.pub"
  delegate_to: localhost
  become: false
  register: local_podman_pubkey

- name: Inform user that id_podman.pub is missing locally
  ansible.builtin.debug:
    msg: "~/.ssh/id_podman.pub not found on control node — skipping podman SSH key authorization for root. Generate it with: ssh-keygen -t ed25519 -f ~/.ssh/id_podman -N ''"
  when: not local_podman_pubkey.stat.exists

- name: Ensure id_podman authorized key is present for root
  ansible.builtin.authorized_key:
    user: root
    state: present
    exclusive: false
    key: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_podman.pub') }}"
  when: local_podman_pubkey.stat.exists

- name: configure default registries in /etc/containers/registries.conf
  blockinfile:
    path: /etc/containers/registries.conf
    create: true
    owner: root
    group: root
    mode: "0644"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - default registries"
    block: |
      [registries.search]
      registries = ["docker.io"]

      [registries.insecure]
      registries = []

      # Optional: Verhindert, dass Podman überhaupt nachfragt und einfach den ersten Treffer nimmt
      unqualified-search-registries = ["docker.io"]

- name: Use kernel-native overlay instead of DGX-OS-forced fuse-overlayfs
  # DGX-OS ships /etc/containers/storage.conf with mount_program = fuse-overlayfs,
  # which forces the slow userspace FUSE path even for root. Empty mount_program
  # = kernel-native overlay (near-zero overhead). Drop fsync=0 (fuse-only mountopt,
  # invalid for kernel overlay). Kernel >= 5.13 required — DGX-OS is well past that.
  # NOTE: only rewrites the config; pre-existing fuse-built storage may need a
  # manual `podman system reset` (destructive) if the next build hits a driver mismatch.
  community.general.ini_file:
    path: /etc/containers/storage.conf
    section: storage.options.overlay
    option: "{{ item.opt }}"
    value: "{{ item.val }}"
    mode: "0644"
    backup: true
  loop:
    - { opt: mount_program, val: '""' }
    - { opt: mountopt, val: '"nodev"' }
  loop_control:
    label: "{{ item.opt }}"

- name: enable and start podman socket (system-level)
  systemd:
    name: podman.socket
    enabled: true
    state: started
    scope: system

- name: enable linger for root
  command: loginctl enable-linger root
  changed_when: false

- name: verify podman is working
  command: podman info
  changed_when: false
  register: podman_info

- name: show podman version
  debug:
    var: podman_info.stdout_lines

- name: podman system prune cron job
  cron:
    name: "podman system prune"
    minute: "30"
    hour: "23"
    job: "podman system prune -af --volumes"
    disabled: "no"
