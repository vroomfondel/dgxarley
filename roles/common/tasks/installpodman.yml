---
# file: roles/common/tasks/installpodman.yml

- name: install podman
  apt:
    pkg:
      - podman
      - buildah
    state: present
    update_cache: true

- name: Check if local id_podman.pub exists
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.ssh/id_podman.pub"
  delegate_to: localhost
  become: false
  register: local_podman_pubkey

- name: Inform user that id_podman.pub is missing locally
  ansible.builtin.debug:
    msg: "~/.ssh/id_podman.pub not found on control node — skipping podman SSH key authorization for root. Generate it with: ssh-keygen -t ed25519 -f ~/.ssh/id_podman -N ''"
  when: not local_podman_pubkey.stat.exists

- name: Ensure id_podman authorized key is present for root
  ansible.builtin.authorized_key:
    user: root
    state: present
    exclusive: false
    key: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_podman.pub') }}"
  when: local_podman_pubkey.stat.exists

- name: configure default registries in /etc/containers/registries.conf
  # Deterministic managed file (v2 format), NOT a blockinfile append. Replacing the
  # whole registries.conf works even on hosts shipping an ACTIVE legacy
  # [registries.search] file (e.g. the DGX-OS spark), where appending our block would
  # create a duplicate [registries.search] table and fail to parse. Leaves the
  # registries.conf.d/ drop-ins (e.g. shortnames.conf) untouched.
  template:
    src: etc_containers_registries.conf.j2
    dest: /etc/containers/registries.conf
    owner: root
    group: root
    mode: "0644"
    backup: true

- name: Check for an existing containers storage.conf
  ansible.builtin.stat:
    path: /etc/containers/storage.conf
  register: containers_storage_conf

- name: Force kernel-native overlay when a storage.conf forces fuse-overlayfs
  # Some hosts (e.g. the DGX-OS custom-podman spark) ship /etc/containers/storage.conf
  # with mount_program = fuse-overlayfs, which forces the slow userspace FUSE path even
  # for root. Empty mount_program = kernel-native overlay (near-zero overhead); drop
  # fsync=0 (a fuse-overlayfs-only mountopt, invalid for kernel overlay).
  #
  # ONLY touch an ALREADY-EXISTING file: hosts without one (apt podman on spark1-4) use
  # the native-overlay compiled defaults already, and containers/storage reads a single
  # storage.conf whole (no merge) — writing a partial file there would drop the
  # [storage] base (driver/runroot) and break podman ("runroot must be set"). A
  # storage.conf.d/ drop-in was tested and is NOT honored by this containers-storage
  # version, so an in-place edit of the existing file is the only working lever.
  # NOTE: config-only; pre-existing fuse-built storage may need a manual
  # `podman system reset` (destructive) if the next build hits a driver mismatch.
  community.general.ini_file:
    path: /etc/containers/storage.conf
    section: storage.options.overlay
    option: "{{ item.opt }}"
    value: "{{ item.val }}"
    create: false
    mode: "0644"
    backup: true
  loop:
    - { opt: mount_program, val: '""' }
    - { opt: mountopt, val: '"nodev"' }
  loop_control:
    label: "{{ item.opt }}"
  when: containers_storage_conf.stat.exists

- name: enable and start podman socket (system-level)
  systemd:
    name: podman.socket
    enabled: true
    state: started
    scope: system

- name: enable linger for root
  command: loginctl enable-linger root
  changed_when: false

- name: verify podman is working
  command: podman info
  changed_when: false
  register: podman_info

- name: show podman version
  debug:
    var: podman_info.stdout_lines

- name: podman system prune cron job
  cron:
    name: "podman system prune"
    minute: "30"
    hour: "23"
    job: "podman system prune -af --volumes"
    disabled: "no"
