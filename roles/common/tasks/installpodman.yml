---
# file: roles/common/tasks/installpodman.yml

- name: install podman (apt) + buildah
  # buildah is ALWAYS from apt (not shipped in the static bundle). apt podman is
  # installed ONLY when the static overlay is disabled — when podman_static_enabled,
  # the static bundle below is the sole podman and apt podman would just be shadowed
  # dead weight. This never REMOVES an already-present apt podman (state: present is
  # additive); purge it by hand if you want a truly apt-podman-free host.
  apt:
    pkg: "{{ (['podman'] if not (podman_static_enabled | default(false) | bool) else []) + ['buildah'] }}"
    state: present
    update_cache: true

- name: Check if local id_podman.pub exists
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.ssh/id_podman.pub"
  delegate_to: localhost
  become: false
  register: local_podman_pubkey

- name: Inform user that id_podman.pub is missing locally
  ansible.builtin.debug:
    msg: "~/.ssh/id_podman.pub not found on control node — skipping podman SSH key authorization for root. Generate it with: ssh-keygen -t ed25519 -f ~/.ssh/id_podman -N ''"
  when: not local_podman_pubkey.stat.exists

- name: Ensure id_podman authorized key is present for root
  ansible.builtin.authorized_key:
    user: root
    state: present
    exclusive: false
    key: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_podman.pub') }}"
  when: local_podman_pubkey.stat.exists

# --- Static Podman overlay (optional, gated by podman_static_enabled) -------------
# mgoltzsche/podman-static ships a fully static rootful podman stack as one arch
# tarball (podman + crun/runc/conmon/netavark/aardvark-dns/fuse-overlayfs/pasta +
# quadlet + systemd units + default etc/containers configs). It installs UNDER
# /usr/local, which wins on PATH over the apt /usr/bin/podman kept above. Both usr/
# AND etc/ are copied: etc/ carries policy.json (pull breaks without it) and the
# static build's required containers.conf (cgroup_manager=cgroupfs, events_logger=
# file). systemd's search path on these hosts INCLUDES /usr/local/lib/systemd/system,
# so the bundle's podman.socket/service become the active units — no unit copy needed.
# The bundle's own registries.conf + fuse-overlayfs-forcing storage.conf are
# re-asserted/corrected by the two managed tasks BELOW this block (that is why this
# overlay is inserted before them, not appended).
- name: check installed static podman version
  ansible.builtin.command: /usr/local/bin/podman --version
  register: _podman_static_current
  changed_when: false
  failed_when: false
  when: podman_static_enabled | default(false) | bool

- name: install static podman bundle
  when:
    - podman_static_enabled | default(false) | bool
    - "'podman version ' + podman_static_version not in (_podman_static_current.stdout | default(''))"
  vars:
    _podman_static_arch: "{{ 'arm64' if ansible_architecture == 'aarch64' else 'amd64' }}"
  block:
    - name: create temp dir for static podman download
      ansible.builtin.tempfile:
        state: directory
        suffix: podman-static
      register: _podman_static_tmp

    - name: download static podman bundle ({{ podman_static_version }} / {{ _podman_static_arch }})
      ansible.builtin.get_url:
        url: "https://github.com/mgoltzsche/podman-static/releases/download/v{{ podman_static_version }}/podman-linux-{{ _podman_static_arch }}.tar.gz"
        dest: "{{ _podman_static_tmp.path }}/podman-static.tar.gz"
        mode: "0644"

    - name: unpack static podman bundle
      ansible.builtin.unarchive:
        src: "{{ _podman_static_tmp.path }}/podman-static.tar.gz"
        dest: "{{ _podman_static_tmp.path }}"
        remote_src: true

    - name: install static podman binaries + configs under /usr/local and /etc
      # cp -a merges usr/ and etc/ into the existing / tree (GNU cp merges into an
      # existing target dir), replicating the upstream install script; -a preserves
      # the executable bits on the static binaries. Idempotency is handled at the
      # block level by the version gate above, so an unconditional copy here is fine.
      ansible.builtin.command:
        cmd: "cp -a {{ _podman_static_tmp.path }}/podman-linux-{{ _podman_static_arch }}/usr {{ _podman_static_tmp.path }}/podman-linux-{{ _podman_static_arch }}/etc /"
      changed_when: true

    - name: reload systemd to pick up static podman units
      ansible.builtin.systemd:
        daemon_reload: true

    - name: clear stale libpod SHM lock left by a different podman version
      # apt podman 4.9.3 leaves /dev/shm/libpod_lock sized for ITS lock count; the
      # static 5.8.4 then fails every call with "failed to open 2048 locks in
      # /libpod_lock: numerical result out of range". Measured: `podman system
      # renumber` can't fix it (it must open the broken lock first) and PATH/hash
      # tricks are irrelevant — only removing the SHM file works; podman recreates it
      # correctly-sized on the next call. tmpfs, so this only bites on a live
      # apt->static migration without a reboot. Runs only in this block (i.e. only
      # when the bundle was just (re)installed); safe as no podman containers run here
      # (podman is build-only on these nodes — k8s workloads use containerd).
      ansible.builtin.file:
        path: /dev/shm/libpod_lock
        state: absent

  always:
    - name: clean up static podman temp dir
      ansible.builtin.file:
        path: "{{ _podman_static_tmp.path }}"
        state: absent
      when: _podman_static_tmp.path is defined

- name: configure default registries in /etc/containers/registries.conf
  # Deterministic managed file (v2 format), NOT a blockinfile append. Replacing the
  # whole registries.conf works even on hosts shipping an ACTIVE legacy
  # [registries.search] file (e.g. the DGX-OS spark), where appending our block would
  # create a duplicate [registries.search] table and fail to parse. Leaves the
  # registries.conf.d/ drop-ins (e.g. shortnames.conf) untouched.
  template:
    src: etc_containers_registries.conf.j2
    dest: /etc/containers/registries.conf
    owner: root
    group: root
    mode: "0644"
    backup: true

- name: Check for an existing containers storage.conf
  ansible.builtin.stat:
    path: /etc/containers/storage.conf
  register: containers_storage_conf

- name: Force kernel-native overlay when a storage.conf forces fuse-overlayfs
  # Some hosts (e.g. the DGX-OS custom-podman spark) ship /etc/containers/storage.conf
  # with mount_program = fuse-overlayfs, which forces the slow userspace FUSE path even
  # for root. Empty mount_program = kernel-native overlay (near-zero overhead); drop
  # fsync=0 (a fuse-overlayfs-only mountopt, invalid for kernel overlay).
  #
  # ONLY touch an ALREADY-EXISTING file: hosts without one (apt podman on spark1-4) use
  # the native-overlay compiled defaults already, and containers/storage reads a single
  # storage.conf whole (no merge) — writing a partial file there would drop the
  # [storage] base (driver/runroot) and break podman ("runroot must be set"). A
  # storage.conf.d/ drop-in was tested and is NOT honored by this containers-storage
  # version, so an in-place edit of the existing file is the only working lever.
  # NOTE: config-only; pre-existing fuse-built storage may need a manual
  # `podman system reset` (destructive) if the next build hits a driver mismatch.
  community.general.ini_file:
    path: /etc/containers/storage.conf
    section: storage.options.overlay
    option: "{{ item.opt }}"
    value: "{{ item.val }}"
    create: false
    mode: "0644"
    backup: true
  loop:
    - { opt: mount_program, val: '""' }
    - { opt: mountopt, val: '"nodev"' }
  loop_control:
    label: "{{ item.opt }}"
  when: containers_storage_conf.stat.exists

- name: enable and start podman socket (system-level)
  systemd:
    name: podman.socket
    enabled: true
    state: started
    scope: system

- name: enable linger for root
  command: loginctl enable-linger root
  changed_when: false

- name: verify podman is working
  command: podman info
  changed_when: false
  register: podman_info

- name: show podman version
  debug:
    var: podman_info.stdout_lines

- name: purge apt podman + orphaned rootless deps when running pure-static (opt-in)
  # Only after the static bundle is verified working above (so a failed install never
  # strands the host podman-less). Removes the shadowed apt /usr/bin/podman plus the
  # exact set that goes orphan once podman is gone — the static bundle ships its own
  # conmon/catatonit/netavark/pasta under /usr/local, and rootful podman uses netavark,
  # so slirp4netns/libslirp0/passt are unused. buildah is deliberately NOT listed
  # (separate apt pkg, kept). Named removal (not a global autoremove) so nothing
  # unrelated is swept up; the list == the packages `apt autoremove -s` reports orphan
  # after an apt podman purge.
  ansible.builtin.apt:
    name:
      - podman
      - catatonit
      - conmon
      - slirp4netns
      - libslirp0
      - passt
    state: absent
    purge: true
  when:
    - podman_static_enabled | default(false) | bool
    - podman_apt_purge | default(false) | bool

- name: podman system prune cron job
  cron:
    name: "podman system prune"
    minute: "30"
    hour: "23"
    # Inline PATH so the job does NOT depend on the crontab-level PATH= env (which is
    # set by the separate `crontab` tag, NOT the `podman` tag) — otherwise a standalone
    # `--tags podman` run on a fresh pure-static host would schedule this with cron's
    # default PATH (/usr/bin:/bin), where /usr/local/bin/podman is invisible.
    job: "PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin podman system prune -af --volumes"
    disabled: "no"
