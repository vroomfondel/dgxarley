---
# file: roles/common/tasks/main.yml
- name: set hostname and /etc/hosts
  import_tasks: set_hostname.yml
  tags:
    - hostname

- name: install basic/helpfull packages, upgrade-full and autoremove
  import_tasks: installbasicpackages.yml
  tags:
    - installbasicpackages

- name: configure avahi appropriately
  import_tasks: config_avahi.yml
  tags:
    - avahi

- name: enable debug-shell
  systemd_service:
    daemon_reload: true
    name: debug-shell
    enabled: false

- name: disable and mask ModemManager (no modems on servers)
  systemd_service:
    name: ModemManager
    state: stopped
    enabled: false
    masked: true
  failed_when: false
  tags:
    - modemmanager
    - netplan

- name: set networkdwait var and installnetplan
  import_tasks: installnetplan.yml
  tags:
    - netplan
  when:
    - wantsnetplan is defined
    - wantsnetplan == true

- name: include fortune for motd.d
  tags:
    - fortune
  import_tasks: installfortunemotd.yml

- name: ssh config stuff
  tags:
    - sshconfig
  import_tasks: sshd_config.yml
  when:
    - inventory_hostname != "krennstor101"

- name: postfix
  tags: postfix
  import_tasks: postfix.yml
  when:
    - skip_common_postfix is not defined or not skip_common_postfix

- name: fail2ban
  tags:
    - fail2ban
  import_tasks: fail2ban.yml
  when:
    - skip_common_fail2ban is not defined or not skip_common_fail2ban

- name: copy necessary basic files
  tags:
    - iptables
  import_tasks: copyfiles.yml
  when:
    - inventory_hostname != "krennstor101"

- name: crontab
  tags:
    - crontab
  import_tasks: crontab.yml

- name: ensure sysstat is installed and configured
  tags: sysstat
  import_tasks: sysstat.yml

- name: deploy smartd monitoring config
  import_tasks: smartd.yml
  tags:
    - smartd

- name: ensure locale DE is there
  tags:
    - locale
  import_tasks: localestuff.yml

- name: ensure net.ipv4.ip_nonlocal_bind=1 in /etc/sysctl.conf
  lineinfile:
    dest: /etc/sysctl.conf
    line: "net.ipv4.ip_nonlocal_bind=1"
    regexp: '^#?\s*net\.ipv4\.ip_nonlocal_bind.*$'
    create: yes
  notify: sysctl reload
  tags:
    - sysctl
  when:
    - "'k3sserver' in group_names"

- name: raise inotify limits for K3s/containerd/systemd
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: true
    reload: true
  loop:
    - { key: fs.inotify.max_user_instances, value: "1024" }
    - { key: fs.inotify.max_user_watches, value: "524288" }
  tags:
    - sysctl
    - inotify

- name: enable IPv4 forwarding (gateway hosts)
  sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_set: true
    reload: true
  tags:
    - sysctl
    - ip_forward
  when:
    - wantsopenvswitch is defined
    - wantsopenvswitch

- name: ensure rp_filter=2 (loose) for policy-routed hosts
  sysctl:
    name: "{{ item }}"
    value: "2"
    sysctl_set: true
    reload: true
  loop:
    - net.ipv4.conf.all.rp_filter
    - net.ipv4.conf.default.rp_filter
  tags:
    - sysctl
    - netplan
  when: >-
    (fwmark_routing | default([]) | length > 0) or
    (ovs_vlan_extra is defined and (
      ovs_vlan_extra.values() | selectattr('routing_policy', 'defined') | list | length > 0 or
      ovs_vlan_extra.values() | selectattr('fwmark_routing', 'defined') | list | length > 0
    ))

- name: ensure rp_filter=2 (loose) for hosts without policy-routing (loose seems to be default for everything debian-based we have)
  sysctl:
    name: "{{ item }}"
    value: "2"
    sysctl_set: true
    reload: true
  loop:
    - net.ipv4.conf.all.rp_filter
    - net.ipv4.conf.default.rp_filter
  tags:
    - sysctl
    - netplan
  when: >-
    (fwmark_routing | default([]) | length == 0) and
    (ovs_vlan_extra is not defined or (
      ovs_vlan_extra.values() | selectattr('routing_policy', 'defined') | list | length == 0 and
      ovs_vlan_extra.values() | selectattr('fwmark_routing', 'defined') | list | length == 0
    ))

- name: disable USB autosuspend (GRUB + udev)
  tags:
    - usb_autosuspend
  import_tasks: usb_autosuspend.yml

- name: disable UAS for problematic USB-SATA bridges
  tags:
    - usb_storage_quirks
  import_tasks: usb_storage_quirks.yml

- name: install and configure podman
  import_tasks: installpodman.yml
  tags:
    - podman
  when:
    - wantspodman is defined
    - wantspodman == true

- name: blacklist simpledrm kernel module
  tags:
    - blacklist_simpledrm
  import_tasks: blacklist_simpledrm.yml

- name: prepare host for Rook/Ceph (kernel modules, lvm2)
  tags:
    - rookceph_host
  import_tasks: rookceph_host_prep.yml
  when:
    - wantsrookceph | default(false)

- name: disable armbian-ramlog on NVMe/HDD-rooted hosts
  tags:
    - armbian_ramlog
  import_tasks: armbian_ramlog.yml

- name: upgrade pkgs and autoremove
  tags:
    - upgradestuff
  import_tasks: upgradeallandautoremove.yml



