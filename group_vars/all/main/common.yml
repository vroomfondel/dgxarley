---
# Public dummy/example values — real values live in group_vars/all/vault/ (git-crypt).
ansible_ssh_user: root

fail2ban_recipient: "fail2ban@example.com"
fail2ban_ignoreips:
  - "192.168.123.0/16"

certmanager_letsencrypt_email: "admin@example.com"
smartd_mail_recipients: "root,admin@example.com"

# Postfix relay
postfix_relayhost: "[mail.example.com]"

# Geoblock/Allow
geoallow:
  - de
geoblock:
  - cn

localnets:
  - {cidr: "10.0.0.0/8", comment: "private-rfc1918"}
  - {cidr: "172.16.0.0/12", comment: "private-rfc1918"}
  - {cidr: "192.168.0.0/16", comment: "private-rfc1918"}
  - {cidr: "169.254.0.0/16", comment: "link-local"}

localnets_ipv6:
  - {cidr: "fe80::/10", comment: "link-local"}
# iptables
iptables_xosrc_ips: []
iptables_lifeline_ips: []
iptables_k3s_external_ips: []
iptables_static_dns_ips: []

# Clevis / Tang NBDE
clevis_tang_servers:
  - "http://tang.example.com"

# WiFi access points
wifi_access_points: []
# DynDNS hostname for ipset updates
dyndns_hostname: "dyn.example.com"

# HAProxy stats + Traefik dashboard
haproxy_stats_password: "changeme"
traefik_dashboard_password: "changeme"

# Podman: use the static mgoltzsche/podman-static bundle instead of apt podman.
# Only takes effect on hosts with `wantspodman: true` (the dgxsparks); k3smaster has
# no wantspodman, so installpodman.yml is skipped there regardless. When true, apt
# podman is skipped (buildah still from apt) and the version-pinned static stack is
# installed under /usr/local. Bump target: roles/common/defaults/main.yml.
podman_static_enabled: true
