---
# Public dummy/example values — real values live in group_vars/all/vault/ (git-crypt).
# Matrix (Synapse homeserver + Cinny web client) — dummy values; real secrets and
# the real base_domain (kikube.eu) live in group_vars/all/vault/matrix.yml.
# hash_behaviour=replace: vault.yml's `matrix:` overrides this entirely, so the
# operational keys are duplicated. Keep in sync with vault.yml and
# roles/k8s_infra/defaults/main/matrix.yml.
# The DB password is postgresql_synapse_password (in group_vars/all/{main,vault}/postgresql.yml).
# *_secret / jwt_secret: generate with `openssl rand -hex 32`; keep stable across
# restarts. Enable/teardown gates (matrix_enabled / matrix_teardown) are in the
# role defaults. matrix_enabled is the master switch: the per-client gates below
# (matrix_cinny_* / matrix_element_*) only take effect while it is true.
matrix:
  namespace: "matrix"
  base_domain: "example.eu"
  data_base: "/mnt/nfs/matrix-synapse"
  time_zone: "Europe/Berlin"
  manage_dns: true
  # Optional per-matrix nsupdate overrides (own DNS server / TSIG for the kikube.eu
  # zone). Any omitted key falls back to the cluster-wide nsupdate_* var. Real
  # values (esp. tsig_key_secret) go in vault. Example shape:
  #   dns:
  #     server: "203.0.113.53"
  #     zone: "kikube.eu"
  #     tsig_key_name: "kikube-key"
  #     tsig_key_secret: "BASE64_TSIG_SECRET"
  #     tsig_algorithm: "hmac-sha256"
  #     ttl: 3600
  #     ingress_ip: "203.0.113.10"
  dns: {}
  enable_registration: false
  enable_token_authenticator: true
  trusted_proxies: "10.68.0.0/16,10.69.0.0/16"
  registration_shared_secret: "CHANGEME_REGISTRATION_SHARED_SECRET"
  macaroon_secret_key: "CHANGEME_MACAROON_SECRET"
  form_secret: "CHANGEME_FORM_SECRET"
  jwt_secret: "CHANGEME_JWT_SECRET"
  admin:
    username: "admin"
    password: "changeme"
  # Mail via the node-local postfix — see the long comment in
  # roles/k8s_infra/defaults/main/matrix.yml for why smtp_host is a placeholder.
  email:
    enabled: false
    smtp_host: "__NODE_IP__"
    smtp_port: 25
    notif_from: "Matrix <matrix@matrix.example.eu>"
    app_name: "Matrix"
    # Missed-message mails only — password reset works without it. Explicit
    # rather than inherited; the two notif_* only bite while this is true.
    enable_notifs: false
    notif_for_new_users: true
    notif_delay_before_mail: "10m"
    # --- Auth / TLS — unset: the node-local postfix authorises by source IP and
    # the hop never leaves the host. Uncomment HERE AND IN VAULT (the vault dict
    # replaces this one wholesale) when smtp_host points at a real relay:
    #
    # smtp_user: "matrix@example.eu"
    # smtp_pass: "CHANGEME"
    # force_tls: false                 # true -> implicit TLS, smtp_port 465
    # require_transport_security: true # refuse plaintext (STARTTLS on 587)
    # enable_tls: true                 # false -> never attempt STARTTLS
    # tlsname: "mail.example.eu"       # cert hostname, if != smtp_host
  # Regular human accounts, created directly at deploy (register_new_matrix_user
  # --no-admin). Examples — real accounts + passwords go in vault (git-crypt).
  # `email` is OPTIONAL: register_new_matrix_user cannot set third-party IDs, so
  # it is applied afterwards via the admin API (see the 3PID task in matrix.yml).
  # Omit it and the account is left untouched. NOTE there is no SMTP config on this
  # homeserver, so an address buys login-by-email and directory lookup, but NOT
  # password reset or notification mails — those need an `email:` section too.
  users:
    - {user: "alice", password: "changeme", email: "alice@example.eu"}
    - {user: "bob", password: "changeme"}
  # Bot accounts — TECHNICALLY IDENTICAL to `users` (same register --no-admin
  # flow); the split is purely naming (humans vs. automated clients). The jwt
  # module is server-wide, so any account can token-login — nothing exclusive here.
  bot_users:
    - {user: "hermes-bot", password: "changeme"}
  images:
    synapse: {repo: "matrixdotorg/synapse", tag: "latest"}
    cinny: {repo: "ghcr.io/cinnyapp/cinny", tag: "latest"}
    # GHCR half of the official element-web release (same manifest as Docker Hub
    # vectorim/element-web), multi-arch, nginx-unprivileged base.
    element: {repo: "ghcr.io/element-hq/element-web", tag: "latest"}
  resources:
    synapse: {cpu_request: "500m", memory_request: "1Gi", cpu_limit: "2000m", memory_limit: "2Gi"}
    cinny: {cpu_request: "50m", memory_request: "64Mi", cpu_limit: "500m", memory_limit: "256Mi"}
    element: {cpu_request: "50m", memory_request: "64Mi", cpu_limit: "500m", memory_limit: "256Mi"}


# Standalone scalars (outside the hash_behaviour=replace `matrix` dict, so they
# need no vault copy). Values shown are the role defaults; the per-client gates
# behave like every other *_enabled/*_teardown pair (enabled: false skips the
# install and deletes nothing, teardown: true is the opt-in removal) and are
# SUBORDINATE to matrix_enabled — with the stack off, the two _enabled flags do
# nothing at all, only the teardowns still run.
# matrix_tls_issuer: "letsencrypt-secondary"
# matrix_cinny_enabled: true
# matrix_cinny_teardown: false
# matrix_element_enabled: true
# matrix_element_teardown: false
#
# Element's two group-call paths, both on Element-hosted services by default.
# An unset knob emits no config.json key at all, so upstream's default applies.
# matrix_element_jitsi_domain: ""          # "" = meet.element.io; else e.g. "jitsi.example.eu"
# matrix_element_jitsi_skip_welcome: false # true = skip Element's "Join Conference" screen
# matrix_element_call_enabled: true        # false = element_call.disable, kills native Element Call