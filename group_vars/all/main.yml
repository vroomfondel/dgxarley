# === Nous Hermes Agent (per-user deployments) — SCHEMA REFERENCE ===
# Public schema documentation. Real entries live in group_vars/all/vault.yml
# (git-crypted) and override this list entirely. Default is `[]` from
# roles/k8s_dgx/defaults/main.yml — this dummy is purely illustrative.
# `enabled: false` on every entry keeps it inert even if vault.yml is missing.
#
# Per-user gates (independent):
#   dashboard_enabled  → official `hermes dashboard` pod  (<u>.hermes-dashboard.<dns>)
#   dashboard_tui      → adds embedded chat tab to the dashboard
#   webui_enabled      → ghcr.io/nesquena/hermes-webui pod (<u>.hermes.<dns>)
#   email.enabled      → `hermes gateway run` sidecar inside the webui pod
#                        (implies webui_enabled; reads EMAIL_* from /opt/data/.env)
hermes_users:
  - username: example
    uid: 1500
    gid: 1500
    litellm_token: "sk-REPLACE-WITH-PER-USER-LITELLM-VIRTUAL-KEY"
    litellm_model: ""                  # empty → falls back to hermes_default_model
    basicauth_password: "changeme"     # defaults to litellm_token if unset
    webui_password: "changeme"         # defaults to basicauth_password if unset
    dashboard_enabled: false
    dashboard_tui: false
    webui_enabled: true
    hermes_debug: false                # true → logging.level=DEBUG in config.yaml
    email:                             # omit block or set enabled:false to skip
      enabled: false
      address: "hermes-example@example.com"
      password: "imap-app-password"    # Gmail/Outlook: app password, NOT account password
      imap_host: "imap.example.com"
      smtp_host: "smtp.example.com"
      imap_port: 993                   # default 993  (IMAP SSL)
      smtp_port: 587                   # default 587  (SMTP STARTTLS)
      poll_interval: 15                # default 15s between IMAP polls
      home_address: "owner@example.com"  # fallback recipient for autonomous tasks
      allow_all_users: false           # true → ignore allowed_users
      allowed_users:                   # sender whitelist
        - "owner@example.com"
      skip_attachments: false          # true → strip attachments before LLM
      # Folder-lifecycle knobs (local patch over upstream gateway/platforms/email.py).
      # All rendered into config.yaml (platforms.email.extra.*), NOT .env — mirror
      # upstream PR #28702. Empty string "" opts out of the respective stage.
      working_folder: "Hermes_Working" # INBOX→Working at fetch; "" → skip, INBOX→Done directly
      done_folder: "Hermes_Done"       # final destination after handle_message(); "" → no moves at all (Working skipped too)
      sent_folder: "Sent"              # IMAP APPEND target for outbound replies; "" → SMTP-only. Rendered into config.yaml (platforms.email.extra.sent_folder), not .env — mirrors upstream PR #28697
      process_existing: true           # true (default) → process pre-existing UNSEEN INBOX backlog on start. Rendered into config.yaml (platforms.email.extra.process_existing), not .env — mirrors upstream PR #28699
      cpu_limit: "500m"                # sidecar caps; defaults 500m / 512Mi
      memory_limit: "512Mi"
    # Ops-managed overrides for the webui Preferences panel. Merged into
    # /opt/data/.webui/settings.json on every pod start — the keys listed
    # here ALWAYS win, any other keys the user has set via the UI
    # (POST /api/settings) are preserved untouched. Mirrors the
    # config.yaml/.env merge pattern. Upstream defaults live in
    # nesquena/hermes-webui at api/config.py:_SETTINGS_DEFAULTS — only
    # list keys here that you actually want to lock to a specific value.
    # Omit the key or set to {} to leave settings.json entirely up to the user.
    webui_settings:
      simplified_tool_calling: true    # "Compact tool activity"        (upstream: true)
      api_redact_enabled: true         # "Redact sensitive data"        (upstream: true)
      sidebar_density: "compact"       # "Sidebar density"              (upstream: "compact") — "detailed"|"compact"|"minimal"
      auto_title_refresh_every: "0"    # "Adaptive title refresh"       (upstream: "0" = Off)
      busy_input_mode: "queue"         # "Busy input mode"              (upstream: "queue") — "queue"|"interrupt"|"steer"
      show_cli_sessions: false         # "Show non-WebUI sessions"      (upstream: false) — set true to see Email/CLI sessions
      sync_to_insights: false          # "Sync to insights"             (upstream: false)
      check_for_updates: true          # "Check for updates"            (upstream: true)
      whats_new_summary_enabled: false # "Summarize What's New with AI" (upstream: false)
    enabled: false

# ============================================================================
# Cluster-wide service coordinates (shared between the k8s_dgx and k8s_infra
# roles)
# ----------------------------------------------------------------------------
# These namespaces / ports / model selectors are referenced by BOTH the
# inference layer (k8s_dgx: sglang, vllm, ollama, litellm, docling) AND the
# app/infra layer (k8s_infra: openwebui, pipelines, searxng, honcho, hindsight,
# hermes). Since k8s_dgx.yml and k8s_infra.yml are SEPARATE playbook runs, role
# defaults do NOT cross over — so the shared coordinates live here in
# group_vars/all where both roles resolve them. (traefik_internal_allowlist is
# defined further up; default_sglang_image / sglang_nnodes stay in
# roles/k8s_dgx/defaults as they're only used by the inference layer.)
# ============================================================================

# --- SGLang coordinates ---
