# sglang_model: "google/diffusiongemma-26B-A4B-it"              # 26B/3.8B MoE BF16, DISCRETE-DIFFUSION (dLLM Gemma4Renoise) — NVFP4 isolation smoke-test, pins 0.5.14-gemmadiffusion image
