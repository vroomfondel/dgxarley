---
ansible_ssh_user: root

fail2ban_recipient: "fail2ban@example.com"
fail2ban_ignoreips:
  - "192.168.123.0/16"

certmanager_letsencrypt_email: "admin@example.com"
smartd_mail_recipients: "root,admin@example.com"

# Postfix relay
postfix_relayhost: "[mail.example.com]"

# Geoblock/Allow
geoallow:
  - de
geoblock:
  - cn

localnets:
  - { cidr: "10.0.0.0/8", comment: "private-rfc1918" }
  - { cidr: "172.16.0.0/12", comment: "private-rfc1918" }
  - { cidr: "192.168.0.0/16", comment: "private-rfc1918" }
  - { cidr: "169.254.0.0/16", comment: "link-local" }

localnets_ipv6:
  - { cidr: "fe80::/10", comment: "link-local" }

# OpenWebUI
openwebui_secret_key: "CHANGEME_SECRET_KEY"
openwebui_admin_email: "admin@example.com"
openwebui_admin_password: "changeme"

# HuggingFace
hf_token: "hf_CHANGEME"

# nsupdate / DNS
nsupdate_server: "198.51.100.1"
nsupdate_zone: "example.com"
nsupdate_tsig_key_name: "dgx.example.com"
nsupdate_tsig_key_secret: "CHANGEME_BASE64_TSIG_KEY"
nsupdate_tsig_algorithm: "hmac-sha256"
nsupdate_ttl: 3600
nsupdate_ingress_ip: "192.168.124.100"

# QSFP IPs for NCCL bootstrap
qsfp_ip_spark1: "10.10.10.101"
qsfp_ip_spark2: "10.10.10.102"
qsfp_ip_spark3: "10.10.10.103"
qsfp_ip_spark4: "10.10.10.104"


# SR-IOV: create Virtual Functions on the QSFP PF used by Multus.
# Used by both dgx_prepare (creates VFs on hosts) and k8s_dgx (selects NADs).
qsfp_sriov_enabled: true
# VF interface name prefix (kernel drops "npN" from VF names: enp1s0f0np0 → enp1s0f0vX)
qsfp_sriov_vf_prefix: "enp1s0f0"

# SR-IOV VF assignments per deployment.
# Each deployment gets its own VF index + dedicated IPs per spark node.
# This allows multiple engines to run on different VFs simultaneously.
# vf: which VF index (maps to NAD qsfp-vfN and interface <prefix>vN)
# head_ip: QSFP IP for the head pod (rank 0, spark1)
# worker_ip1..N: QSFP IPs for worker pods (rank 1..N, spark2..N+1)
qsfp_sriov_assignments:
  sglang:
    vf: 0
    head_ip: "10.10.10.201"
    worker_ip1: "10.10.10.202"
    worker_ip2: "10.10.10.203"
    worker_ip3: "10.10.10.204"
  vllm:
    vf: 1
    head_ip: "10.10.10.205"
    worker_ip1: "10.10.10.206"
    worker_ip2: "10.10.10.207"
    worker_ip3: "10.10.10.208"
  sglang_shard:
    vf: 2
    head_ip: "10.10.10.209"
    worker_ip1: "10.10.10.210"
    worker_ip2: "10.10.10.211"
    worker_ip3: "10.10.10.212"
  vllm_shard:
    vf: 3
    head_ip: "10.10.10.213"
    worker_ip1: "10.10.10.214"
    worker_ip2: "10.10.10.215"
    worker_ip3: "10.10.10.216"
  iperf_test:
    vf: 7
    server_ip: "10.10.10.241"
    client_ip: "10.10.10.242"

# PostgreSQL
postgresql_postgres_password: "changeme"
postgresql_openwebui_password: "changeme"

# Grafana
grafana_admin_password: "changeme"
grafana_root_url: "https://grafana.example.com"

# Keel
keel_basic_auth_password: "changeme"
keel_gotify_token: "CHANGEME_GOTIFY_TOKEN"
keel_gotify_url: "https://gotify.example.com"

# Alertmanager
alertmanager_smtp_smarthost: "mail.example.com:25"
alertmanager_smtp_mailfrom: "alertmanager@example.com"
alertmanager_alert_email: "admin@example.com"
alertmanager_gotify_token: "CHANGEME_GOTIFY_TOKEN"
alertmanager_gotify_url: "https://gotify.example.com"

# iptables
iptables_xosrc_ips: []
iptables_lifeline_ips: []
iptables_k3s_external_ips: []
iptables_static_dns_ips: []

# Clevis / Tang NBDE
clevis_tang_servers:
  - "http://tang.example.com"

# WiFi access points
wifi_access_points: []

# NUT UPS
nut_ups_name: "greencell"
nut_ups_secondary_name: "greencell2"
nut_admin_password: "changeme"
nut_monitor_password: "changeme"


# DynDNS hostname for ipset updates
dyndns_hostname: "dyn.example.com"

# HAProxy stats + Traefik dashboard
haproxy_stats_password: "changeme"
traefik_dashboard_password: "changeme"

# Traefik IP-Allowlist for internal services (k8s_infra + k8s_dgx)
traefik_internal_allowlist:
  - "192.168.123.0/24"
  - "192.168.124.0/24"

# NUT exporter (k8s_infra)
nut_exporter_server: "192.168.124.100"
nut_exporter_password: "changeme"
