# --- LiteLLM coordinates ---
litellm_namespace: "litellm"
litellm_port: 4000
# Stable LiteLLM alias for Hermes (and any other client that needs a session-
# durable model name). Routes to whatever SGLang currently serves.
litellm_hermes_alias_model: "hermes-default"

# === Vision model — MASTER SWITCH =========================================
# enable_vision_model toggles the WHOLE Qwen3-VL vision companion in one place:
#   true  → the sglang-vision SGLang instance is deployed (sglang_instances, see
#           roles/k8s_dgx/defaults/main.yml) AND LiteLLM exposes the
#           `vision-default` alias for it.
#   false → the instance is dropped from the deploy loop, the LiteLLM alias is
#           removed, AND a `--tags sglang` run TEARS DOWN the already-running
#           vision pods/Service (teardown block in roles/k8s_dgx/tasks/sglang.yml).
#
# HOWTO disable (or re-enable) the vision model — that's all you do:
#   1. set  enable_vision_model: false   (here)   [true to re-enable]
#   2. ansible-playbook k8s_dgx.yml --tags sglang,litellm
#        --tags sglang  → removes the sglang-vision Deployments + Service (or
#                         redeploys them when re-enabling)
#        --tags litellm → re-renders LiteLLM without (or with) the vision alias
#   The vision series also disappears from the Grafana SGLang panel once
#   Prometheus's ~5 min staleness window passes.
enable_vision_model: true

# === Coder model — MASTER SWITCH (default OFF) ============================
# enable_coder_model is the exact analogue of enable_vision_model for the local
# Qwen3-Coder-Next companion (sglang-coder instance, see roles/k8s_dgx/defaults/
# main.yml). DEFAULT false — the instance is UNVALIDATED and memory-tight
# (co-locates with the Nemotron default on all 4 sparks; needs SR-IOV + timeslice
# + freeing the default's memory). Read the TUNE notes by _sglang_coder_instance
# before flipping it true.
#   true  → sglang-coder is deployed AND LiteLLM exposes the `coder-default` alias.
#   false → dropped from the deploy loop, alias removed, and a `--tags sglang` run
#           TEARS DOWN any running sglang-coder resources.
# HOWTO (same as vision): set the flag, then
#   ansible-playbook k8s_dgx.yml --tags sglang,litellm
enable_coder_model: false

# === Embedding model — MASTER SWITCH (default OFF) =======================
# enable_embedding_model is the analogue of enable_vision_model/enable_coder_model
# for the EMBEDDING companion (sglang-embed instance, ALWAYS single-node tp=1 on
# spark2; see _sglang_embed_instance in roles/k8s_dgx/defaults/main.yml). It
# REPLACES the standalone Ollama embedding deployment (tasks/ollama_embed.yml).
# DEFAULT false until the embed instance is deployed AND verified — flipping it
# true only stands up sglang-embed; the consumers (LiteLLM/honcho/hindsight) are
# rewired to it in a SEPARATE step (see the cutover plan), so do NOT rewire them
# before sglang-embed is Ready or in-cluster embeddings break.
#   true  → sglang-embed is deployed (chroma-core/Qwen3-Embedding-4B-FP8-Dynamic, --is-embedding).
#   false → dropped from the deploy loop, and a `--tags sglang` run TEARS DOWN
#           any running sglang-embed resources.
# HOWTO: set the flag, then  ansible-playbook k8s_dgx.yml --tags sglang
enable_embedding_model: false

# === Ollama embedding — legacy deploy switch (default ON) =================
# enable_ollama_embed gates the STANDALONE Ollama embedding deployment
# (roles/k8s_dgx/tasks/ollama_embed.yml) that the sglang-embed instance
# (enable_embedding_model above) is set to REPLACE. Deliberately INDEPENDENT of
# enable_embedding_model so both run in parallel during the cutover — ollama-embed
# must stay up while consumers still point at it. Cutover order:
#   1. enable_embedding_model: true  → deploy + verify sglang-embed
#   2. rewire the consumers (LiteLLM fragment, honcho/hindsight/OpenWebUI URLs)
#   3. enable_ollama_embed: false, then
#        ansible-playbook k8s_dgx.yml --tags ollama_embed
#      → TEARS DOWN the running ollama-embed resources (Deployment/Service/
#        ConfigMaps/IngressRoutes/cert/DNS record) via ollama_embed_teardown.yml.
#        The ollama Namespace, ollama-tls-haproxy-config and the shared
#        Middlewares stay (also owned by tasks/ollama.yml); the model cache
#        hostPath /var/lib/ollama-embed-data on spark2 stays too (manual cleanup).
enable_ollama_embed: true

# Switch for the vision alias when enable_vision_model is false:
#   false (default) → the `vision-default` alias is DROPPED entirely; a request
#                     for it 404s, and Hermes renders no auxiliary.vision slot.
#   true            → keep `vision-default` ALIVE, pointed at the base model
#                     (sglang_served_model_name). Enable this ONLY when the base
#                     model is itself vision-capable (multimodal) — turning it on
#                     is a statement that image requests route fine to the base.
#                     It ALSO wires Hermes' auxiliary.vision slot at the same alias
#                     (roles/k8s_infra/defaults/main.yml vision_model), so image
#                     tasks go to the base too. If the base is text-only, image
#                     payloads degrade (ignored / error) — then leave this false.
# Has NO effect when enable_vision_model is true (alias → real VL group as usual).
litellm_vision_alias_fallback_to_base: false

# Qwen3-VL vision companion (sglang-vision instance), wired EXACTLY like
# hermes-default: the backend is registered in model_list under its REAL served
# name (litellm_vision_model) and litellm_vision_alias_model is a router
# model_group_alias onto it (see litellm_router_settings).
# The alias NAME exists when vision is enabled OR the fallback switch is on; its
# TARGET (litellm_vision_alias_target) is the real VL group when enabled, else the
# base text group (fallback). With both off, the name is "" → router omits it.
litellm_vision_alias_model: "{{ 'vision-default' if ((enable_vision_model | default(true)) or (litellm_vision_alias_fallback_to_base | default(false))) else '' }}"
litellm_vision_model: "Qwen/Qwen3-VL-8B-Instruct-FP8"   # == served_model_name of the sglang-vision instance
litellm_vision_alias_target: "{{ litellm_vision_model if (enable_vision_model | default(true)) else sglang_served_model_name }}"
# Qwen3-Coder-Next companion (sglang-coder instance), wired the same way, gated on
# enable_coder_model. litellm_coder_model == its served_model_name (the model id).
litellm_coder_alias_model: "{{ 'coder-default' if (enable_coder_model | default(false)) else '' }}"
litellm_coder_model: "RedHatAI/Qwen3-Coder-Next-NVFP4"   # == served_model_name of the sglang-coder instance
# Embedding companion (sglang-embed instance), wired the same way, gated on
# enable_embedding_model. litellm_embed_model == its served_model_name (the model
# id). `embed-default` is a STABLE alias so honcho/hindsight/OpenWebUI keep
# resolving embeddings across an embed-model swap (same benefit as hermes-default).
litellm_embed_alias_model: "{{ 'embed-default' if (enable_embedding_model | default(false)) else '' }}"
litellm_embed_model: "chroma-core/Qwen3-Embedding-4B-FP8-Dynamic"   # == served_model_name of the sglang-embed instance (FP8 quant)
# litellm_model_list_append / _exclude below are PUBLIC DUMMY values. The REAL
# ones live in group_vars/all/vault.yml (its cloud entry carries a secret
# api_key); vault.yml loads AFTER main.yml so it OVERRIDES these — the standard
# public-dummy / vault-real pattern used throughout this repo. Because lists
# REPLACE (never merge), the real vault `litellm_model_list_append` assembles
# BOTH fragments in one definition (its cloud fragment + the vision fragment
# below). Keep exactly ONE `litellm_model_list_append:` PER FILE — the only
# sanctioned duplicate is this main↔vault dummy/real pair, never two in the same
# group_vars dir. _litellm_vision_model_list is NOT a dummy: it's the actual
# (non-secret) vision fragment, referenced by name from both this dummy and the
# vault combine (gated to [] when enable_vision_model is false).
_litellm_vision_model_list:
  - model_name: "{{ litellm_vision_model }}"
    litellm_params:
      model: "openai/{{ litellm_vision_model }}"
      api_base: "http://sglang-vision.{{ sglang_namespace }}.svc.cluster.local:{{ sglang_port }}/v1"
      api_key: "none"
      input_cost_per_token: "{{ litellm_default_input_cost_per_token }}"
      output_cost_per_token: "{{ litellm_default_output_cost_per_token }}"

# Coder fragment — same shape, points at the in-cluster sglang-coder Service.
# Also non-secret; referenced by name from both the dummy below and the vault
# combine (gated to [] when enable_coder_model is false).
_litellm_coder_model_list:
  - model_name: "{{ litellm_coder_model }}"
    litellm_params:
      model: "openai/{{ litellm_coder_model }}"
      api_base: "http://sglang-coder.{{ sglang_namespace }}.svc.cluster.local:{{ sglang_port }}/v1"
      api_key: "none"
      input_cost_per_token: "{{ litellm_default_input_cost_per_token }}"
      output_cost_per_token: "{{ litellm_default_output_cost_per_token }}"

# Embedding fragment — same shape, points at the in-cluster sglang-embed Service
# (openai/ provider → /v1/embeddings; NO ollama/ TLS singleton needed). Non-secret;
# referenced by name from both the dummy below and the vault combine (gated to []
# when enable_embedding_model is false). model_name == the sglang-embed served name.
_litellm_embed_model_list:
  - model_name: "{{ litellm_embed_model }}"
    litellm_params:
      model: "openai/{{ litellm_embed_model }}"
      api_base: "http://sglang-embed.{{ sglang_namespace }}.svc.cluster.local:{{ sglang_port }}/v1"
      api_key: "none"
      input_cost_per_token: "{{ litellm_default_input_cost_per_token }}"
      output_cost_per_token: "{{ litellm_default_output_cost_per_token }}"

# Dummy: vision + coder + embed (the non-secret subset). Real vault value = cloud +
# the same three gated fragments.
litellm_model_list_append: >-
  {{ (_litellm_vision_model_list if (enable_vision_model | default(true)) else [])
     + (_litellm_coder_model_list if (enable_coder_model | default(false)) else [])
     + (_litellm_embed_model_list if (enable_embedding_model | default(false)) else []) }}
# Dummy: exclude nothing. Real vault value drops the local ollama chat model.
litellm_model_list_exclude: []

# --- Ollama embedding coordinates ---
ollama_port: 11434
# Active ollama embedding model — parameters pulled from ollama_embed_model_profiles
#ollama_embed_model: "bge-m3"
ollama_embed_model: "qwen3-embedding:4b-q8_0"
# Ollama embedding model profiles
ollama_embed_model_profiles:
  "qwen3-embedding:4b-q8_0":
    info_url: "https://ollama.com/library/qwen3-embedding"
    # Qwen3-Embedding-4B q8_0 (~4.3 GB). Native 2560-dim (set
    # honcho_embedding_dimensions: 2560 to match), Qwen3 decoder w/ last-token
    # pooling, multilingual + code, up to 32K context. q8_0 ≈ fp16 quality for
    # embeddings at ~half the VRAM. NOTE :latest = 8B (4096-dim) — always pin
    # the explicit tag here. 0.6b alternative: "qwen3-embedding:0.6b-fp16" (1024-dim).
    context_length: 32768
  # Previous default — BAAI BGE-M3 multilingual embedding (~1.2 GB), 1024-dim,
  # XLM-RoBERTa. Kept as a fallback profile; switch ollama_embed_model back to
  # "bge-m3" to restore. (Note: bge-m3 hits sglang#7590 on Blackwell, but works
  # fine under Ollama.)
  "bge-m3":
    info_url: "https://ollama.com/library/bge-m3"
    context_length: 8192
ollama_embedding_model: "{{ ollama_embed_model }}"
ollama_embedding_model_max_ctx: "{{ ollama_embed_model_profiles[ollama_embed_model].context_length }}"

# --- Docling coordinate ---
docling_port: 5001

# --- JuiceFS shared storage (cross-role knobs) ------------------------------
# Authoritative home for the JuiceFS vars that MUST be visible outside the
# juicefs_storage role: the `common` role's iptables template reads the topology
# knobs to open the metadata/object ports for a QSFP-less master mount, and
# k8s_dgx derives hf_cache_juicefs_root from the mount path (so the HF-cache
# hostPath and the FUSE mountpoint can never drift). All other juicefs_* knobs
# stay in roles/juicefs_storage/defaults/main.yml.
#
# Master switch for the whole JuiceFS layer — DUMMY default; the REAL value
# lives in group_vars/all/vault.yml (loads after main.yml → overrides this).
# While false: storage.yml skips the juicefs_storage role, and the monitoring
# stack below stays fully dark (every consumer gates on juicefs_enabled AND
# juicefs_metrics_enabled) — Prometheus never scrapes, the down-alerts never
# fire, no ports open for a not-yet-deployed filesystem. Enable order:
# storage.yml → common.yml --tags iptables → k8s_infra.yml --tags prometheus,grafana.
juicefs_enabled: false
# inventory_hostname of the node holding the USB-SSD (runs Valkey + RustFS).
juicefs_storage_node: spark1
# Host mountpoint of the shared FS on every mount node. Promoted here (not a
# juicefs_storage default) so k8s_dgx's connection:local play can reference it
# for the HF-cache hostPath — role defaults are out of scope in a foreign play.
juicefs_mount_path: /mnt/jfs
# Also mount JuiceFS on the QSFP-less k3s master. OFF by default. When true, the
# master reaches the backend over the mgmt/k3s VLAN, so the storage node's
# firewall additionally opens Valkey(6379)+RustFS(9000) from k3snodes (see
# roles/common/templates/iptables.sh.j2), Valkey is dual-homed, and the master's
# storage address resolves to the mgmt IP. Full detail: JUICEFS_MIGRATION_HOWTO.md.
juicefs_mount_master: false
# Inventory group whose hosts get the JuiceFS mount. Promoted here (was a
# juicefs_storage default) because common's iptables template and k8s_infra's
# Prometheus scrape loop iterate over it too — role defaults are out of scope
# in a foreign play.
juicefs_mount_group: dgxsparks

# Prometheus metrics for the JuiceFS stack. Pre-enabled, but every consumer
# couples it to the master switch (juicefs_enabled AND juicefs_metrics_enabled),
# so nothing scrapes/alerts/opens ports until the layer is actually deployed.
# ONE switch, three effects:
#   1. juicefs_storage: adds `--metrics <k3s_node_ip>:<port>` to every FUSE
#      mount unit (restarts the mount once!) and installs the apt
#      prometheus-redis-exporter next to Valkey on the storage node;
#   2. common (iptables): opens the two metrics ports from k3snodes on the
#      affected hosts (in-cluster Prometheus egress is SNAT'd to its node IP);
#   3. k8s_infra: adds the `juicefs` / `juicefs-valkey` scrape jobs + alert
#      rules (prometheus.yml) and provisions the Grafana dashboards
#      (JuiceFS 20794, Valkey/redis_exporter 763) via download-dashboards.sh.
# Rollout after flipping: storage.yml → common.yml --tags iptables →
# k8s_infra.yml --tags prometheus,grafana.
# NOTE: RustFS has NO native /metrics endpoint (OTel push only, rustfs#3154
# still open as of 2026-07) — object-store health is monitored from the CLIENT
# side via the juicefs_object_request_* panels and the JuiceFSObjectErrors alert.
juicefs_metrics_enabled: true
juicefs_metrics_port: 9567          # juicefs mount --metrics (every mount node)
juicefs_valkey_exporter_port: 9121  # prometheus-redis-exporter (storage node only)
