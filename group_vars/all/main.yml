postgresql_honcho_password: "changeme"
postgresql_hindsight_password: "changeme"
postgresql_forgejo_password: "changeme"

# Honcho (AI memory backend) — dummy values; override the real ones in
# group_vars/all/vault.yml. honcho_jwt_secret signs the API's bearer JWTs
# (AUTH_USE_AUTH=true); generate with `python scripts/generate_jwt_secret.py`
# in the honcho repo, or any long random string. Changing it invalidates all
# issued tokens. The LiteLLM key Honcho uses is litellm_master_key (above).
honcho_jwt_secret: "changeme-honcho-jwt-secret"

# Honcho per-feature LLM API keys — dummy values; real ones in
# group_vars/all/vault.yml. Each Honcho feature picks up its OWN key via
# `api_key_env` in config.toml (see roles/k8s_dgx/tasks/honcho.yml), so you can
# point e.g. dream at a different provider/key than deriver. Currently every
# feature routes through LiteLLM, so the real values all = litellm_master_key.
# (The embedding key is set for completeness; ollama-embed ignores it.)
honcho_deriver_api_key: "sk-changeme"
honcho_dialectic_api_key: "sk-changeme"
honcho_summary_api_key: "sk-changeme"
honcho_dream_api_key: "sk-changeme"
honcho_embedding_api_key: "sk-changeme"

# Hindsight (agent memory backend) — dummy values; real ones in
# group_vars/all/vault.yml. Auth uses our own KeyMapTenantExtension (no Supabase):
#   hindsight_tenant_keymap  — the SINGLE source of truth: map of bearer key ->
#                              tenant name; each tenant gets its own Postgres
#                              schema. Add real keys (long random strings) here in
#                              vault. Keys are NOT templated — write literal
#                              strings. Unmapped keys are rejected (no fallback).
#   hindsight_cp_tenant      — (optional, non-secret) which tenant the control-
#                              plane UI browses; must be a tenant NAME from the
#                              keymap. Empty → UI has no API access (see defaults).
#   hindsight_llm_api_key    — upstream text-gen key (= LiteLLM master key here).
#   hindsight_embeddings_api_key — sent to ollama-embed, which ignores it.
hindsight_tenant_keymap:
  "changeme-hindsight-key": "admin"
hindsight_llm_api_key: "sk-changeme"
hindsight_embeddings_api_key: "sk-changeme"

# LiteLLM
litellm_master_key: "sk-changeme"
# LiteLLM built-in Prometheus exporter (/metrics on the proxy port). Gated,
# default ON. Renders `callbacks: ["prometheus"]` into litellm_settings. No
# enterprise license needed (proxy_server.py mounts /metrics unconditionally on
# the prometheus callback). Metrics carry model/key/team/deployment labels (e.g.
# per-backend success + latency for the hermes-default alias). Single uvicorn
# worker, so no PROMETHEUS_MULTIPROC_DIR needed. In group_vars/all so k8s_infra's
# prometheus.yml can see it for the auth-gated scrape job below.
litellm_enable_metrics: true
# Gate /metrics behind auth. LiteLLM's own default is require_auth=TRUE (verified
# in litellm/__init__.py: require_auth_for_metrics_endpoint=True), so an open
# annotation scrape would 401. We default this to FALSE (open) so the
# kubernetes-pods annotation scrape works out of the box — /metrics stays behind
# the litellm-ip-allowlist externally, open in-cluster (same posture as SGLang).
#   false → require_auth_for_metrics_endpoint: false + annotation scrape.
#   true  → keep LiteLLM auth on; annotation scrape is dropped and Prometheus
#           authenticates with litellm_master_key via a dedicated scrape_config
#           (prometheus.yml). NOTE: any valid LiteLLM key can read /metrics — not
#           scoped (issue #13644); prefer a dedicated virtual key in production.
litellm_metrics_require_auth: false
litellm_salt_key: "changeme-salt-key"
litellm_ui_username: "admin"
litellm_ui_password: "changeme"

# LiteLLM virtual keys — metadata only. Actual sk-... tokens are generated at
# runtime by the /key/generate API and persisted as K8s Secrets
# litellm-vkey-<alias>. Consumer roles read these Secrets directly; nothing
# sensitive leaks into git.
litellm_virtual_keys:
  - key_alias: "openwebui-chat"
    user_id: "openwebui-chat"
    max_budget:
    budget_duration: "30d"
    tpm_limit: 0
    rpm_limit: 0
    models: []
  - key_alias: "openwebui-embedding"
    user_id: "openwebui-embedding"
    max_budget:
    budget_duration: "30d"
    tpm_limit: 0
    rpm_limit: 0
    models: ["{{ ollama_embedding_model }}"]

# Grafana
grafana_admin_password: "changeme"
grafana_root_url: "https://grafana.example.com"

# Seafile (CE) — full operational config. With hash_behaviour=replace (Ansible
# default), vault.yml's `seafile:` REPLACES this whole block — so vault.yml
# must carry the operational keys too. Same pattern as
# qsfp_sriov_assignments / nut_ups_shutdown_map.
# DB has its own root + per-app user; admin login is auto-bootstrapped on
# first start of the seafile-server pod via INIT_SEAFILE_ADMIN_* env vars.
seafile:
  data_base: "/mnt/nfs/seafile-data"
  mariadb_data_base: "/var/lib/k8s-data/seafile-mariadb"
  namespace: "seafile"
  hostname: "seafile.{{ dns_external_domain_suffix }}"
  time_zone: "Europe/Berlin"
  jwt_secret: "CHANGEME_50_CHARS_OF_RANDOM"
  admin:
    email: "admin@example.com"
    password: "changeme"
  db:
    root_password: "changeme"
    password: "changeme"
  images:
    server: {repo: "seafileltd/seafile-mc", tag: "13.0-latest"}
    mariadb: {repo: "mariadb", tag: "11.4"}
    memcached: {repo: "memcached", tag: "1.6-alpine"}
  resources:
    server: {memory_request: "512Mi", memory_limit: "2Gi"}
    mariadb: {memory_request: "256Mi", memory_limit: "1Gi"}
    memcached: {memory_limit: "128Mi"}

# Forgejo (Gitea fork) — dummy values; real secrets in group_vars/all/vault.yml.
# hash_behaviour=replace: vault.yml's `forgejo:` overrides this entirely, so the
# operational keys are duplicated. Keep in sync with vault.yml and
# roles/k8s_infra/defaults/main.yml. DB password = postgresql_forgejo_password.
# secret_key/internal_token/*_jwt_secret are Forgejo's symmetric keys (generate
# with `forgejo generate secret <NAME>` or `openssl rand -hex 32`); rotating them
# loses all encrypted data (2FA/OAuth/sessions). admin is bootstrapped once.
forgejo:
  data_base: "/mnt/nfs/forgejo-data"
  namespace: "forgejo"
  hostname: "forgejo.{{ dns_external_domain_suffix }}"
  time_zone: "Europe/Berlin"
  app_name: "Forgejo"
  uid: 1000
  gid: 1000
  disable_ssh: true
  disable_registration: true
  trusted_proxies: "10.68.0.0/16,10.69.0.0/16"
  secret_key: "CHANGEME_SECRET_KEY"
  internal_token: "CHANGEME_INTERNAL_TOKEN"
  oauth2_jwt_secret: "CHANGEME_OAUTH2_JWT"
  lfs_jwt_secret: "CHANGEME_LFS_JWT"
  admin:
    username: "admin"
    email: "admin@example.com"
    password: "changeme"
  images:
    server: {repo: "codeberg.org/forgejo/forgejo", tag: "15.0.3"}
  resources:
    server: {memory_request: "256Mi", memory_limit: "1Gi"}

