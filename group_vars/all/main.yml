---
ansible_ssh_user: root

fail2ban_recipient: "fail2ban@example.com"
fail2ban_ignoreips:
  - "192.168.123.0/16"

certmanager_letsencrypt_email: "admin@example.com"
smartd_mail_recipients: "root,admin@example.com"

# Postfix relay
postfix_relayhost: "[mail.example.com]"

# Geoblock/Allow
geoallow:
  - de
geoblock:
  - cn

localnets:
  - { cidr: "10.0.0.0/8", comment: "private-rfc1918" }
  - { cidr: "172.16.0.0/12", comment: "private-rfc1918" }
  - { cidr: "192.168.0.0/16", comment: "private-rfc1918" }
  - { cidr: "169.254.0.0/16", comment: "link-local" }

localnets_ipv6:
  - { cidr: "fe80::/10", comment: "link-local" }

# OpenWebUI
openwebui_secret_key: "CHANGEME_SECRET_KEY"
openwebui_admin_email: "admin@example.com"
openwebui_admin_password: "changeme"
# Bearer tokens for LiteLLM-backed endpoints. Length of
# openwebui_connections_openai_keys must match openwebui_connections_openai.
openwebui_connections_openai_keys:
  - "CHANGEME_LITELLM_CHAT_KEY"
openwebui_embedding_openai_key: "CHANGEME_LITELLM_EMBED_KEY"

# HuggingFace
hf_token: "hf_CHANGEME"

# nsupdate / DNS
nsupdate_server: "198.51.100.1"
nsupdate_zone: "example.com"
nsupdate_tsig_key_name: "dgx.example.com"
nsupdate_tsig_key_secret: "CHANGEME_BASE64_TSIG_KEY"
nsupdate_tsig_algorithm: "hmac-sha256"
nsupdate_ttl: 3600
nsupdate_ingress_ip: "192.168.124.100"

# QSFP IPs for NCCL bootstrap
qsfp_ip_spark1: "10.10.10.101"
qsfp_ip_spark2: "10.10.10.102"
qsfp_ip_spark3: "10.10.10.103"
qsfp_ip_spark4: "10.10.10.104"


# SR-IOV: create Virtual Functions on the QSFP PF used by Multus.
# Used by both dgx_prepare (creates VFs on hosts) and k8s_dgx (selects NADs).
qsfp_sriov_enabled: true
# VF interface name prefix (kernel drops "npN" from VF names: enp1s0f0np0 → enp1s0f0vX)
qsfp_sriov_vf_prefix: "enp1s0f0"

# SR-IOV VF assignments per deployment.
# Each deployment gets its own VF index + dedicated IPs per spark node.
# This allows multiple engines to run on different VFs simultaneously.
# vf: which VF index (maps to NAD qsfp-vfN and interface <prefix>vN)
# head_ip: QSFP IP for the head pod (rank 0, spark1)
# worker_ip1..N: QSFP IPs for worker pods (rank 1..N, spark2..N+1)
qsfp_sriov_assignments:
  sglang:
    vf: 0
    head_ip: "10.10.10.201"
    worker_ip1: "10.10.10.202"
    worker_ip2: "10.10.10.203"
    worker_ip3: "10.10.10.204"
  sglang_coder:
    vf: 4
    head_ip: "10.10.10.241"
    worker_ip1: "10.10.10.242"
    worker_ip2: "10.10.10.243"
    worker_ip3: "10.10.10.244"
  sglang_res1:
    vf: 5
    head_ip: "10.10.10.251"
    worker_ip1: "10.10.10.252"
    worker_ip2: "10.10.10.253"
    worker_ip3: "10.10.10.254"
  sglang_res2:
    vf: 6
    head_ip: "10.10.10.061"
    worker_ip1: "10.10.10.062"
    worker_ip2: "10.10.10.063"
    worker_ip3: "10.10.10.064"
  vllm:
    vf: 1
    head_ip: "10.10.10.205"
    worker_ip1: "10.10.10.206"
    worker_ip2: "10.10.10.207"
    worker_ip3: "10.10.10.208"
  sglang_shard:
    vf: 2
    head_ip: "10.10.10.209"
    worker_ip1: "10.10.10.210"
    worker_ip2: "10.10.10.211"
    worker_ip3: "10.10.10.212"
  vllm_shard:
    vf: 3
    head_ip: "10.10.10.213"
    worker_ip1: "10.10.10.214"
    worker_ip2: "10.10.10.215"
    worker_ip3: "10.10.10.216"
  iperf_test:
    vf: 7
    server_ip: "10.10.10.241"
    client_ip: "10.10.10.242"

# PostgreSQL
postgresql_postgres_password: "changeme"
postgresql_openwebui_password: "changeme"
postgresql_litellm_password: "changeme"
postgresql_honcho_password: "changeme"
postgresql_hindsight_password: "changeme"

# Honcho (AI memory backend) — dummy values; override the real ones in
# group_vars/all/vault.yml. honcho_jwt_secret signs the API's bearer JWTs
# (AUTH_USE_AUTH=true); generate with `python scripts/generate_jwt_secret.py`
# in the honcho repo, or any long random string. Changing it invalidates all
# issued tokens. The LiteLLM key Honcho uses is litellm_master_key (above).
honcho_jwt_secret: "changeme-honcho-jwt-secret"

# Honcho per-feature LLM API keys — dummy values; real ones in
# group_vars/all/vault.yml. Each Honcho feature picks up its OWN key via
# `api_key_env` in config.toml (see roles/k8s_dgx/tasks/honcho.yml), so you can
# point e.g. dream at a different provider/key than deriver. Currently every
# feature routes through LiteLLM, so the real values all = litellm_master_key.
# (The embedding key is set for completeness; ollama-embed ignores it.)
honcho_deriver_api_key: "sk-changeme"
honcho_dialectic_api_key: "sk-changeme"
honcho_summary_api_key: "sk-changeme"
honcho_dream_api_key: "sk-changeme"
honcho_embedding_api_key: "sk-changeme"

# Hindsight (agent memory backend) — dummy values; real ones in
# group_vars/all/vault.yml. Auth uses our own KeyMapTenantExtension (no Supabase):
#   hindsight_tenant_keymap  — JSON-able map of bearer key -> tenant name; each
#                              tenant gets its own Postgres schema. Add real keys
#                              (long random strings) here in vault. Keys are NOT
#                              templated — write literal strings.
#   hindsight_api_key        — the default/admin tenant's bearer key; doubles as
#                              the control-plane dataplane + UI access key. MUST
#                              be one of the keys in hindsight_tenant_keymap.
#   hindsight_llm_api_key    — upstream text-gen key (= LiteLLM master key here).
#   hindsight_embeddings_api_key — sent to ollama-embed, which ignores it.
hindsight_tenant_keymap:
  "changeme-hindsight-api-key": "default"
hindsight_api_key: "changeme-hindsight-api-key"
hindsight_llm_api_key: "sk-changeme"
hindsight_embeddings_api_key: "sk-changeme"

# LiteLLM
litellm_master_key: "sk-changeme"
litellm_salt_key: "changeme-salt-key"
litellm_ui_username: "admin"
litellm_ui_password: "changeme"

# LiteLLM virtual keys — metadata only. Actual sk-... tokens are generated at
# runtime by the /key/generate API and persisted as K8s Secrets
# litellm-vkey-<alias>. Consumer roles read these Secrets directly; nothing
# sensitive leaks into git.
litellm_virtual_keys:
  - key_alias: "openwebui-chat"
    user_id: "openwebui-chat"
    max_budget: null
    budget_duration: "30d"
    tpm_limit: 0
    rpm_limit: 0
    models: []
  - key_alias: "openwebui-embedding"
    user_id: "openwebui-embedding"
    max_budget: null
    budget_duration: "30d"
    tpm_limit: 0
    rpm_limit: 0
    models: ["{{ ollama_embedding_model }}"]

# Grafana
grafana_admin_password: "changeme"
grafana_root_url: "https://grafana.example.com"

# Seafile (CE) — full operational config. With hash_behaviour=replace (Ansible
# default), vault.yml's `seafile:` REPLACES this whole block — so vault.yml
# must carry the operational keys too. Same pattern as
# qsfp_sriov_assignments / nut_ups_shutdown_map.
# DB has its own root + per-app user; admin login is auto-bootstrapped on
# first start of the seafile-server pod via INIT_SEAFILE_ADMIN_* env vars.
seafile:
  data_base: "/mnt/nfs/seafile-data"
  mariadb_data_base: "/var/lib/k8s-data/seafile-mariadb"
  namespace: "seafile"
  hostname: "seafile.{{ dns_external_domain_suffix }}"
  time_zone: "Europe/Berlin"
  jwt_secret: "CHANGEME_50_CHARS_OF_RANDOM"
  admin:
    email: "admin@example.com"
    password: "changeme"
  db:
    root_password: "changeme"
    password: "changeme"
  images:
    server:    { repo: "seafileltd/seafile-mc", tag: "13.0-latest" }
    mariadb:   { repo: "mariadb",               tag: "11.4" }
    memcached: { repo: "memcached",             tag: "1.6-alpine" }
  resources:
    server:    { memory_request: "512Mi", memory_limit: "2Gi" }
    mariadb:   { memory_request: "256Mi", memory_limit: "1Gi" }
    memcached: { memory_limit: "128Mi" }

# Keel
keel_basic_auth_password: "changeme"
keel_gotify_token: "CHANGEME_GOTIFY_TOKEN"
keel_gotify_url: "https://gotify.example.com"

# Alertmanager
alertmanager_smtp_smarthost: "mail.example.com:25"
alertmanager_smtp_mailfrom: "alertmanager@example.com"
alertmanager_alert_email: "admin@example.com"
alertmanager_gotify_token: "CHANGEME_GOTIFY_TOKEN"
alertmanager_gotify_url: "https://gotify.example.com"

# iptables
iptables_xosrc_ips: []
iptables_lifeline_ips: []
iptables_k3s_external_ips: []
iptables_static_dns_ips: []

# Clevis / Tang NBDE
clevis_tang_servers:
  - "http://tang.example.com"

# WiFi access points
wifi_access_points: []

# NUT UPS
nut_ups_name: "greencell"
nut_ups_secondary_name: "greencell2"
nut_admin_password: "changeme"
nut_monitor_password: "changeme"


# DynDNS hostname for ipset updates
dyndns_hostname: "dyn.example.com"

# HAProxy stats + Traefik dashboard
haproxy_stats_password: "changeme"
traefik_dashboard_password: "changeme"

# Traefik IP-Allowlist for internal services (k8s_infra + k8s_dgx)
traefik_internal_allowlist:
  - "192.168.123.0/24"
  - "192.168.124.0/24"

# NUT exporter (k8s_infra)
nut_exporter_server: "192.168.124.100"
nut_exporter_password: "changeme"


# === Nous Hermes Agent (per-user deployments) — SCHEMA REFERENCE ===
# Public schema documentation. Real entries live in group_vars/all/vault.yml
# (git-crypted) and override this list entirely. Default is `[]` from
# roles/k8s_dgx/defaults/main.yml — this dummy is purely illustrative.
# `enabled: false` on every entry keeps it inert even if vault.yml is missing.
#
# Per-user gates (independent):
#   dashboard_enabled  → official `hermes dashboard` pod  (<u>.hermes-dashboard.<dns>)
#   dashboard_tui      → adds embedded chat tab to the dashboard
#   webui_enabled      → ghcr.io/nesquena/hermes-webui pod (<u>.hermes.<dns>)
#   email.enabled      → `hermes gateway run` sidecar inside the webui pod
#                        (implies webui_enabled; reads EMAIL_* from /opt/data/.env)
hermes_users:
  - username: example
    uid: 1500
    gid: 1500
    litellm_token: "sk-REPLACE-WITH-PER-USER-LITELLM-VIRTUAL-KEY"
    litellm_model: ""                  # empty → falls back to hermes_default_model
    basicauth_password: "changeme"     # defaults to litellm_token if unset
    webui_password: "changeme"         # defaults to basicauth_password if unset
    dashboard_enabled: false
    dashboard_tui: false
    webui_enabled: true
    hermes_debug: false                # true → logging.level=DEBUG in config.yaml
    email:                             # omit block or set enabled:false to skip
      enabled: false
      address: "hermes-example@example.com"
      password: "imap-app-password"    # Gmail/Outlook: app password, NOT account password
      imap_host: "imap.example.com"
      smtp_host: "smtp.example.com"
      imap_port: 993                   # default 993  (IMAP SSL)
      smtp_port: 587                   # default 587  (SMTP STARTTLS)
      poll_interval: 15                # default 15s between IMAP polls
      home_address: "owner@example.com"  # fallback recipient for autonomous tasks
      allow_all_users: false           # true → ignore allowed_users
      allowed_users:                   # sender whitelist
        - "owner@example.com"
      skip_attachments: false          # true → strip attachments before LLM
      # Folder-lifecycle knobs (local patch over upstream gateway/platforms/email.py).
      # Empty string "" opts out of the respective stage. Defaults shown below.
      working_folder: "Hermes_Working" # INBOX→Working at fetch; "" → skip, INBOX→Done directly
      done_folder: "Hermes_Done"       # final destination after handle_message(); "" → no moves
      sent_folder: "Sent"              # IMAP APPEND target for outbound replies; "" → SMTP-only
      process_existing: true           # true (default) → process pre-existing UNSEEN INBOX backlog on start
      cpu_limit: "500m"                # sidecar caps; defaults 500m / 512Mi
      memory_limit: "512Mi"
    # Ops-managed overrides for the webui Preferences panel. Merged into
    # /opt/data/.webui/settings.json on every pod start — the keys listed
    # here ALWAYS win, any other keys the user has set via the UI
    # (POST /api/settings) are preserved untouched. Mirrors the
    # config.yaml/.env merge pattern. Upstream defaults live in
    # nesquena/hermes-webui at api/config.py:_SETTINGS_DEFAULTS — only
    # list keys here that you actually want to lock to a specific value.
    # Omit the key or set to {} to leave settings.json entirely up to the user.
    webui_settings:
      simplified_tool_calling: true    # "Compact tool activity"        (upstream: true)
      api_redact_enabled: true         # "Redact sensitive data"        (upstream: true)
      sidebar_density: "compact"       # "Sidebar density"              (upstream: "compact") — "detailed"|"compact"|"minimal"
      auto_title_refresh_every: "0"    # "Adaptive title refresh"       (upstream: "0" = Off)
      busy_input_mode: "queue"         # "Busy input mode"              (upstream: "queue") — "queue"|"interrupt"|"steer"
      show_cli_sessions: false         # "Show non-WebUI sessions"      (upstream: false) — set true to see Email/CLI sessions
      sync_to_insights: false          # "Sync to insights"             (upstream: false)
      check_for_updates: true          # "Check for updates"            (upstream: true)
      whats_new_summary_enabled: false # "Summarize What's New with AI" (upstream: false)
    enabled: false
